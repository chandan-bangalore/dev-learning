e></pre>"}, {"level": "basic", "q": "What is subcarrier spacing (SCS) in NR and why 15/30/60 kHz?", "a": "OFDM subcarrier spacing <code>Δf</code>; slot duration scales inversely (<code>T_slot ≈ 1/(14·Δf)</code> for normal CP numerology). Larger SCS shortens slot for lower latency and wider phase-noise tolerance at mmWave.<br><br><b>🔑 Plain terms:</b> Wider tone spacing = shorter timeslots = snappier scheduling but less CP overhead tolerance per symbol.<br><b>💡 Example:</b> <pre><code>scs_khz = 30\nslot_ms = 1 / (14 * scs_khz * 1e3) * 1e3\nprint(\"approx normal-slot duration ms:\", round(slot_ms, 3))</code></pre>", "id": 51}, {"level": "basic", "q": "Why does NR OFDM use a cyclic prefix (CP)?", "a": "CP copies the end of the symbol to the front so linear convolution with multipath channel becomes circular within the FFT size—enables one-tap equalization per subcarrier if CP ≥ delay spread.<br><br><b>🔑 Plain terms:</b> Echo tail gets glued to the front so the math circle closes.<br><b>💡 Example:</b> <pre><code>Tcp_us = 4.7  # illustrative normal CP @ 30 kHz first symbol scale\nprint(\"CP time us (order):\", Tcp_us)</code></pre>", "id": 52}, {"level": "intermediate", "q": "What is a Bandwidth Part (BWP) in NR?", "a": "A contiguous subset of carrier bandwidth with its own numerology and control/data configuration—UE can switch BWPs to save power or adapt capability.<br><br><b>🔑 Plain terms:</b> Use a smaller window on the big spectrum sometimes.<br><b>💡 Example:</b> <pre><code>print(\"RRC: bwp-Downlink / bwp-Uplink lists + active BWP id\")</code></pre>", "id": 53}, {"level": "intermediate", "q": "What is CORESET vs search space?", "a": "CORESET defines time/frequency control region (PDCCH candidates); search space lists monitored blind decode candidates within CORESETs.<br><br><b>🔑 Plain terms:</b> Where to look for DCI vs the checklist of places to peek.<br><b>💡 Example:</b> <pre><code>print(\"Blind decoding budget drives UE complexity\")</code></pre>", "id": 54}, {"level": "intermediate", "q": "What is PTRS in NR downlink?", "a": "Phase Tracking RS helps track phase noise on high frequencies / high-order QAM by inserting known pilots sparsely in time/frequency.<br><br><b>🔑 Plain terms:</b> Tiny compass corrections for wobbly mmWave LO.<br><b>💡 Example:</b> <pre><code>print(\"PTRS density increases with MCS and carrier frequency (deployment-dependent)\")</code></pre>", "id": 55}, {"level": "intermediate", "q": "What is PRACH long vs short formats (high level)?", "a": "Long formats for large cells / satellite-NTN style delays; short formats for small cells and faster acquisition—different preamble lengths/repetitions.<br><br><b>🔑 Plain terms:</b> Long knock on door vs short rapid taps.<br><b>💡 Example:</b> <pre><code>print(\"RACH config: prach-ConfigurationIndex selects preamble format / occasion mapping\")</code></pre>", "id": 56}, {"level": "intermediate", "q": "What is SS/PBCH block (SSB) burst?", "a": "NR sync raster uses SSB bursts (PSS/SSS/PBCH) for cell search; burst periodicity (e.g. 5/20 ms) trades acquisition time vs overhead.<br><br><b>🔑 Plain terms:</b> Lighthouse flashes for ‘where is the cell’.<br><b>💡 Example:</b> <pre><code>print(\"ssb-PeriodicityServingCell / SMTC window for measurements\")</code></pre>", "id": 57}, {"level": "intermediate", "q": "What is asynchronous UL HARQ in NR?", "a": "UL grants may not be tied to fixed slot offsets relative to previous transmissions as tightly as in some LTE designs—scheduler flexibility; UE tracks HARQ processes by DCI timing.<br><br><b>🔑 Plain terms:</b> Resend uplink pieces when told, without rigid train schedule.<br><b>💡 Example:</b> <pre><code>print(\"UE maintains ul harq entity per CC / process id from DCI\")</code></pre>", "id": 58}, {"level": "intermediate", "q": "What is rate matching vs puncturing for LDPC in NR?", "a": "Rate matching systematically repeats/prunes coded bits to match assigned REs; differs from ad-hoc puncturing patterns in older codes.<br><br><b>🔑 Plain terms:</b> Tailor the sweater to exact chair size after knitting.<br><b>💡 Example:</b> <pre><code>print(\"DLSCH: RM uses E, N_cb, redundancy version RV\")</code></pre>", "id": 59}, {"level": "intermediate", "q": "What is DMRS additional positions?", "a": "Front-loaded DMRS plus optional additional symbols track channel variation over the slot—important for mobility and high Doppler.<br><br><b>🔑 Plain terms:</b> Extra snapshots when the channel moves mid-slot.<br><b>💡 Example:</b> <pre><code>print(\"dmrs-AdditionalPosition: pos0/pos1/pos2/pos3 (type-dependent)\")</code></pre>", "id": 60}, {"level": "intermediate", "q": "What is SRS wideband vs narrowband probing?", "a": "Wideband SRS estimates channel across many RBs for scheduling/precoding; narrowband probes specific regions with lower overhead.<br><br><b>🔑 Plain terms:</b> Whole-room photo vs snapshot in one corner.<br><b>💡 Example:</b> <pre><code>print(\"c-SRS / b-SRS bandwidth config via RRC\")</code></pre>", "id": 61}, {"level": "intermediate", "q": "What is mini-slot scheduling in NR?", "a": "Transmission can start mid-slot and span fewer than 14 symbols for low latency (subject to numerology and constraints).<br><br><b>🔑 Plain terms:</b> Use part of a timeslice for urgent traffic.<br><b>💡 Example:</b> <pre><code>print(\"pdsch-TimeDomainAllocation: startSymbolAndLength SLIV\")</code></pre>", "id": 62}, {"level": "intermediate", "q": "What is extended CP in NR?", "a": "Longer CP symbol for larger delay spread channels (e.g. some NTN / large cells) at cost of spectral efficiency per OFDM symbol.<br><br><b>🔑 Plain terms:</b> Wider bumper on each OFDM car.<br><b>💡 Example:</b> <pre><code>print(\"extendedCP: fewer symbols per slot, larger Tcp\")</code></pre>", "id": 63}, {"level": "advanced", "q": "What is low-PAPR waveform research context vs CP-OFDM in NR?", "a": "NR DL default is CP-OFDM; DFT-s-OFDM optional on UL mainly for PAPR reduction on power-limited UEs—trade frequency localization.<br><br><b>🔑 Plain terms:</b> Smoother UL waveform option vs classic OFDM spikes.<br><b>💡 Example:</b> <pre><code>print(\"Transform precoding enabled -> DFT-s-OFDM PUSCH\")</code></pre>", "id": 64}, {"level": "advanced", "q": "What is Type II CSI codebook (intuition)?", "a": "Higher-resolution linear combination precoder feedback using wideband/subband basis—more bits than Type I for better MU-MIMO matching at cost of UL overhead.<br><br><b>🔑 Plain terms:</b> Describe the beam with a richer recipe book.<br><b>💡 Example:</b> <pre><code>print(\"Type II: subband + layer combination indices (release-dependent)\")</code></pre>", "id": 65}]};

let viewed={};let levelFilter={};
TOPICS.forEach(t=>{viewed[t.id]=new Set();levelFilter[t.id]='all';});
let activeTopic='ntn';

function switchTopic(id){
  activeTopic=id;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tbtn-'+id).classList.add('active');
  document.querySelectorAll('.topic-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

function setLevel(tid,level,el){
  levelFilter[tid]=level;
  el.closest('.topic-panel').querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderQuestions(tid);
}
function handleLevel(el){
  const tid=el.getAttribute('data-tid');
  const level=el.getAttribute('data-level');
  setLevel(tid,level,el);
}

function toggle(tid,id){
  const el=document.getElementById('qi-'+tid+'-'+id);
  const wasOpen=el.classList.contains('open');
  el.classList.toggle('open');
  if(!wasOpen){viewed[tid].add(id);updateProgress(tid);}
}
function handleToggle(el){
  const tid=el.getAttribute('data-tid');
  const id=parseInt(el.getAttribute('data-id'));
  toggle(tid,id);
}

function updateProgress(tid){
  const total=ALL_QUESTIONS[tid].length;
  const done=viewed[tid].size;
  const pct=Math.round(done/total*100);
  const fill=document.getElementById('prog-'+tid);
  const txt=document.getElementById('progtxt-'+tid);
  if(fill)fill.style.width=pct+'%';
  if(txt)txt.textContent=done+' / '+total;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderQuestions(tid){
  const qs=ALL_QUESTIONS[tid];
  const level=levelFilter[tid];
  const filtered=level==='all'?qs:qs.filter(q=>q.level===level);
  const basics=filtered.filter(q=>q.level==='basic');
  const ints=filtered.filter(q=>q.level==='intermediate');
  const advs=filtered.filter(q=>q.level==='advanced');

  function renderGroup(items,label,badgeClass,badgeLabel){
    if(!items.length)return '';
    let s='<div class="section-label">'+label+'</div>';
    items.forEach(q=>{
      s+='<div class="q-item" id="qi-'+tid+'-'+q.id+'">'+
        '<div class="q-header" data-tid="'+tid+'" data-id="'+q.id+'" onclick="handleToggle(this)">'+
        '<span class="q-num">'+q.id+'.</span>'+
        '<span class="q-text">'+q.q+'</span>'+
        '<span class="q-chevron">&#9658;</span>'+
        '</div><div class="q-body"><span class="badge '+badgeClass+'">'+badgeLabel+'</span><br>'+q.a+'</div>'+
        '</div>';
    });
    return s;
  }

  const container=document.getElementById('qs-'+tid);
  let html=renderGroup(basics,'Basic','','Basic')+
           renderGroup(ints,'Intermediate','','Intermediate')+
           renderGroup(advs,'Advanced','badge-adv','Advanced');
  if(!html)html='<p class="empty">No questions match this filter.</p>';
  container.innerHTML=html;
}

const nav=document.getElementById('topic-nav');
const panels=document.getElementById('panels');

TOPICS.forEach(t=>{
  const qs=ALL_QUESTIONS[t.id];
  const total=qs.length;
  const basicCount=qs.filter(q=>q.level==='basic').length;
  const intCount=qs.filter(q=>q.level==='intermediate').length;
  const advCount=qs.filter(q=>q.level==='advanced').length;

  const btn=document.createElement('button');
  btn.className='topic-btn '+t.cls+(t.id===activeTopic?' active':'');
  btn.id='tbtn-'+t.id;
  btn.setAttribute('data-tid',t.id);
  btn.onclick=function(){switchTopic(this.getAttribute('data-tid'));};
  btn.innerHTML='<span class="dot"></span>'+t.icon+' '+t.label+' <span style="font-size:11px;opacity:0.7">('+total+')</span>';
  nav.appendChild(btn);

  const panel=document.createElement('div');
  panel.className='topic-panel '+t.cls+(t.id===activeTopic?' active':'');
  panel.id='panel-'+t.id;
  panel.innerHTML=
    '<div class="progress-row">'+
    '<span class="progress-label">Viewed</span>'+
    '<div class="progress-bar"><div class="progress-fill" id="prog-'+t.id+'" style="background:var(--tc);"></div></div>'+
    '<span class="progress-count" id="progtxt-'+t.id+'">0 / '+total+'</span>'+
    '</div>'+
    '<div class="level-tabs">'+
    '<button class="ltab '+t.cls+' active" data-tid="'+t.id+'" data-level="all" onclick="handleLevel(this)">All ('+total+')</button>'+
    '<button class="ltab '+t.cls+'" data-tid="'+t.id+'" data-level="basic" onclick="handleLevel(this)">Basic ('+basicCount+')</button>'+
    '<button class="ltab '+t.cls+'" data-tid="'+t.id+'" data-level="intermediate" onclick="handleLevel(this)">Intermediate ('+intCount+')</button>'+
    (advCount>0?'<button class="ltab '+t.cls+'" data-tid="'+t.id+'" data-level="advanced" onclick="handleLevel(this)">Advanced ('+advCount+')</button>':'')+
    '</div>'+
    '<div id="qs-'+t.id+'"></div>';
  panels.appendChild(panel);
  renderQuestions(t.id);
});
</script>
</body>
</html>
