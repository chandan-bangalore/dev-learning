n-conversion pipelines.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# CIC filter operation — R stages of integrators then combs:\n# Integrator (recursive accumulator):  y[n] = y[n-1] + x[n]\n# Comb (differencer):                  y[n] = x[n] - x[n-M]\n# where M = differential delay (usually 1 or 2)\n\ndef cic_decimate(x, R, N, M=1):\n    \"\"\"\n    CIC decimator: R=decimation factor, N=stages, M=differential delay\n    No multiplications — suitable for FPGA implementation\n    \"\"\"\n    y = x.copy().astype(np.float64)\n\n    # N integrator stages (run at full rate):\n    for _ in range(N):\n        y = np.cumsum(y)   # y[n] = y[n-1] + x[n]\n\n    # Decimate by R:\n    y = y[::R]\n\n    # N comb stages (run at decimated rate):\n    for _ in range(N):\n        y = np.diff(y, prepend=np.zeros(M))   # y[n] = y[n] - y[n-M]\n\n    return y\n\n# Example: 5-stage CIC, decimate by 8:\nx = np.random.randn(1024)\ny = cic_decimate(x, R=8, N=5, M=1)\nprint(f\"Input length: {len(x)}, Output length: {len(y)}\")   # 1024 -> 128\n\n# CIC gain = (R*M)^N — must compensate after decimation\ngain = (8 * 1)**5\nprint(f\"CIC gain: {gain}\")   # 32768 — normalize output by this\n# Limitation: frequency droop near passband edge — compensated with half-band FIR</code></pre>"}, {"id": 23, "level": "intermediate", "q": "What is a Goertzel algorithm and when is it preferred over FFT?", "a": "The Goertzel algorithm efficiently computes a single DFT bin or a small subset of bins. Complexity: O(N) per bin vs FFT O(N log N) total. Useful when you need only a few specific frequencies. Algorithm: second-order IIR: <code>s[n] = x[n] + 2cos(2πk/N)·s[n-1] - s[n-2]</code>, final output: <code>y = s[N] - e^{-j2πk/N}·s[N-1]</code>. Example: DTMF tone detection (only need 8 specific frequencies from 8 kHz audio — Goertzel processes 8 bins in 8N ops vs FFT at N log N). Also used in: partial DFT, specific frequency monitoring, radar Doppler bin extraction.<br><br><b>🔑 Plain terms:</b> Goertzel computes the DFT at ONE specific frequency using only a 2nd-order IIR filter — it's O(N) vs FFT's O(N log N) when you only need a few frequency bins, not the full spectrum.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\ndef goertzel(x, k, N):\n    \"\"\"\n    Compute DFT magnitude at frequency bin k of N-point DFT.\n    Much faster than FFT when you need only a few bins.\n    \"\"\"\n    omega = 2 * np.pi * k / N\n    cos_w = np.cos(omega)\n    coeff = 2 * cos_w\n    s0, s1, s2 = 0.0, 0.0, 0.0\n    for sample in x:\n        s0 = sample + coeff * s1 - s2\n        s2 = s1\n        s1 = s0\n    # Final output:\n    power = s1**2 + s2**2 - coeff * s1 * s2\n    return np.sqrt(power)\n\n# Detect DTMF tone '5' (770 Hz + 1336 Hz):\nFs = 8000; N = 512\nt  = np.arange(N) / Fs\nx  = (np.sin(2*np.pi*770*t) +\n      np.sin(2*np.pi*1336*t) +\n      0.1*np.random.randn(N))\n\n# Check the 4 column frequencies of DTMF:\nfor f in [1209, 1336, 1477, 1633]:\n    k   = round(f * N / Fs)\n    mag = goertzel(x, k, N)\n    print(f\"f={f:4d} Hz: magnitude={mag:.1f}  {'<-- DETECTED' if mag>20 else ''}\")\n\n# Goertzel uses only 2 multiplications per sample (vs ~N/2*log2(N) for FFT)\n# Preferred when detecting <10 known frequencies from a long signal</code></pre>"}, {"id": 24, "level": "intermediate", "q": "What is group delay and why does it matter?", "a": "Group delay τ_g(ω) = -dφ(ω)/dω is the time delay of a frequency component through a system. It measures how much each frequency is delayed. Linear phase filter: constant group delay — all frequencies delayed equally — no dispersion (waveform shape preserved). IIR filters: nonlinear phase — different frequencies delayed by different amounts — causes signal distortion. Critical in: audio (linear phase FIR for audiophile quality), communications (inter-symbol interference if non-constant group delay across signal bandwidth), video. FIR filters with symmetric coefficients have linear phase. <code>grpdelay(b,a)</code> in MATLAB plots group delay.<br><br><b>🔑 Plain terms:</b> Group delay is how long each frequency takes to pass through a filter. Constant group delay = all frequencies arrive at the same time (linear phase) — the wave shape is preserved. Variable group delay distorts the signal shape.<br><b>💡 Example:</b> <pre><code>import numpy as np\nfrom scipy import signal\n\nFs = 1000\n\n# FIR filter — linear phase (constant group delay):\nb_fir = signal.firwin(51, 100, fs=Fs)\nw, gd_fir = signal.group_delay((b_fir, 1))\ngd_fir_ms = gd_fir[len(gd_fir)//4] / Fs * 1000   # at passband centre\nprint(f\"FIR group delay: {gd_fir_ms:.1f} ms (constant = linear phase)\")\n\n# IIR Butterworth — non-linear phase (variable group delay):\nb_iir, a_iir = signal.butter(4, 100, fs=Fs)\nw, gd_iir = signal.group_delay((b_iir, a_iir))\ngd_low  = gd_iir[1]  / Fs * 1000   # near DC\ngd_high = gd_iir[50] / Fs * 1000   # near cutoff\nprint(f\"IIR group delay: {gd_low:.1f} ms at DC, {gd_high:.1f} ms near cutoff\")\n# Group delay peaks near cutoff — high frequencies delayed differently\n\n# Why does this matter?\n# Digital communications: ISI occurs if different frequencies arrive at different times\n# Audio: linear phase FIR = transparent, IIR = phase coloration\n# Radar: non-linear phase smears pulse shape -> reduced range resolution\n# 5G NR uses linear phase FIR for prototype filter in OFDM guard bands</code></pre>"}, {"id": 25, "level": "intermediate", "q": "What is the Hilbert transform and what is an analytic signal?", "a": "The Hilbert transform shifts all frequency components by -90° (multiplies by -j·sgn(f)). The analytic signal z(t) = x(t) + j·H{x(t)} has a one-sided spectrum (no negative frequencies). Envelope: |z(t)|. Instantaneous phase: angle(z(t)). Instantaneous frequency: d(angle(z))/dt. Discrete Hilbert transform: computed via FFT — zero the negative frequency components, double positive. MATLAB: <code>hilbert(x)</code> returns analytic signal. Applications: envelope detection, AM demodulation, instantaneous frequency estimation, single-sideband modulation, speech processing, 5G OFDM signal analysis.<br><br><b>🔑 Plain terms:</b> The Hilbert transform converts a real bandpass signal to a complex (analytic) signal, where the imaginary part is the real part shifted 90 degrees. This lets you extract instantaneous amplitude, frequency, and phase at every sample.<br><b>💡 Example:</b> <pre><code>import numpy as np\nfrom scipy import signal\n\nFs = 1000\nt  = np.linspace(0, 2, 2*Fs)\n\n# AM signal: amplitude-modulated carrier\ncarrier     = np.sin(2*np.pi*100*t)\nmodulation  = 1 + 0.5*np.sin(2*np.pi*5*t)   # 5 Hz AM\nx           = modulation * carrier\n\n# Analytic signal via Hilbert transform:\nanalytic    = signal.hilbert(x)\namplitude   = np.abs(analytic)        # instantaneous amplitude (envelope)\nphase       = np.angle(analytic)      # instantaneous phase (radians)\nfrequency   = np.diff(np.unwrap(phase)) / (2*np.pi) * Fs  # instantaneous frequency (Hz)\n\nprint(f\"Mean instantaneous amplitude: {np.mean(amplitude):.3f}\")  # ≈ 0.5*(1 + 0.5) ≈ 1.0\nprint(f\"Instantaneous freq (centre): {np.mean(frequency):.1f} Hz\")  # ≈ 100 Hz\n\n# In 5G NR / radar:\n# x[n] = I[n] + j*Q[n]  is ALREADY the analytic signal from the DDC\n# No need for Hilbert transform if you have I/Q samples directly\n# |I + jQ| = signal envelope (used for RSSI/AGC)\n# angle(I + jQ) = phase (used for demodulation)</code></pre>"}, {"id": 26, "level": "intermediate", "q": "What is OFDM and why is it used in 5G?", "a": "OFDM (Orthogonal Frequency Division Multiplexing) transmits data on many narrow, orthogonal subcarriers simultaneously. Each subcarrier is a separate FFT bin. Subcarrier spacing Δf = 1/T_symbol. Orthogonality: subcarriers don't interfere if spaced at 1/T. Cyclic prefix (CP): copies last portion of symbol to the start — eliminates inter-symbol interference (ISI) from multipath if CP length > channel delay spread. Modulated via IFFT (transmitter), demodulated via FFT (receiver). Advantages: robust to frequency-selective fading, efficient use of spectrum, simple equalisation (one tap per subcarrier). 5G NR uses flexible OFDM numerology: Δf = 15·2^μ kHz, μ=0..4.<br><br><b>🔑 Plain terms:</b> OFDM splits a wideband channel into hundreds of narrow subcarriers, each carrying just a few bits. If one subcarrier hits a frequency null, only a few bits are lost — not the whole signal. Each subcarrier is narrow enough to avoid inter-symbol interference from multipath.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# OFDM parameters (5G NR, 15 kHz SCS, 20 MHz channel):\nN_fft  = 2048         # FFT size\nN_cp   = 144          # cyclic prefix length (normal CP)\nSCS    = 15e3         # subcarrier spacing = 15 kHz\nFs     = SCS * N_fft  # = 30.72 MHz\n\nN_used = 1200         # 1200 active subcarriers (100 RBs * 12 subcarriers)\n\n# Transmitter:\n# Step 1: map QAM symbols to subcarriers (IFFT input):\nsymbols  = (np.random.choice([-1, 1], N_used) + 1j * np.random.choice([-1, 1], N_used))  # QPSK\nfreq_domain = np.zeros(N_fft, dtype=complex)\nfreq_domain[1 : N_used//2 + 1]      = symbols[:N_used//2]   # upper\nfreq_domain[N_fft - N_used//2 : ]   = symbols[N_used//2:]   # lower (negative freqs)\n\n# Step 2: IFFT -> time domain OFDM symbol:\ntime_symbol = np.fft.ifft(freq_domain) * np.sqrt(N_fft)\n\n# Step 3: add cyclic prefix (copy last N_cp samples to front):\nofdm_symbol = np.concatenate([time_symbol[-N_cp:], time_symbol])\n\nprint(f\"OFDM symbol length: {len(ofdm_symbol)} samples = {len(ofdm_symbol)/Fs*1e6:.1f} us\")\n# 2048 + 144 = 2192 samples = 71.4 us  (matches 5G NR spec)\n\n# At receiver: remove CP, FFT, one-tap equalizer per subcarrier\nrx_no_cp = ofdm_symbol[N_cp:]             # remove cyclic prefix\nrx_freq  = np.fft.fft(rx_no_cp) / np.sqrt(N_fft)  # FFT back to frequency domain</code></pre>"}, {"id": 27, "level": "intermediate", "q": "What is a polyphase filter bank?", "a": "A polyphase filter bank decomposes a filter into M sub-filters (polyphase components) operating at 1/M the original rate. For a length-N FIR filter decimating by M: polyphase components e_k[n] = h[nM + k]. Each component operates at output rate Fs/M. Efficiency: M× fewer computations than direct convolution. Synthesis filter bank: dual operation for interpolation. Perfect reconstruction filter banks: analysis + synthesis reconstruct original signal. Used in: channelisers (split wideband into channels), OFDM transmitter/receiver (DFT filter bank), audio sub-band coding (MP3, AAC), 5G NR channel filtering.<br><br><b>🔑 Plain terms:</b> A polyphase filter bank splits signals into subbands by combining IFFT/FFT operations with FIR filters. Used in 5G NR for baseband channel filtering and in software-defined radio for processing multiple channels simultaneously.<br><b>💡 Example:</b> <pre><code>import numpy as np\nfrom scipy import signal\n\n# M-channel analysis filter bank (split one wideband into M subbands):\nM    = 8       # 8 subbands\nK    = 4       # oversampling factor (filters are K*M taps long)\nN_pr = M * K   # prototype filter length\n\n# Design prototype lowpass filter (cutoff at pi/M):\nh = signal.firwin(N_pr, 1.0/M, window='hann')\n\n# Reshape into polyphase components:\n# E[m][k] = h[m + M*k]  for m=0..M-1, k=0..K-1\nE = h.reshape(K, M).T   # shape: (M, K)\nprint(f\"Polyphase matrix shape: {E.shape}\")   # (8, 4)\n\n# Analysis: apply polyphase FIR then IFFT\n# (this replaces M separate downsampled FIR filters + mixers)\ndef polyphase_analysis(x, E, M):\n    N = len(x)\n    output = np.zeros((M, N//M), dtype=complex)\n    for n in range(N//M):\n        # Extract M polyphase components:\n        block = x[n*M : (n+1)*M][::-1]       # reverse order\n        filtered = E @ block[:K] if K<=M else E @ np.pad(block, (0, max(0, K-len(block))))[:K]\n        # Actually just use FFT of filtered block:\n        output[:, n] = np.fft.ifft(filtered)\n    return output\n\n# Computational advantage:\n# Naive M filter bank: M * (K*M) MACs per sample = M^2 * K\n# Polyphase + FFT:     K MACs + M*log2(M) = much faster!</code></pre>"}, {"id": 28, "level": "intermediate", "q": "What is the Discrete Cosine Transform (DCT) and where is it used?", "a": "DCT transforms a signal into a sum of cosine waves. DCT-II (most common): X[k] = Σ x[n]·cos(π(2n+1)k/(2N)). Key property: energy compaction — most signal energy concentrated in low-frequency coefficients, allowing high compression. Real-valued (unlike complex DFT). DCT types: DCT-I through VIII. Applications: JPEG image compression (2D DCT on 8×8 blocks), MP3/AAC audio (MDCT = Modified DCT), video codecs (H.264, H.265, AV1 use DCT/DST variants for residual coding). The DCT is near-optimal for natural signals that have high inter-sample correlation.<br><br><b>🔑 Plain terms:</b> The DCT is like the FFT but for real-valued signals — it represents a signal as a sum of cosines only (no sines). Energy compaction property: most of the signal energy concentrates in the first few DCT coefficients, making it ideal for compression.<br><b>💡 Example:</b> <pre><code>import numpy as np\nfrom scipy.fft import dct, idct\n\n# DCT-II (the most common, used in JPEG and MP3):\n# X[k] = 2 * sum_{n=0}^{N-1} x[n] * cos(pi*k*(2n+1)/(2N))\n\n# Audio signal (one frame of 1024 samples):\nN    = 1024\nt    = np.arange(N) / 44100\nx    = np.sin(2*np.pi*440*t) + 0.5*np.sin(2*np.pi*880*t)  # A4 + A5\n\n# Apply DCT:\nX = dct(x, type=2, norm='ortho')\n\n# Energy compaction — most energy in first few coefficients:\ntotal_energy = np.sum(X**2)\nfor pct in [10, 20, 50]:\n    n_coeff  = int(N * pct / 100)\n    energy   = np.sum(np.sort(X**2)[::-1][:n_coeff])\n    print(f\"Top {pct:3d}% coefficients ({n_coeff:4d}): {100*energy/total_energy:.1f}% of energy\")\n# Top  10%  (102): 98.2% of energy   <- compression works!\n# Top  20%  (204): 99.8%\n# Top  50%  (512): 100.0%\n\n# Lossy compression: zero out small coefficients, reconstruct with IDCT:\nX_compressed = X.copy()\nthreshold    = np.percentile(np.abs(X), 80)   # zero out bottom 80%\nX_compressed[np.abs(X) < threshold] = 0\nx_reconstructed = idct(X_compressed, type=2, norm='ortho')\n\nsnr = 10*np.log10(np.mean(x**2) / np.mean((x - x_reconstructed)**2))\nprint(f\"Compression SNR: {snr:.1f} dB\")   # typically 20-40 dB</code></pre>"}, {"id": 29, "level": "intermediate", "q": "What is a wavelet transform and how does it differ from STFT?", "a": "Wavelets provide multi-resolution time-frequency analysis. Short wavelets for high frequencies (good time resolution), long wavelets for low frequencies (good frequency resolution) — adaptive resolution. STFT has fixed time-frequency resolution for all frequencies. Continuous WT: scale and translate a mother wavelet. Discrete WT (DWT): dyadic scales (2^j) — implemented via filter bank (low-pass = approximation coefficients, high-pass = detail coefficients, decimate by 2 each level). Fast DWT: O(N). Applications: image compression (JPEG 2000), denoising (threshold small wavelet coefficients), ECG analysis, seismic, transient detection. Haar, Daubechies, Symlets are common wavelets.<br><br><b>🔑 Plain terms:</b> Wavelets zoom in on both time and frequency simultaneously — short wavelet = high time resolution, long wavelet = high frequency resolution. Unlike STFT, the zoom level adapts to the frequency: high frequencies get fine time resolution, low frequencies get fine frequency resolution.<br><b>💡 Example:</b> <pre><code>import numpy as np\nimport pywt   # pip install PyWavelets\n\n# Discrete Wavelet Transform (DWT):\nsignal_data = (np.sin(2*np.pi*50*np.linspace(0,1,1024)) +\n               0.3*np.random.randn(1024))\n\n# Decompose with Daubechies-4 wavelet, 3 levels:\ncoeffs = pywt.wavedec(signal_data, 'db4', level=3)\n# coeffs[0] = approximation (low freq, level 3)\n# coeffs[1] = detail level 3 (medium-low freq)\n# coeffs[2] = detail level 2 (medium-high freq)\n# coeffs[3] = detail level 1 (high freq)\n\nfor i, c in enumerate(coeffs):\n    level = 'approx' if i == 0 else f'detail-{len(coeffs)-i}'\n    print(f\"{level}: {len(c)} coefficients, energy={np.sum(c**2):.1f}\")\n\n# Denoising: threshold detail coefficients (soft thresholding):\nthreshold = 0.5 * np.max(np.abs(coeffs[-1]))   # estimate from finest level\ncoeffs_denoised = [c if i==0 else pywt.threshold(c, threshold, 'soft')\n                   for i, c in enumerate(coeffs)]\ndenoised = pywt.waverec(coeffs_denoised, 'db4')[:len(signal_data)]\nsnr = 10*np.log10(np.mean(signal_data**2) / np.mean((signal_data - denoised)**2))\nprint(f\"Denoising SNR improvement: {snr:.1f} dB\")</code></pre>"}, {"id": 30, "level": "intermediate", "q": "What is adaptive filtering and what is the LMS algorithm?", "a": "Adaptive filters adjust their coefficients automatically to minimise an error signal. Used when the desired signal statistics are unknown or time-varying. LMS (Least Mean Squares): <code>y[n] = w^T[n]·x[n]</code> (filter output). <code>e[n] = d[n] - y[n]</code> (error vs desired). <code>w[n+1] = w[n] + μ·e[n]·x[n]</code> (update weights). μ = step size (small = stable/slow, large = fast/possibly unstable). Stability: μ &lt; 1/(N·P_x). Applications: echo cancellation (telephone/speakerphone), noise cancellation (ANC headphones), channel equalisation (5G receiver), beamforming, line interference cancellation.<br><br><b>🔑 Plain terms:</b> Adaptive filtering adjusts its own coefficients automatically to minimise error. The LMS algorithm: look at the error, nudge each coefficient slightly in the direction that reduces it. Used in echo cancellation, noise cancellation, and channel equalisation.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\nnp.random.seed(42)\nN = 2000\n\n# Echo cancellation scenario:\n# Near-end speaker signal (what we want):\nspeech = np.random.randn(N)\n# Far-end echo path (unknown — 5 tap channel):\ntrue_echo_path = np.array([0.5, 0.3, -0.2, 0.1, -0.05])\n# Received signal = speech + convolved echo:\necho   = np.convolve(speech, true_echo_path, mode='same')\nreceived = speech + 0.5*echo + 0.01*np.random.randn(N)  # add small noise\n\n# LMS adaptive filter (estimate echo path):\nL   = len(true_echo_path)   # filter length\nw   = np.zeros(L)           # initial weights (all zero)\nmu  = 0.01                  # step size (learning rate)\nerrors = []\n\nfor n in range(L, N):\n    x_buf = received[n-L:n][::-1]   # input buffer\n    y_hat = np.dot(w, x_buf)        # predicted echo\n    error = received[n] - y_hat     # prediction error\n    w    += 2 * mu * error * x_buf  # update weights (LMS rule)\n    errors.append(error**2)\n\nprint(f\"Initial MSE:  {np.mean(errors[:100]):.4f}\")\nprint(f\"Final MSE:    {np.mean(errors[-100:]):.6f}\")\nprint(f\"Learned weights: {np.round(w, 3)}\")\nprint(f\"True weights:    {true_echo_path}\")\n# Converges to true echo path in ~500 samples!</code></pre>"}, {"id": 31, "level": "intermediate", "q": "What is the difference between FIR and IIR implementation in fixed-point?", "a": "Fixed-point DSP avoids floating-point hardware (common in embedded/FPGA/ASIC). Key issues: Overflow: sum of multiplications can exceed word width. Quantisation: finite bit representation rounds coefficients and signals. IIR in fixed-point: more dangerous — quantised poles may move outside unit circle causing instability. Limit cycles: self-sustaining oscillations from quantised feedback. Solutions: scale inputs, use second-order sections (SOS), double-precision accumulation. FIR in fixed-point: simpler — no feedback, always stable, just need enough bits for accumulation (input bits + log2(N) guard bits). Saturation arithmetic prevents overflow wrapping (use <code>SAT</code> instruction on DSPs).<br><br><b>🔑 Plain terms:</b> Fixed-point arithmetic represents fractions as integers scaled by a power of 2. Q-format specifies the word length and fractional bits. In FIR, overflow is a concern for accumulators; in IIR, coefficient quantisation can move poles outside the unit circle.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Q-format notation: Q(I.F) = I integer bits + F fractional bits\n# Q1.15: 1 sign bit + 15 fractional bits, range [-1, 1), resolution = 2^-15\n# Q8.24: 8 integer + 24 fractional, range [-128, 128), resolution = 2^-24\n\ndef to_fixed(x, fractional_bits=15):\n    scale = 2**fractional_bits\n    return np.round(x * scale).astype(np.int16)\n\ndef from_fixed(x_fixed, fractional_bits=15):\n    return x_fixed / (2**fractional_bits)\n\n# Quantise FIR coefficients to Q1.15:\nb_float = np.array([0.1, 0.25, 0.5, 0.25, 0.1])   # floating-point\nb_fixed = to_fixed(b_float, 15)                     # Q1.15\nb_quant = from_fixed(b_fixed, 15)                   # back to float\n\nprint(f\"Original:   {b_float}\")\nprint(f\"Quantised:  {b_quant}\")\ncoeff_error = 20*np.log10(np.max(np.abs(b_float - b_quant)) / np.max(np.abs(b_float)))\nprint(f\"Coeff error: {coeff_error:.1f} dB\")   # ≈ -90 dB (excellent for 16-bit)\n\n# IIR accumulator overflow guard: use 32-bit or 64-bit accumulator\n# even when input and output are 16-bit:\ndef fir_fixed_point(x, b, bits=15):\n    scale = 2**bits\n    x_q   = np.round(x * scale).astype(np.int64)\n    b_q   = np.round(b * scale).astype(np.int64)\n    # Use 64-bit accumulator to prevent overflow during sum:\n    y_q   = np.convolve(x_q, b_q) >> bits   # shift right to remove scaling\n    return y_q / scale</code></pre>"}, {"id": 32, "level": "intermediate", "q": "What is the Fourier series and how does it relate to the DFT?", "a": "The Fourier series decomposes a periodic continuous signal into harmonically related sinusoids: x(t) = Σ c_k·e^{j2πkt/T} where c_k are complex coefficients, T = period. The DFT is the discrete, finite-length version: samples of the DTFT at N equally spaced frequencies. Interpretation: the N-point DFT of one period of a periodic signal gives the Fourier series coefficients (scaled by N). Parseval's theorem: total power in time = total power in frequency: Σ|x[n]|² = (1/N)Σ|X[k]|². The DFT assumes the N-sample block repeats periodically — hence circular convolution and spectral leakage for non-periodic-in-window signals.<br><br><b>🔑 Plain terms:</b> The Fourier series decomposes a periodic signal into a sum of harmonically related sinusoids. The DFT is the discrete, finite version — it treats the N samples as one period of a periodic signal and computes the complex amplitudes of each harmonic.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Square wave — classic Fourier series example:\n# x(t) = (4/pi) * [sin(2*pi*f0*t)/1 + sin(2*pi*3*f0*t)/3 + sin(2*pi*5*f0*t)/5 + ...]\n\nN  = 1024\nf0 = 10    # fundamental frequency (10 Hz)\nFs = 1000  # sample rate\n\nt = np.arange(N) / Fs\n\n# Square wave from Fourier series (first 15 harmonics):\nsquare_approx = np.zeros(N)\nfor k in range(1, 30, 2):   # odd harmonics: 1, 3, 5, ...\n    square_approx += (4 / (np.pi * k)) * np.sin(2*np.pi*k*f0*t)\n\n# True square wave:\nsquare_true = np.sign(np.sin(2*np.pi*f0*t))\n\n# DFT of square wave:\nX = np.fft.rfft(square_true)\nfreqs = np.fft.rfftfreq(N, 1/Fs)\nmags  = 2 * np.abs(X) / N\n\n# Print harmonic structure:\nfor k in range(1, 8, 2):\n    f_k = k * f0\n    idx = np.argmin(np.abs(freqs - f_k))\n    expected = 4 / (np.pi * k)\n    print(f\"Harmonic {k}: f={f_k:4d} Hz, amplitude={mags[idx]:.4f} (theory: {expected:.4f})\")\n# Harmonic 1: f=10  Hz, amplitude=1.2732 (theory: 1.2732)\n# Harmonic 3: f=30  Hz, amplitude=0.4244 (theory: 0.4244) ...</code></pre>"}, {"id": 33, "level": "intermediate", "q": "What is noise shaping and oversampling in sigma-delta converters?", "a": "Sigma-delta (ΣΔ) ADC uses oversampling (much higher rate than Nyquist) + 1-bit (or few-bit) quantiser + noise shaping to achieve high resolution. Noise shaping: the quantisation noise is spectrally shaped (pushed to high frequencies) by the loop filter. After the ΣΔ modulator: decimate with low-pass filter to remove shaped noise — effective ENOB increases. Oversampling by 4× gives 1 extra bit (6 dB). With noise shaping: higher-order modulators give more bits per octave of oversampling. Used in: audio DAC/ADC (24-bit), precision measurement (weighing scales), microphone interfaces. 5G NR massive MIMO uses ΣΔ DAC for beamforming efficiency.<br><br><b>🔑 Plain terms:</b> Oversampling spreads quantisation noise over a wider bandwidth, then a digital lowpass filter removes most of it. Noise shaping pushes the quantisation noise into high frequencies (where the filter removes it), allowing effective resolution far beyond what the raw bit count suggests.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Sigma-delta ADC principle:\n# Oversample by OSR (oversampling ratio), then decimate\n# Quantisation noise power = Delta^2/12 (where Delta = LSB step)\n# After decimation, noise power is reduced by factor OSR (first-order SDM)\n\nOSR   = 64    # oversample 64x\nbits  = 1     # 1-bit quantiser (comparator)\n\n# SQNR improvement with oversampling (first-order modulator):\n# SQNR_dB ≈ 6.02*bits + 10*log10(OSR/pi^2 * 3/2) for first-order SDM\nSQNR_first_order = 6.02*bits + 1.76 + 10*np.log10(3*OSR/(2*np.pi**2))\nprint(f\"1-bit, OSR=64, 1st order SDM SQNR ≈ {SQNR_first_order:.1f} dB\")\n# ≈ 23.9 dB -> ENOB ≈ 3.7 bits\n\n# Higher-order SDM: each extra order adds ~15 dB at OSR=64\nSQNR_2nd = SQNR_first_order + 15\nSQNR_3rd = SQNR_2nd + 15\nprint(f\"1-bit, OSR=64, 2nd order: ≈ {SQNR_2nd:.0f} dB ({(SQNR_2nd-1.76)/6.02:.1f} ENOB)\")\nprint(f\"1-bit, OSR=64, 3rd order: ≈ {SQNR_3rd:.0f} dB ({(SQNR_3rd-1.76)/6.02:.1f} ENOB)\")\n\n# Real audio DAC example:\n# 1-bit, OSR=256, 5th order: ENOB ≈ 20 bits  (CD quality)\n# This is how AKM, ESS, and TI audio DACs achieve 24-bit specs!\n\n# Noise shaping makes quantisation noise 'move' to high frequencies:\n# First order: spectral density rises at +20 dB/decade above DC\n# -> decimation filter then removes it: net SQNR = 6N + 1.76 + 20*log10(OSR^(N+0.5))</code></pre>"}, {"id": 34, "level": "intermediate", "q": "What is a raised cosine filter and why is it used in digital communications?", "a": "The raised cosine filter is a band-limited pulse shaping filter for digital communications. Frequency response: flat for |f| &lt; (1-α)/(2T), smooth roll-off to zero at |f| = (1+α)/(2T). α = roll-off factor (0=brick wall, 1=maximum roll-off). Time domain: sinc-like with zero-crossings at integer multiples of T (symbol period). Zero ISI at sampling instants — Nyquist ISI criterion satisfied. Split between transmit and receive: each uses a root raised cosine (RRC) filter — two RRC filters in cascade = one raised cosine. Used in: LTE/5G NR pulse shaping, QPSK/QAM modulation, cable/satellite modems. Compact spectrum + zero ISI = ideal for bandwidth-efficient digital comms.<br><br><b>🔑 Plain terms:</b> The raised cosine filter controls how fast a symbol transitions to the next, limiting the signal bandwidth while preventing inter-symbol interference (ISI). Split between transmitter (root RC) and receiver (root RC again), the combined response is exactly the raised cosine.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Raised cosine filter:\n# H(f) = 1                               for |f| < (1-alpha)/(2T)\n#         0.5*(1 + cos(pi*T/alpha*(|f| - (1-alpha)/(2T))))  for edge\n#         0                               for |f| > (1+alpha)/(2T)\n# alpha = roll-off factor (0=ideal sinc, 1=maximum excess bandwidth)\n# T = symbol period\n\ndef raised_cosine(t, T, alpha):\n    \"\"\"Raised cosine impulse response (time domain)\"\"\"\n    # Avoid division by zero at special points:\n    eps = 1e-10\n    h = np.sinc(t/T) * np.cos(np.pi*alpha*t/T) / (1 - (2*alpha*t/T)**2 + eps)\n    return h\n\nT = 1.0    # 1 second per symbol (normalised)\nt = np.linspace(-6*T, 6*T, 1001)\n\n# Compare three roll-off values:\nfor alpha in [0.0, 0.35, 1.0]:\n    h = raised_cosine(t, T, alpha)\n    # ISI check: h[n*T] = 0 for n != 0 (Nyquist criterion)\n    BW = (1 + alpha) / (2*T)   # bandwidth in Hz\n    print(f\"alpha={alpha:.2f}: bandwidth={BW:.2f} Hz, excess BW={alpha*100:.0f}%\")\n# alpha=0.00: bandwidth=0.50 Hz, excess BW=0%    (minimum BW, sinc — impractical)\n# alpha=0.35: bandwidth=0.68 Hz, excess BW=35%   (5G NR uses ~0.35)\n# alpha=1.00: bandwidth=1.00 Hz, excess BW=100%  (easy to implement, wasteful)\n\n# Root raised cosine (RRC) = sqrt of raised cosine in frequency domain:\n# Transmitter filter: RRC\n# Receiver filter:    RRC (matched filter)\n# Combined:           RRC * RRC = RC (zero ISI at sample points)</code></pre>"}, {"id": 35, "level": "intermediate", "q": "What is a PLL (Phase-Locked Loop) in DSP?", "a": "A digital PLL tracks the phase and frequency of an input signal. Components: phase detector (compares input phase to VCO/NCO output), loop filter (low-pass, determines bandwidth and damping), NCO (Numerically Controlled Oscillator — generates output signal). Locked state: NCO phase tracks input. Capture range: frequencies over which PLL can acquire lock. Lock range: frequencies over which locked PLL stays locked. Second-order loop: poles at origin + loop filter pole. Applications: clock recovery (deserialiser), carrier synchronisation (5G NR timing), frequency synthesis, FM demodulation, GPS receiver timing. Loop bandwidth trade-off: wide = fast acquisition, noisy; narrow = clean, slow.<br><br><b>🔑 Plain terms:</b> A PLL locks its output frequency to a reference input by using feedback. The phase detector measures the error between input and output phases, the loop filter smooths it, and the VCO (voltage-controlled oscillator) adjusts its frequency. Used for clock recovery, carrier synchronisation, and frequency synthesis.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Discrete-time PLL simulation (first-order):\nN    = 2000    # samples\nf_in = 0.1     # input normalised frequency (0.1 * Fs)\nKp   = 0.1     # loop gain (phase detector + VCO gain combined)\n\n# Introduce a frequency offset: VCO starts at 0.095 (off by 0.005):\nf_vco     = 0.095     # initial VCO frequency (wrong)\nphase_in  = 0.0\nphase_vco = 0.0\nphase_errors = []\nfreq_track   = []\n\nfor n in range(N):\n    # Input signal phase:\n    phase_in  += 2 * np.pi * f_in\n    # VCO output phase:\n    phase_vco += 2 * np.pi * f_vco\n\n    # Phase detector (multiplier + LPF approximation):\n    error = np.sin(phase_in - phase_vco)   # phase error signal\n\n    # Loop filter (first order — just a gain):\n    f_vco += Kp * error   # adjust VCO frequency\n\n    phase_errors.append(error)\n    freq_track.append(f_vco)\n\nimport numpy as np\nprint(f\"Initial freq error: {abs(0.1 - 0.095)*100:.2f}% -> {f_vco:.5f} (target: 0.1)\")\nprint(f\"Lock achieved in ≈ {np.argmin(np.abs(freq_track - 0.1))} samples\")\n\n# PLL applications in 5G:\n# - Carrier frequency synchronisation (UE locks to gNB carrier)\n# - Timing recovery (sample clock alignment)\n# - Frequency synthesis (generate precise local oscillator from reference)</code></pre>"}, {"id": 36, "level": "intermediate", "q": "What is beamforming in signal processing?", "a": "Beamforming steers an antenna array towards a desired direction by applying phase (and/or amplitude) weights to each element's signal. Delay-and-sum: time-align received signals from each element for a given direction, then sum — constructive interference in desired direction, destructive elsewhere. Frequency domain: apply complex weights W = e^{-j2πd·sin(θ)/λ} per element for direction θ, element spacing d, wavelength λ. Digital beamforming: ADC at each element, weights applied digitally — multiple simultaneous beams possible. Used in: 5G massive MIMO (32-256 antennas), radar, sonar, medical ultrasound, smart speakers. MVDR/Capon beamformer minimises interference while maintaining signal gain.<br><br><b>🔑 Plain terms:</b> Beamforming uses an array of antennas where each element's signal is phase-shifted and summed. The shifts cause signals from one direction to add up (constructive interference) and signals from other directions to cancel (destructive interference).<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Uniform Linear Array (ULA) beamforming:\nN_ant  = 8          # number of antenna elements\nd      = 0.5        # element spacing in wavelengths (lambda/2)\ntheta  = 30         # target angle from broadside (degrees)\n\n# Phase shift between adjacent elements for a source at angle theta:\npsi = 2 * np.pi * d * np.sin(np.deg2rad(theta))   # phase increment per element\nsteering_vector = np.exp(1j * np.arange(N_ant) * psi)   # array response vector\n\n# Beamforming weights (matched to steering vector = maximum ratio combining):\nw = steering_vector.conj() / N_ant   # normalised weights\n\n# Compute array pattern at different angles:\nangles = np.linspace(-90, 90, 361)\ngain_dB = []\nfor ang in angles:\n    psi_a   = 2*np.pi*d*np.sin(np.deg2rad(ang))\n    a       = np.exp(1j * np.arange(N_ant) * psi_a)\n    pattern = np.abs(np.dot(w.conj(), a))**2   # beam power\n    gain_dB.append(10*np.log10(pattern + 1e-10))\n\nmax_gain_idx = np.argmax(gain_dB)\nprint(f\"Beam peak at {angles[max_gain_idx]:.0f} degrees\")   # 30 degrees\nprint(f\"Peak gain:   {gain_dB[max_gain_idx]:.1f} dB\")       # 9 dB (= 10*log10(8))\nprint(f\"3dB beamwidth: ≈ {102/(N_ant*d):.1f} degrees\")      # 12.75 degrees\n\n# In 5G NR massive MIMO: N_ant = 64 or 256 -> 3dB BW ≈ 1-3 degrees\n# Each UE gets a focused beam -> spatial multiplexing + interference isolation</code></pre>"}, {"level": "basic", "q": "What is the Nyquist sampling criterion for a real bandlimited signal?", "a": "If the highest frequency is <code>f_max</code>, sampling at <code>f_s &gt; 2 f_max</code> (strictly greater in theory) avoids aliasing; in practice use guard band and anti-alias filters.<br><br><b>🔑 Plain terms:</b> You must take at least two samples per cycle of the fastest wiggle in the signal.<br><b>💡 Example:</b> <pre><code>import math\nf_max = 3.4e3  # voice-ish band edge (illustrative)\nfs_min = 2 * f_max\nprint(\"Nyquist rate (Hz):\", fs_min)</code></pre>", "id": 37}, {"level": "basic", "q": "What is aliasing in the frequency domain?", "a": "Copies of the spectrum repeat every <code>f_s</code>; if signal bandwidth exceeds <code>f_s/2</code>, shifted copies overlap and become indistinguishable after sampling.<br><br><b>🔑 Plain terms:</b> Echo images of your spectrum sit on top of each other like stacked transparencies.<br><b>💡 Example:</b> <pre><code>fs = 8000\nf = 7500  # tone above Nyquist 4000 -> aliases\nalias = abs(f - round(f/fs)*fs)\nprint(\"alias frequency (Hz) ~\", min(alias, fs-alias))</code></pre>", "id": 38}, {"level": "basic", "q": "What is Gibbs phenomenon?", "a": "Truncating a Fourier series for a discontinuity produces overshoot/ringing near the jump that does not vanish with more terms—only narrower.<br><br><b>🔑 Plain terms:</b> Sharp edges always ring a little when you use finite harmonics.<br><b>💡 Example:</b> <pre><code>import numpy as np\nn = np.linspace(-1, 1, 20001)\npartial = sum((4/np.pi)/(2*k+1)*np.sin((2*k+1)*np.pi*n) for k in range(80))\nedge = np.argmax(n > 0.999)\nprint(\"Gibbs overshoot factor ~1.09 vs step height; sample near jump:\", float(partial[edge]))</code></pre>", "id": 39}, {"level": "basic", "q": "What is group delay vs phase delay?", "a": "Phase delay <code>-φ/ω</code>; group delay <code>-dφ/dω</code> describes envelope propagation speed per frequency—important for wideband pulses and equalization.<br><br><b>🔑 Plain terms:</b> Phase delay is average twist; group delay is how the packet envelope walks vs frequency.<br><b>💡 Example:</b> <pre><code>import numpy as np\nw = np.linspace(1e-3, 1, 500)\nphi = -2*w  # linear phase -> constant group delay\ngd = -np.gradient(phi, w)\nprint(\"group delay ~ constant:\", float(np.mean(gd)))</code></pre>", "id": 40}, {"level": "intermediate", "q": "What is overlap-add (OLA) for FIR filtering long streams?", "a": "Partition input into blocks, zero-pad each block so circular convolution equals linear convolution, FFT–multiply–IFFT per block, add the overlapping tail regions.<br><br><b>🔑 Plain terms:</b> Convolve long tape by doing FFT chunks and stitching overlaps.<br><b>💡 Example:</b> <pre><code># Pseudocode sketch\n# y = OLA(x, h, L, Nfft)\nprint(\"OLA: FFT block conv + overlap tail sum\")</code></pre>", "id": 41}, {"level": "intermediate", "q": "What is a CIC decimator (intuition)?", "a": "Cascaded integrator-comb structures achieve large integer sample-rate changes with no multipliers—common in ΣΔ ADC/DDC chains; needs compensation filter sometimes.<br><br><b>🔑 Plain terms:</b> Bucket brigade counters that spill every N samples—cheap hardware rate change.<br><b>💡 Example:</b> <pre><code>R = 64  # decimation factor (illustrative)\nprint(\"CIC: no multipliers, grows word width with stages + R\")</code></pre>", "id": 42}, {"level": "intermediate", "q": "What is the Goertzel algorithm used for?", "a": "Efficiently computes a single DFT bin (e.g. DTMF detection) without full N-point FFT.<br><br><b>🔑 Plain terms:</b> One piano key’s strength instead of playing the whole keyboard.<br><b>💡 Example:</b> <pre><code>import math\ndef goertzel_mag(x, k, N):\n    w = 2*math.pi*k/N\n    coeff = 2*math.cos(w)\n    s0 = s1 = s2 = 0.0\n    for n in range(N):\n        s0 = x[n] + coeff*s1 - s2\n        s2, s1 = s1, s0\n    return abs(s1 - s2*math.exp(-1j*w))  # magnitude approx\nprint(\"bin power:\", goertzel_mag([math.sin(2*math.pi*3*n/32) for n in range(32)], 3, 32))</code></pre>", "id": 43}, {"level": "intermediate", "q": "What is fixed-point Q15 format (concept)?", "a": "A signed 16-bit fraction interpreted as <code>value = int16 / 2^15</code> in [-1,1) approx; multiplies widen then shift/saturation.<br><br><b>🔑 Plain terms:</b> Store 0.75 as an integer by agreeing everyone divides by 32768.<br><b>💡 Example:</b> <pre><code>import struct\ndef q15(x):\n    v = int(round(x * (1<<15)))\n    v = max(-32768, min(32767, v))\n    return v\nprint(q15(0.5), hex(struct.unpack('>h', struct.pack('>h', q15(0.5)))[0]))</code></pre>", "id": 44}, {"level": "intermediate", "q": "What is Wiener–Khinchin relation (concept)?", "a": "Autocorrelation and power spectral density are Fourier pairs for wide-sense stationary processes—estimate PSD via FFT of windowed autocorrelation or periodogram variants.<br><br><b>🔑 Plain terms:</b> Echo pattern in time tells rainbow in frequency.<br><b>💡 Example:</b> <pre><code>import numpy as np\nx = np.random.randn(4096)\nR = np.correlate(x, x, mode='full')\nS = np.abs(np.fft.fft(R[len(R)//2:len(R)//2+1024]))**2\nprint(\"PSD estimate vector len\", S.shape)</code></pre>", "id": 45}, {"level": "intermediate", "q": "What is polyphase representation of a filter?", "a": "Split impulse response into R subfilters for efficient multirate systems—enables commutator models for decimation/interpolation.<br><br><b>🔑 Plain terms:</b> Slice the FIR into R parallel shorter filters for rate-change machinery.<br><b>💡 Example:</b> <pre><code>R = 4\nprint(\"polyphase: h split into\", R, \"subfilters\")</code></pre>", "id": 46}, {"level": "intermediate", "q": "What is an analytic signal and Hilbert transform use?", "a": "<code>x_a(t) = x(t) + j H{x(t)}</code> has one-sided spectrum—used for envelope/phase detection and SSB.<br><br><b>🔑 Plain terms:</b> Make a complex signal whose negative frequencies are gone.<br><b>💡 Example:</b> <pre><code># scipy.signal.hilbert if available; else conceptual\nprint(\"envelope ~ abs(x + j*hilbert(x))\")</code></pre>", "id": 47}, {"level": "intermediate", "q": "What is Welch’s method?", "a": "Split record into overlapped windows, compute modified periodograms, average—reduces variance of PSD estimate at cost of resolution.<br><br><b>🔑 Plain terms:</b> Average many blurry photos to reduce noise.<br><b>💡 Example:</b> <pre><code>import numpy as np\n# toy: average two periodogram halves\nx = np.random.randn(8192)\nP1 = np.abs(np.fft.fft(x[:4096]*np.hanning(4096)))**2\nP2 = np.abs(np.fft.fft(x[2048:6144]*np.hanning(4096)))**2\nprint(\"welch-ish avg first bin\", (P1[0]+P2[0])/2)</code></pre>", "id": 48}, {"level": "basic", "q": "What is circular vs linear convolution?", "a": "Circular convolution is FFT-domain multiply with implicit periodicity; linear convolution needs zero-padding to length ≥ N+M−1 to avoid wrap-around.<br><br><b>🔑 Plain terms:</b> Don’t let the tail of the echo run into the start of next block.<br><b>💡 Example:</b> <pre><code>N, M = 8, 4\nL = N + M - 1\nprint(\"zero-pad FFT length >=\", L)</code></pre>", "id": 49}, {"id": 50, "level": "basic", "q": "What is an anti-imaging filter after interpolation?", "a": "After upsampling with zero insertion, spectral images appear around multiples of the new sample rate; a low-pass removes images before DAC or downstream processing.<br><br><b>🔑 Plain terms:</b> Smooth the stairsteps so high-frequency copies do not fold back as alias.<br><b>💡 Example:</b> <pre><code>R = 4  # upsample by 4\nprint('LP cutoff < new_fs/2 to kill images')</code></pre>"}], "fiveG": [{"id": 1, "level": "basic", "q": "What is 5G NR and how does it differ from LTE?", "a": "5G NR (New Radio) is the 3GPP 5th generation cellular standard (Release 15 onwards). Key improvements over LTE: (1) Flexible numerology — multiple subcarrier spacings vs LTE's fixed 15 kHz. (2) mmWave support (FR2: 24-52 GHz) alongside sub-6 GHz (FR1). (3) Massive MIMO — up to 64 antenna ports per cell. (4) Lean carrier design — no mandatory cell-specific reference signals. (5) NR PDCCH with more flexible scheduling. (6) Ultra-reliable low latency (URLLC) support. (7) Network slicing. (8) SA (Standalone) and NSA (Non-Standalone) deployment. Peak speeds: DL 20 Gbps, UL 10 Gbps.<br><br><b>🔑 Plain terms:</b> 5G NR (New Radio) is the 5th-generation wireless standard. Think of LTE as a 4-lane highway; 5G NR as a dynamic highway that can instantly add lanes (wider bandwidth), drive in both directions simultaneously (FDD/TDD flex), and serve completely different vehicle types (eMBB, URLLC, mMTC) on the same road.<br><b>💡 Example:</b> <pre><code># Key 5G NR improvements over LTE:\n# 1. Bandwidth: up to 400 MHz per carrier (LTE max = 20 MHz)\n# 2. Subcarrier spacing: 15/30/60/120/240 kHz (LTE: only 15 kHz)\n# 3. Latency: 1 ms air-interface (LTE: 4 ms)\n# 4. Peak rate: 20 Gbps downlink (LTE: 1 Gbps)\n# 5. Massive MIMO: up to 256 antennas (LTE: typically 8)\n# 6. mmWave: 24-52 GHz bands (LTE: sub-6 GHz only)\n\n# Quick comparison table:\nspecs = {\n    'Max BW':        ('100 MHz',  '20 MHz'),\n    'Min latency':   ('1 ms',     '4 ms'),\n    'Peak DL rate':  ('20 Gbps',  '1 Gbps'),\n    'SCS options':   ('5 values', '1 value (15 kHz)'),\n    'MIMO streams':  ('up to 8',  'up to 4'),\n    'mmWave':        ('Yes',      'No'),\n}\nprint(f\"{'Feature':<20} {'5G NR':<15} {'LTE'}\")\nfor k, (nr, lte) in specs.items():\n    print(f\"{k:<20} {nr:<15} {lte}\")</code></pre>"}, {"id": 2, "level": "basic", "q": "What is the 5G NR frequency range and what are FR1 and FR2?", "a": "5G NR operates in two frequency ranges: FR1 (sub-6 GHz): 410 MHz – 7.125 GHz. Better coverage, smaller bandwidths. Key bands: n1 (2100 MHz), n3 (1800 MHz), n41 (2500 MHz), n77/n78 (3.5 GHz), n79 (4.9 GHz). FR2 (mmWave): 24.25 – 52.6 GHz. Very high bandwidth (up to 400 MHz per carrier), short range, high path loss, directional. Key bands: n257 (28 GHz), n258 (26 GHz), n260 (39 GHz). FR1 for coverage and capacity; FR2 for hotspots, fixed wireless, high-throughput applications. Carrier aggregation possible within and across frequency ranges.<br><br><b>🔑 Plain terms:</b> FR1 is sub-6 GHz (the 'workhorse' — wide coverage, moderate bandwidth). FR2 is millimetre-wave 24-52 GHz (the 'firehose' — gigabit speeds but short range, needs line-of-sight). Most smartphones in 2024 support FR1; only high-end ones support FR2.<br><b>💡 Example:</b> <pre><code># 5G NR Frequency Ranges:\n# FR1: 410 MHz – 7125 MHz   (sub-6 GHz)\n# FR2: 24250 MHz – 52600 MHz (mmWave)\n\n# FR1 bands (examples):\nfr1_bands = {\n    'n1':  {'UL': '1920-1980 MHz',  'DL': '2110-2170 MHz', 'duplex': 'FDD', 'max_BW': '20 MHz'},\n    'n78': {'freq': '3300-3800 MHz', 'duplex': 'TDD',       'max_BW': '100 MHz'},  # most common 5G globally\n    'n77': {'freq': '3300-4200 MHz', 'duplex': 'TDD',       'max_BW': '100 MHz'},  # US C-band\n    'n28': {'freq': '703-748 MHz',   'duplex': 'FDD',        'max_BW': '30 MHz'},   # coverage layer\n}\n\n# FR2 bands (examples):\nfr2_bands = {\n    'n258': {'freq': '24250-27500 MHz', 'max_BW': '400 MHz'},\n    'n257': {'freq': '26500-29500 MHz', 'max_BW': '400 MHz'},\n    'n261': {'freq': '27500-28350 MHz', 'max_BW': '400 MHz'},  # US 28 GHz\n}\n\n# Propagation comparison:\n# FR1 (3.5 GHz): cell range 500m-5km, penetrates walls, nationwide coverage\n# FR2 (28 GHz):  cell range 50-300m, absorbed by walls, stadiums/dense urban only\n\n# Max channel bandwidth:\n# FR1: 50 MHz (15/30 kHz SCS) or 100 MHz (30/60 kHz SCS)\n# FR2: 200 MHz (60/120 kHz SCS) or 400 MHz (120 kHz SCS)\nprint(\"FR1 n78 max throughput: 100 MHz * spectral_efficiency ≈ 1.5 Gbps\")\nprint(\"FR2 n258 max throughput: 400 MHz * spectral_efficiency ≈ 6 Gbps\")</code></pre>"}, {"id": 3, "level": "basic", "q": "What is 5G NR numerology (μ)?", "a": "5G NR defines flexible numerology: subcarrier spacing (SCS) = 15·2^μ kHz, symbol duration = 1/(SCS). μ values: 0 (15 kHz, same as LTE), 1 (30 kHz), 2 (60 kHz), 3 (120 kHz, mmWave), 4 (240 kHz, reference only). Higher μ = wider SCS = shorter OFDM symbol = more robust to phase noise (important at mmWave) but less multipath robustness. Slot duration = 0.5^μ ms (14 OFDM symbols per slot). Bandwidth: FR1 up to 100 MHz, FR2 up to 400 MHz. Multiple numerologies can coexist in one carrier (mixed numerology with guard bands).<br><br><b>🔑 Plain terms:</b> Numerology (mu) scales the subcarrier spacing by powers of 2. Wider subcarrier spacing = shorter OFDM symbol = less sensitive to phase noise and Doppler — ideal for high-frequency mmWave. Narrower spacing = longer symbol = better frequency resolution, tolerates multipath better.<br><b>💡 Example:</b> <pre><code># 5G NR Numerology table (3GPP TS 38.211 Table 4.2-1):\n# mu | SCS (kHz) | Symbol duration (us) | CP (us) | Supported bands\n# 0  |    15     |       66.7           |  4.69   | FR1 only\n# 1  |    30     |       33.3           |  2.34   | FR1 only\n# 2  |    60     |       16.7           |  1.17   | FR1 + FR2\n# 3  |   120     |        8.3           |  0.59   | FR2 only\n# 4  |   240     |        4.2           |  0.29   | FR2 reference only\n\nimport numpy as np\n\nfor mu in range(5):\n    SCS   = 15e3 * (2**mu)      # subcarrier spacing in Hz\n    T_sym = 1 / SCS             # useful symbol duration\n    T_cp  = T_sym / 14          # normal CP ≈ symbol/14\n    N_sym_slot = 14             # always 14 symbols per slot\n    T_slot = N_sym_slot * (T_sym + T_cp)   # slot duration\n    print(f\"mu={mu}: SCS={SCS/1e3:5.0f} kHz, T_sym={T_sym*1e6:.1f} us, \"\n          f\"T_slot={T_slot*1e6:.2f} ms\")\n# mu=0: SCS=15 kHz, T_sym=66.7 us, T_slot=1.00 ms  (LTE-compatible)\n# mu=1: SCS=30 kHz, T_sym=33.3 us, T_slot=0.50 ms\n# mu=3: SCS=120 kHz, T_sym=8.3 us, T_slot=0.125 ms (ultra-low latency FR2)</code></pre>"}, {"id": 4, "level": "basic", "q": "What is a resource grid in 5G NR?", "a": "The 5G NR resource grid is the time-frequency lattice of resource elements (REs). One RE = one subcarrier × one OFDM symbol. 12 subcarriers = 1 resource block (RB) in frequency. Slot = 14 symbols in time (normal CP) or 12 (extended CP, only μ=2). Resource block group (RBG): group of RBs for scheduling. Grid dimensions: NRB (bandwidth-dependent) × 14 symbols. Multiple numerologies have separate grids. Reference signals, control channels, data channels, guard bands all occupy specific positions on the grid. The carrier bandwidth part (BWP) is a contiguous set of RBs in the resource grid that a UE is configured to use.<br><br><b>🔑 Plain terms:</b> The resource grid is 5G's 'spreadsheet' — columns are OFDM symbols (time), rows are subcarriers (frequency). Each cell is one Resource Element (RE). 12 consecutive subcarriers × 1 slot = 1 Resource Block (RB). The scheduler assigns RBs to users.<br><b>💡 Example:</b> <pre><code># Resource grid dimensions (3GPP TS 38.211):\n# Time axis:  1 slot = 14 OFDM symbols (normal CP)\n# Freq axis:  1 RB = 12 subcarriers\n\n# Maximum RBs per channel bandwidth (mu=1, 30 kHz SCS):\n# BW (MHz): 5, 10, 15, 20, 25, 30, 40, 50, 60, 80, 100\n# N_RB:     11, 24, 38, 51, 65, 78, 106, 133, 162, 217, 273\n# Source: 3GPP TS 38.104 Table 5.3.2-1\n\nimport numpy as np\n\nBW_MHz = 100       # 100 MHz channel\nmu     = 1         # numerology mu=1 (30 kHz SCS)\nN_RB   = 273       # from spec table\nSCS    = 15000 * (2**mu)   # 30 kHz\nN_sc   = N_RB * 12         # total active subcarriers\n\nprint(f\"Channel BW:    {BW_MHz} MHz\")\nprint(f\"N_RB:          {N_RB} resource blocks\")\nprint(f\"N_subcarriers: {N_sc} ({N_RB}*12)\")\nprint(f\"FFT size:      {2**int(np.ceil(np.log2(N_sc * 1.1)))} samples\")  # ≈ 4096\n\n# Resource Element (RE) = 1 subcarrier × 1 symbol = smallest unit\nN_RE_slot  = N_RB * 12 * 14    # REs per slot\nprint(f\"REs per slot:  {N_RE_slot}\")   # 273*12*14 = 45864\n\n# Data rate estimate:\n# 256-QAM = 8 bits/RE, code rate 0.92, 4 layers, 273 RBs, mu=1 (2 slots/ms)\nrate = 273*12*14*2 * 8 * 0.92 * 4 / 1e9  # Gbps\nprint(f\"Peak DL rate:  {rate:.2f} Gbps (theoretical)\")</code></pre>"}, {"id": 5, "level": "basic", "q": "What is the difference between gNB and UE in 5G?", "a": "gNB (next-generation NodeB): the 5G base station. Split architecture: CU (Central Unit — handles PDCP, RRC, higher layers), DU (Distributed Unit — handles RLC, MAC, lower PHY), RU/AAU (Radio Unit — handles upper PHY and RF). Connected to 5GC (core network) via NG interface, to other gNBs via Xn. UE (User Equipment): the mobile device (smartphone, modem, IoT device). Contains: RF front end, baseband modem, NAS/RRC stack. UE capabilities reported to gNB: supported bands, MIMO layers, bandwidth, features. gNB manages resource allocation, scheduling, power control, handover. UE performs measurements and reports to gNB.<br><br><b>🔑 Plain terms:</b> The gNB (gNodeB) is the 5G base station — it's the smart end that handles all the complex signal processing. The UE (User Equipment) is your phone. The gNB speaks 'downlink' to the UE; the UE speaks 'uplink' to the gNB. The gNB also talks to the 5G core network (5GC).<br><b>💡 Example:</b> <pre><code># gNB responsibilities:\n# - Schedules which UEs transmit/receive and when (MAC scheduler)\n# - Encodes/decodes data (LDPC, Polar)\n# - OFDM modulation/demodulation\n# - Beamforming for massive MIMO\n# - HARQ retransmission management\n# - Power control of UE uplink\n# - Handover coordination between cells\n\n# UE responsibilities:\n# - Synchronises to gNB timing (SSB, PBCH)\n# - Reports channel quality (CSI, CQI, PMI, RI)\n# - Random access procedure (PRACH)\n# - Encodes/decodes its own data\n# - Maintains timing advance for uplink\n\n# Simplified message flow for one downlink data packet:\nflow = [\n    \"1. gNB scheduler: allocate RBs to UE on PDCCH (DCI format 1_1)\",\n    \"2. gNB PHY: LDPC encode -> modulate (256-QAM) -> OFDM -> beamform -> TX\",\n    \"3. UE PHY:  RX -> OFDM demod -> equalise -> demodulate -> LDPC decode\",\n    \"4. UE MAC:  HARQ ACK/NACK on PUCCH\",\n    \"5. If NACK: gNB retransmits with incremental redundancy (HARQ IR)\",\n]\nfor s in flow:\n    print(s)</code></pre>"}, {"id": 6, "level": "basic", "q": "What is the 5G NR frame structure?", "a": "5G NR frame: 10 ms total. 1 frame = 10 subframes. 1 subframe = 1 ms. Each subframe contains 2^μ slots (1 slot for μ=0, 2 for μ=1, etc.). Slot = 14 OFDM symbols (normal CP). Each symbol has a CP (Cyclic Prefix) prepended. CP duration = 144/2048 · (1/SCS) for normal, 512/2048 for first symbol in slot. Frame/subframe numbering is 10-bit SFN (System Frame Number). Downlink/Uplink/Flexible: symbols configured as D (downlink), U (uplink), or X (flexible) via TDD pattern. Guard period between DL and UL. Periodicity of TDD pattern configurable (e.g., DDDSUUU or DDDDD).<br><br><b>🔑 Plain terms:</b> A 5G NR frame is 10 ms long, split into 10 subframes of 1 ms each. Each subframe contains 2^mu slots (so mu=1 gives 2 slots/subframe). Every slot has 14 OFDM symbols. The frame number cycles 0–1023, giving a 10.24-second hyperframe.<br><b>💡 Example:</b> <pre><code># 5G NR frame hierarchy:\n# Hyperframe: 1024 frames = 10.24 s\n# Frame:      10 ms (SFN 0-1023)\n# Subframe:   1 ms  (10 per frame)\n# Slot:       1/SCS_factor ms (2^mu per subframe)\n# Symbol:     14 per slot (normal CP)\n\nimport numpy as np\n\nfor mu in [0, 1, 2, 3]:\n    SCS          = 15e3 * (2**mu)\n    slots_per_sf = 2**mu\n    slot_dur_us  = 1000 / slots_per_sf\n    sym_dur_us   = slot_dur_us / 14\n    print(f\"mu={mu}: {slots_per_sf:2d} slots/subframe, \"\n          f\"slot={slot_dur_us:.2f} us, symbol={sym_dur_us:.2f} us\")\n# mu=0:  1 slot/sf, slot=1000.00 us, symbol=71.43 us\n# mu=1:  2 slots/sf, slot=500.00 us,  symbol=35.71 us\n# mu=2:  4 slots/sf, slot=250.00 us,  symbol=17.86 us\n# mu=3:  8 slots/sf, slot=125.00 us,  symbol=8.93 us\n\n# Special (first) slot: normal CP = 0.07*T_u; others = 0.059*T_u\n# In MATLAB numbering: slot 0 in subframe 0 = slot 0 of frame\n# Downlink-heavy TDD pattern (DDDSU): D=DL, S=special, U=UL</code></pre>"}, {"id": 7, "level": "basic", "q": "What are the key 5G NR physical layer channels?", "a": "Downlink channels: PDSCH (Physical Downlink Shared Channel — user data), PDCCH (Physical Downlink Control Channel — scheduling grants/assignments), PBCH (Physical Broadcast Channel — system information in SSB), CSIRS (Channel State Information Reference Signal), DMRS (Demodulation Reference Signal). Uplink channels: PUSCH (Physical Uplink Shared Channel — user data/UCI), PUCCH (Physical Uplink Control Channel — HARQ ACK/NACK, SR, CSI reports), PRACH (Physical Random Access Channel — initial access), DMRS. Signals: PSS/SSS (Synchronisation), SSB (SS/PBCH Block), SRS (Sounding Reference Signal).<br><br><b>🔑 Plain terms:</b> 5G NR physical channels are like different coloured highways carrying different types of traffic. PDSCH is the wide highway for data. PDCCH is the traffic control signal. PBCH is the road sign that tells you the road exists. PRACH is the on-ramp request.<br><b>💡 Example:</b> <pre><code># 5G NR physical channels and signals:\nchannels = {\n    # Downlink channels:\n    'PBCH':  'Physical Broadcast Channel — carries MIB (master info block), maps to SSB',\n    'PDCCH': 'Physical Downlink Control Channel — carries DCI (scheduling commands)',\n    'PDSCH': 'Physical Downlink Shared Channel — carries actual data to UE (and SIB/paging)',\n    # Uplink channels:\n    'PRACH': 'Physical Random Access Channel — UE initial access request',\n    'PUCCH': 'Physical Uplink Control Channel — carries UCI (HARQ ACK, CSI, SR)',\n    'PUSCH': 'Physical Uplink Shared Channel — carries uplink data',\n    # Reference signals:\n    'SSB':   'Synchronisation Signal Block — PSS+SSS+PBCH (cell search)',\n    'DMRS':  'Demodulation Reference Signal — channel estimation for coherent demod',\n    'CSI-RS':'Channel State Info Reference Signal — gNB measures DL channel quality',\n    'SRS':   'Sounding Reference Signal — gNB measures UL channel (for beamforming)',\n    'PTRS':  'Phase Tracking Reference Signal — compensate phase noise at mmWave',\n}\nfor ch, desc in channels.items():\n    print(f\"{ch:8s}: {desc}\")</code></pre>"}, {"id": 8, "level": "basic", "q": "What is the 5G NR synchronisation signal block (SSB)?", "a": "The SSB (SS/PBCH Block) is the primary cell discovery signal transmitted periodically by the gNB. It occupies 4 OFDM symbols × 20 RBs (240 subcarriers) = 4×240 REs. Contents: PSS (Primary Sync Signal, 127 subcarriers, m-sequence) on symbol 0, SSS (Secondary Sync Signal, 127 subcarriers, Gold sequence) on symbol 2, PBCH (Physical Broadcast Channel with MIB) on symbols 1,2,3. Cell ID = 3×NID1 + NID2 (0-1007 unique cell IDs). SSB periodicity: 5, 10, 20, 40, 80, 160 ms (default 20 ms for initial access). Multiple SSBs per half-frame for beam sweeping — up to 8 (FR1) or 64 (FR2).<br><br><b>🔑 Plain terms:</b> The SSB (Synchronisation Signal Block) is the 5G 'lighthouse' — it broadcasts the cell's identity and timing. A UE with no connection starts by scanning for SSBs to find a cell. PSS and SSS let the UE synchronise in time and identify the physical cell ID.<br><b>💡 Example:</b> <pre><code># SSB structure (4 OFDM symbols wide):\n# Symbol 0: PSS (Primary Synchronisation Signal)   — 127 subcarriers\n# Symbol 1: PBCH (Physical Broadcast Channel)       — 240 subcarriers\n# Symbol 2: SSS + PBCH\n# Symbol 3: PBCH\n\n# PSS: m-sequence, 3 root sequences (N_ID2 = 0,1,2)\n# SSS: Gold sequence, 336 sequences (N_ID1 = 0..335)\n# PCI (Physical Cell ID) = 3*N_ID1 + N_ID2  (0..1007)\n\nimport numpy as np\n\n# Generate PSS for N_ID2 = 0 (as per 3GPP TS 38.211 section 7.4.2.2):\ndef generate_pss(N_ID2):\n    # m-sequence with generator polynomial x^7 + x^4 + 1\n    x = np.array([0, 1, 1, 0, 1, 1, 1])   # initial state\n    pss = np.zeros(127, dtype=int)\n    for n in range(127):\n        pss[n] = x[6]\n        x = np.roll(x, -1)\n        x[6] = (x[0] ^ x[3]) & 1   # feedback\n    # Map to +/-1 and apply N_ID2 cyclic shift:\n    m_shift = (43 * N_ID2) % 127\n    pss_seq = 1 - 2 * np.roll(pss, m_shift)\n    return pss_seq\n\npss = generate_pss(0)\nprint(f\"PSS length: {len(pss)} chips, values: {np.unique(pss)}\")  # [−1, 1]\nprint(f\"PSS power: {np.mean(pss**2):.1f}\")    # 1.0 (unit power)\n\n# SSB periodicity: 5 ms, 10 ms, 20 ms, 40 ms, 80 ms, 160 ms\n# Number of SSBs per half-frame: 4 (FR1, mu=0,1), 8 (FR1, mu=2), 64 (FR2)</code></pre>"}, {"id": 9, "level": "basic", "q": "What is OFDM and how is it implemented in 5G NR?", "a": "OFDM (Orthogonal Frequency Division Multiplexing): data mapped to QAM symbols on N subcarriers, taken by IFFT to time domain, cyclic prefix added, transmitted. Receiver: remove CP, FFT, one-tap equaliser per subcarrier. 5G NR transmitter chain: bit stream → CRC → LDPC/polar encoding → rate matching → scrambling → modulation (QPSK/16QAM/64QAM/256QAM) → layer mapping → precoding → RE mapping (resource grid) → IFFT → CP addition → digital front end → DAC → RF. Receiver: reverse order. CP length chosen to exceed channel delay spread — eliminates ISI. Subcarrier spacing determines robustness to Doppler and phase noise.<br><br><b>🔑 Plain terms:</b> OFDM converts serial data into parallel streams — each stream modulates a different subcarrier. The key innovation: subcarriers are orthogonal (mathematically independent) so they don't interfere despite overlapping spectrally. Implemented with IFFT at the transmitter and FFT at the receiver.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# 5G NR OFDM parameters (mu=1, 30 kHz SCS, 100 MHz BW):\nN_FFT  = 4096    # FFT size\nN_RB   = 273     # resource blocks\nN_sc   = N_RB * 12   # 3276 active subcarriers\nN_CP   = 288     # normal cyclic prefix samples (at 122.88 MHz)\nFs     = 122.88e6  # sample rate for 100 MHz BW (4096*30kHz=122.88 MHz)\n\n# Transmitter: frequency domain -> time domain\ndef ofdm_modulate(symbols_freq, N_FFT, N_CP):\n    \"\"\"\n    symbols_freq: complex array of length N_sc (QAM symbols on active subcarriers)\n    Returns time-domain OFDM symbol with cyclic prefix\n    \"\"\"\n    # Map symbols to FFT input (zero-pad to N_FFT):\n    freq_grid = np.zeros(N_FFT, dtype=complex)\n    half = len(symbols_freq) // 2\n    freq_grid[1:half+1]        = symbols_freq[:half]   # positive freqs\n    freq_grid[N_FFT-half:]     = symbols_freq[half:]   # negative freqs\n\n    # IFFT: convert to time domain (scale for unit power):\n    time_sym = np.fft.ifft(freq_grid) * np.sqrt(N_FFT)\n\n    # Add cyclic prefix (copy last N_CP samples to front):\n    return np.concatenate([time_sym[-N_CP:], time_sym])\n\n# Receiver: time domain -> frequency domain\ndef ofdm_demodulate(rx_signal, N_FFT, N_CP):\n    rx_no_cp = rx_signal[N_CP:]            # remove cyclic prefix\n    return np.fft.fft(rx_no_cp) / np.sqrt(N_FFT)  # FFT\n\n# The cyclic prefix turns linear convolution (multipath) into circular:\n# This means the channel appears as multiplication in the frequency domain\n# -> single complex multiply per subcarrier for equalization!\nprint(f\"OFDM symbol duration: {(N_FFT+N_CP)/Fs*1e6:.2f} us\")   # 34.9 us for mu=1</code></pre>"}, {"id": 10, "level": "basic", "q": "What is HARQ in 5G NR?", "a": "HARQ (Hybrid Automatic Repeat reQuest) combines FEC (Forward Error Correction) with ARQ retransmission. If a packet is decoded incorrectly, the UE sends NACK; gNB retransmits. Chase Combining (CC): retransmit same bits, receiver MRC-combines all copies. Incremental Redundancy (IR): retransmit different redundancy versions (RV0, RV1, RV2, RV3) — different punctured versions of rate-1/3 mother code. IR has better performance — each retransmission adds new information. 5G NR HARQ: up to 16 parallel HARQ processes per UE (vs 8 in LTE). HARQ round-trip time: UE receives PDSCH, sends HARQ feedback on PUCCH, gNB decodes feedback, schedules retransmission. Minimum RTT ~4 ms (FR1).<br><br><b>🔑 Plain terms:</b> HARQ is the 'try and retry' mechanism. If the receiver can't decode a packet, it asks for a retransmission. Unlike simple ARQ (throw away and resend), HARQ combines the failed and retransmitted versions using chase combining or incremental redundancy — squeezing out more information from failed attempts.<br><b>💡 Example:</b> <pre><code># HARQ operation:\n# 1. gNB transmits Transport Block (TB)\n# 2. UE attempts decoding\n# 3a. Success (CRC passes): UE sends ACK on PUCCH; gNB frees HARQ process\n# 3b. Failure (CRC fails):  UE sends NACK; gNB retransmits same or different redundancy version\n\n# HARQ key parameters:\n# Processes:       16 (5G NR, async HARQ for DL)\n# Max retransmissions: 4 (1 initial + 3 retransmissions), configurable up to 8\n# RTT:             8 slots (minimum), 3 ms for mu=1\n\n# Redundancy Versions (RV):\n# RV0: systematic bits + parity  (best for standalone decoding)\n# RV1: starts at 17/66 of codeword (shifted parity)\n# RV2: starts at 33/66 of codeword\n# RV3: starts at 56/66 of codeword (mostly parity)\n\n# Incremental redundancy: transmit different parity bits each retransmission\n# Chase combining: retransmit RV0 every time (same bits, soft combine at receiver)\n\nimport numpy as np\n# HARQ gain: each retransmission adds ~3 dB (combine = double the energy)\nsnr_init_db    = 3.0   # too low to decode alone\nn_retrans      = 3     # 3 retransmissions\nsnr_combined   = snr_init_db + 10*np.log10(n_retrans + 1)\nprint(f\"After {n_retrans} retransmissions: SNR = {snr_combined:.1f} dB\")  # 9 dB</code></pre>"}, {"id": 11, "level": "basic", "q": "What is the difference between FDD and TDD in 5G NR?", "a": "FDD (Frequency Division Duplex): uplink and downlink on separate frequency bands simultaneously. Fixed DL/UL split. Requires paired spectrum. Low latency (simultaneous DL/UL). Used for: LTE bands, n1, n3, n7. TDD (Time Division Duplex): single frequency band shared between DL and UL — time-multiplexed. Configurable DL/UL ratio. Asymmetric traffic support. Better for higher frequencies. Used for: n41, n77, n78, n79 (main 5G NR bands), all mmWave. Reciprocity: TDD channel is reciprocal (UL = DL) — enables massive MIMO beamforming using UL SRS measurements for DL precoding. Cross-link interference (CLI) possible between cells with different TDD configs.<br><br><b>🔑 Plain terms:</b> FDD = two separate frequencies for uplink and downlink, always on simultaneously (like a full-duplex walkie-talkie). TDD = one frequency, alternating between uplink and downlink (like a half-duplex walkie-talkie). 5G NR uses mostly TDD in the new mid-band spectrum.<br><b>💡 Example:</b> <pre><code># FDD: paired spectrum (UL and DL frequencies separated by duplex gap)\n# Band n1: UL 1920-1980 MHz, DL 2110-2170 MHz (190 MHz duplex gap)\n# Advantage: simultaneous UL+DL, simple timing, good for symmetric traffic\n# Disadvantage: requires paired spectrum license, twice the bandwidth\n\n# TDD: unpaired spectrum, time-shared\n# Band n78: 3300-3800 MHz (single band, UL and DL share time)\n# Advantage: flexible UL/DL ratio, efficient for asymmetric traffic (mostly DL)\n# Disadvantage: half-duplex, need guard period, interference between cells\n\n# 5G NR TDD slot format (example DDDSU pattern with mu=1):\n# D = Downlink slot (all 14 symbols are DL)\n# S = Special slot (DL + guard + UL symbols, e.g. 6+2+6 or 10+2+2)\n# U = Uplink slot (all 14 symbols are UL)\n\n# DDDSU pattern: 4 DL slots, 1 Special, 1 UL slot per 5 slots (3 ms at mu=1)\nimport numpy as np\npattern   = 'DDDSU'\nslots_per_ms = 2   # mu=1: 2 slots/ms\ndl_ratio  = (4 + 0.7) / 6   # roughly 4.7/6 slots are DL\nul_ratio  = (1 + 0.3) / 6\nprint(f\"TDD DDDSU: DL={dl_ratio*100:.0f}%, UL={ul_ratio*100:.0f}%\")\n\n# 3GPP TS 38.213 Table 11.1.1-1 defines all supported slot formats</code></pre>"}, {"id": 12, "level": "basic", "q": "What is QAM and what modulation orders are supported in 5G NR?", "a": "QAM (Quadrature Amplitude Modulation) encodes bits in amplitude and phase of a carrier. M-QAM: log2(M) bits per symbol. 5G NR supported modulations: QPSK (2 bits/symbol, robust), 16QAM (4 bits/symbol), 64QAM (6 bits), 256QAM (8 bits/symbol, requires high SNR), 1024QAM (10 bits/symbol, introduced in Release 17 for high-SNR scenarios). Higher order QAM = higher spectral efficiency but requires higher SNR and more precise carrier/phase synchronisation. CQI (Channel Quality Indicator) reported by UE determines which MCS (Modulation and Coding Scheme) the gNB uses for scheduling.<br><br><b>🔑 Plain terms:</b> QAM (Quadrature Amplitude Modulation) encodes data as points in a 2D constellation. 4-QAM (QPSK) = 2 bits per symbol. 16-QAM = 4 bits. 256-QAM = 8 bits. Higher-order QAM carries more data but requires better SNR — points are closer together and noise can cause errors.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# QAM bits per symbol and minimum SNR required:\nqam_table = {\n    'QPSK':    {'bits': 2,  'min_snr_db': 2},   # reliable at 2 dB SNR\n    '16-QAM':  {'bits': 4,  'min_snr_db': 12},\n    '64-QAM':  {'bits': 6,  'min_snr_db': 18},\n    '256-QAM': {'bits': 8,  'min_snr_db': 24},\n    '1024-QAM':{'bits': 10, 'min_snr_db': 30},  # 5G NR FR1 experimental\n}\n\nfor mod, info in qam_table.items():\n    print(f\"{mod:10s}: {info['bits']} bits/symbol, min SNR ≈ {info['min_snr_db']} dB\")\n\n# Generate QPSK constellation (Gray-coded):\nbits_to_symbol = {\n    '00':  1 + 1j,   # maps to +x+y quadrant\n    '01':  1 - 1j,\n    '10': -1 + 1j,\n    '11': -1 - 1j,\n}\nfor bits, sym in bits_to_symbol.items():\n    print(f\"QPSK '{bits}' -> {sym/np.sqrt(2):.3f} (normalised)\")\n\n# 256-QAM constellation:\nM = 256\nqam_256 = np.array([(2*i - np.sqrt(M) + 1) + 1j*(2*q - np.sqrt(M) + 1)\n                      for i in range(int(np.sqrt(M)))\n                      for q in range(int(np.sqrt(M)))])\nqam_256 /= np.sqrt(np.mean(np.abs(qam_256)**2))   # normalise to unit power\nprint(f\"256-QAM: {len(qam_256)} constellation points, power = {np.mean(np.abs(qam_256)**2):.2f}\")</code></pre>"}, {"id": 13, "level": "basic", "q": "What is MIMO and how does it work in 5G NR?", "a": "MIMO (Multiple Input Multiple Output) uses multiple antennas at transmitter and receiver. Types: Diversity — transmit same data from multiple antennas (improves reliability, SNR). Spatial multiplexing — transmit independent data streams (layers) simultaneously on same frequency using different spatial directions (increases throughput). Beamforming — combine antenna weights to direct signal energy towards UE. 5G NR: up to 8 DL/4 UL spatial layers per UE. Massive MIMO (mMIMO): gNB with 32-256 antenna ports for simultaneous beamforming to many UEs (MU-MIMO). Precoding: codebook-based (PMI from UE) or non-codebook (SRS-based reciprocity). Layer = independent stream in spatial multiplexing.<br><br><b>🔑 Plain terms:</b> MIMO uses multiple antennas at both ends. Spatial multiplexing = send different data streams simultaneously on different antenna paths (multiplies throughput). Diversity = send the same data on multiple antennas (improves reliability). 5G NR uses up to 8 spatial layers.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# 2x2 MIMO spatial multiplexing:\nN_tx = 2; N_rx = 2\n\n# Random channel matrix (Rayleigh fading):\nH = (np.random.randn(N_rx, N_tx) + 1j*np.random.randn(N_rx, N_tx)) / np.sqrt(2)\n\n# Transmit two independent streams:\ns1 = 1 + 1j    # stream 1 (QPSK symbol)\ns2 = -1 + 1j   # stream 2 (QPSK symbol)\nx = np.array([s1, s2]) / np.sqrt(2)   # normalise transmit power\n\n# Channel propagation (no noise):\ny = H @ x   # received signal: y = H*x\n\n# Zero-forcing receiver (pseudo-inverse of H):\nH_pinv = np.linalg.pinv(H)   # minimum norm solution\ns_est = H_pinv @ y            # estimate transmitted symbols\n\nprint(f\"Transmitted: {x}\")\nprint(f\"Received:    {np.round(s_est, 4)}\")   # should match x closely\n\n# Channel capacity (Shannon):\nSNR = 20   # 20 dB\nsigma2 = 10**(-SNR/10)\nC = np.log2(np.linalg.det(np.eye(N_rx) + SNR * H @ H.conj().T)).real\nprint(f\"2x2 MIMO capacity at 20 dB SNR: {C:.2f} bits/s/Hz\")   # ≈ 2-4x SISO</code></pre>"}, {"id": 14, "level": "basic", "q": "What is the 5G NR random access procedure (RACH)?", "a": "RACH allows UE to establish uplink synchronisation and obtain a C-RNTI. 4-step RACH: (1) UE sends PRACH preamble (Msg1) — randomly chosen from configured set, in PRACH occasion. gNB detects preamble, estimates TA (timing advance). (2) gNB sends RAR (Random Access Response, Msg2) on PDCCH/PDSCH — contains TA, UL grant for Msg3, temporary C-RNTI. (3) UE sends RRC setup request (Msg3) on PUSCH — applies TA, first uplink message. (4) gNB sends contention resolution (Msg4) — resolves collisions if multiple UEs sent same preamble. 2-step RACH (Rel-16): Msg1+Msg3 combined (MsgA), gNB responds with MsgB. Reduces latency.<br><br><b>🔑 Plain terms:</b> RACH (Random Access Channel) is how a UE joins the network. The UE picks a random Zadoff-Chu sequence from the gNB-broadcast list and transmits it on PRACH. The gNB correlates the received signal against all possible sequences to detect the UE, then responds with the UE's timing advance.<br><b>💡 Example:</b> <pre><code># 5G NR RACH procedure (4-step, contention-based):\n# Msg1: UE -> gNB: PRACH preamble (Zadoff-Chu sequence, one of 64)\n# Msg2: gNB -> UE: RAR (Random Access Response) on PDSCH\n#         contains: timing advance, initial UL grant, temporary RNTI\n# Msg3: UE -> gNB: RRC Setup Request on PUSCH (using temp RNTI)\n# Msg4: gNB -> UE: RRC Setup (contention resolution)\n\nimport numpy as np\n\n# Zadoff-Chu sequence (ZC) — used for PRACH preamble:\ndef zadoff_chu(u, N):\n    \"\"\"Generate Zadoff-Chu root sequence u of length N\"\"\"\n    n = np.arange(N)\n    return np.exp(-1j * np.pi * u * n * (n+1) / N)\n\nN_ZC = 139   # PRACH format 0 sequence length (short PRACH)\nu    = 1     # root index (gNB configures which roots are used)\n\nzc = zadoff_chu(u, N_ZC)\nprint(f\"ZC sequence: length={len(zc)}, |zc|={np.mean(np.abs(zc)**2):.2f} (unit power)\")\n\n# Generate 64 preambles by cyclic shifts of the root:\nshift = 13   # cyclic shift (Ncs, from RACH config)\npreambles = [np.roll(zc, k*shift) for k in range(64)]\n\n# At receiver: matched filter for preamble detection\n# Correlation peak position -> timing advance (propagation delay)\nreceived = preambles[5] + 0.1*np.random.randn(N_ZC)   # preamble #5 sent\ncorr = np.array([abs(np.dot(received, p.conj())) for p in preambles])\ndetected_preamble = np.argmax(corr)\nprint(f\"Detected preamble index: {detected_preamble}\")   # 5</code></pre>"}, {"id": 15, "level": "basic", "q": "What is a BWP (Bandwidth Part) in 5G NR?", "a": "A BWP (Bandwidth Part) is a contiguous set of PRBs (Physical Resource Blocks) within the carrier bandwidth that a UE is configured to use. Purpose: allows UEs with narrow RF bandwidth capability to operate in wide carriers; enables power saving (use narrow BWP when idle, switch to wide when active). Parameters: centre frequency, subcarrier spacing, number of RBs, CP type. UE can have up to 4 configured DL BWPs and 4 UL BWPs, but only one active at a time. BWP switching triggered by: PDCCH DCI, RRC reconfiguration, inactivity timer. Initial BWP: used during initial access (same numerology as SSB). Active BWP can be different from initial BWP.<br><br><b>🔑 Plain terms:</b> A BWP (Bandwidth Part) is a slice of the total channel bandwidth. A UE only needs to process its assigned BWP — it can be much narrower than the full carrier bandwidth, saving battery. The gNB can dynamically switch a UE's active BWP (e.g. wide BWP for high throughput, narrow BWP when idle).<br><b>💡 Example:</b> <pre><code># BWP allows UEs with different capabilities to share a wideband carrier:\n# 100 MHz carrier:\n# BWP1 (UE1 — IoT device):    20 RBs, centred at DC\n# BWP2 (UE2 — smartphone):   100 RBs (full bandwidth)\n# BWP3 (UE3 — high-speed):   273 RBs (full bandwidth)\n\n# BWP configuration parameters:\nbwp_config = {\n    'bwp_id':          1,\n    'N_RB':            52,        # number of resource blocks in BWP\n    'start_RB':        0,         # starting RB from carrier edge\n    'SCS':             30,        # kHz, subcarrier spacing\n    'cyclic_prefix':   'normal',  # or 'extended' (60 kHz SCS only)\n    'RNTI':            0xC123,    # this UE's identity\n}\n\n# BWP bandwidth in kHz:\nBWP_BW_kHz = bwp_config['N_RB'] * 12 * bwp_config['SCS']\nprint(f\"BWP bandwidth: {BWP_BW_kHz/1000:.1f} MHz\")   # 18.7 MHz for 52 RBs @ 30 kHz\n\n# A UE always has 4 configured BWPs:\n# BWP1: initial BWP (active during random access)\n# BWP2: active BWP (used for data)\n# BWP3: dormant BWP (switched to for high throughput)\n# BWP4: another alternative\n\n# BWP switching: gNB signals switch via DCI field \"bandwidth part indicator\"\n# Switching latency: typ. 3-4 ms (includes RF retuning)\nprint(\"BWP switching: narrow BWP -> wide BWP for burst download -> narrow BWP when idle\")</code></pre>"}, {"id": 16, "level": "intermediate", "q": "How does 5G NR LDPC coding work?", "a": "LDPC (Low-Density Parity-Check) codes are the channel codes for 5G NR data channels (PDSCH, PUSCH). Defined by sparse parity check matrix H. Two base graphs: BG1 (larger, for large transport blocks or high code rate ≥ 1/3), BG2 (smaller, for small TBs or low code rate). Lifting factor Z: scales base graph to actual code. Encoder: systematic — information bits + parity. Decoder: belief propagation (sum-product algorithm) over Tanner graph — iterative message passing between variable nodes (bits) and check nodes (parity equations). Quasi-cyclic structure enables parallel hardware implementation. Rate matching: puncturing/shortening for target code rate. Near Shannon capacity at large block lengths.<br><br><b>🔑 Plain terms:</b> LDPC (Low-Density Parity-Check) codes use a sparse matrix of check equations to detect and correct errors. Belief propagation decoding iteratively refines bit probabilities by passing 'messages' between bit nodes and check nodes. Used for 5G NR data channels (PDSCH/PUSCH).<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# LDPC concept: H * c = 0 (mod 2) defines valid codewords\n# H is the parity check matrix (sparse: very few 1s)\n\n# Simplified 4x8 LDPC example:\nH = np.array([\n    [1,1,0,1,0,0,0,0],\n    [0,1,1,0,1,0,0,0],\n    [0,0,1,1,0,1,0,0],\n    [1,0,0,1,0,0,1,1],\n], dtype=int)\nprint(f\"H density: {np.mean(H):.2f} (low density = sparse = LDPC)\")  # ~0.31\n\n# A valid codeword satisfies all check equations:\nc = np.array([1,0,1,0,1,1,0,0])   # hypothetical codeword\nsyndrome = H @ c % 2\nprint(f\"Syndrome (all 0 = valid): {syndrome}\")   # [0,0,0,0] if valid\n\n# 5G NR LDPC specifics (3GPP TS 38.212):\n# Two base graph families: BG1 (large TB), BG2 (small TB/high code rate)\n# BG1: max rate 8448 coded bits, min code rate 1/3\n# BG2: max rate 3840 coded bits, min code rate 1/5\n# Lifting factor Z: 2..384 (determines actual matrix size from base graph)\n# Rate matching: puncture/repeat coded bits to fill N_RE available REs\nprint(\"BG1 codeword: 66*Z coded bits (including systematic + parity)\")\nprint(\"BG2 codeword: 50*Z coded bits\")\n\n# Decoding: Belief Propagation (sum-product or min-sum algorithm)\n# Typical iterations: 20-50\n# GPU/FPGA acceleration required for real-time decoding at 5G rates</code></pre>"}, {"id": 17, "level": "intermediate", "q": "How does 5G NR Polar coding work and where is it used?", "a": "Polar codes (invented by Arikan 2009) achieve Shannon capacity via channel polarisation. Used in 5G NR for: PDCCH, PUCCH, PBCH control channel coding (not data). Principle: N = 2^n bit-channels created from N uses of a physical channel — some polarise to reliable (capacity ≈ 1), others to unreliable (capacity ≈ 0). Information bits placed on reliable channels, frozen bits (known zeros) on unreliable. Decoder: successive cancellation (SC) — decode bits one by one. SC list (SCL) decoder: maintain L candidate paths, improved performance. CRC-aided SCL (CA-SCL): best practical decoder. Rate matching: puncturing, shortening, or repetition. Excellent for short block lengths vs LDPC.<br><br><b>🔑 Plain terms:</b> Polar codes are the first capacity-achieving codes with an explicit construction. They split channels into 'good' and 'bad' sub-channels, send data only on good ones, and freeze bad ones to known values. Used in 5G NR for control channels (PDCCH, PBCH, PUCCH).<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Polar code concept: N = 2^n channel uses, K information bits, (N-K) frozen bits\n# Frozen bits = 0, sent on the worst N-K sub-channels\n# Information bits sent on the best K sub-channels\n\ndef polar_encode_N8(u):\n    \"\"\"Polar encoder for N=8 (3 stages)\"\"\"\n    # Generator matrix G = F^{tensor n} where F = [[1,0],[1,1]]\n    N = 8\n    x = u.copy()\n    # Stage 1: pairs (0,1), (2,3), (4,5), (6,7)\n    for i in [0, 2, 4, 6]:\n        x[i] = (x[i] + x[i+1]) % 2\n    # Stage 2: pairs (0,2), (1,3), (4,6), (5,7)\n    for i in [0, 1, 4, 5]:\n        x[i] = (x[i] + x[i+2]) % 2\n    # Stage 3: pairs (0,4), (1,5), (2,6), (3,7)\n    for i in range(4):\n        x[i] = (x[i] + x[i+4]) % 2\n    return x\n\n# Example: K=4 information bits in N=8 polar code\n# Best sub-channels (from Bhattacharyya parameters): indices 3,5,6,7\n# Frozen sub-channels: indices 0,1,2,4\n\ninfo_bits   = np.array([1, 0, 1, 1])   # 4 bits to send\nu           = np.zeros(8, dtype=int)   # input vector\nu[[3,5,6,7]] = info_bits               # place on good channels\nu[[0,1,2,4]] = 0                       # freeze bad channels to 0\n\ncodeword = polar_encode_N8(u)\nprint(f\"Input u:    {u}\")\nprint(f\"Codeword:   {codeword}\")   # 8 bits sent over channel\nprint(f\"Code rate:  {4/8:.2f}\")    # R = K/N = 0.5</code></pre>"}, {"id": 18, "level": "intermediate", "q": "What is the 5G NR physical layer processing chain for PDSCH?", "a": "DL PDSCH chain: (1) CRC attachment. (2) Code block segmentation (if TB > max CB size). (3) LDPC encoding (BG1 or BG2). (4) Rate matching (puncturing/repetition to target code rate). (5) Code block concatenation. (6) Scrambling (XOR with PN sequence using cell ID + RNTI). (7) Modulation (QPSK/16/64/256/1024QAM). (8) Layer mapping (up to 8 layers). (9) Antenna port mapping / precoding (codebook or non-codebook). (10) RE mapping (assign to resource grid, avoiding DMRS, CSI-RS, etc.). (11) OFDM modulation (IFFT + CP). (12) Digital front end (CFR, DPD). (13) DAC → RF. Reverse at UE receiver.<br><br><b>🔑 Plain terms:</b> The PDSCH (downlink data channel) processing chain converts raw data bits into RF symbols through a pipeline: CRC attachment, LDPC encoding, rate matching, scrambling, modulation, layer mapping, and finally precoding (beamforming) be
