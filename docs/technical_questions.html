<script>
const TOPICS=[{"id": "ntn", "label": "NTN / LEO Satcom", "icon": "🛰️", "cls": "t-ntn"}, {"id": "mimo", "label": "MIMO & propagation", "icon": "📶", "cls": "t-mimo"}, {"id": "pcap", "label": "Wireshark / tcpdump", "icon": "🦈", "cls": "t-pcap"}, {"id": "emb_c", "label": "Embedded C", "icon": "🔌", "cls": "t-emb"}, {"id": "avx2", "label": "AVX2 x86 SIMD", "icon": "⚡", "cls": "t-avx2"}, {"id": "dsp", "label": "DSP", "icon": "〰️", "cls": "t-dsp"}, {"id": "fiveG", "label": "5G Phy Layer", "icon": "📡", "cls": "t-5g"}];
const ALL_QUESTIONS={"ntn": [{"id": 1, "level": "basic", "q": "What does NTN mean in 5G, and why is LEO the usual focus for consumer broadband?", "a": "NTN (Non-Terrestrial Network) extends cellular coverage using airborne or spaceborne platforms. LEO (Low Earth Orbit, roughly 300–2000 km altitude) offers much lower round-trip delay and smaller path loss than GEO for comparable elevation angles, making it attractive for interactive broadband and NR-NTN trials.<br><br><b>🔑 Plain terms:</b> NTN = cell towers in the sky (planes, balloons, satellites). LEO satellites are close, so your bits take a short round trip—more like wired internet delay than old satellite TV.<br><b>💡 Example:</b> <pre><code># Order-of-magnitude one-way propagation (vacuum, zenith ~600 km):\nc = 299_792_458.0  # m/s\nh_km = 600\nd_m = h_km * 1000\nprint(f\"One-way ~ {d_m/c*1000:.1f} ms (plus processing, ISL, terrestrial)\")</code></pre>"}, {"id": 2, "level": "basic", "q": "Typical LEO altitude and orbital period—how are they related?", "a": "Circular orbit period <code>T ≈ 2π √(a³/μ)</code> with semi-major axis <code>a ≈ R_earth + h</code> and Earth gravitational parameter <code>μ ≈ 3.986×10¹⁴ m³/s²</code>. At ~550 km, period is on the order of ~90–95 minutes; higher LEO is slower.<br><br><b>🔑 Plain terms:</b> Higher orbit = bigger racetrack = longer lap time. LEO satellites whip around the Earth roughly every hour and a half.<br><b>💡 Example:</b> <pre><code>import math\nMU = 3.986004418e14  # m^3/s^2\nR_E = 6371e3\ndef period_s(h_m):\n    a = R_E + h_m\n    return 2 * math.pi * math.sqrt(a**3 / MU)\nfor h_km in (400, 550, 1200):\n    T = period_s(h_km * 1000)\n    print(h_km, \"km ->\", round(T/60, 1), \"min\")</code></pre>"}, {"id": 3, "level": "basic", "q": "What is a LEO mega-constellation in one paragraph?", "a": "Hundreds to thousands of satellites in multiple orbital planes/shells, coordinated so at least one satellite is above a minimum elevation angle for users in covered latitudes. Feeder links connect satellites to ground gateways; user links serve terminals.<br><br><b>🔑 Plain terms:</b> Instead of one big satellite parked over the equator, you get a swarm of smaller ones that take turns serving you as they fly overhead.<br><b>💡 Example:</b> <pre><code># Toy: how many planes if each satellite covers a stripe?\n# (Illustration only — real constellations use detailed sims.)\nimport math\nearth_circ_m = 40075e3\nbeam_width_km = 25  # not literal; illustrative\nsats_per_ring = max(1, int(earth_circ_m / (beam_width_km * 1000)))\nprint(\"Illustrative satellites per single ring:\", sats_per_ring)</code></pre>"}, {"id": 4, "level": "basic", "q": "Define service link, feeder link, and gateway in NTN.", "a": "Service link: satellite ↔ UE. Feeder link: satellite ↔ ground network equipment (often a gateway/teleport). Gateway: Earth station aggregating feeder traffic to the core network. Transparent payloads often relay user↔feeder RF; regenerative payloads demod/remod or route packets onboard.<br><br><b>🔑 Plain terms:</b> User beam is your Wi‑Fi to space; feeder beam is the fat pipe down to a ground station; gateway is that ground station’s hook into the internet.<br><b>💡 Example:</b> <pre><code># Name mapping (conceptual)\nroles = {\n    \"service_link\": \"satellite <-> user terminal\",\n    \"feeder_link\": \"satellite <-> gateway / teleport\",\n    \"gateway\": \"Earth station + backhaul to core / IP\",\n}\nfor k, v in roles.items():\n    print(f\"{k}: {v}\")</code></pre>"}, {"id": 5, "level": "basic", "q": "Why is elevation angle important for LEO links?", "a": "Low elevation means longer slant range through atmosphere, more tropospheric loss and scintillation, higher risk of blockage by terrain/buildings, and often larger Doppler component for moving satellites. Operators pick a minimum elevation (e.g., 25–35°) to balance coverage vs link quality.<br><br><b>🔑 Plain terms:</b> Near the horizon the signal travels through more ‘bad air’ and clutter—like shining a flashlight through fog at a shallow angle.<br><b>💡 Example:</b> <pre><code>import math\ndef slant_km(h_km, el_deg):\n    # simple planar geometry: range ~ h / sin(el) for small angles (approx)\n    el = math.radians(max(el_deg, 1.0))\n    return h_km / math.sin(el)\nfor el in (10, 25, 45, 90):\n    print(f\"el={el:2d} deg, approx slant/h ~ {slant_km(550, el):.1f} x altitude\")</code></pre>"}, {"id": 6, "level": "basic", "q": "What is Doppler shift and why is it worse for LEO than for GEO from a UE perspective?", "a": "Doppler arises from radial velocity between transmitter and receiver. LEO satellites have high orbital speed (~7–8 km/s magnitude). Even if UE is fixed, the satellite’s radial velocity toward/away from the UE changes quickly, shifting carrier frequency. GEO satellites’ apparent motion is slow; Doppler is comparatively small.<br><br><b>🔑 Plain terms:</b> If a siren moves toward you, pitch goes up; away, pitch down. LEO ‘sirens’ move fast, so your radio carrier appears to slide up and down the dial.<br><b>💡 Example:</b> <pre><code># f_shift ≈ (v_radial / c) * f0\nc = 299792458.0\nf0 = 14e9  # 14 GHz Ka example\nv_radial = 500.0  # m/s (illustrative)\nprint(f\"Doppler ~ {v_radial/c * f0/1e3:.2f} kHz at 14 GHz\")</code></pre>"}, {"id": 7, "level": "basic", "q": "What is free-space path loss (FSPL) and how does distance enter?", "a": "FSPL in dB is often written <code>FSPL = 20 log₁₀(4πd/λ)</code> = <code>20 log₁₀(d) + 20 log₁₀(f) + 20 log₁₀(4π/c)</code>. It increases 20 dB per decade of distance or frequency (line-of-sight, idealized). Real links add atmospheric, pointing, and implementation losses.<br><br><b>🔑 Plain terms:</b> Each time you double the distance, FSPL in dB increases by about 6 dB; each time you double the frequency, also about 6 dB more loss (free-space, idealized).<br><b>💡 Example:</b> <pre><code>import math\ndef fspl_db(d_m, f_hz):\n    lam = 299792458.0 / f_hz\n    return 20*math.log10(4*math.pi*d_m/lam)\nd = 600e3  # 600 km slant (illustrative)\nfor f_ghz in (2, 12, 20):\n    f = f_ghz * 1e9\n    print(f\"{f_ghz} GHz FSPL @ {d/1e3:.0f} km: {fspl_db(d, f):.1f} dB\")</code></pre>"}, {"id": 8, "level": "basic", "q": "What is a bent-pipe (transparent) satellite payload?", "a": "RF received on the uplink is amplified, filtered, frequency-translated, and retransmitted without baseband decoding of user data. Simple and low-latency processing on board, but no onboard routing/regeneration of NR protocol data units.<br><br><b>🔑 Plain terms:</b> The satellite is a mirror with a frequency changer—it doesn’t ‘read’ your packets, it just shifts and boosts them.<br><b>💡 Example:</b> <pre><code># Model: y(t) = gain * x(t) * exp(j*2*pi*df*t) + noise\nimport math, cmath\nx = 1 + 0j\ngain = 100\ndf = 20e3\nfs = 30.72e6\nn = 1000\ny = gain * x * cmath.exp(1j * 2 * math.pi * df * n / fs)\nprint(\"sample rotated:\", y)</code></pre>"}, {"id": 9, "level": "basic", "q": "What is a regenerative payload and one advantage for NR-NTN?", "a": "The satellite demodulates/decodes (or at least performs digital regeneration/routing) and re-encodes for downlink. Advantages can include better interference management, beamforming gains with onboard processing, routing over ISLs, and potentially improved spectral efficiency compared to pure analog relay.<br><br><b>🔑 Plain terms:</b> Instead of a dumb mirror, the satellite understands frames and can clean them up or route them like a flying base station.<br><b>💡 Example:</b> <pre><code># Conceptual: on-sat demod BER threshold\nimport random\ndef hard_decode(bits, p_err):\n    return [b if random.random() > p_err else 1-b for b in bits]\nprint(hard_decode([1,0,1,1], 0.05))</code></pre>"}, {"id": 10, "level": "basic", "q": "What are ISLs (Inter-Satellite Links) and why do LEO constellations use them?", "a": "ISLs connect neighboring satellites (often optical or Ka-band RF) to route traffic in space, reducing dependence on every satellite having a simultaneous feeder to a gateway and improving polar/remote coverage continuity.<br><br><b>🔑 Plain terms:</b> Satellites pass messages along a chain in the sky so your data doesn’t always have to touch the ground in the middle of nowhere.<br><b>💡 Example:</b> <pre><code># Toy shortest-hop count on a ring\nn = 40  # satellites in a ring\nsrc, dst = 3, 35\nhop_cw = (dst - src) % n\nhop_ccw = (src - dst) % n\nprint(\"min hops:\", min(hop_cw, hop_ccw))</code></pre>"}, {"id": 11, "level": "basic", "q": "Why is TCP tricky over satellite links even for LEO?", "a": "TCP throughput scales inversely with RTT for loss-based congestion control and window growth; high bandwidth-delay product (BDP) needs large windows. Random losses from weather/fading misinterpreted as congestion hurt throughput unless mitigations (PEP, Hybla, BBR, split TCP) are used.<br><br><b>🔑 Plain terms:</b> TCP assumes loss means congestion; on radio, weather drops packets too. Also long pipes need big windows or the link idles.<br><b>💡 Example:</b> <pre><code># BDP bits = bandwidth * RTT\nbw_mbps = 100\nrtt_ms = 80\nbdp_bits = (bw_mbps * 1e6) * (rtt_ms / 1000)\nprint(f\"BDP ~ {bdp_bits/8/1024:.0f} KiB\")</code></pre>"}, {"id": 12, "level": "basic", "q": "What is link budget at a high level?", "a": "Received power (dBm) ≈ Tx EIRP (dBm) + G_rx (dBi) − FSPL (dB) − other losses (dB). Compare to receiver sensitivity threshold for a given modulation/coding to determine margin.<br><br><b>🔑 Plain terms:</b> Add gains, subtract distance and weather penalties—if you still have enough signal left, the link works.<br><b>💡 Example:</b> <pre><code># Minimal link budget snippet (dB domain)\neirp_dbm = 40\ng_rx_dbi = 39.0\nfspl_db = 182.0\nlosses_db = 3.0\nprx = eirp_dbm + g_rx_dbi - fspl_db - losses_db\nprint(\"P_rx (dBm):\", prx)</code></pre>"}, {"id": 13, "level": "basic", "q": "Rain fade: why Ka-band LEO links care about weather more than many L-band systems?", "a": "Atmospheric absorption/scattering increases with frequency; rain cells cause substantial attenuation at Ka (≈20–30 GHz) and Ku compared to L/S bands. Link budgets include rain margin; adaptive modulation and coding (AMC) backs off rates during fades.<br><br><b>🔑 Plain terms:</b> High-frequency signals get soaked by rain clouds like a sponge; you either shout louder or speak slower.<br><b>💡 Example:</b> <pre><code># Illustrative rain margin table (dB) — not for design\nrain_margin = {\"L_band\": 0.5, \"Ku_band\": 4.0, \"Ka_band\": 8.0}\nfor band, m in rain_margin.items():\n    print(band, m, \"dB (illustrative)\")</code></pre>"}, {"id": 14, "level": "basic", "q": "What is ephemeris and why does the UE or network need it for NTN?", "a": "Ephemeris describes satellite position/velocity as a function of time (orbit state vectors or Kepler elements). For beam acquisition, Doppler pre-compensation, timing alignment, and regulatory geolocation, terminals need accurate orbit knowledge broadcast by the network or GNSS-assisted databases.<br><br><b>🔑 Plain terms:</b> It’s the satellite’s flight schedule and GPS coordinates so your phone knows where to point and how to tune.<br><b>💡 Example:</b> <pre><code># Kepler mean motion n (rad/s) from semi-major axis a\nimport math\nMU = 3.986004418e14\na = 6921e3  # ~550 km altitude\nn = math.sqrt(MU / a**3)\nprint(\"mean motion (rad/s):\", n, \"revs/day:\", n*86400/(2*math.pi))</code></pre>"}, {"id": 15, "level": "basic", "q": "What is a TLE (Two-Line Element set)?", "a": "A standardized NORAD/NASA format distributing orbital elements for SGP4/SDP4 propagation models. Useful for non-3GPP simulations, visualization, and lab emulators; commercial NTN systems may use proprietary ephemeris over 3GPP signaling instead of public TLEs.<br><br><b>🔑 Plain terms:</b> A compact text recipe anyone can use to predict where a satellite will be—handy for demos and MATLAB/Python sims.<br><b>💡 Example:</b> <pre><code># TLE = title + two data lines; parse with skyfield/sgp4\ntle = '''0 ISS (ZARYA)\n1 25544U 98067A   24101.50000000  .00016717  00000-0  10270-3 0  9990\n2 25544  51.6400  25.0000 0002000   0.0000  90.0000 15.50000000 00000'''\nprint(\"TLE chars:\", len(tle))</code></pre>"}, {"id": 16, "level": "basic", "q": "Minimum elevation angle vs coverage: what trade-off do network planners face?", "a": "Lower minimum elevation increases sky coverage and reduces satellite count needed, but degrades link budget and availability. Higher minimum elevation improves median link quality but may create coverage holes unless satellite density increases.<br><br><b>🔑 Plain terms:</b> Pick a higher ‘look angle’ for clearer sky, or lower angle for more places covered—with weaker links.<br><b>💡 Example:</b> <pre><code>import math\ndef footprint_cap_lat(inc_deg):\n    # crude cap: roughly related to inclination (not exact cell edge)\n    return inc_deg - 5  # illustrative only\nprint(\"Illustrative max latitude ~\", footprint_cap_lat(53), \"deg for inc=53\")</code></pre>"}, {"id": 17, "level": "basic", "q": "What is NR-NTN in 3GPP?", "a": "Work in Rel-17/18/19 to support NTN scenarios with NR, including adaptations for large cell radius, long delays, high Doppler, and satellite ephemeris signaling. Includes UE features, SIBs, and physical layer tweaks compared to terrestrial NR.<br><br><b>🔑 Plain terms:</b> The 5G NR standard’s ‘satellite mode’—extra knobs so phones and satellites can speak NR despite motion and delay.<br><b>💡 Example:</b> <pre><code># Not from spec — mnemonic checklist\nchecks = [\"ephemeris\", \"Doppler\", \"large TA\", \"SIB extensions\", \"PRACH\"]\nprint(\"NR-NTN design touches:\", \", \".join(checks))</code></pre>"}, {"id": 18, "level": "basic", "q": "LEO handover: what is happening when your satellite changes?", "a": "As satellites move or beams sweep, the UE may need to switch serving cell/beam/satellite. Handover involves measurement reports, target cell preparation, and state transfer to maintain session continuity—often more frequent than urban terrestrial micro mobility.<br><br><b>🔑 Plain terms:</b> Like switching cell towers while driving, except the tower is flying at mach 20-ish angular motion across your sky.<br><b>💡 Example:</b> <pre><code>events = [\"A3 offset met\", \"HO command\", \"RACH to target\", \"DL/UL resume\"]\nfor i, e in enumerate(events, 1):\n    print(i, e)</code></pre>"}, {"id": 19, "level": "basic", "q": "What is Earth-fixed vs Earth-moving cell in NTN context?", "a": "Earth-fixed beams steer to keep coverage on geographic areas as satellites move (beamforming tracks Earth). Earth-moving beams are fixed in satellite body frame, sweeping across Earth surface. NR-NTN discussions include reference systems for synchronization and measurement behavior tied to these models.<br><br><b>🔑 Plain terms:</b> Either the spotlight follows the stage (Earth-fixed) or the stage moves under a fixed lamp (Earth-moving).<br><b>💡 Example:</b> <pre><code>mode = \"earth_fixed\"\nif mode == \"earth_fixed\":\n    print(\"beam steering compensates satellite motion\")\nelse:\n    print(\"footprint slides across terrain\")</code></pre>"}, {"id": 20, "level": "basic", "q": "Why can round-trip time (RTT) still matter for LEO voice over NR?", "a": "Even ~20–40 ms one-way space propagation plus terrestrial/core segments can push RTT above comfortable conversational thresholds if combined with processing/ISL hops. VoNR codecs and jitter buffers tolerate some delay, but echo control and conversational turn-taking degrade with high RTT.<br><br><b>🔑 Plain terms:</b> Walkie-talkie lag: short LEO helps, but many hops add up—still need good echo cancellation.<br><b>💡 Example:</b> <pre><code>rtt_ms = 2*25 + 15 + 10  # space*2 + core + RAN illustrative\nprint(\"RTT ms:\", rtt_ms)</code></pre>"}, {"id": 21, "level": "basic", "q": "What is HAPS and how does it differ from LEO NTN?", "a": "HAPS (High Altitude Platform Station) operates in stratosphere (~17–22 km) on balloons or UAVs. Much shorter range and different regulatory/weather behavior than LEO; often stationary relative to wind patterns with station-keeping. NTN includes both HAPS and satellites.<br><br><b>🔑 Plain terms:</b> HAPS is a tower on a balloon/plane height; LEO is hundreds of km up—different coverage physics and regulations.<br><b>💡 Example:</b> <pre><code>alt = {\"HAPS_km\": 20, \"LEO_km\": 600}\nfor k, v in alt.items():\n    print(k, v)</code></pre>"}, {"id": 22, "level": "basic", "q": "What is G/T and why do ground gateways quote it?", "a": "G/T is antenna gain divided by system noise temperature (dB/K). It measures how well a receive station collects signal power relative to noise. Higher G/T improves C/N₀ for a given received power.<br><br><b>🔑 Plain terms:</b> A bigger ear (gain) with a quiet room (low noise) hears whispers better—that’s G/T.<br><b>💡 Example:</b> <pre><code>import math\nG_dbi = 50.0\nT_sys_K = 200.0\ngt = G_dbi - 10*math.log10(T_sys_K)\nprint(\"G/T (dB/K) ~\", round(gt, 2))</code></pre>"}, {"id": 23, "level": "basic", "q": "What is EIRP?", "a": "Effective Isotropic Radiated Power combines transmit power and antenna gain relative to an isotropic radiator: <code>EIRP = P_tx + G_tx</code> (log domain). Regulatory limits often cap EIRP spectral density for sharing.<br><br><b>🔑 Plain terms:</b> How loud you shout in all directions if your megaphone (antenna) aimed the sound—regulators cap how ‘loud’ you can be.<br><b>💡 Example:</b> <pre><code>ptx_dbm = 30\ngtx_dbi = 40\nprint(\"EIRP dBm:\", ptx_dbm + gtx_dbi)</code></pre>"}, {"id": 24, "level": "basic", "q": "Why might user terminals use phased arrays for LEO broadband?", "a": "Electronic beam steering without moving parts enables fast tracking of LEO passes, narrow beams for gain, and spatial filtering. Arrays can support multiple simultaneous beams for satellite diversity.<br><br><b>🔑 Plain terms:</b> Many tiny antennas team up to steer a beam electronically—like a crowd doing the wave to point a spotlight.<br><b>💡 Example:</b> <pre><code># Weighted array factor (ULA) illustrative\nimport cmath, math\nN=8;d_lambda=0.5;theta_deg=20\nw=[cmath.exp(1j*2*math.pi*d_lambda*n*math.sin(math.radians(theta_deg))) for n in range(N)]\n# beam peak when steering matches arrival — demo only\nprint(\"weights len\", len(w))</code></pre>"}, {"id": 25, "level": "basic", "q": "What is C/N₀ and how is it used?", "a": "Carrier-to-noise density ratio (dB-Hz) = received carrier power (dBm) − noise PSD (dBm/Hz). It determines supportable data rate with a given modulation/coding via Shannon-like thresholds and implementation margins.<br><br><b>🔑 Plain terms:</b> It tells how much signal juice you have per Hz of noise bandwidth—sets the speed limit.<br><b>💡 Example:</b> <pre><code>import math\n# Thermal noise PSD ~ -174 dBm/Hz at 290K (order)\nPn = -174  # dBm/Hz\nPrx = -120  # dBm carrier (illus)\nB_hz = 1e6\nCN0 = Prx - (Pn + 10 * math.log10(B_hz)) + 10 * math.log10(B_hz)\nprint(\"C/N0 (dB-Hz) ~\", round(CN0, 1))</code></pre>"}, {"id": 26, "level": "basic", "q": "What is scintillation?", "a": "Rapid signal amplitude/phase fluctuations caused by ionospheric/tropospheric irregularities and multipath. More pronounced at low elevations and certain frequencies; impacts tracking loops and demodulator performance.<br><br><b>🔑 Plain terms:</b> Twinkling—not just stars; your radio signal flickers as the air stirs it.<br><b>💡 Example:</b> <pre><code>import random\ndef scintillate(rssi_dbm):\n    return rssi_dbm + random.gauss(0, 0.5)\nprint([scintillate(-100) for _ in range(5)])</code></pre>"}, {"id": 27, "level": "basic", "q": "What is dual polarization (e.g., LHCP/RHCP) used for on satellite links?", "a": "Orthogonal polarizations can double capacity through polarization reuse and mitigate certain multipath/faraday effects depending on band. Terminals and satellites must match polarization sense.<br><br><b>🔑 Plain terms:</b> Two signals on the same frequency but twisted differently—like left- vs right-handed threads that don’t collide.<br><b>💡 Example:</b> <pre><code>pols = (\"LHCP\", \"RHCP\", \"linear H\", \"linear V\")\nprint(\"reuse pairs:\", pols[0], \"+\", pols[1])</code></pre>"}, {"id": 28, "level": "basic", "q": "What is a gateway diversity strategy?", "a": "Using multiple geographically separated gateways so feeder rain fade or outages at one site can be mitigated by routing through another, subject to satellite visibility and backbone connectivity.<br><br><b>🔑 Plain terms:</b> If Seattle’s gateway is raining, hand the traffic to Arizona’s dish instead.<br><b>💡 Example:</b> <pre><code>sites = {\"Seattle\": 0.9, \"Phoenix\": 0.99}\nimport random\ndef up(s): return random.random() < sites[s]\nprint(\"Seattle up?\", up(\"Seattle\"), \"Phoenix up?\", up(\"Phoenix\"))</code></pre>"}, {"id": 29, "level": "basic", "q": "Why are polar orbits common in LEO constellations?", "a": "Inclinations near 90° cover high latitudes including polar regions that equatorial GEO cannot serve well. Shells often mix inclinations (e.g., ~53° for mid-latitude density + polar shells) to balance global coverage.<br><br><b>🔑 Plain terms:</b> Some satellites orbit pole-to-pole so Arctic villages get coverage—not GEO’s strong suit.<br><b>💡 Example:</b> <pre><code>inc = 97.4\nprint(\"near-polar inclination deg:\", inc)</code></pre>"}, {"id": 30, "level": "basic", "q": "What is beam footprint vs cell ID in NTN?", "a": "Footprint is the geographic area illuminated by a beam’s main lobe at a given satellite attitude/beamforming state. Cell ID is a logical identifier in RAN protocols mapping to beams/resources; NR-NTN may map many UEs into large cells.<br><br><b>🔑 Plain terms:</b> The spotlight on the ground is the footprint; the name tag the network uses for that patch is the cell ID.<br><b>💡 Example:</b> <pre><code>footprint_km2 = 300 * 400  # illustrative ellipse area\nprint(\"order-of-magnitude footprint km^2:\", footprint_km2)</code></pre>"}, {"id": 31, "level": "basic", "q": "What is latency composition for a LEO broadband session?", "a": "One-way includes air interface over user+feeder links, possible ISL multi-hop, gateway processing, terrestrial backbone, and internet peering. LEO reduces propagation vs GEO but ISL routing and peering can dominate if poorly engineered.<br><br><b>🔑 Plain terms:</b> Delay is a stack of slices—space is only one slice.<br><b>💡 Example:</b> <pre><code>parts = {\"RAN\":5,\"space\":40,\"ISL\":10,\"backhaul\":15,\"IXP\":5}\nprint(\"sum ms:\", sum(parts.values()))</code></pre>"}, {"id": 32, "level": "basic", "q": "What is atmospheric absorption window selection?", "a": "Designers pick frequency bands with relatively low molecular absorption (e.g., certain Ka windows) while balancing rain sensitivity and component availability.<br><br><b>🔑 Plain terms:</b> Pick a radio ‘color’ where the air is more transparent, not where water vapor eats you alive.<br><b>💡 Example:</b> <pre><code>windows = [\"Ku ~12-18 GHz\", \"Ka ~20-30 GHz\", \"Q/V higher\"]\nfor w in windows:\n    print(w)</code></pre>"}, {"id": 33, "level": "basic", "q": "What is Faraday rotation and when does it matter?", "a": "Ionospheric plasma rotates polarization of linearly polarized waves; magnitude grows ~1/f² and depends on TEC and geomagnetic field angle. More relevant for L/S bands; less for Ka where linear polarization is more practical.<br><br><b>🔑 Plain terms:</b> The ionosphere spins your signal’s polarization like a barber pole—worse at lower frequencies.<br><b>💡 Example:</b> <pre><code>f_ghz = 2.0\nprint(\"Faraday importance scales ~ 1/f^2 => relative to 2 GHz:\", (1/f_ghz**2))</code></pre>"}, {"id": 34, "level": "basic", "q": "What is station-keeping for LEO?", "a": "Orbital perturbations (drag, J2, solar radiation pressure) change altitude/inclination; satellites perform propulsive maneuvers to stay in assigned slots within tolerance.<br><br><b>🔑 Plain terms:</b> Tiny orbital drift is corrected with thrusters so the swarm stays in formation.<br><b>💡 Example:</b> <pre><code>dv_budget_mps_per_year = 25  # illustrative\nprint(\"annual station-keeping budget order:\", dv_budget_mps_per_year, \"m/s\")</code></pre>"}, {"id": 35, "level": "basic", "q": "What is orbital decay for very low LEO?", "a": "Atmospheric drag removes energy, lowering perigee until reentry unless boosted. Very low orbits (~300–400 km) decay faster; constellations trade altitude vs lifetime/refueling.<br><br><b>🔑 Plain terms:</b> Skim the atmosphere and you slowly sink unless you fire thrusters to climb again.<br><b>💡 Example:</b> <pre><code>h_km = 350\ndrag_severity = \"high\" if h_km < 450 else \"moderate\"\nprint(h_km, \"km ->\", drag_severity)</code></pre>"}, {"id": 36, "level": "basic", "q": "What is spectrum sharing between NGSO systems?", "a": "Multiple NGSO constellations may share bands with coordination (ephemeris sharing, power limits, antenna discrimination) to control interference—often studied under ITU/Radio Regulations and operator agreements.<br><br><b>🔑 Plain terms:</b> Two highway lanes merging—rules decide who yields so radios don’t scream over each other.<br><b>💡 Example:</b> <pre><code>coord = [\"EPFD limits\", \"PFD masks\", \"GSO arc avoidance angles\"]\nprint(coord)</code></pre>"}, {"id": 37, "level": "basic", "q": "What is EPFD?", "a": "Equivalent Power Flux-Density limits protect GSO earth stations from aggregated interference from NGSO constellations by constraining power flux density as seen from the GSO arc, depending on off-boresight angle and frequency.<br><br><b>🔑 Plain terms:</b> A rule that says ‘from the GEO satellite’s point of view, your LEO swarm can’t glare too bright’.<br><b>💡 Example:</b> <pre><code>print(\"EPFD is an ITU-style interference metric (dB(W/m^2) in reference BW))\")</code></pre>"}, {"id": 38, "level": "basic", "q": "Why is laser (optical) ISL attractive?", "a": "Very narrow beams allow high spatial reuse and high data rates with comparatively small apertures; no spectrum filing for space-space links in the same way as RF. Challenges: cloud avoidance for downlinks (not ISL), pointing/acquisition/tracking, and hardware reliability.<br><br><b>🔑 Plain terms:</b> Fiber without glass—super-fast between satellites; aligning beams is hard but spectrum is ‘free’.<br><b>💡 Example:</b> <pre><code>rate_gbps = 100\nprint(\"ISL capacity order (illustrative):\", rate_gbps, \"Gb/s per link\")</code></pre>"}, {"id": 39, "level": "basic", "q": "What is UT (User Terminal) gimbal vs ESA?", "a": "Mechanical gimbal mounts steer a dish; electronically steered arrays (ESA) steer beams in software. Most modern flat LEO UTs are ESAs.<br><br><b>🔑 Plain terms:</b> Old VSAT on a motor; new pizza-box steers beams with chips.<br><b>💡 Example:</b> <pre><code>types = {\"mechanical\": \"gimbal dish\", \"phased_array\": \"flat ESA\"}\nprint(types[\"phased_array\"])</code></pre>"}, {"id": 40, "level": "basic", "q": "What is satellite angular velocity as seen from ground?", "a": "Even with ~90 min period, apparent angular speed depends on range and geometry; near zenith passes can sweep quickly across the sky, driving beam tracking update rates.<br><br><b>🔑 Plain terms:</b> A plane looks slow far away but zips across your view when overhead—same idea.<br><b>💡 Example:</b> <pre><code># rough max angular rate ~ v / range\nv = 7600  # m/s\nd = 600e3\nprint(\"order omega rad/s:\", v/d)</code></pre>"}, {"id": 41, "level": "intermediate", "q": "How does NR-NTN differ from terrestrial NR in cell radius and timing?", "a": "NTN cells can be very large (hundreds of km). Propagation delay breaks small-TA assumptions; 3GPP introduced extended timing advance, larger PRACH formats, and SIB signaling for ephemeris to align UL/DL timing and frequency.<br><br><b>🔑 Plain terms:</b> Terrestrial NR assumes the tower is close; NTN must stretch timers and pre-correct for space distance and motion.<br><b>💡 Example:</b> <pre><code>ta_us = 2 * 600e3 / 299792458 * 1e6  # two-way ~ sat height order\nprint(\"order two-way prop us:\", round(ta_us, 1))</code></pre>"}, {"id": 42, "level": "intermediate", "q": "What is Doppler-precompensation split between UE and gNB in NTN?", "a": "Typically the network signals parameters and the UE applies UL frequency pre-compensation for its perceived Doppler using ephemeris and GNSS (implementation-dependent). DL may be pre-shifted by network as well depending on scenario.<br><br><b>🔑 Plain terms:</b> Both ends agree on how much to ‘tune the radio dial’ so transmitted energy lands on the right subcarriers.<br><b>💡 Example:</b> <pre><code>f_err_hz = 20e3\nprecomp = -f_err_hz\nprint(\"UE shifts UL by Hz:\", precomp)</code></pre>"}, {"id": 43, "level": "intermediate", "q": "Why might PRACH preambles be longer or repeated in NTN?", "a": "Large cell radii and timing uncertainty increase delay spread and RTT; longer sequences improve detection SNR and tolerate misalignment before TA is established.<br><br><b>🔑 Plain terms:</b> Knock louder and longer on a distant door so someone hears you despite echo.<br><b>💡 Example:</b> <pre><code>preamble_ms = 1.0  # illustrative terrestrial\npreamble_ntn_ms = 4.0\nprint(\"NTN often needs longer PRACH (illus):\", preamble_ntn_ms, \"ms\")</code></pre>"}, {"id": 44, "level": "intermediate", "q": "How does large BDP affect RLC AM retransmissions?", "a": "High RTT inflates the pipe; if RLC status PDUs are delayed, unnecessary retransmissions or stalled windows can occur unless window sizes and timers scale with RTT/bandwidth.<br><br><b>🔑 Plain terms:</b> Acknowledgements return slowly—if your ‘waiting for receipt’ timer is too short, you resend needlessly.<br><b>💡 Example:</b> <pre><code>rtt=0.12; bw=100e6; frame=1400*8\npipe = bw*rtt/frame\nprint(\"RLC frames in flight (order):\", int(pipe))</code></pre>"}, {"id": 45, "level": "intermediate", "q": "What is split-TCP or Performance Enhancing Proxy (PEP) in satcom?", "a": "A middlebox terminates TCP near the network edge and uses an optimized protocol over the satellite segment, re-encapsulating to TCP toward the remote endpoint. Improves throughput but touches end-to-end semantics and security (TLS visibility).<br><br><b>🔑 Plain terms:</b> A translator who speaks ‘fast satellite dialect’ in the middle of a normal TCP conversation.<br><b>💡 Example:</b> <pre><code>print(\"PEP locations: gateway, satellite (if regenerative), enterprise edge\")</code></pre>"}, {"id": 46, "level": "intermediate", "q": "How does AMC help LEO Ka links?", "a": "Adaptive Modulation and Coding steps down MCS during fades (rain, scintillation) preserving connectivity at lower rates, and steps up in clear sky.<br><br><b>🔑 Plain terms:</b> Speak simpler words in a storm; use big words when the line is crystal clear.<br><b>💡 Example:</b> <pre><code>mcs = 20\nif rain_atten_db := 6:\n    mcs -= 4\nprint(\"backed-off MCS:\", mcs)</code></pre>"}, {"id": 47, "level": "intermediate", "q": "What is angle-of-arrival (AoA) tracking for phased arrays?", "a": "Estimate direction of incoming wavefront to update beamformer weights; for LEO, AoA rate can be high, requiring Kalman filters or predictor loops.<br><br><b>🔑 Plain terms:</b> The array constantly guesses where the signal is coming from and steers a digital ear that way.<br><b>💡 Example:</b> <pre><code># one-step LMS-ish update (stdlib only; not a real tracker)\nimport cmath\nw = [1 + 0j] * 4\nsteer = [0, 0.5, 1.0, 1.5]\na = [cmath.exp(1j * 2 * cmath.pi * s / 4) for s in steer]\nmu = 0.05\nw = [wi + mu * ai for wi, ai in zip(w, a)]\nprint([round(abs(x), 3) for x in w])</code></pre>"}, {"id": 48, "level": "intermediate", "q": "What is satellite diversity (two satellites visible)?", "a": "If the UT can maintain two simultaneous paths, selection/combining can mitigate blockage. NR may explore CA/DC-style solutions depending on architecture.<br><br><b>🔑 Plain terms:</b> If one flying cell is blocked by a tree, hold hands with another still in view.<br><b>💡 Example:</b> <pre><code>snr = [12, 8, 15]  # dB from 3 candidate beams\nbest = max(snr)\nprint(\"pick best SNR branch:\", best)</code></pre>"}, {"id": 49, "level": "intermediate", "q": "How does ionospheric delay differ for LEO vs GEO slant paths?", "a": "Ionospheric delay scales with TEC along the path; longer low-elevation paths increase TEC integration. LEO geometry changes faster; dual-frequency correction (L1/L5) common in GNSS can inspire satcom correction strategies in affected bands.<br><br><b>🔑 Plain terms:</b> More ionosphere along shallow paths; LEO moves the path quickly so corrections must update fast.<br><b>💡 Example:</b> <pre><code>tec = 40  # TECU illustrative\nk = 40.3  # factor order for delay in meters at L band (approx scale)\nf_mhz = 1575\ndelay_m = k * tec / (f_mhz**2)\nprint(\"order iono delay m at L1:\", round(delay_m,2))</code></pre>"}, {"id": 50, "level": "intermediate", "q": "What is timing drift due to oscillator error over long RTT?", "a": "UE/local oscillator ppm error integrated over long loops causes subcarrier misalignment; NTN may tighten requirements or use frequent DL tracking and UL precomp.<br><br><b>🔑 Plain terms:</b> If your clock is slightly wrong, over a long phone call your ‘musical pitch’ drifts vs the satellite.<br><b>💡 Example:</b> <pre><code>ppm=0.1\nf=14e9\ndrift_hz = ppm*1e-6*f\nprint(\"14 GHz * 0.1 ppm -> Hz:\", drift_hz)</code></pre>"}, {"id": 51, "level": "intermediate", "q": "What is feeder congestion and how does ISL mitigate it?", "a": "If many users in a satellite footprint exceed feeder capacity to a visible gateway, throughput collapses. ISL routing to alternate gateways balances load.<br><br><b>🔑 Plain terms:</b> The airplane is full, but you can bus passengers to another airport gate with more runway capacity.<br><b>💡 Example:</b> <pre><code>users_gbps=80; feeder_gbps=50\nprint(\"bottleneck?\", users_gbps>feeder_gbps)</code></pre>"}, {"id": 52, "level": "intermediate", "q": "How does 3GPP categorize NTN payloads (transparent vs regenerative) for testing?", "a": "Conformance and protocol assumptions differ: transparent may look like long delay relay; regenerative may terminate NR on board affecting PDCP/RLC split and security termination points.<br><br><b>🔑 Plain terms:</b> Test cases ask whether the satellite is a cable extender or a real gNB in the sky.<br><b>💡 Example:</b> <pre><code>print(\"Regenerative: possible on-board UP termination; check rel-17 UE features\")</code></pre>"}, {"id": 53, "level": "intermediate", "q": "What is differential Doppler between UL and DL carriers?", "a": "If FDD separation is large, Earth-satellite radial velocity projects differently on UL vs DL frequencies, requiring distinct compensation values per carrier.<br><br><b>🔑 Plain terms:</b> Your walk toward a siren shifts pitch; different radio colors shift by different amounts.<br><b>💡 Example:</b> <pre><code>v=300.0; c=299792458.0\nfor f in (2e9, 2.02e9):\n    print(f/1e6, \"MHz Doppler Hz:\", v/c*f)</code></pre>"}, {"id": 54, "level": "intermediate", "q": "Why can scheduling delay jitter hurt TCP over LEO?", "a": "Burstiness from TDD patterns or beam hopping increases delay variance, confusing TCP RTT estimation and causing spurious retransmissions unless CC is robust.<br><br><b>🔑 Plain terms:</b> If ping times bounce wildly, TCP guesses wrong about congestion.<br><b>💡 Example:</b> <pre><code>rtts=[40,120,45,130,42]\nimport statistics\nprint(\"mean\", statistics.mean(rtts), \"stdev\", statistics.pstdev(rtts))</code></pre>"}, {"id": 55, "level": "intermediate", "q": "What is beam hopping / time-sliced illumination?", "a": "Satellite illuminates cells sequentially in time to reuse power/amplifiers across a wide area, trading instantaneous capacity per cell for average capacity.<br><br><b>🔑 Plain terms:</b> One flashlight rapidly painting many walls—each wall sees bright light only part of the time.<br><b>💡 Example:</b> <pre><code>cells=200; duty=0.05\nprint(\"avg power fraction per cell if equal:\", duty)</code></pre>"}, {"id": 56, "level": "intermediate", "q": "How does polarization mismatch loss appear in link budget?", "a": "If Tx and Rx polarization senses differ (e.g., misaligned linear), loss adds (often a few dB) reducing margin.<br><br><b>🔑 Plain terms:</b> Twisting your polarized sunglasses wrong dims the screen—same for antennas.<br><b>💡 Example:</b> <pre><code>loss_db = 3\nprint(\"add margin:\", loss_db, \"dB if 45deg linear mismatch (order-of-magnitude)\")</code></pre>"}, {"id": 57, "level": "intermediate", "q": "What is sun outage / solar transit?", "a": "When the satellite passes in front of the sun from a ground antenna’s view, solar noise raises system noise temperature drastically, degrading C/N for minutes.<br><br><b>🔑 Plain terms:</b> The sun shouts into your dish when it lines up behind the satellite.<br><b>💡 Example:</b> <pre><code>print(\"Predict with antenna pointing + ephemeris + solar position (PyEphem, skyfield)\")</code></pre>"}, {"id": 58, "level": "intermediate", "q": "What is coding gain in link budget?", "a": "Using LDPC/polar codes allows operation at lower Eb/N0 for the same PER, effectively adding margin compared to uncoded transmission.<br><br><b>🔑 Plain terms:</b> Redundancy puzzles let you understand messages in noisier rooms.<br><b>💡 Example:</b> <pre><code>snr_req_uncoded_db = 15\nsnr_req_coded_db = 3\nprint(\"coding gain dB (illus):\", snr_req_uncoded_db - snr_req_coded_db)</code></pre>"}, {"id": 59, "level": "intermediate", "q": "How does rain rate map to attenuation (qualitatively)?", "a": "Empirical models (ITU-R P.618 series) map rain rate mm/h and path length through rain to attenuation; higher frequency and longer slant path worsen fade.<br><br><b>🔑 Plain terms:</b> More rain along the tunnel of air between you and space = thicker wall to punch through.<br><b>💡 Example:</b> <pre><code># ITU-R has tables — placeholder call\nprint(\"Use ITU-R P.618 / P.838 for design attenuation\")</code></pre>"}, {"id": 60, "level": "intermediate", "q": "What is pointing loss?", "a": "Misalignment between boresight and actual AoA reduces effective gain by a few dB depending on beamwidth; UT tracking loops minimize this.<br><br><b>🔑 Plain terms:</b> Aim the flashlight slightly wrong and the spot dims at the target.<br><b>💡 Example:</b> <pre><code>hpbw_deg = 2.0\npoint_err_deg = 0.5\n# parabolic approx of pattern drop (very rough)\nloss_db = 12 * (point_err_deg / hpbw_deg)**2\nprint(\"rough pointing loss dB:\", round(loss_db,2))</code></pre>"}, {"id": 61, "level": "intermediate", "q": "What is multibeam frequency reuse?", "a": "Spatial separation allows same frequency reused in non-adjacent beams; sidelobe constraints limit how tight reuse can be.<br><br><b>🔑 Plain terms:</b> Neighbors use the same Wi‑Fi channel if houses are far enough apart.<br><b>💡 Example:</b> <pre><code>reuse_factor = 4\nprint(\"4-color reuse example factor:\", reuse_factor)</code></pre>"}, {"id": 62, "level": "intermediate", "q": "How does Doppler vary over a pass (qualitative curve)?", "a": "At rise/set, radial velocity magnitude is larger; near zenith, radial velocity toward a fixed UE crosses zero causing Doppler zero crossing where rate of change of Doppler is maximum—challenging for tracking loops.<br><br><b>🔑 Plain terms:</b> The train’s approach speed is fastest at the ends of the crossing, slowest straight in front.<br><b>💡 Example:</b> <pre><code>import math\n# s around closest approach; toy fd ~ v*t/(t^2+tau^2)\nv, tau = 7e3, 60.0\nfd_max = 0.0\nfor ti in range(-300, 301, 2):\n    fd = v * ti / (ti * ti + tau * tau)\n    fd_max = max(fd_max, abs(fd))\nprint(\"max |fd| (toy) Hz order:\", round(fd_max, 2))</code></pre>"}, {"id": 63, "level": "intermediate", "q": "What is carrier phase tracking vs frequency tracking?", "a": "PLL/FLL loops track phase and frequency error; high Doppler rate stresses loop bandwidth choices—wide bandwidth tracks dynamics but passes more noise.<br><br><b>🔑 Plain terms:</b> Steering a bike: tight grip reacts fast but wobbles with bumps; loose grip smooths noise but turns slowly.<br><b>💡 Example:</b> <pre><code>bw_hz=200; cn0=85e3  # illustrative\nprint(\"track loop tradeoff: BW\", bw_hz, \"Hz vs C/N0\", cn0, \"Hz\")</code></pre>"}, {"id": 64, "level": "intermediate", "q": "What is network slice relevance for NTN?", "a": "Slices can separate mission-critical IoT, broadband, and backhaul with different QoS; satellite backhaul may map to a slice with higher latency tolerance unless augmented.<br><br><b>🔑 Plain terms:</b> Different traffic classes get different VIP lanes—even over the same constellation.<br><b>💡 Example:</b> <pre><code>slices = [\"eMBB\", \"URLLC\", \"MIoT\"]\nprint(slices)</code></pre>"}, {"id": 65, "level": "intermediate", "q": "How might security differ with regenerative satellites?", "a": "If user plane terminates on board, keys and integrity protection endpoints shift; operators must consider satellite physical compromise and key rotation.<br><br><b>🔑 Plain terms:</b> If the satellite reads your traffic, trust boundaries move into space hardware.<br><b>💡 Example:</b> <pre><code>print(\"Consider UP security termination: ground vs payload\")</code></pre>"}, {"id": 66, "level": "intermediate", "q": "What is latency asymmetry and why does it matter?", "a": "UL and DL paths may differ (ISL routing, peering), skewing protocols that assume symmetry (some ARQ timers, RTP playout).<br><br><b>🔑 Plain terms:</b> Upload goes Seattle–Tokyo, download Tokyo–Virginia—pings differ each direction.<br><b>💡 Example:</b> <pre><code>ul=45; dl=70\nprint(\"asym ms:\", dl-ul)</code></pre>"}, {"id": 67, "level": "intermediate", "q": "What is co-channel interference from adjacent satellites?", "a": "Side lobes may illuminate users also visible to another satellite using same frequency; coordination and power control mitigate.<br><br><b>🔑 Plain terms:</b> Two spotlights spill into each other’s circles.<br><b>💡 Example:</b> <pre><code>sinr_db = 15  # illustrative\nprint(\"manage CCI to keep SINR target e.g.\", sinr_db, \"dB\")</code></pre>"}, {"id": 68, "level": "intermediate", "q": "How does elevation affect gaseous attenuation?", "a": "Longer tropospheric path at low elevation increases oxygen/water vapor absorption, especially near 22 GHz water resonance and 60 GHz O2 band edges.<br><br><b>🔑 Plain terms:</b> More air to breathe for the radio wave—some frequencies get absorbed more.<br><b>💡 Example:</b> <pre><code>print(\"Check ITU-R P.676 for gaseous attenuation vs f, el\")</code></pre>"}, {"id": 69, "level": "intermediate", "q": "What is UT installation skew error?", "a": "Mounting error of a flat panel causes systematic pointing bias; calibration uses beacon or GNSS/IMU fusion.<br><br><b>🔑 Plain terms:</b> If the pizza box isn’t level, your beam points slightly wrong.<br><b>💡 Example:</b> <pre><code>tilt_deg=2\nprint(\"causes systematic AoA error order:\", tilt_deg, \"deg\")</code></pre>"}, {"id": 70, "level": "intermediate", "q": "What is satellite switching at Layer-2 vs IP routing?", "a": "Some systems bridge at L2 across ISLs; others run IP/MPLS with onboard routers in regenerative payloads.<br><br><b>🔑 Plain terms:</b> Either you’re extending an Ethernet cable in space or you’re running a space router.<br><b>💡 Example:</b> <pre><code>print([\"L2 bridge\", \"L3 MPLS SR\", \"IPv6 segment routing\"])</code></pre>"}, {"id": 71, "level": "intermediate", "q": "How does congestion control interact with variable LEO capacity?", "a": "As beams/handovers change available rates, CC algorithms should avoid overreacting to transient capacity drops.<br><br><b>🔑 Plain terms:</b> Speed limit keeps changing; don’t slam brakes every block.<br><b>💡 Example:</b> <pre><code>rates=[90,40,85,30,95]\nimport itertools\nprint(\"variance drives CC challenge; samples:\", rates[:3])</code></pre>"}, {"id": 72, "level": "intermediate", "q": "What is onboard buffer bloat over ISLs?", "a": "Deep buffers on satellites to absorb bursts can inflate RTT and hurt TCP unless AQM or scheduling is careful.<br><br><b>🔑 Plain terms:</b> Big waiting room in orbit makes pings spike.<br><b>💡 Example:</b> <pre><code>buf_ms = 200\nprint(\"extra queuing RTT order ms:\", buf_ms)</code></pre>"}, {"id": 73, "level": "intermediate", "q": "What is regulatory ‘bring into use’ for filings?", "a": "ITU coordination requires milestones demonstrating satellite network usage in filed frequency assignments; affects deployment timelines.<br><br><b>🔑 Plain terms:</b> Use-it-or-lose-it deadlines for spectrum homework.<br><b>💡 Example:</b> <pre><code>milestones=[\" filing\", \" deployment\", \" BIU\", \" coordination\"]\nprint(\" -> \".join(milestones))</code></pre>"}, {"id": 74, "level": "intermediate", "q": "How does mobility state estimation differ for NTN UE?", "a": "UE may combine GNSS position, ephemeris, and RSRP trends to predict handover; speeds relative to satellite dominate.<br><br><b>🔑 Plain terms:</b> Your phone knows where you are on Earth and where the bird is—predicts the next handover.<br><b>💡 Example:</b> <pre><code>state=(\"GNSS fix ok\", \"ephemeris ok\", \"RSRP trend down\")\nprint(state)</code></pre>"}, {"id": 75, "level": "intermediate", "q": "What is impact of solar activity on LEO links?", "a": "High solar activity increases ionospheric TEC and scintillation at affected bands/paths; also affects drag and space weather risk.<br><br><b>🔑 Plain terms:</b> Sun throws tantrums—ionosphere wobbles more, orbits feel more drag.<br><b>💡 Example:</b> <pre><code>f107 = 200  # solar flux illustrative high\nprint(\"high F10.7 ~\", f107, \"=> more iono variability (qualitative)\")</code></pre>"}, {"id": 76, "level": "intermediate", "q": "What is dual connectivity NTN+TN conceptually?", "a": "UE anchored to terrestrial gNB with satellite as secondary (or vice versa) for coverage extension or redundancy—subject to device capability and operator architecture.<br><br><b>🔑 Plain terms:</b> Wi‑Fi plus cellular, but second path is satellite.<br><b>💡 Example:</b> <pre><code>print(\"MN-SN / DC patterns depend on 3GPP release & vendor\")</code></pre>"}, {"id": 77, "level": "intermediate", "q": "How does quantization noise affect wideband satellite ADCs?", "a": "High bandwidth gateways need high ENOB ADCs; quantization raises noise floor limiting high-order QAM.<br><br><b>🔑 Plain terms:</b> Measuring a tsunami with a ruler marked in feet—coarse steps add error.<br><b>💡 Example:</b> <pre><code>import math\nenob=10\nfs=2e9\npn_dbfs = -6.02*enob - 1.76 + 10*math.log10(fs/2)\nprint(\"rough wideband ADC noise floor dBFS:\", round(pn_dbfs,1))</code></pre>"}, {"id": 78, "level": "intermediate", "q": "What is intermodulation in multi-carrier satellite payloads?", "a": "Nonlinear HPA generates IMD products that can spill into adjacent channels; back-off trades power efficiency for linearity.<br><br><b>🔑 Plain terms:</b> Pushing an amplifier hard makes it ‘sing’ extra garbage tones.<br><b>💡 Example:</b> <pre><code>ibo_db = 3  # input back-off illustrative\nprint(\"linear trade IBO dB:\", ibo_db)</code></pre>"}, {"id": 79, "level": "intermediate", "q": "What is latency fairness in multipath scheduling?", "a": "Schedulers should avoid starving flows when one path has longer RTT (e.g., satellite vs terrestrial) in MP-TCP or ATSSS contexts.<br><br><b>🔑 Plain terms:</b> Don’t always pick the fast lane if it starves the slow truck that carries half the cargo.<br><b>💡 Example:</b> <pre><code>paths=[(\"TN\",20),(\"NTN\",90)]\nprint(paths)</code></pre>"}, {"id": 80, "level": "intermediate", "q": "What is a simple Python pattern to simulate LEO visibility windows?", "a": "Use SGP4 + observer lat/lon or great-circle geometry with circular orbit approximation for teaching; production uses precise ephemeris and terrain masks.<br><br><b>🔑 Plain terms:</b> Compute when the satellite is above your horizon mask.<br><b>💡 Example:</b> <pre><code>import math\ndef elev_simple(t, period=5500):\n    # toy sine elevation\n    return max(0, 40 * math.sin(2 * math.pi * t / period))\nfor t in range(0, 7000, 500):\n    print(t, \"s -> el ~\", round(elev_simple(t), 1))</code></pre>"}], "mimo": [{"id": 1, "level": "basic", "q": "What is MIMO and what problem does it solve?", "a": "Multiple-Input Multiple-Output uses multiple antennas at TX and/or RX to improve spectral efficiency (spatial multiplexing), reliability (diversity), or interference management—without extra bandwidth.<br><br><b>🔑 Plain terms:</b> More antennas let you send parallel ‘lanes’ of data or backup copies through the same air.<br><b>💡 Example:</b> <pre><code># Toy: 2x2 complex channel H, singular values -> modes\nimport numpy as np\nH = (np.random.randn(2,2) + 1j*np.random.randn(2,2))/np.sqrt(2)\ns = np.linalg.svd(H, compute_uv=False)\nprint(\"singular values (channel strengths):\", s)</code></pre>"}, {"id": 2, "level": "basic", "q": "Difference between SIMO, MISO, and MIMO?", "a": "SIMO: multiple RX antennas (receive diversity). MISO: multiple TX (transmit diversity/beamforming). MIMO: multiple at both ends enabling multiplexing and richer precoding.<br><br><b>🔑 Plain terms:</b> One ear vs one mouth vs many mouths and ears together.<br><b>💡 Example:</b> <pre><code>roles = {\"SIMO\": \"1 TX, N RX\", \"MISO\": \"M TX, 1 RX\", \"MIMO\": \"M TX, N RX\"}\nfor k,v in roles.items(): print(k, v)</code></pre>"}, {"id": 3, "level": "basic", "q": "What is spatial multiplexing?", "a": "Sending independent data streams on the same time/frequency resource by exploiting distinct spatial paths (high-rank channel). Requires sufficiently uncorrelated subchannels.<br><br><b>🔑 Plain terms:</b> Stack two conversations in the same room if voices don’t blend—listeners can separate them.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH = np.eye(2) + 0.1*np.random.randn(2,2)\nrank = np.linalg.matrix_rank(H, tol=1e-2)\nprint(\"approx rank:\", rank)</code></pre>"}, {"id": 4, "level": "basic", "q": "What is diversity order (high level)?", "a": "Independent fading branches reduce probability that all branches are simultaneously deep faded; diversity order relates to how outage probability scales with SNR in idealized models.<br><br><b>🔑 Plain terms:</b> Flip several coins—odds all tails drops if coins are independent.<br><b>💡 Example:</b> <pre><code>import random\ndef outage_branches(L, p_deep=0.1):\n    return sum(random.random()<p_deep for _ in range(L)) == L\nprint(\"all branches deep?\", [outage_branches(4) for _ in range(5)])</code></pre>"}, {"id": 5, "level": "basic", "q": "What is beamforming?", "a": "Weighting antenna elements’ signals so that waves add constructively toward a desired direction (or null toward interferers). Can be analog (RF phase shifters), digital (baseband), or hybrid.<br><br><b>🔑 Plain terms:</b> A speaker array aimed so the crowd in section A hears loud and section B hears quiet.<br><b>💡 Example:</b> <pre><code>import numpy as np, cmath\nN=8; d_lambda=0.5; theta=30*np.pi/180\nn=np.arange(N)\nw=np.exp(-1j*2*np.pi*d_lambda*n*np.sin(theta))\nprint(\"beamformer weight magnitude stats\", np.mean(np.abs(w)))</code></pre>"}, {"id": 6, "level": "basic", "q": "What is a steering vector for a ULA?", "a": "For uniform linear array element spacing d, narrowband steering vector <code>a(θ) = [1, e^{-j2π d sin θ / λ}, …]^T</code> (phase progression along the array).<br><br><b>🔑 Plain terms:</b> Each antenna gets a phase twist so the combined wave lines up at angle θ.<br><b>💡 Example:</b> <pre><code>import numpy as np\ndef steering_ula(N, d_lambda, theta_rad):\n    n = np.arange(N)\n    return np.exp(-1j * 2*np.pi * d_lambda * n * np.sin(theta_rad))\nprint(np.round(steering_ula(8, 0.5, np.deg2rad(20)), 2))</code></pre>"}, {"id": 7, "level": "basic", "q": "What is delay spread?", "a": "Time difference between first and significant multipath arrivals; large delay spread implies frequency-selective fading for narrow coherence bandwidth.<br><br><b>🔑 Plain terms:</b> Echoes arrive stretched in time—the room sounds ‘boomy’ to a narrowband tone.<br><b>💡 Example:</b> <pre><code>import numpy as np\ntaps = np.array([0, 0.2e-6, 0.8e-6, 2e-6])\nprint(\"delay spread order (s):\", taps.max()-taps.min())</code></pre>"}, {"id": 8, "level": "basic", "q": "Define coherence bandwidth Bc (rule of thumb).", "a": "Bc ≈ 1 / (5· RMS delay spread) is a common rule for ‘flat’ fading over a subchannel; exact definition depends on correlation threshold.<br><br><b>🔑 Plain terms:</b> If echoes are very spread out, your narrow channel sees different gains at nearby frequencies.<br><b>💡 Example:</b> <pre><code>rms_us = 0.5\nBc_MHz = 1/(5*rms_us*1e-6)/1e6\nprint(\"Bc ~ MHz (rule-of-thumb):\", round(Bc_MHz,2))</code></pre>"}, {"id": 9, "level": "basic", "q": "What is coherence time?", "a": "Time over which channel impulse response is approximately constant; inversely related to Doppler spread. High mobility shortens coherence time.<br><br><b>🔑 Plain terms:</b> How long the radio ‘weather’ stays stable before motion reshuffles reflections.<br><b>💡 Example:</b> <pre><code>fd=100  # Hz max Doppler spread order\nTc=1/(2*fd)\nprint(\"coherence time order s:\", Tc)</code></pre>"}, {"id": 10, "level": "basic", "q": "Rayleigh vs Rician fading?", "a": "Rayleigh: no dominant LOS component (envelope ~ Rayleigh). Rician: strong LOS adds specular component (K-factor = LOS power / scattered power).<br><br><b>🔑 Plain terms:</b> Hallway with no flashlight vs flashlight plus shadows.<br><b>💡 Example:</b> <pre><code>import numpy as np\nK_dB=7; K=10**(K_dB/10)\nlos=np.sqrt(K/(K+1)); scat=np.sqrt(1/(K+1))\nh = los + scat*(np.random.randn()+1j*np.random.randn())/np.sqrt(2)\nprint(\"|h|:\", abs(h))</code></pre>"}, {"id": 11, "level": "basic", "q": "What is path loss vs shadowing?", "a": "Path loss: deterministic large-scale attenuation vs distance (e.g. FSPL, log-distance). Shadowing: slow random variation (log-normal) from obstacles.<br><br><b>🔑 Plain terms:</b> Dimmer as you walk away (path loss) plus random tree cover (shadowing).<br><b>💡 Example:</b> <pre><code>import math\ndef log_distance_db(d0,d,n,PL0):\n    return PL0 + 10*n*math.log10(d/d0)\nprint(\"1285m vs 100m, n=3.5:\", round(log_distance_db(100,1285,3.5,80),1), \"dB extra\")</code></pre>"}, {"id": 12, "level": "basic", "q": "What is angular spread?", "a": "Spread of arrival/departure angles of multipath clusters; large spread reduces spatial correlation between antennas for a given spacing.<br><br><b>🔑 Plain terms:</b> Echoes come from many directions, not one needle beam.<br><b>💡 Example:</b> <pre><code>import math\nspread_deg=15\nprint(\"RMS angle spread deg:\", spread_deg)</code></pre>"}, {"id": 13, "level": "basic", "q": "What is analog vs digital beamforming?", "a": "Analog: phase/amplitude shifts in RF with shared baseband chain—low cost, limited flexibility. Digital: per-antenna baseband processing—maximum flexibility, higher hardware cost.<br><br><b>🔑 Plain terms:</b> One mixer vs one mixer per antenna.<br><b>💡 Example:</b> <pre><code>print(\"Analog: few RF chains; Digital: M RF chains to antennas\")</code></pre>"}, {"id": 14, "level": "basic", "q": "What is a hybrid beamforming architecture?", "a": "Combines analog beamforming (few RF chains) with digital precoding to approximate full digital with lower hardware count—common in mmWave.<br><br><b>🔑 Plain terms:</b> A few hands turn big knobs (RF), fine fingers tweak details (digital).<br><b>💡 Example:</b> <pre><code>N_rf, N_ant = 4, 64\nprint(\"chains\", N_rf, \"antennas\", N_ant)</code></pre>"}, {"id": 15, "level": "basic", "q": "What is CSI at the transmitter?", "a": "Channel State Information (CSI) describes the channel matrix H; TX precoding (eigen-beamforming, ZF) needs CSI from feedback (FDD) or reciprocity (TDD).<br><br><b>🔑 Plain terms:</b> The map the transmitter uses to aim beams—either told by receiver or inferred.<br><b>💡 Example:</b> <pre><code>print(\"FDD: PMI/CSI-RS feedback; TDD: SRS + reciprocity (calibrated)\")</code></pre>"}, {"id": 16, "level": "basic", "q": "What is precoding?", "a": "Linear transformation W applied to symbol vector s: x = W s, chosen to diagonalize channel or manage MU interference (e.g. ZF, MMSE, SLNR).<br><br><b>🔑 Plain terms:</b> Mix the data streams before antennas so the air ‘unmixes’ them cleanly at the UEs.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH = np.array([[1,0.2],[0.1,0.9]]) + 0j\nW = np.linalg.pinv(H)  # naive ZF-ish\nprint(\"cond(H)\", np.linalg.cond(H))</code></pre>"}, {"id": 17, "level": "basic", "q": "What is MU-MIMO?", "a": "Multiple users served on same time-frequency resource using spatial separation; requires accurate CSI and favorable channel orthogonality.<br><br><b>🔑 Plain terms:</b> Two phone calls in the same room if voices aim to different ears.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH1 = np.random.randn(4,1)+0j\nH2 = np.random.randn(4,1)+0j\nprint(\"normalized correlation\", np.abs(H1.conj().T@H2)/(np.linalg.norm(H1)*np.linalg.norm(H2)))</code></pre>"}, {"id": 18, "level": "basic", "q": "What is pilot contamination?", "a": "In massive MIMO TDD, reused uplink pilots from neighboring cells correlate channel estimates, leaking interference into coherent combining.<br><br><b>🔑 Plain terms:</b> Everyone shouts their name at once—base station confuses similar voices.<br><b>💡 Example:</b> <pre><code>print(\"Mitigate: pilot reuse planning, orthogonal pilots, bayesian estimation\")</code></pre>"}, {"id": 19, "level": "basic", "q": "What is array factor?", "a": "Normalized response of an array to plane wave vs angle; product of element pattern and array factor for overall beam pattern.<br><br><b>🔑 Plain terms:</b> How sensitive the antenna fence is vs direction, ignoring single-element shape.<br><b>💡 Example:</b> <pre><code>import numpy as np, math\nN, d_lambda, steer_deg = 8, 0.5, 20\nn = np.arange(N)\nw = np.exp(-1j * 2*np.pi * d_lambda * n * math.sin(math.radians(steer_deg)))\nths = np.linspace(-math.pi/2, math.pi/2, 200)\ndef AF(theta):\n    a = np.exp(-1j * 2*np.pi * d_lambda * n * np.sin(theta))\n    return np.abs(a.conj() @ w)\nprint(\"peak\", max(AF(t) for t in ths))</code></pre>"}, {"id": 20, "level": "basic", "q": "What are grating lobes?", "a": "Undesired main-lobe-like peaks at angles where element spacing causes phase ambiguity (spatial aliasing); occur when d > λ/2 for ULA.<br><br><b>🔑 Plain terms:</b> Antenna spacing too wide → duplicate ‘fake’ beam peaks.<br><b>💡 Example:</b> <pre><code>import math\nlam=0.1; d=0.06\nprint(\"d/lambda\", d/lam, \"(>0.5 risks grating lobes in ULA)\")</code></pre>"}, {"id": 21, "level": "intermediate", "q": "What is the narrowband MIMO input–output model?", "a": "y = H x + n with y (N_r×1), H (N_r×N_t), x (N_t×1); extensions: OFDM treats each subcarrier independently under CP length.<br><br><b>🔑 Plain terms:</b> Linear algebra per tone: matrix times vector equals what each antenna hears.<br><b>💡 Example:</b> <pre><code>import numpy as np\nNr,Nt=4,2\nH=np.random.randn(Nr,Nt)+1j*np.random.randn(Nr,Nt)\nx=np.array([1+0j,1j])\nn=(np.random.randn(Nr)+1j*np.random.randn(Nr))*0.1\ny=H@x+n\nprint(\"y shape\", y.shape)</code></pre>"}, {"id": 22, "level": "intermediate", "q": "SVD of channel matrix for MIMO?", "a": "H = U Σ Vᴴ; right singular vectors (V) are eigenmodes at TX; U at RX; singular values are mode gains for parallel AWGN channels (water-filling power allocation).<br><br><b>🔑 Plain terms:</b> Rotate the data so the channel becomes a few clean parallel pipes with different loudness.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH=np.random.randn(3,3)+1j*np.random.randn(3,3)\nU,s,Vh=np.linalg.svd(H)\nprint(\"singular values:\", s)</code></pre>"}, {"id": 23, "level": "intermediate", "q": "What is water-filling power allocation?", "a": "Allocate more power to stronger parallel modes (higher SNR) subject to total power; analogous to filling water to different-depth basins.<br><br><b>🔑 Plain terms:</b> Pour more water into deeper cups first until total budget used.<br><b>💡 Example:</b> <pre><code>import numpy as np\ng=np.array([1.0,0.3,0.1]); P=3; noise=0.1\n# toy one-step waterfill\nlevels = noise/g\nprint(\"inverse channel gains (noise-normalized):\", levels)</code></pre>"}, {"id": 24, "level": "intermediate", "q": "What is zero-forcing (ZF) precoding?", "a": "Choose W so that H W ≈ I for users (ignoring noise); can amplify noise when H is ill-conditioned (high condition number).<br><br><b>🔑 Plain terms:</b> Force cross-talk to zero—sometimes by shouting very loud on weak modes.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH=np.array([[1,0.9],[0.8,1.0]])+0j\nW=np.linalg.pinv(H)\nprint(\"cond(H)\", np.linalg.cond(H))</code></pre>"}, {"id": 25, "level": "intermediate", "q": "MMSE precoding/receiver vs ZF?", "a": "MMSE balances interference suppression and noise enhancement; more robust than ZF at low SNR or bad conditioning.<br><br><b>🔑 Plain terms:</b> Compromise between zero crosstalk and not blowing up noise.<br><b>💡 Example:</b> <pre><code>print(\"W_mmse ∝ Hᴴ (H Hᴴ + σ² I)⁻¹ (forms vary by left/right inv)\")</code></pre>"}, {"id": 26, "level": "intermediate", "q": "What is channel rank in practice?", "a": "Rank(H) upper-bounds number of useful spatial streams; correlated antennas or limited angular spread reduce rank.<br><br><b>🔑 Plain terms:</b> How many independent sluice gates the matrix actually opens.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH=np.ones((4,4))*0.9 + 0.01*np.random.randn(4,4)\nprint(\"rank\", np.linalg.matrix_rank(H))</code></pre>"}, {"id": 27, "level": "intermediate", "q": "What is eigenbeamforming (single-user)?", "a": "Transmit along dominant eigenvectors of HᴴH (or related) to maximize capacity; requires CSI and SVD/eigen-decomposition.<br><br><b>🔑 Plain terms:</b> Send mostly on the ‘fat pipes’ of the channel.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH=np.random.randn(2,2)+1j*np.random.randn(2,2)\nw=np.linalg.eigh(H.conj().T@H)[1][:,-1]\nprint(\"dominant eigenmode power on tx:\", np.linalg.norm(w))</code></pre>"}, {"id": 28, "level": "intermediate", "q": "What is angle-of-departure / angle-of-arrival in spatial models?", "a": "AoD/AoA parameterize multipath clusters in geometric stochastic channel models (e.g. 3GPP SCM/SCME concepts): used to build H from array responses.<br><br><b>🔑 Plain terms:</b> Where rays leave the BS and where they arrive at the UE.<br><b>💡 Example:</b> <pre><code>print(\"PAS: power azimuth spectrum of clusters\")</code></pre>"}, {"id": 29, "level": "intermediate", "q": "Clarke’s isotropic scatterer model (Doppler PSD)?", "a": "Classic U-shaped Doppler power spectrum for 2D isotropic scattering around mobile: <code>S(f) ∝ 1/√(f_d² - f²)</code> for |f|<f_d.<br><br><b>🔑 Plain terms:</b> When scatterers ring you evenly, Doppler spread has that bathtub curve.<br><b>💡 Example:</b> <pre><code>import numpy as np, math\nfd=100; f=np.linspace(-fd+1e-3, fd-1e-3, 500)\nS=1/np.sqrt(fd**2 - f**2)\nprint(\"peak at edges integral ~\", np.mean(S))</code></pre>"}, {"id": 30, "level": "intermediate", "q": "What is a tapped delay line (TDL / CDL) model?", "a": "Discrete-time FIR channel with taps at delays τ_k and powers P_k; used in 3GPP TDL/CDL profiles for calibration.<br><br><b>🔑 Plain terms:</b> A line of echoes with fixed delays and average powers.<br><b>💡 Example:</b> <pre><code>taps=[(0,0), (30e-9,-4.3), (85e-9,-6.6)]  # (delay_s, power_dB) illustrative\nprint(\"profile:\", taps)</code></pre>"}, {"id": 31, "level": "intermediate", "q": "What is mutual coupling between antennas?", "a": "Near-field interaction changes effective embedded element patterns and correlation; must be included in accurate array design.<br><br><b>🔑 Plain terms:</b> Antennas talk to each other through near fields, not just through the sky.<br><b>💡 Example:</b> <pre><code>print(\"Use MoM/FEM or S-parameter mesh in design tools\")</code></pre>"}, {"id": 32, "level": "intermediate", "q": "What is EVM and how does it relate to MIMO?", "a": "Error Vector Magnitude measures constellation distortion from phase noise, PA nonlinearity, IQ imbalance, CFO—limits practical MCS even with good SNR.<br><br><b>🔑 Plain terms:</b> How smudged the constellation dots are vs ideal.<br><b>💡 Example:</b> <pre><code>import numpy as np\nideal=np.array([1+1j,-1+1j])\nrx=ideal+0.05*(np.random.randn(2)+1j*np.random.randn(2))\nevm=np.mean(np.abs(rx-ideal)/np.abs(ideal))\nprint(\"rms EVM ~\", evm)</code></pre>"}, {"id": 33, "level": "intermediate", "q": "What is PA nonlinearity impact on precoded OFDM?", "a": "High PAPR OFDM + nonlinear PA causes AM-AM/AM-PM distortion and spectral regrowth; digital predistortion (DPD) mitigates.<br><br><b>🔑 Plain terms:</b> Cranking volume distorts bass and splatters harmonics into neighbors’ bands.<br><b>💡 Example:</b> <pre><code>print(\"DPD learns inverse of PA nonlinearity at TX\")</code></pre>"}, {"id": 34, "level": "intermediate", "q": "What is codebook-based precoding (LTE/NR idea)?", "a": "UE reports preferred precoding matrix indicator (PMI) from finite codebook to limit feedback bits vs full CSI.<br><br><b>🔑 Plain terms:</b> Pick a beam recipe from a menu instead of describing every spice.<br><b>💡 Example:</b> <pre><code>print(\"NR Type I/II CSI codebooks: different resolution vs overhead\")</code></pre>"}, {"id": 35, "level": "intermediate", "q": "What is analog beam tracking in mmWave?", "a": "Beam refinement procedures adjust analog beam pairs as UE moves to maintain SNR under narrow beams.<br><br><b>🔑 Plain terms:</b> Keep the flashlight pointed as you walk.<br><b>💡 Example:</b> <pre><code>print(\"NR: beam management, SSB bursts, CSI-RS for refinement\")</code></pre>"}, {"id": 36, "level": "intermediate", "q": "What is block diagonalization?", "a": "MU-MIMO precoding that zeros inter-user interference by projecting each user’s precoder into nullspace of others’ channels—generalizes ZF across users.<br><br><b>🔑 Plain terms:</b> Give each user a private lane through the air matrix.<br><b>💡 Example:</b> <pre><code>print(\"BD: compute nullspaces of stacked other-user channels\")</code></pre>"}, {"id": 37, "level": "intermediate", "q": "What is maximum ratio combining (MRC)?", "a": "Linear receiver weights proportional to channel conjugates to maximize SNR for SIMO; optimal for uncoded AWGN with known CSI per branch.<br><br><b>🔑 Plain terms:</b> Add echoes in phase so peaks add and noise averages down.<br><b>💡 Example:</b> <pre><code>import numpy as np\nh=np.array([0.8+0.1j, 0.3-0.4j])\nw=h.conj()/np.linalg.norm(h)\nprint(\"MRC output scale\", np.abs(w@h))</code></pre>"}, {"id": 38, "level": "intermediate", "q": "What is maximum ratio transmission (MRT)?", "a": "Transmit beamformer w ∝ h* (conjugate) to maximize received power at a single user (matched to channel).<br><br><b>🔑 Plain terms:</b> Aim the whole array’s power along the strongest path to one phone.<br><b>💡 Example:</b> <pre><code>import numpy as np\nh=np.random.randn(4,1)+1j*np.random.randn(4,1)\nw=h.conj(); w=w/np.linalg.norm(w)\nprint(\"unit norm tx\", np.linalg.norm(w))</code></pre>"}, {"id": 39, "level": "intermediate", "q": "What is OTA (over-the-air) MIMO testing?", "a": "Emulate spatial channels in anechoic chambers with multiprobe fading instead of cabled conducted tests.<br><br><b>🔑 Plain terms:</b> Fake the whole sky of reflections with many speakers in a lab.<br><b>💡 Example:</b> <pre><code>print(\"Standards: CTIA/3GPP discuss multiprobe fading setups\")</code></pre>"}, {"id": 40, "level": "intermediate", "q": "What is Kronecker MIMO channel model (simplified)?", "a": "H = R_rx^{1/2} H_w R_tx^{1/2} with i.i.d. entries in H_w; separable correlation at TX/RX—simple but not always accurate.<br><br><b>🔑 Plain terms:</b> Correlation at base and mobile multiply a random cloud.<br><b>💡 Example:</b> <pre><code>import numpy as np\nRr=np.array([[1,0.5],[0.5,1]]); Rt=np.array([[1,0.3],[0.3,1]])\nHw=np.random.randn(2,2)\nfrom numpy.linalg import cholesky\nH=cholesky(Rr)@Hw@cholesky(Rt).T\nprint(H)</code></pre>"}, {"id": 41, "level": "intermediate", "q": "What is line-of-sight MIMO?", "a": "Pure LOS can be rank-1 at ULA unless spacing creates multiple orthogonal modes at different angles (path-length differences).<br><br><b>🔑 Plain terms:</b> Two antennas seeing the same ray may not give two streams.<br><b>💡 Example:</b> <pre><code>print(\"Rich scattering or multipath helps rank in many deployments\")</code></pre>"}, {"id": 42, "level": "intermediate", "q": "What is polarization diversity?", "a": "Use orthogonal polarizations as diversity branches; often combined with spatial diversity.<br><br><b>🔑 Plain terms:</b> Vertical and horizontal ears hear different reflections.<br><b>💡 Example:</b> <pre><code>pols=(\"V\",\"H\"); print(\"branches:\", pols)</code></pre>"}, {"id": 43, "level": "intermediate", "q": "What is cyclic delay diversity (CDD)?", "a": "Apply cyclic shifts per TX antenna before OFDM IFFT to artificially increase frequency selectivity for diversity in OFDM.<br><br><b>🔑 Plain terms:</b> Stagger echoes across antennas so the tone comb sees variation.<br><b>💡 Example:</b> <pre><code>print(\"LTE used CDD in some open-loop MIMO modes\")</code></pre>"}, {"id": 44, "level": "intermediate", "q": "What is channel hardening in massive MIMO?", "a": "As M grows, effective scalar channel after MRC/MRT concentrates (law of large numbers), reducing small-scale fading variance seen by scheduler.<br><br><b>🔑 Plain terms:</b> Many random paths average out to a steady pipe.<br><b>💡 Example:</b> <pre><code>import numpy as np\nM=64; h=(np.random.randn(M)+1j*np.random.randn(M))/np.sqrt(2*M)\nprint(\"norm^2 concentrates ~1:\", np.linalg.norm(h)**2)</code></pre>"}, {"id": 45, "level": "intermediate", "q": "What is two-stage precoding (massive MIMO)?", "a": "Outer digital beamformer reduces dimension; inner analog handles angle—reduces CSI feedback and baseband complexity.<br><br><b>🔑 Plain terms:</b> Coarse direction knob + fine digital mixer.<br><b>💡 Example:</b> <pre><code>print(\"f = f_RF * f_BB structure (conceptual)\")</code></pre>"}, {"id": 46, "level": "intermediate", "q": "What is SC-FDMA (UL LTE) vs OFDMA for peak-to-average?", "a": "SC-FDMA (DFT-spread OFDM) reduces PAPR for handset PA efficiency; trade spectral localization vs OFDM flexibility.<br><br><b>🔑 Plain terms:</b> Smoother waveform for cheaper phone amplifiers.<br><b>💡 Example:</b> <pre><code>print(\"DFT precoder spreads symbols across subcarriers coherently\")</code></pre>"}, {"id": 47, "level": "intermediate", "q": "What is spatial correlation from limited scatterers?", "a": "Few clusters → high correlation between adjacent antennas → lower effective rank for same antenna count.<br><br><b>🔑 Plain terms:</b> Narrow street of mirrors vs disco ball.<br><b>💡 Example:</b> <pre><code>import numpy as np\ndef corr_from_spacing(d_lambda, spread_rad):\n    return np.exp(-1j*2*np.pi*d_lambda*np.sin(spread_rad))  # toy one-path\nprint(abs(corr_from_spacing(0.5, np.deg2rad(5))))</code></pre>"}, {"id": 48, "level": "intermediate", "q": "What is dual-polarized MIMO?", "a": "2×2 on same polarization grid becomes 4 logical ports with X-pol; increases rank in rich XPD environments.<br><br><b>🔑 Plain terms:</b> Pack more dimensions using both polarizations at each patch.<br><b>💡 Example:</b> <pre><code>print(\"XPD: cross-polar discrimination dB between V/H ports\")</code></pre>"}, {"id": 49, "level": "intermediate", "q": "What is RF chain imbalance impact on TDD reciprocity?", "a": "Amplitude/phase mismatch between DL/UL RF paths breaks H_DL ≈ H_UL assumption for calibration-based CSI.<br><br><b>🔑 Plain terms:</b> Left and right ears hear slightly different if volumes differ—breaks symmetry.<br><b>💡 Example:</b> <pre><code>print(\"Use calibration signals over-the-air to estimate delta\")</code></pre>"}, {"id": 50, "level": "intermediate", "q": "What is beam squint in wideband phased arrays?", "a": "True-time-delay vs phase shift: phase shift beam direction varies with frequency causing beam to ‘squint’ across bandwidth.<br><br><b>🔑 Plain terms:</b> Rainbow smear of beam peak vs frequency.<br><b>💡 Example:</b> <pre><code>print(\"True time delay lines fix squint for ultra-wideband arrays\")</code></pre>"}, {"id": 51, "level": "intermediate", "q": "What is network-centric vs user-centric beamforming?", "a": "Network-centric: fixed cell beams; user-centric: dynamically form beams/panels around user groups (JT/CoMP ideas).<br><br><b>🔑 Plain terms:</b> Streetlights vs follow-spotlights.<br><b>💡 Example:</b> <pre><code>print(\"Cell-free massive MIMO pushes user-centric ideas\")</code></pre>"}, {"id": 52, "level": "intermediate", "q": "What is inter-cell interference coordination with MIMO?", "a": "Coordinated beamforming / muting / fractional reuse to reduce ICI especially on cell edge.<br><br><b>🔑 Plain terms:</b> Neighboring towers agree not to blind each other’s customers.<br><b>💡 Example:</b> <pre><code>print(\"eICIC, FeICIC historically; NR: coordination frameworks\")</code></pre>"}, {"id": 53, "level": "intermediate", "q": "What is LOS probability model in 3GPP?", "a": "Probabilistic LOS/NLOS state affects path loss and K-factor (e.g. urban micro UMi street canyon models).<br><br><b>🔑 Plain terms:</b> Sometimes you see the tower, sometimes you don’t—model rolls dice by distance.<br><b>💡 Example:</b> <pre><code>import math\nd=200; P_LOS=max(0,min(1,(48/1800)*math.log10(d)+0.55))  # illustrative not exact 38.901\nprint(\"illus P_LOS\", P_LOS)</code></pre>"}, {"id": 54, "level": "intermediate", "q": "What is diffraction loss (knife-edge intuition)?", "a": "Obstacles bend energy into shadow region; excess loss depends on Fresnel parameter.<br><br><b>🔑 Plain terms:</b> Radio ‘creeps’ around building corners—weakly.<br><b>💡 Example:</b> <pre><code>import math\nh=10; d1=50; d2=200  # heights/dist illustrative\nv=h*math.sqrt(2*(d1+d2)/(3e8/(2.4e9)*d1*d2))  # Fresnel parameter order\nprint(\"Fresnel v ~\", v)</code></pre>"}, {"id": 55, "level": "intermediate", "q": "What is penetration loss modeling?", "a": "Additional dB loss for outdoor-to-indoor (O2I), material types (concrete, low-E glass) in link budgets.<br><br><b>🔑 Plain terms:</b> Thick walls eat extra dB beyond free space.<br><b>💡 Example:</b> <pre><code>materials={\"lowE_glass\":25,\"concrete\":15,\"wood\":6}\nprint(materials)</code></pre>"}, {"id": 56, "level": "intermediate", "q": "What is cross-polar discrimination (XPD)?", "a": "Ratio of co-pol to cross-pol received power; affects dual-pol MIMO conditioning.<br><br><b>🔑 Plain terms:</b> How much vertical leaks into horizontal port.<br><b>💡 Example:</b> <pre><code>print(\"High XPD -> low X-pol interference\")</code></pre>"}, {"id": 57, "level": "intermediate", "q": "What is DMRS-based CSI in NR?", "a": "Demodulation RS used also for channel estimation for coherent demod and can inform PMI/CSI feedback pipelines.<br><br><b>🔑 Plain terms:</b> Pilot symbols glued to the data slot for measuring H.<br><b>💡 Example:</b> <pre><code>print(\"NR DMRS: configurable patterns, front-loaded for low latency\")</code></pre>"}, {"id": 58, "level": "intermediate", "q": "What is SRS sounding for TDD massive MIMO?", "a": "UE sends SRS; gNB estimates uplink channel; with calibration uses for DL precoding (reciprocity).<br><br><b>🔑 Plain terms:</b> Phone pings ‘here I am’ so tower learns beam weights.<br><b>💡 Example:</b> <pre><code>print(\"Wideband SRS for frequency-selective precoding\")</code></pre>"}, {"id": 59, "level": "intermediate", "q": "What is condition number of H impact?", "a": "Large κ(H) means ZF noise amplification and sensitivity to CSI errors; prefer unitary-ish channels for MIMO stability.<br><br><b>🔑 Plain terms:</b> Ill-conditioned matrix = unstable lever.<br><b>💡 Example:</b> <pre><code>import numpy as np\nH=np.array([[1,1],[1,1.0001]])\nprint(\"cond\", np.linalg.cond(H))</code></pre>"}, {"id": 60, "level": "intermediate", "q": "What is elevation beamforming difference vs azimuth only?", "a": "2D arrays (UPA) control both azimuth and elevation; elevation matters for high-rise scenarios and drone UEs.<br><br><b>🔑 Plain terms:</b> Steer up and sideways, not only left-right.<br><b>💡 Example:</b> <pre><code>print(\"UPA: Ny x Nz elements with separable or joint precoding\")</code></pre>"}, {"id": 61, "level": "intermediate", "q": "What is channel aging?", "a": "CSI becomes outdated as UE moves between SRS/CSI-RS and data transmission; degrades MU-MIMO ZF.<br><br><b>🔑 Plain terms:</b> Map drawn last second is wrong after you sprint.<br><b>💡 Example:</b> <pre><code>print(\"Shorter slot, more frequent SRS, predictive filters mitigate\")</code></pre>"}, {"id": 62, "level": "intermediate", "q": "What is analog self-interference cancellation (full duplex context)?", "a": "Antenna/propagation/analog cancellation paths reduce SI before ADC for in-band full duplex experiments.<br><br><b>🔑 Plain terms:</b> Hear someone whisper while you shout—cancel your own voice first.<br><b>💡 Example:</b> <pre><code>print(\"FD: SI cancellation chain: prop -> analog -> digital\")</code></pre>"}, {"id": 63, "level": "intermediate", "q": "What is rich vs sparse scattering channel?", "a": "Rich: many uncorrelated paths → i.i.d.-like H; sparse mmWave: few dominant paths → beam alignment critical.<br><br><b>🔑 Plain terms:</b> Forest of echoes vs flashlight beams.<br><b>💡 Example:</b> <pre><code>print(\"SV channel models: few parameters, angle-domain sparsity\")</code></pre>"}, {"id": 64, "level": "intermediate", "q": "What is angular domain beamspace representation?", "a": "Apply spatial DFT to channel vector to concentrate energy in few angular bins for mmWave beam selection.<br><br><b>🔑 Plain terms:</b> FFT across antennas ≈ look in angle bins.<br><b>💡 Example:</b> <pre><code>import numpy as np\nh=np.random.randn(64)+0j\nH=np.fft.fft(h, norm=\"ortho\")\nprint(\"max bin\", np.argmax(np.abs(H)))</code></pre>"}], "pcap": [{"id": 1, "level": "basic", "q": "What is libpcap?", "a": "C library that abstracts packet capture on many OSes; tcpdump and Wireshark build on it.<br><br><b>🔑 Plain
