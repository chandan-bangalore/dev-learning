fore the OFDM modulation.<br><b>💡 Example:</b> <pre><code># 5G NR PDSCH TX chain (3GPP TS 38.211/212/214):\nimport numpy as np\n\n# Step 1: Transport Block CRC (24A or 24B bits appended)\ndef attach_crc(bits, crc_poly_len=24):\n    return np.append(bits, np.zeros(crc_poly_len, dtype=int))   # simplified\n\n# Step 2: LDPC encoding (code rate R, base graph selection)\ndef ldpc_encode(bits, R=0.5):\n    N_coded = int(len(bits) / R)\n    return np.random.randint(0, 2, N_coded)   # placeholder\n\n# Step 3: Rate matching (puncture/repeat to fit N_RE available REs)\ndef rate_match(coded_bits, N_RE, mod_order):\n    N_out = N_RE * mod_order\n    if len(coded_bits) > N_out:\n        return coded_bits[:N_out]             # puncture\n    else:\n        return np.tile(coded_bits, N_out//len(coded_bits)+1)[:N_out]  # repeat\n\n# Step 4: Scrambling (XOR with RNTI-seeded pseudo-random sequence)\ndef scramble(bits, rnti):\n    c = np.random.randint(0, 2, len(bits))    # PRBS (seeded by RNTI+slot)\n    return (bits + c) % 2\n\n# Step 5: Modulation (256-QAM = 8 bits per symbol)\nmod_order = 8   # 256-QAM\nN_RB = 50; N_sym = 12; N_layers = 2\nN_RE = N_RB * 12 * 12   # data REs (12 symbols, minus DMRS)\n\n# Chain:\ndata = np.random.randint(0, 2, 1000)    # 1000 information bits\ncrc  = attach_crc(data)\ncoded = ldpc_encode(crc, R=0.75)\nmatched = rate_match(coded, N_RE, mod_order)\nscrambled = scramble(matched, rnti=0xC123)\nprint(f\"Data bits: {len(data)}, Coded: {len(coded)}, Rate-matched: {len(matched)}\")\n# Spectral efficiency = data_bits / (N_RE * N_layers)\nSE = len(data) / (N_RE * N_layers)\nprint(f\"Spectral efficiency: {SE:.2f} bits/RE/layer\")</code></pre>"}, {"id": 19, "level": "intermediate", "q": "What is PDCCH and how does DCI work in 5G NR?", "a": "PDCCH (Physical Downlink Control Channel) carries DCI (Downlink Control Information). DCI contains: scheduling grants for PDSCH/PUSCH, power control commands, SRS triggers, HARQ feedback timing. DCI formats: 0_0/0_1 (UL grant for PUSCH), 1_0/1_1 (DL grant for PDSCH), 2_x (power control). PDCCH uses polar coding + QPSK. Search spaces: UE-specific (USS) and common (CSS). CORESET (Control Resource Set): frequency/time region where PDCCH candidates exist. UE blindly decodes all candidates in its search space — aggregation levels 1,2,4,8,16 CCEs. CRC scrambled with RNTI (C-RNTI for UE-specific, SI-RNTI for broadcast, RA-RNTI for random access).<br><br><b>🔑 Plain terms:</b> PDCCH carries the 'scheduling ticket' (DCI — Downlink Control Information) that tells a UE when to transmit/receive, on which RBs, and with what modulation. Without decoding PDCCH, the UE doesn't know where its data is.<br><b>💡 Example:</b> <pre><code># DCI (Downlink Control Information) formats:\ndci_formats = {\n    '0_0': 'UL grant (PUSCH scheduling, fallback format)',\n    '0_1': 'UL grant (PUSCH scheduling, main format)',\n    '1_0': 'DL assignment (PDSCH scheduling, fallback format)',\n    '1_1': 'DL assignment (PDSCH scheduling, main format)',\n    '2_0': 'Slot format indication (TDD DL/UL configuration)',\n    '2_3': 'Transmit power control for SRS',\n}\n\n# DCI format 1_1 key fields (abbreviated):\ndci_1_1_fields = {\n    'Identifier (1 bit)': '0=UL, 1=DL',\n    'BWP indicator (2 bits)': 'which BWP to use (0-3)',\n    'Frequency allocation': 'which RBs are allocated',\n    'Time allocation (4 bits)': 'which PDSCH symbols in the slot',\n    'MCS (5 bits)': 'modulation+code rate (table: QPSK..256-QAM)',\n    'HARQ process (4 bits)': 'which HARQ buffer to use (0-15)',\n    'Redundancy version (2 bits)': 'RV0/1/2/3',\n    'NDI (1 bit)': 'new data indicator (toggles for new TB)',\n    'MIMO layers/precoding': 'beam/precoder selection',\n    'PUCCH resource (3 bits)': 'where to send HARQ feedback',\n}\nfor field, meaning in dci_1_1_fields.items():\n    print(f\"  {field}: {meaning}\")\n\n# CORESET: the search space where PDCCH can be found\n# UE blind-decodes 44 candidate PDCCH locations (aggregation levels 1,2,4,8,16)\n# Polar coded + RNTI scrambled for UE-specific decoding</code></pre>"}, {"id": 20, "level": "intermediate", "q": "What is CSI reporting in 5G NR and what does it include?", "a": "CSI (Channel State Information) reporting enables gNB to adapt to channel conditions. UE measures CSI-RS (Reference Signal) and reports: CQI (Channel Quality Indicator, 4 bits): suggested MCS, based on target 10% BLER. PMI (Precoding Matrix Indicator): suggested precoder from codebook (for codebook-based beamforming). RI (Rank Indicator): number of useful spatial layers. LI (Layer Indicator, Rel-16): strongest layer. CRI (CSI-RS Resource Indicator, beam selection). Reporting modes: aperiodic (triggered by DCI), periodic (PUCCH), semi-persistent. Type I codebook: single-panel, coarse. Type II codebook: multi-panel, higher resolution, more overhead. Compressed Type II (Rel-16): frequency-domain compression.<br><br><b>🔑 Plain terms:</b> CSI (Channel State Information) is the UE's report card on the downlink channel quality. The gNB schedules based on CSI to pick the best modulation, coding rate, beam, and number of MIMO layers. Reported on PUCCH or PUSCH.<br><b>💡 Example:</b> <pre><code># CSI components:\n# CQI (Channel Quality Indicator) — 4 bits, table index 0-15\n#     -> maps to modulation+code rate (QPSK R=0.08 to 256-QAM R=0.93)\n# PMI (Precoding Matrix Indicator) — beam/precoder selection\n#     -> index into codebook of possible precoding matrices\n# RI (Rank Indicator) — how many MIMO layers the channel supports (1-8)\n# LI (Layer Indicator) — used with Type II CSI for advanced MU-MIMO\n\n# CQI table (3GPP TS 38.214 Table 5.2.2.1-3):\ncqi_table = [\n    (0, 'out of range', 0, 0),\n    (1, 'QPSK',    78,  0.152),\n    (5, 'QPSK',   602,  0.588),   # example mid entries\n    (10,'16-QAM', 666,  0.651),\n    (15,'64-QAM',948,   0.926),\n]\nprint(f\"{'CQI':<5} {'Modulation':<12} {'Code Rate/1024':<18} {'Efficiency'}\")\nfor cqi, mod, cr, eff in cqi_table:\n    print(f\"{cqi:<5} {mod:<12} {cr:<18} {eff:.3f} bits/RE\")\n\nimport numpy as np\n# CQI estimation from measured SNR:\n# SNR (dB): -6.7, 1.0, 4.0, 6.4, 8.1, 10.3, 11.7, 14.1, 16.3, 18.7 for CQI 1-10\n# Rule of thumb: CQI ≈ SNR_dB * 0.5 + 5  (rough linear approximation)\nsnr_db = 15.0\ncqi_est = min(15, max(1, round(snr_db * 0.5 + 5)))\nprint(f\"Estimated CQI for SNR={snr_db} dB: {cqi_est}\")</code></pre>"}, {"id": 21, "level": "intermediate", "q": "What is SRS (Sounding Reference Signal) and how is it used?", "a": "SRS (Sounding Reference Signal) is an uplink reference signal transmitted by the UE for channel estimation at the gNB. Uses: (1) UL channel estimation for scheduling and link adaptation. (2) TDD reciprocity-based DL beamforming (gNB estimates DL channel from UL SRS). (3) Positioning. (4) Beam management. SRS configuration: bandwidth, starting RB, comb (every 2nd or 4th subcarrier), number of antenna ports, periodicity. Multiple UEs use different comb offsets and sequence shifts for orthogonality. Aperiodic SRS triggered by DCI for on-demand sounding. Wideband SRS sweeps full carrier bandwidth over multiple slots. Critical for massive MIMO reciprocity-based precoding.<br><br><b>🔑 Plain terms:</b> SRS (Sounding Reference Signal) is transmitted by the UE on the uplink so the gNB can measure the uplink channel. Because TDD has channel reciprocity (UL channel ≈ DL channel), SRS measurements are used to compute downlink beamforming weights.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# SRS is a Zadoff-Chu based sequence — same property as PRACH (constant amplitude)\ndef srs_sequence(u, N, k0=0):\n    \"\"\"Generate SRS sequence — ZC-based (3GPP TS 38.211 section 6.4.1.4)\"\"\"\n    n = np.arange(N)\n    r = np.exp(-1j * np.pi * u * n * (n+1) / N)\n    return r\n\n# SRS parameters:\nN_SRS  = 48    # sequence length (function of N_RB, comb)\nu      = 3     # root index (base sequence index)\nsrs    = srs_sequence(u, N_SRS)\n\nprint(f\"SRS length: {len(srs)}, PAPR: {10*np.log10(np.max(np.abs(srs)**2)/np.mean(np.abs(srs)**2)):.2f} dB\")\n# PAPR = 0 dB (constant envelope — ideal for power amplifier)\n\n# SRS transmission patterns:\n# Periodic: every K_SRS slots (configurable: 1,2,4,5,8,10,16,20,40,80,160,320 slots)\n# Aperiodic: triggered by DCI (on-demand sounding)\n# Semi-persistent: configured semi-statically\n\n# gNB processing of SRS:\n# 1. Receive SRS, remove known sequence -> channel estimate H_UL[k] per subcarrier\n# 2. UL channel = DL channel (TDD reciprocity): H_DL[k] ≈ H_UL[k]^H\n# 3. Compute beamforming weights: w = H_UL^H (MRT) or (H^H*H)^-1*H^H (ZF)\n# 4. Apply weights to next DL transmission\n\nprint(\"SRS -> UL channel estimate -> DL beamforming weights (reciprocity)\")</code></pre>"}, {"id": 22, "level": "intermediate", "q": "What is timing advance (TA) and how is it managed in 5G NR?", "a": "Timing advance compensates for propagation delay so UE uplink transmissions arrive at the gNB within the CP window. Without TA, distant UEs would cause inter-symbol interference. Initial TA: estimated from PRACH preamble (gNB measures preamble arrival time, sends TA command in RAR). TA range: covers cell radius — for μ=1, max TA ~0.52 ms (78 km radius). Closed-loop TA update: gNB sends TA MAC CE periodically (or when error exceeds threshold). TA timer: UE drops connection if no TA update received within configured time (TA misalignment accumulates due to UE movement). TA adjustment: in units of Tc = 1/(480kHz × 4096) ≈ 0.51 ns.<br><br><b>🔑 Plain terms:</b> Timing Advance (TA) compensates for the propagation delay between the UE and gNB. Without it, UEs at different distances would all transmit at the same time, and their signals would arrive at the gNB at different times, colliding. TA shifts the UE's uplink timing earlier.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Timing advance concept:\n# Round-trip propagation delay for a UE at distance d:\nc = 3e8   # speed of light\nfor d_km in [0.1, 1.0, 5.0, 10.0, 30.0]:\n    RTT  = 2 * d_km * 1e3 / c * 1e6   # microseconds\n    TA   = RTT / 2                      # one-way delay (us)\n    # 5G NR TA granularity: 16*64*Tc = 16 * 1/(30.72e6*4096) * 1e6 ≈ 0.13 us\n    Tc   = 1 / (30.72e6 * 4096) * 1e6  # smallest time unit in NR (us)\n    TA_N = round(TA / (16 * Tc))        # TA command value N_TA\n    print(f\"d={d_km:5.1f} km: RTT={RTT:.2f} us, TA={TA:.2f} us, N_TA={TA_N}\")\n# d= 0.1 km: RTT=0.67 us, TA=0.33 us, N_TA=2\n# d=30.0 km: RTT=200 us, TA=100 us, N_TA=769\n\n# TA procedure:\n# 1. Estimated from PRACH timing (Msg2 RAR contains initial TA command)\n# 2. Maintained by MAC CE (TA command = adjustment, +/-31 steps)\n# 3. TA timer: if expires, UE must redo RACH before uplink transmit\n# 4. Maximum TA: 3846 * 16 * Tc ≈ 0.4 ms -> max cell range ≈ 60 km</code></pre>"}, {"id": 23, "level": "intermediate", "q": "What is the 5G NR PUCCH and what does it carry?", "a": "PUCCH (Physical Uplink Control Channel) carries UCI (Uplink Control Information): HARQ-ACK (1-2 bits for each HARQ process — ACK if decoded correctly, NACK otherwise), SR (Scheduling Request — request for UL resource grant), CSI reports (CQI/PMI/RI). PUCCH formats: Format 0 (1-2 bits, 1-2 symbols, sequence-based), Format 1 (1-2 bits, 4-14 symbols, OCC spreading for multiplexing), Format 2 (up to 11 bits, 1-2 symbols, DM-RS, QPSK), Format 3 (>2 bits, 4-14 symbols, OCC), Format 4 (>2 bits, 4-14 symbols, small payload with OCC). Short PUCCH (F0/F2): 1-2 symbols — for slot-based HARQ feedback. Long PUCCH (F1/F3/F4): better coverage.<br><br><b>🔑 Plain terms:</b> PUCCH (Physical Uplink Control Channel) carries the UE's control messages back to the gNB — mainly HARQ ACK/NACK (did you get my data?), CSI reports (how good is the downlink?), and Scheduling Requests (I have data to send, please allocate me uplink resources).<br><b>💡 Example:</b> <pre><code># PUCCH formats and their use:\npucch_formats = {\n    'Format 0 (1-2 symbols)':   '1-2 bits, HARQ ACK or SR — used for fast feedback',\n    'Format 1 (4-14 symbols)':  '1-2 bits, HARQ ACK + SR — time-multiplexed',\n    'Format 2 (1-2 symbols)':   '3-11 bits, short CSI report',\n    'Format 3 (4-14 symbols)':  '>2 bits, longer CSI + HARQ, Polar coded',\n    'Format 4 (4-14 symbols)':  '>2 bits, spread PUCCH for multiple UEs sharing resource',\n}\nfor fmt, desc in pucch_formats.items():\n    print(f\"  {fmt}: {desc}\")\n\n# HARQ feedback timing (minimum):\n# gNB sends PDSCH in slot n\n# UE decodes, sends HARQ ACK/NACK in slot n + K1 (K1 configurable, min=1)\n# For mu=1: K1=1 -> HARQ RTT ≈ 2 slots = 1 ms\n\nimport numpy as np\n# UCI (Uplink Control Information) bit content:\nK_harq = 4     # HARQ ACK/NACK bits per cell (1 for 1 codeword, 2 for 2 CW)\nK_sr   = 1     # scheduling request (0=no request, 1=request)\nK_csi  = 11    # CSI part1 bits (CQI+RI+PMI encoded)\ntotal_UCI = K_harq + K_sr + K_csi\nprint(f\"Total UCI bits: {total_UCI} -> PUCCH Format {2 if total_UCI <= 11 else 3}\")</code></pre>"}, {"id": 24, "level": "intermediate", "q": "What is power control in 5G NR uplink?", "a": "UL power control ensures UE transmit power is just enough to meet target quality (avoids interference + saves battery). PUSCH open-loop: <code>P_PUSCH = min(Pmax, P0 + α·PL + 10log10(M) + ΔTF + f(i))</code> where PL = path loss (measured from DL reference signal), P0 = target received power, α = path loss compensation factor (0-1), M = number of allocated RBs, ΔTF = MCS-dependent offset, f(i) = closed-loop correction. Closed-loop correction f(i): gNB sends TPC (Transmit Power Control) commands in DCI — UE accumulates corrections. PUCCH has separate power control loop. Fractional path loss compensation (α&lt;1): allows near UEs to interfere less.<br><br><b>🔑 Plain terms:</b> Uplink power control ensures each UE transmits with just enough power to be received at the gNB — not too weak (bad SNR), not too strong (interferes with neighbouring cells). The formula balances path loss compensation with interference management.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# 5G NR Open-loop uplink power control (3GPP TS 38.213 Eq. 7.1.1-1):\n# P_PUSCH = min(P_max, P_O + alpha*PL + 10*log10(2^mu * N_RB) + delta_TF + f)\n#\n# P_O    = cell-specific baseline power (dBm)\n# alpha  = path loss compensation factor (0 to 1; 1=full compensation)\n# PL     = estimated downlink path loss (dB)\n# N_RB   = number of allocated resource blocks\n# delta_TF = TF-dependent power offset (function of MCS)\n# f      = closed-loop correction (accumulated from TPC commands)\n\ndef pusch_power(P_O=-76, alpha=0.8, PL_dB=80, N_RB=25, mu=1, delta_TF=0, f=0):\n    P_max = 23   # dBm (typical UE max power)\n    P_O_eff = P_O + alpha * PL_dB + 10*np.log10((2**mu) * N_RB) + delta_TF + f\n    return min(P_max, P_O_eff)\n\n# Example: UE 1 km away (PL ≈ 100 dB), allocated 25 RBs, mu=1:\npower = pusch_power(PL_dB=100, N_RB=25)\nprint(f\"PUSCH Tx power: {power:.1f} dBm\")    # e.g. 15 dBm\n\n# Closed-loop TPC (Transmit Power Control):\n# gNB measures UE's received power, sends TPC command in DCI (+1,0,-1 dB steps)\n# Accumulated: f += TPC_command each slot\ntpc_accumulation = [1, 1, 0, -1, 0, 1]   # example TPC sequence\nf = sum(tpc_accumulation)\nprint(f\"Accumulated TPC: {f} dB (f parameter)\")</code></pre>"}, {"id": 25, "level": "intermediate", "q": "What is massive MIMO and how does the 5G NR specification support it?", "a": "Massive MIMO: gNB with very many antennas (32-256+) serving multiple UEs simultaneously. 5G NR support: up to 32 DL CSI-RS ports (more with extensions), non-codebook-based precoding using SRS reciprocity, Type II CSI feedback for precise precoding, FD-MIMO antenna ports. gNB estimates DL channel from UL SRS (TDD reciprocity), computes optimal precoder (e.g., zero-forcing, MRT), applies to PDSCH. MU-MIMO: schedule multiple UEs on same RBs — spatial separation via precoding. Benefits: 10x+ capacity increase, 3dB array gain per doubling of antennas, interference nulling. Challenges: CSI acquisition, pilot contamination in multi-cell, calibration for reciprocity.<br><br><b>🔑 Plain terms:</b> Massive MIMO uses 64-256+ antenna elements at the gNB to form very narrow beams, each serving a different user simultaneously. Instead of one wide beam covering a sector (like a floodlight), massive MIMO uses many narrow beams (like spotlights) — multiplying throughput by spatial reuse.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Massive MIMO: N_ant >> N_UE (antennas >> served users)\n# Key property: random channels become orthogonal as N_ant -> infinity\n# -> simple MRT beamforming approaches optimal performance\n\nN_ant = 64    # 64-element antenna array (8x8 panel)\nN_UE  = 8     # 8 simultaneous users\n\n# Channel matrix: N_UE x N_ant (each row = one user's channel vector)\nH = (np.random.randn(N_UE, N_ant) + 1j*np.random.randn(N_UE, N_ant)) / np.sqrt(2)\n\n# MRT (Maximum Ratio Transmission) precoder:\n# W_MRT = H^H / ||H^H||  (simply conjugate of channel)\nW_mrt = H.conj().T   # shape: N_ant x N_UE\n\n# Check orthogonality between users (diagonal should dominate):\nG = (H @ W_mrt) / N_ant   # effective channel: should approach identity\nprint(\"Effective channel (normalised), magnitude [dB]:\")\nprint(np.round(20*np.log10(np.abs(G) + 1e-10), 1))\n# Diagonal dominates, off-diagonal small -> low inter-user interference\n\n# Degrees of freedom: min(N_ant, N_UE) = 8 simultaneous streams\n# Spectral efficiency: ~8x vs single-user SISO at same total power\n# 5G NR supports up to 256 antenna ports (Class H gNB)</code></pre>"}, {"id": 26, "level": "intermediate", "q": "What is the 5G NR UE measurement and reporting procedure?", "a": "UE performs measurements for: handover decisions, beam management, RRM. Measurements: RSRP (Reference Signal Received Power — average power of CSI-RS or SSB RE), RSRQ (Reference Signal Received Quality — RSRP/RSSI), SINR (Signal to Interference plus Noise Ratio). L3 filtering: exponential average to reduce noise: <code>F_n = (1-a)·F_{n-1} + a·M_n</code>, a = 1/2^(k/4). Event-triggered reporting: A3 (neighbour better than serving by offset), A5 (serving below threshold1 and neighbour above threshold2). Time-to-trigger (TTR): measurement condition must hold for TTR before reporting. gNB uses reports for handover, CA management, beam switching.<br><br><b>🔑 Plain terms:</b> Measurement and reporting is how the UE tells the gNB about the channel quality and neighbouring cells. RSRP (signal strength), RSRQ (signal quality), and SINR are measured from reference signals and reported according to measurement events (A3 = neighbour stronger than serving by threshold).<br><b>💡 Example:</b> <pre><code># 5G NR UE measurements:\nimport numpy as np\n\n# RSRP (Reference Signal Received Power):\n# Measured on: SSB (for beam management), CSI-RS (for fine measurement)\n# Range: -140 to -44 dBm (reported as integer 0-127: RSRP = value - 140 dBm)\n\ndef rsrp_report(rsrp_dBm):\n    return max(0, min(127, round(rsrp_dBm + 140)))\n\nrsrp = -85   # dBm (typical urban indoor)\nprint(f\"RSRP: {rsrp} dBm -> report value: {rsrp_report(rsrp)}\")   # 55\n\n# RSRQ (Reference Signal Received Quality):\n# RSRQ = N_RB * RSRP / RSSI  (accounts for interference)\n# Range: -43 to 20 (0.5 dB steps)\n\n# SINR: not standardised but commonly reported for beam selection\n# SINR = signal_power / (interference + noise)\n\n# Measurement events (trigger handover/beam change):\nevents = {\n    'A1': 'Serving cell becomes better than threshold (stop measurements)',\n    'A2': 'Serving cell becomes worse than threshold (start measurements)',\n    'A3': 'Neighbour becomes offset better than serving (handover trigger)',\n    'A4': 'Neighbour becomes better than threshold',\n    'A5': 'Serving worse than threshold1 AND neighbour better than threshold2',\n    'A6': 'Neighbour becomes offset better than SCell (CA addition)',\n}\nfor event, desc in events.items():\n    print(f\"  {event}: {desc}\")</code></pre>"}, {"id": 27, "level": "intermediate", "q": "What is beam management in 5G NR?", "a": "Beam management maintains optimal beam pair link between gNB and UE, especially at mmWave. Procedures: P1 (Beam sweeping and selection): gNB sweeps multiple beams (SSB or CSI-RS), UE reports best beam (CRI). P2 (Beam refinement): narrow beam search within selected wide beam. P3 (UE Rx beam refinement): UE tests different Rx beams for same gNB Tx beam. BFR (Beam Failure Recovery): if all configured beams fail (BLER too high), UE initiates recovery — transmits PRACH on candidate beam, gNB responds. L1-RSRP: instantaneous measurement (no L3 filter) for fast beam tracking. TCI (Transmission Configuration Indicator): gNB configures which beam (RS) to use for PDSCH/PDCCH reception.<br><br><b>🔑 Plain terms:</b> Beam management is how 5G NR steers and tracks narrow beams to follow moving UEs, especially at mmWave. The procedure involves initial beam scan (P1), beam refinement (P2/P3), and beam failure recovery if the beam is lost.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Beam management procedures (3GPP TS 38.214):\n# P1: Initial beam scanning (coarse)\n#     gNB sweeps SSB beams (up to 64 at FR2)\n#     UE measures all SSB beams, reports best N beams (L1-RSRP)\n\n# P2: TX beam refinement\n#     gNB sends CSI-RS on multiple TX beams (narrower than SSB beams)\n#     UE reports best beam index\n\n# P3: RX beam refinement\n#     gNB uses one TX beam, UE tries different RX beam directions\n\n# Example: beam pair management\nN_SSB   = 8    # 8 SSB beams (FR1)\nN_CSI_RS = 16  # 16 CSI-RS beams (finer grid within best SSB beam)\n\n# Simulate beam RSRP measurements:\nnp.random.seed(42)\nssb_rsrp = -80 + np.random.randn(N_SSB) * 5   # SSB beam RSRPs (dBm)\nbest_ssb = np.argmax(ssb_rsrp)\n\ncsi_rsrp = ssb_rsrp[best_ssb] + np.random.randn(N_CSI_RS) * 2   # finer around best SSB\nbest_csi = np.argmax(csi_rsrp)\n\nprint(f\"Best SSB beam: {best_ssb}, RSRP={ssb_rsrp[best_ssb]:.1f} dBm\")\nprint(f\"Best CSI-RS beam: {best_csi}, RSRP={csi_rsrp[best_csi]:.1f} dBm\")\n\n# Beam failure detection:\n# If BFD-RS (beam failure detection RS) quality falls below threshold:\nq_threshold = -12   # dB SINR threshold\n# UE sends Beam Failure Recovery Request (BFRQ) on PRACH\n# gNB responds on PDCCH with new beam allocation</code></pre>"}, {"id": 28, "level": "intermediate", "q": "What is carrier aggregation (CA) in 5G NR?", "a": "CA allows a UE to receive/transmit on multiple component carriers (CCs) simultaneously to increase peak throughput and exploit fragmented spectrum. PCell (Primary Cell): mandatory, carries PUCCH, RRC. SCells (Secondary Cells): activated on demand, no PUCCH. Up to 16 CCs in Rel-17. Intra-band contiguous CA: adjacent CCs in same band. Intra-band non-contiguous: same band, different locations. Inter-band CA: different bands (e.g., n78 + n258). NR-DC (Dual Connectivity): UE connected to two gNBs on different carriers. CA requires: carrier capable UE, coordinated scheduling (if intra-gNB), increased RF complexity. Timing advance per CC (for TDD inter-band). HARQ and scheduling per CC.<br><br><b>🔑 Plain terms:</b> Carrier Aggregation (CA) bonds multiple component carriers (CCs) together so the UE can use the combined bandwidth. Like merging two lanes into one — twice the bandwidth, up to twice the speed. CCs can be in the same band (intraband) or different bands (interband).<br><b>💡 Example:</b> <pre><code># Carrier Aggregation configuration:\n# PCell: Primary Component Carrier (always active, carries RRC signalling)\n# SCell: Secondary Component Carrier (can be added/removed dynamically)\n\n# Example: 2CC intraband CA on n78:\nca_config = {\n    'PCell': {'band': 'n78', 'BW': 100, 'N_RB': 273, 'SCS': 30, 'freq': '3500 MHz'},\n    'SCell': {'band': 'n78', 'BW': 100, 'N_RB': 273, 'SCS': 30, 'freq': '3600 MHz'},\n}\ntotal_BW = sum(cc['BW'] for cc in ca_config.values())\ntotal_RB = sum(cc['N_RB'] for cc in ca_config.values())\nprint(f\"CA total bandwidth: {total_BW} MHz, {total_RB} RBs\")   # 200 MHz, 546 RBs\n\n# CA BLER target: typically 10% (higher than single carrier = more margin)\n\n# EN-DC (EUTRA-NR Dual Connectivity):\n# LTE anchor (PCell) + 5G NR SCell\n# User data split: control on LTE, high-speed data on 5G NR\nimport numpy as np\nlte_rate = 0.15  # Gbps\nnr_rate  = 1.2   # Gbps\nprint(f\"EN-DC combined: {lte_rate + nr_rate:.2f} Gbps (LTE + 5G NR)\")\n\n# Scheduling independence: each CC has its own scheduler, HARQ processes\n# Cross-carrier scheduling: PDCCH on PCell schedules PDSCH on SCell</code></pre>"}, {"id": 29, "level": "intermediate", "q": "What is the 5G NR link budget and what factors affect cell coverage?", "a": "Link budget: P_Tx (dBm) - Losses + Gains ≥ P_Rx_min. Key terms: EIRP (Effective Isotropic Radiated Power) = Tx power + antenna gain - cable losses. Free space path loss: FSPL = 20log10(4πd/λ). Additional losses: penetration (indoor: 10-25 dB), shadowing margin (8-10 dB), interference margin, body loss. Receiver sensitivity: P_min = kTB + NF + SNR_required. 5G NR factors: gNB Tx power (typically 40-46 dBm macro), UE Tx power (23-26 dBm), mMIMO beam gain (15-20 dB), frequency (higher = more path loss), bandwidth (wider = more noise). mmWave: short range but very high capacity with beamforming gain.<br><br><b>🔑 Plain terms:</b> Link budget calculates whether a signal can reach a UE with sufficient SNR. It balances the transmit power against all the losses (path loss, fading, body loss) and gains (antenna gain, MIMO) to predict the received SNR and maximum cell range.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Simplified 5G NR DL link budget (FR1, n78, 3.5 GHz):\n# Parameters:\nP_tx_dBm      = 46      # gNB TX power (dBm) — 3GPP max for macro\nG_tx_dBi      = 17      # gNB antenna gain (dBi, massive MIMO beam)\nCable_loss_dB = 2       # feeder losses\nG_rx_dBi      = 0       # UE antenna gain\nNF_dB         = 9       # UE noise figure\nBW_Hz         = 15e3    # one RB bandwidth (15 kHz SCS, simplified)\nSINR_req_dB   = -3      # QPSK min SINR (cell edge, PDSCH)\nMargin_dB     = 10      # shadow fading margin + interference\n\n# EIRP (Effective Isotropic Radiated Power):\nEIRP = P_tx_dBm + G_tx_dBi - Cable_loss_dB\nprint(f\"EIRP: {EIRP} dBm\")\n\n# Thermal noise at UE receiver:\nkT = -174   # dBm/Hz at 290K\nN_floor_dBm = kT + 10*np.log10(BW_Hz) + NF_dB\nprint(f\"Noise floor: {N_floor_dBm:.1f} dBm\")\n\n# Maximum Allowable Path Loss:\nMAPL = EIRP + G_rx_dBi - N_floor_dBm - SINR_req_dB - Margin_dB\nprint(f\"MAPL: {MAPL:.1f} dB\")\n\n# Cell range from MAPL using UMa path loss model (3GPP TR 38.901):\n# PL = 28 + 22*log10(d) + 20*log10(fc_GHz)  for d < d_BP\nfc_GHz = 3.5\nd_range = 10**((MAPL - 28 - 20*np.log10(fc_GHz)) / 22) / 1000   # km\nprint(f\"Estimated cell range: {d_range:.2f} km\")</code></pre>"}, {"id": 30, "level": "intermediate", "q": "What is the 5G NR physical random access channel (PRACH)?", "a": "PRACH carries the random access preamble (Msg1). Preamble: Zadoff-Chu (ZC) sequence of length 139 or 839. Format: long formats (formats 0-3, 839-length ZC) for large cells, short formats (A1-A3, B1-B4, C0, C2 — 139-length ZC) for small cells/high SCS. ZC sequences have ideal cyclic autocorrelation — multiple preambles from a root with different cyclic shifts are orthogonal. 64 preambles per cell (some for contention-free, some for contention-based). PRACH occasions: time-frequency positions signalled in SIB1. gNB detects preamble via correlator (frequency-domain: multiply received signal with conjugate DFT of ZC). TA estimated from correlation peak offset.<br><br><b>🔑 Plain terms:</b> The PRACH preamble uses a Zadoff-Chu sequence — a special sequence with constant amplitude (no peaks) and excellent autocorrelation (sharp peak at zero lag, zero elsewhere). The gNB correlates the received signal with all possible preamble sequences to detect which one the UE sent and estimate its timing.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Zadoff-Chu PRACH preamble generation:\ndef zadoff_chu(u, N):\n    n = np.arange(N)\n    return np.exp(-1j * np.pi * u * n * (n + 1) / N)\n\n# PRACH Format 0 (30 kHz SCS, 1 ms duration):\nN_u  = 139    # ZC sequence length for short preamble\nu    = 1      # root index\n\nzc   = zadoff_chu(u, N_u)\nprint(f\"ZC sequence: length={N_u}, PAPR={10*np.log10(np.max(np.abs(zc)**2)/np.mean(np.abs(zc)**2)):.2f} dB\")\n# PAPR = 0 dB -> constant amplitude -> maximum power amplifier efficiency\n\n# 64 preambles from cyclic shifts of root:\nN_cs = 13   # cyclic shift (Ncs = 13 -> 139/13 = 10 preambles per root)\npreambles = [np.roll(zc, k * N_cs) for k in range(64)]\n\n# Receiver correlation (matched filter detection):\nnoise_sigma = 0.1\nreceived = preambles[7] + noise_sigma * (np.random.randn(N_u) + 1j*np.random.randn(N_u))\n\n# Correlate with all preambles:\ncorr = np.array([np.abs(np.dot(received, p.conj()))**2 for p in preambles])\ndetected = np.argmax(corr)\nprint(f\"Detected preamble: {detected} (sent: 7), \"\n      f\"SNR: {10*np.log10(corr[detected]/np.mean(corr)):.1f} dB\")</code></pre>"}, {"id": 31, "level": "intermediate", "q": "What is the 5G NR L2 architecture (MAC, RLC, PDCP)?", "a": "Layer 2 sits between PHY and RRC/NAS. PDCP (Packet Data Convergence Protocol): header compression (ROHC), ciphering and integrity protection, reordering for dual connectivity, duplicate detection. RLC (Radio Link Control): three modes — TM (transparent, no header), UM (unacknowledged, in-sequence delivery), AM (acknowledged mode — ARQ retransmission). MAC (Medium Access Control): scheduling decisions (which UE, which RBs, which MCS), HARQ processes, logical channel multiplexing/demultiplexing, random access. Logical channels: BCCH (broadcast), PCCH (paging), CCCH (common control), DCCH (dedicated control), DTCH (dedicated traffic). Transport channels map to physical channels.<br><br><b>🔑 Plain terms:</b> The 5G NR L2 stack (MAC, RLC, PDCP) is like the post office sorting system. PDCP handles security (encryption) and header compression. RLC handles segmentation/reassembly and in-order delivery. MAC is the traffic cop that schedules who uses the air interface and when.<br><b>💡 Example:</b> <pre><code># 5G NR Layer 2 architecture:\n# PDCP (Packet Data Convergence Protocol) — 3GPP TS 38.323:\n#   - Header compression (ROHC)\n#   - Ciphering and integrity protection\n#   - Sequence numbering and duplicate detection\n#   - Reordering in case of carrier aggregation reordering\n\n# RLC (Radio Link Control) — 3GPP TS 38.322:\n#   - Three modes: TM (transparent), UM (unacknowledged), AM (acknowledged)\n#   - TM: BCCH/CCCH/PCCH (no header, pass-through)\n#   - UM: streaming (VoIP, video) — ordered delivery, no retransmission\n#   - AM: reliable data (TCP) — retransmission if RLC SDU not received\n\n# MAC (Medium Access Control) — 3GPP TS 38.321:\n#   - Logical channel multiplexing (up to 32 logical channels)\n#   - HARQ operation (16 processes DL, 16 UL)\n#   - Random access procedure\n#   - Scheduling (PDCCH DCI interpretation)\n#   - Power headroom reporting (PHR)\n#   - Buffer status reporting (BSR) -> tells gNB how much UL data is waiting\n\n# Data flow (downlink):\nflow = [\n    \"IP packet arrives at PDCP\",\n    \"PDCP: ROHC compress header, encrypt, add PDCP header (sequence number)\",\n    \"RLC: segment to RLC PDU if too large, add RLC header\",\n    \"MAC: multiplex RLC PDUs from multiple logical channels into MAC PDU\",\n    \"MAC: add subheader per LC, padding to fill TB\",\n    \"PHY: TB -> CRC -> LDPC -> rate match -> scramble -> modulate -> OFDM -> TX\",\n]\nfor i, step in enumerate(flow, 1):\n    print(f\"Step {i}: {step}\")</code></pre>"}, {"id": 32, "level": "intermediate", "q": "What is the UE PHY uplink transmission process?", "a": "UE UL PUSCH chain: (1) Receive UL grant (DCI 0_1) on PDCCH — contains RB allocation, MCS, HARQ process, RV, DMRS ports. (2) Generate transport block — MAC layer provides. (3) CRC attach. (4) CB segmentation. (5) LDPC encode + rate match. (6) Data scrambling. (7) Modulate (QPSK/16/64/256QAM). (8) Layer mapping (up to 4 UL layers). (9) Transform precoding (DFT-s-OFDM, Pi/2-BPSK for coverage): optional, reduces PAPR. (10) Precoding (antenna ports). (11) RE mapping + DMRS insertion. (12) IFFT + CP. (13) Power control + timing advance. (14) DAC → PA → antenna. UE must transmit in the scheduled slot and apply correct TA.<br><br><b>🔑 Plain terms:</b> The UE uplink transmission process mirrors the downlink but in reverse — the UE encodes and modulates its data to send to the gNB. The key difference from LTE: 5G NR UL can use both CP-OFDM (same as DL) and DFT-s-OFDM (single-carrier, lower PAPR) depending on UE capability and configuration.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# UE uplink (PUSCH) processing chain:\n# 1. Transport Block CRC attachment (24-bit CRC)\n# 2. LDPC encoding (BG1 or BG2 based on TB size and code rate)\n# 3. Rate matching (to fill N_RE PUSCH resource elements)\n# 4. Scrambling (RNTI-based PRBS)\n# 5. Modulation (QPSK, 16/64/256-QAM — same table as DL)\n# 6a. CP-OFDM: Layer mapping -> precoding -> OFDM\n# 6b. DFT-s-OFDM: Layer mapping -> DFT -> subcarrier mapping -> OFDM\n# 7. DMRS insertion (for channel estimation at gNB)\n# 8. Power control (adjust Tx power per slot)\n# 9. RF upconversion and transmission\n\n# CP-OFDM vs DFT-s-OFDM:\ncp_ofdm_pros = [\"Multi-layer MIMO (up to 4 layers UL)\", \"Same as DL -> simpler implementation\"]\ncp_ofdm_cons = [\"High PAPR (up to 12 dB)\", \"Requires linear PA -> more power consumption\"]\n\ndft_s_ofdm_pros = [\"Low PAPR (~6 dB lower)\", \"Better coverage at cell edge\", \"Less PA back-off needed\"]\ndft_s_ofdm_cons = [\"Single layer only (rank 1)\", \"Single-carrier -> less frequency diversity\"]\n\nprint(\"CP-OFDM: preferred when coverage OK, MIMO gain wanted\")\nprint(\"DFT-s-OFDM: preferred at cell edge, power limited UE\")\n\n# UE capability: 'transformPrecoding' indicates DFT-s-OFDM support\n# gNB enables via RRC: pusch-Config -> transformPrecoder: enabled/disabled</code></pre>"}, {"id": 33, "level": "intermediate", "q": "What is DFT-s-OFDM and when is it used in 5G NR?", "a": "DFT-spread OFDM (also called SC-FDMA in LTE) is a waveform where input symbols are first transformed by a DFT before the IFFT. Spreading makes the signal more single-carrier like — lower PAPR (Peak-to-Average Power Ratio) than pure OFDM. Lower PAPR = UE power amplifier operates more efficiently = better coverage (or lower power for same range). 5G NR: DFT-s-OFDM is optional for PUSCH (transform precoding enabled/disabled by RRC). Mandatory for PRACH. Pi/2-BPSK + DFT-s-OFDM achieves near-constant envelope — ultra-low PAPR for cell-edge coverage. Downside: only single-layer transmission with transform precoding, no frequency-selective scheduling within the DFT block.<br><br><b>🔑 Plain terms:</b> DFT-s-OFDM (also called SC-FDMA) precedes the OFDM modulation with a DFT, spreading each symbol across all subcarriers. This reduces the peak-to-average power ratio (PAPR) — which means the UE's power amplifier can operate more efficiently, extending battery life and cell range.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# PAPR comparison: CP-OFDM vs DFT-s-OFDM\ndef papr_db(signal):\n    peak  = np.max(np.abs(signal)**2)\n    avg   = np.mean(np.abs(signal)**2)\n    return 10 * np.log10(peak / avg)\n\nN     = 512      # FFT size\nN_sc  = 72       # 6 RBs = 72 active subcarriers (for this example)\n\n# Generate QPSK symbols:\nbits    = np.random.randint(0, 4, N_sc)\nsymbols = np.exp(1j * (np.pi/4 + bits * np.pi/2))  # QPSK\n\n# CP-OFDM modulation:\nfreq_grid = np.zeros(N, dtype=complex)\nfreq_grid[1:N_sc//2+1]  = symbols[:N_sc//2]\nfreq_grid[N-N_sc//2:]   = symbols[N_sc//2:]\nofdm_signal = np.fft.ifft(freq_grid)\npapr_ofdm = papr_db(ofdm_signal)\n\n# DFT-s-OFDM modulation:\nsymbols_dft = np.fft.fft(symbols) / np.sqrt(N_sc)   # DFT precoding step\nfreq_grid2 = np.zeros(N, dtype=complex)\nfreq_grid2[1:N_sc+1] = symbols_dft                   # subcarrier mapping (contiguous)\nsc_fdma_signal = np.fft.ifft(freq_grid2)\npapr_scofdm = papr_db(sc_fdma_signal)\n\nprint(f\"CP-OFDM PAPR:   {papr_ofdm:.1f} dB\")    # typically 8-12 dB\nprint(f\"DFT-s-OFDM PAPR: {papr_scofdm:.1f} dB\") # typically 2-5 dB (much lower!)\nprint(f\"PAPR reduction: {papr_ofdm - papr_scofdm:.1f} dB -> more power efficient\")</code></pre>"}, {"id": 34, "level": "intermediate", "q": "What is the gNB split architecture (CU-DU-RU)?", "a": "3GPP defines functional splits for 5G NR gNB: CU (Central Unit): PDCP, RRC, SDAP — centralised, can serve multiple DUs. DU (Distributed Unit): MAC, RLC, upper PHY (FAPI interface) — near edge. RU (Radio Unit): lower PHY (FFT/IFFT, PRACH, CP), RF — at antenna. Interfaces: F1 (CU-DU), open FH (DU-RU, e.g., O-RAN 7.2x split). O-RAN 7.2x split: DU handles FEC, MRC, precoding; RU handles FFT, beamforming weights application, time/frequency synchronisation. Benefits: centralisation enables coordination (CoMP, load balancing), RU is simple/cheap, CU can be cloud-native. CU further split: CU-CP (control plane) and CU-UP (user plane).<br><br><b>🔑 Plain terms:</b> The CU-DU-RU split separates the 5G base station functions across three units: the CU handles higher-layer protocols (PDCP, RRC), the DU handles lower-layer MAC/PHY processing, and the RU handles RF and analog processing. This enables centralised processing and flexible network deployment.<br><b>💡 Example:</b> <pre><code># gNB functional split (3GPP TS 38.401, O-RAN Alliance):\n# CU (Central Unit):\n#   - PDCP, SDAP, RRC\n#   - User plane (CU-UP) and control plane (CU-CP) can be separated\n#   - Hosted in centralised data centre\n# DU (Distributed Unit):\n#   - RLC, MAC, upper PHY (FEC encoding/decoding, scrambling, modulation)\n#   - Hosted closer to cell site (aggregation site or edge DC)\n# RU (Radio Unit):\n#   - Lower PHY (OFDM, FFT/IFFT, CP add/remove, precoding if split 7.2x)\n#   - RF (DAC/ADC, PA, filters)\n#   - Physically at antenna mast\n\n# Fronthaul interface between DU and RU:\n# Split option 7.2x (O-RAN): most popular\n#   DU sends: frequency-domain IQ samples (after layer mapping, before IFFT)\n#   RU does:  IFFT, CP insertion, DAC, upconversion, PA\n\n# Fronthaul data rate requirement (Option 7.2x):\nimport numpy as np\nN_ant       = 64      # 64 antenna ports\nN_RB        = 273     # resource blocks (100 MHz, mu=1)\nsymbols_slot = 14     # OFDM symbols per slot\nslot_dur_ms = 0.5     # 0.5 ms (mu=1)\nIQ_bits     = 16      # 16-bit I + 16-bit Q = 32 bits per sample\noverhead    = 1.25    # protocol overhead factor\n\nsamples_per_slot = N_ant * N_RB * 12 * symbols_slot\nrate_bps = samples_per_slot / (slot_dur_ms*1e-3) * IQ_bits * overhead\nprint(f\"O-RAN FH data rate: {rate_bps/1e9:.1f} Gbps\")   # ~157 Gbps\n# This drives the need for 25G/100G eCPRI fronthaul</code></pre>"}, {"id": 35, "level": "intermediate", "q": "What is PDSCH DMRS and why is it needed?", "a": "DMRS (Demodulation Reference Signal) is a known pilot signal transmitted along with data, used by the receiver for channel estimation. On PDSCH: UE uses DMRS to estimate the channel H(f) per subcarrier, then equalises: ŷ = H^{-1}·y. Without DMRS, coherent detection is impossible in a fading channel. NR PDSCH DMRS: two types: Type 1 (comb-2, interleaved, up to 4 ports) and Type 2 (comb-2, non-interleaved, up to 6 ports). Front-loaded DMRS: always in symbol 2 of slot. Additional DMRS: more pilot symbols for high Doppler. DMRS overhead vs channel estimation quality trade-off. CDM (Code Division Multiplexing): multiple DMRS ports share same REs via orthogonal sequences.<br><br><b>🔑 Plain terms:</b> DMRS (Demodulation Reference Signal) are known pilot symbols embedded within the PDSCH allocation. The UE uses them to estimate the channel impulse response at those frequency-time positions, then interpolates to estimate the channel everywhere else, enabling coherent demodulation of the data symbols.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# DMRS placement (type 1, single symbol, mapping type A):\n# Symbol 2 (or 3) of the slot contains DMRS\n# Every other subcarrier in the DMRS symbol: RE 0, 2, 4, ... (pilots)\n# Remaining subcarriers: RE 1, 3, 5, ... (data interpolated from neighbours)\n\n# DMRS sequence: Gold sequence (length-31 PRBS)\ndef gold_sequence(c_init, length):\n    # Simplified — real 3GPP uses proper M-sequence with polynomial\n    np.random.seed(c_init % (2**31))\n    return 1 - 2*np.random.randint(0, 2, length)   # +/-1\n\nrnti   = 0xC123\ncell_id = 42\nslot   = 5\nc_init = (slot + 1) * (cell_id + 1) + rnti   # seeded per slot per UE\ndmrs   = gold_sequence(c_init, 132)           # 132 pilots for 11 RBs\ndmrs_cplx = (dmrs[::2] + 1j*dmrs[1::2]) / np.sqrt(2)  # complex DMRS\n\n# At receiver: channel estimation\n# H_pilot[k] = Y_pilot[k] / DMRS[k]  (simple LS estimate at pilot positions)\nH_true      = 0.8 + 0.2j + 0.01*(np.random.randn(66) + 1j*np.random.randn(66))\nnoise       = 0.05 * (np.random.randn(66) + 1j*np.random.randn(66))\nY_pilot     = H_true * dmrs_cplx + noise\n\nH_ls        = Y_pilot / dmrs_cplx   # LS channel estimate\nerror       = np.mean(np.abs(H_true - H_ls)**2)\nprint(f\"LS estimation MSE: {10*np.log10(error):.1f} dB\")   # should be ~ -26 dB at SNR=30dB\n\n# DMRS port vs layer: each spatial layer has its own DMRS pattern\n# gNB uses DMRS to estimate per-layer channel for MIMO equalisation</code></pre>"}, {"id": 36, "level": "advanced", "q": "What is the 5G NR channel model and how is it used in link-level simulation?", "a": "3GPP TR 38.901 defines 5G channel models. CDL (Clustered Delay Line): fixed delays/angles for conformance testing. TDL (Tapped Delay Line): simplified for baseband simulation. Key parameters: delay spread (DS), angular spread (AS), Rician K-factor, Doppler. CDL-A/B/C: NLOS profiles with different delay/angle spreads. CDL-D/E: LOS (Rician). Procedure: generate time-varying channel matrix H(t, τ) from clusters of paths, each with delay, Doppler, angle. In simulation: convolve Tx signal with H, add AWGN. Used for: MCS design, PDSCH/PUSCH BLER curves, MIMO algorithm testing, HARQ combining gain. Fast fading model: Jake's (Clarke's) spectrum for flat Doppler.<br><br><b>🔑 Plain terms:</b> The 5G NR channel model (3GPP TR 38.901) describes how radio signals propagate in different environments — the statistical distributions of path loss, shadowing, multipath, Doppler, and angular spread. It's used in simulators to test 5G systems without deploying real hardware.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# TR 38.901 Urban Macrocell (UMa) path loss model:\ndef uma_pathloss_los(d_2d_m, h_BS=25, h_UT=1.5, fc_GHz=3.5):\n    \"\"\"\n    UMa LOS path loss (dB) for 2D distance d_2d_m.\n    3GPP TR 38.901 Table 7.4.1-1.\n    \"\"\"\n    h_E   = 1.0         # effective environment height (m)\n    h_BS_prime = h_BS - h_E\n    h_UT_prime = h_UT - h_E\n    d_3D  = np.sqrt(d_2d_m**2 + (h_BS - h_UT)**2)\n    d_BP  = 4 * h_BS_prime * h_UT_prime * fc_GHz*1e9 / 3e8   # breakpoint distance\n\n    if d_2d_m < d_BP:\n        PL = 28.0 + 22*np.log10(d_3D) + 20*np.log10(fc_GHz)\n    else:\n        PL = 28.0 + 40*np.log10(d_3D) + 20*np.log10(fc_GHz) - 9*np.log10(d_BP**2 + (h_BS-h_UT)**2)\n    return PL\n\n# Compute path loss at various distances:\nfor d in [50, 100, 200, 500, 1000]:\n    PL = uma_pathloss_los(d)\n    print(f\"d={d:5d}m: PL = {PL:.1f} dB\")\n\n# Add shadowing (log-normal fading):\nsigma_SF = 4.0   # standard deviation (dB) for UMa LOS\nshadowing = np.random.normal(0, sigma_SF)   # random shadowing instance\n\n# Small-scale fading: cluster-based model\n# Delay spread: UMa DS = 10^(-6.955 + 0.963*log10(fc)) seconds\nDS = 10**(-6.955 + 0.963*np.log10(3.5))\nprint(f\"Delay spread (UMa): {DS*1e9:.0f} ns (-> CP must be > this)\")  # ≈ 363 ns</code></pre>"}, {"id": 37, "level": "advanced", "q": "What is massive MIMO precoding — MRT, ZF, MMSE?", "a": "MRT (Maximum Ratio Transmission): w = h* (conjugate of channel). Maximises received SNR at target UE. Simple, full array gain, but causes interference to other UEs. ZF (Zero Forcing): W = H^H(HH^H)^{-1} (pseudo-inverse). Nulls interference to all UEs — inter-user interference = 0. Performance limited at low SNR (noise amplification). Requires full CSI. MMSE/RZF (Regularised ZF): W = H^H(HH^H + (1/SNR)·I)^{-1}. Balances noise amplification and interference. Optimal linear precoder. FD-MIMO codebook (Type I/II): limited feedback — UE selects from predefined precoders. SRS reciprocity: gNB estimates H from UL SRS, computes W directly. Block diagonalisation: multi-user extension of ZF.<br><br><b>🔑 Plain terms:</b> MRT (Maximum Ratio Transmission) points the beam at the target UE — maximum gain. ZF (Zero-Forcing) also nulls interference to other UEs — zero inter-user interference. MMSE balances both — takes noise into account to give the best actual throughput in multi-user MIMO.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Multi-user MIMO precoding comparison: MRT vs ZF vs MMSE\nnp.random.seed(42)\nN_ant = 64    # base station antennas\nK     = 4     # simultaneous users (K << N_ant for massive MIMO to work)\nSNR   = 20    # dB\n\nsigma2 = 10**(-SNR/10)   # noise variance\n\n# Random channel (each row = one user's channel from N_ant antennas):\nH = (np.random.randn(K, N_ant) + 1j*np.random.randn(K, N_ant)) / np.sqrt(2)\n# H shape: K x N_ant\n\n# MRT: W = H^H (conjugate transpose) — maximises received signal\nW_mrt = H.conj().T  # N_ant x K\n\n# ZF: W = H^H * (H * H^H)^{-1} — inverts channel, zeros inter-user interference\nW_zf = H.conj().T @ np.linalg.inv(H @ H.conj().T)  # N_ant x K\n\n# MMSE: W = H^H * (H * H^H + sigma2*I)^{-1} — optimal (regularised ZF)\nW_mmse = H.conj().T @ np.linalg.inv(H @ H.conj().T + sigma2 * np.eye(K))\n\n# Effective channel after precoding:\nfor name, W in [(\"MRT \", W_mrt), (\"ZF  \", W_zf), (\"MMSE\", W_mmse)]:\n    # Normalise precoder power:\n    W_norm = W / np.sqrt(np.trace(W @ W.conj().T) / K)\n    G = H @ W_norm   # K x K effective channel\n    # Compute per-user SINR:\n    sinrs = []\n    for k in range(K):\n        signal = np.abs(G[k,k])**2\n        interfence = np.sum(np.abs(G[k,:])**2) - signal + sigma2\n        sinrs.append(signal / interfence)\n    avg_rate = np.mean([np.log2(1+s) for s in sinrs])\n    print(f\"{name}: avg rate = {avg_rate:.2f} bits/s/Hz, min SINR = {10*np.log10(min(sinrs)):.1f} dB\")</code></pre>"}, {"id": 38, "level": "advanced", "q": "What is the 5G NR positioning procedure?", "a": "5G NR positioning (TS 38.305, TS 38.215): UE position estimated for regulatory (E911), commercial, IoT use. Methods: DL-TDOA (Downlink Time Difference Of Arrival): UE measures RSTD (Reference Signal Time Difference) between multiple TRPs (Transmission Reception Points) using PRS (Positioning Reference Signal). Multi-lateration. UL-TDOA: gNB/TRP measures TDOA of UE SRS. DL-AoD (Angle of Departure): gNB-side angle estimate. UL-AoA (Angle of Arrival): TRP measures UE signal angle. NR-RAT-independent: GNSS, sensors. Rel-16 target: sub-3m 90th percentile (outdoor), sub-1m (indoor). PRS: dedicated positioning signal, configurable muting patterns to avoid interference.<br><br><b>🔑 Plain terms:</b> 5G NR positioning uses multi-cell timing and angle measurements to locate a UE without GPS. RSTD (Reference Signal Time Difference) measures arrival time differences between cells. AoA/AoD (Angle of Arrival/Departure) uses beamforming to determine direction. Combined, accuracy better than 1 metre is possible.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# 5G NR positioning methods:\n# DL-TDOA: UE measures RSTD (time difference of PRS from multiple cells)\n# UL-TDOA: gNBs measure RTOA (time of arrival of SRS from UE)\n# Multi-RTT: both gNB and UE measure round-trip times\n# DL-AoD:  gNB estimates angle of departure from UE's reference signal measurements\n# UL-AoA:  gNB estimates angle of arrival from UE's uplink reference signals\n\n# PRS (Positioning Reference Signal): dedicated RS for positioning\n# Sequence: ZC-based, multiple comb offsets, multiple symbols per slot\n\n# RSTD-based 2D positioning (hyperbolic):\n# UE measures RSTD between reference cell and N neighbour cells\n# Each RSTD defines a hyperbola (locus of points with equal time diff)\n# Intersection of 2+ hyperbolas = UE position\n\n# Example: 3-cell setup\ngNB_positions = np.array([[0,0], [500,0], [250,433]])   # meters\ngNB_timings   = np.array([0, 0, 0])   # synchronised cells\n\n# True UE position:\nUE_pos = np.array([200, 150])\n\n# Compute true TOA from each cell:\nc = 3e8   # speed of light\nTOA = [np.linalg.norm(UE_pos - gNB) / c + gNB_timings[i]\n       for i, gNB in enumerate(gNB_positions)]\n\n# RSTD: difference from reference cell (index 0):\nRSTD = [(TOA[i] - TOA[0]) * 1e9 for i in range(1, len(TOA))]   # in nanoseconds\nprint(f\"RSTD from cells: {[f'{r:.1f} ns' for r in RSTD]}\")\n\n# Position accuracy requirement:\n# 3GPP Release 16: outdoor 3m (horizontal), indoor 3m\n# Release 17: sub-meter for industrial use cases (URLLC positioning)</code></pre>"}, {"id": 39, "level": "advanced", "q": "What is the 5G NR scheduler and what algorithms are used?", "a": "The MAC scheduler in the gNB decides per slot: which UEs get resources (RBs), how many RBs, which MCS, TDD DL/UL allocation. Goals: maximise throughput, ensure fairness, meet QoS (delay, packet loss rate). Common algorithms: Proportional Fair (PF): schedule UE that maximises R_k(t)/R̄_k(t), where R_k(t) = instantaneous rate, R̄_k(t) = average rate. Balances throughput and fairness. Round-robin: equal time, fair but ignores channel quality. Maximum CQI: always schedule best channel — max throughput, starves weak UEs. MU-MIMO scheduling: select UEs with near-orthogonal channels. QoS-aware: prioritise delay-sensitive traffic (URLLC). Buffer status reports (BSR) from UE inform scheduler of UL data.<br><br><b>🔑 Plain terms:</b> The 5G NR scheduler decides each slot: which UEs get resources, how many RBs, what MCS, and with how many MIMO layers. The goal: maximise cell throughput while being fair to all users. Proportional Fair is the dominant algorithm — balance between throughput and fairness.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Proportional Fair (PF) scheduler:\n# Priority metric: r_k(t) / R_k(t)\n# r_k(t)  = instantaneous achievable rate (based on current CQI)\n# R_k(t)  = average throughput (exponential moving average over last T_c TTIs)\n# Select UE with highest priority each TTI\n\nK      = 8     # 8 UEs\nT_c    = 20    # averaging window (slots)\nN_slots = 100  # simulation duration\n\n# Random CQI per UE per slot (simplified):\nnp.random.seed(42)\nCQI    = np.random.randint(5, 15, (N_slots, K))   # CQI 5-14 per slot per UE\n\n# Rate from CQI (rough mapping):\ndef cqi_to_rate(cqi):\n    rates = [0.15, 0.24, 0.38, 0.60, 0.88, 1.18, 1.48, 1.91, 2.41, 2.73]\n    return rates[min(cqi-5, 9)]   # bits per RE (approx)\n\navg_rate = np.ones(K) * 0.5   # initialise average rate\nscheduled_count = np.zeros(K, dtype=int)\n\nfor slot in range(N_slots):\n    inst_rates = np.array([cqi_to_rate(CQI[slot, k]) for k in range(K)])\n    pf_metric  = inst_rates / avg_rate   # proportional fair metric\n\n    winner = np.argmax(pf_metric)        # schedule highest PF metric UE\n    scheduled_count[winner] += 1\n\n    # Update exponential moving average:\n    for k in range(K):\n        if k == winner:\n            avg_rate[k] = (1-1/T_c)*avg_rate[k] + (1/T_c)*inst_rates[k]\n        else:\n            avg_rate[k] = (1-1/T_c)*avg_rate[k]   # not scheduled\n\nprint(\"UE scheduling shares:\", scheduled_count)   # should be roughly equal\nprint(\"UE avg throughput:\", np.round(avg_rate, 2))</code></pre>"}, {"id": 40, "level": "advanced", "q": "What is 5G NR URLLC and how is it achieved?", "a": "URLLC (Ultra-Reliable Low Latency Communication): target ≤1ms latency, 99.999% reliability. Mechanisms: (1) Mini-slot scheduling: 2/4/7 symbol PDSCH/PUSCH instead of full slot — reduces scheduling granularity. (2) Configured grants: pre-allocated UL resources (no dynamic grant delay). (3) Downlink preemption: URLLC can preempt ongoing eMBB transmission. (4) Short HARQ feedback: PUCCH Format 0 (1-2 symbols). (5) Repetition: multiple transmissions before waiting for HARQ feedback. (6) Higher coding rate + stronger FEC (polar codes). (7) Sub-slot PUCCH. Applications: industrial automation, remote surgery, autonomous driving. Tension with eMBB: URLLC preemption reduces eMBB throughput.<br><br><b>🔑 Plain terms:</b> URLLC (Ultra-Reliable Low-Latency Communication) targets 1 ms latency and 99.999% reliability for industrial automation, autonomous vehicles, and remote surgery. Every design choice is made to cut delay: mini-slots, front-loaded DMRS, skipping HARQ retransmission via powerful coding.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# URLLC latency budget breakdown (mu=3, 120 kHz SCS):\n# Slot duration = 0.125 ms\nlatency_budget = {\n    'UE processing (encode/modulate)': 0.125,   # ms\n    'Transmission (1 slot)':           0.125,\n    'Propagation (1 km cell)':         0.003,\n    'gNB processing (decode)':         0.125,\n    'Total one-way':                   0.378,    # well under 1 ms\n}\nfor item, ms in latency_budget.items():\n    print(f\"  {item}: {ms:.3f} ms\")\n\n# URLLC reliability: 1e-5 BLER (0.001% packet loss)\n# vs eMBB: 10% BLER (lots of HARQ retransmission accepted)\n\n# How URLLC achieves low latency:\ntechniques = [\n    \"Mini-slots: schedule in 2/4/7 symbols instead of full 14-symbol slot\",\n    \"Front-loaded DMRS: pilot in first symbol -> fast channel estimate\",\n    \"HARQ disabled: no waiting for ACK/NACK; use strong code for direct success\",\n    \"Low code rate: R=1/5 instead of R=4/5 -> 10 dB more protection\",\n    \"Repetition: transmit same TB on multiple slots simultaneously\",\n    \"Pre-emptive scheduling: URLLC can interrupt ongoing eMBB transmission\",\n]\nfor i, t in enumerate(techniques, 1):\n    print(f\"{i}. {t}\")\n\n# URLLC MCS selection:\n# Normal eMBB: target 10% BLER -> CQI 7-10 (64-QAM)\n# URLLC:       target 0.001% BLER -> much lower MCS or higher coding gain</code></pre>"}, {"id": 41, "level": "advanced", "q": "What is the 5G NR physical layer processing for PDCCH?", "a": "PDCCH chain: (1) CRC (24-bit, scrambled with RNTI). (2) Polar encoding: CRC-aided polar code (CA-polar). (3) Rate matching: puncturing/shortening to fill aggregation level (1/2/4/8/16 CCEs, each CCE = 6 REGs = 6×12 REs). (4) Scrambling (cell-ID + slot/symbol). (5) QPSK modulation. (6) Layer mapping (single layer). (7) Antenna port mapping (precoding with beam). (8) RE mapping within CORESET. CORESET: rectangular region in time-frequency defined by bitmap of 6-RB groups × 1-3 symbols, in each BWP. UE blindly decodes: for each candidate in search space, attempt polar decoding, check CRC pass. AL16 = 96 REs = 192 QPSK bits, after rate matching from polar encoder.<br><br><b>🔑 Plain terms:</b> PDCCH processing converts a Downlink Control Information (DCI) bitstream into transmitted OFDM symbols. The processing is: CRC attach -> Polar encode -> rate match -> scramble -> QPSK modulate -> map to CORESET REGs.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# PDCCH processing chain (3GPP TS 38.211/212):\n\n# Step 1: DCI payload + CRC\nDCI_bits = 40     # DCI format 1_1, ~40 bits (varies by configuration)\nCRC_bits  = 24    # 24-bit CRC (scrambled with RNTI at receiver)\nK_total   = DCI_bits + CRC_bits    # 64 bits input to Polar encoder\n\n# Step 2: Polar encoding\n# Code size N = 2^n where N >= (E/2) and N >= 32\nAL        = 8     # aggregation level (8 CCEs)\nN_RE_CCE  = 6 * 12   # 6 REGs per CCE * 12 REs per REG = 72 REs/CCE\n# But only 3/4 are data (DMRS on 1/4):\nN_RE      = AL * N_RE_CCE * 3 // 4    # ~432 REs\nE         = N_RE * 2    # QPSK: 2 bits per RE = 864 code bits (rate matched output)\n\nN_polar   = 2**int(np.ceil(np.log2(max(E//2, 32))))  # next power of 2 >= E/2\nN_polar   = min(N_polar, 512)   # cap at 512 for PDCCH\nprint(f\"DCI={DCI_bits}b + CRC={CRC_bits}b -> Polar({K_total},{N_polar})\")\n\n# Step 3: Rate matching (puncture/repeat/interleave to length E=864)\n# Step 4: Scrambling (Gold sequence seeded by cell ID and slot)\n# Step 5: QPSK modulation -> E/2 = 432 complex symbols\n\n# Step 6: REG mapping\n# REG (Resource Element Group) = 12 subcarriers x 1 OFDM symbol\n# CCE = 6 REGs = 72 REs\n# Aggregation level AL: UE monitors AL*6 REGs\nN_symbols = AL * 6 * 12 * 2   # total bits for QPSK\nprint(f\"PDCCH occupies AL={AL} CCEs = {AL*6} REGs = {AL*6*12} REs, {N_symbols//2} QPSK symbols\")\nprint(f\"Rate matched output: {E} bits, code rate: {K_total/E:.3f}\")</code></pre>"}, {"id": 42, "level": "advanced", "q": "What is PAPR in OFDM and how is it reduced?", "a": "PAPR (Peak-to-Average Power Ratio) = max instantaneous power / average power. OFDM: sum of N sinusoids can constructively align → very high peaks. High PAPR requires linear PA (power amplifier) with large back-off → reduced efficiency. PAPR for N subcarriers: up to 10log10(N) dB (e.g., 40 dB for 10,000 subcarriers). Reduction techniques: Clipping and filtering (CF): clip peaks above threshold, filter to remove OOB — causes EVM. Selected Mapping (SLM): try multiple phase sequences, transmit lowest PAPR — overhead. Partial Transmit Sequence (PTS): similar. Tone reservation: reserve subcarriers for PAPR reduction signal. DFT-s-OFDM (5G UL): eliminates OFDM PAPR problem. CFR (Crest Factor Reduction): used in gNB to protect PA.<br><br><b>🔑 Plain terms:</b> PAPR (Peak-to-Average Power Ratio) is the ratio of the peak power to average power of an OFDM signal. High PAPR forces the power amplifier to back off from its maximum power, reducing efficiency. Reducing PAPR lets the PA work closer to saturation, saving energy.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# OFDM PAPR demonstration:\nN_fft  = 1024    # FFT size\nN_sc   = 600     # active subcarriers\nN_iter = 1000    # Monte Carlo iterations\n\npaprs = []\nfor _ in range(N_iter):\n    # Random QPSK symbols:\n    symbols = np.exp(1j * (np.pi/4 + np.random.randint(0,4,N_sc)*np.pi/2))\n\n    # Map to frequency grid:\n    freq = np.zeros(N_fft, dtype=complex)\n    freq[1:N_sc//2+1]  = symbols[:N_sc//2]\n    freq[N_fft-N_sc//2:] = symbols[N_sc//2:]\n\n    # IFFT -> time domain:\n    x = np.fft.ifft(freq)\n    papr = np.max(np.abs(x)**2) / np.mean(np.abs(x)**2)\n    paprs.append(10*np.log10(papr))\n\nprint(f\"OFDM PAPR statistics (N_sc={N_sc}):\")\nprint(f\"  Mean:   {np.mean(paprs):.1f} dB\")\nprint(f\"  99%ile: {np.percentile(paprs, 99):.1f} dB\")\nprint(f\"  Max:    {np.max(paprs):.1f} dB\")\n\n# PAPR reduction techniques:\ntechniques = {\n    'Clipping and filtering':   '2-4 dB reduction, introduces EVM distortion',\n    'SLM (Selected Mapping)':   '3-4 dB reduction, needs side information',\n    'PTS (Partial Transmit Sum)':'3-5 dB reduction, more complex',\n    'Tone reservation':         '2-3 dB reduction, wastes a few subcarriers',\n    'DFT-s-OFDM (UL only)':    '5-7 dB reduction, single-carrier waveform',\n}\nfor tech, desc in techniques.items():\n    print(f\"  {tech}: {desc}\")</code></pre>"}, {"id": 43, "level": "advanced", "q": "What is DPD (Digital Pre-Distortion) and why is it needed in 5G?", "a": "Power amplifiers have nonlinear transfer function at high power — cause harmonic/intermodulation distortion, spectral regrowth (ACLR violation). DPD pre-distorts the signal before the PA so PA output is linear. Principle: apply inverse of PA nonlinearity before the PA. PA(DPD(x)) ≈ linear. Memory polynomial DPD: <code>y[n] = Σ_{k,m} a_{km}·x[n-m]·|x[n-m]|^{k-1}</code>. Identification: adaptive — use observation receiver to compare PA output with ideal, update coefficients (least squares, RLS). Critical in 5G: wider bandwidth → more memory effects. ACLR requirement: ≤-45 dBc. Without DPD: must back off 6-10 dB (large efficiency loss). With DPD: operate 1-3 dB from saturation. 5G mmWave: DPD at 400 MHz bandwidth requires very fast sampling (~2 GHz observation bandwidth).<br><br><b>🔑 Plain terms:</b> DPD (Digital Pre-Distortion) is a software trick to make a non-linear power amplifier behave as if it were linear. It pre-distorts the signal in the opposite way the PA will distort it, so the output is clean. Without DPD, a 5G 256-QAM signal would be corrupted by PA non-linearity.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Power Amplifier non-linearity (Rapp model):\ndef rapp_pa(x, p=2, A=1.0):\n    \"\"\"\n    Rapp model: smooth AM/AM non-linearity\n    p=2: typical for GaAs PA\n    A: saturation amplitude\n    \"\"\"\n    return x / (1 + (np.abs(x)/A)**(2*p))**(1/(2*p))\n\n# Generate OFDM signal (simplified):\nnp.random.seed(42)\nN = 512\nsymbols = np.exp(1j * np.random.uniform(0, 2*np.pi, N//4))   # random phase\nx = np.fft.ifft(np.pad(symbols, (0, 3*N//4)), N)             # OFDM signal\n\n# Normalise to IBO (Input Back-Off) = 6 dB:\nIBO_dB = 6.0\nx_norm = x / np.sqrt(np.mean(np.abs(x)**2)) * 10**(-IBO_dB/20)\n\n# PA output without DPD:\ny_no_dpd = rapp_pa(x_norm, p=2)\n\n# EVM without DPD:\nEVM_no_dpd = np.sqrt(np.mean(np.abs(y_no_dpd - x_norm)**2) / np.mean(np.abs(x_norm)**2)) * 100\nprint(f\"EVM without DPD: {EVM_no_dpd:.1f}% rms\")   # typically 5-15%\n\n# Simple DPD: memoryless polynomial inverse (simplified):\n# Pre-distort: x_dpd[n] = sum_k a_k * x[n] * |x[n]|^(2k)\n# For ideal DPD: y = PA(DPD(x)) ≈ linear(x)\n# Real DPD: iterative identification (indirect learning architecture)\nprint(\"DPD target: EVM < 2% for 256-QAM compliance (3GPP TS 38.104)\")\nprint(\"LUT-based DPD or memory polynomial model typically used in gNB baseband\")\n\n# 3GPP EVM limits:\nevm_limits = {'QPSK': 17.5, '16-QAM': 12.5, '64-QAM': 8, '256-QAM': 3.5}\nfor mod, evm in evm_limits.items():\n    print(f\"  {mod}: EVM < {evm}%\")</code></pre>"}, {"id": 44, "level": "advanced", "q": "What is the 5G NR L1/L2 interface and FAPI?", "a": "FAPI (Femtocell API) or nFAPI is a standardised interface between the MAC (L2) and PHY (L1) in the gNB DU. FAPI messages per slot: DL: MAC sends DL_TTI_REQUEST containing PDCCH PDU, PDSCH PDU, CSI-RS PDU, SSB PDU — includes all parameters per allocation. UL: MAC sends UL_TTI_REQUEST (PUSCH/PUCCH/SRS/PRACH allocation), PHY returns RX_DATA_INDICATION (decoded TB), CRC_INDICATION (HARQ result), UCI_INDICATION (PUCCH/PUSCH UCI), RACH_INDICATION. Timing: FAPI messages for slot n sent at slot n-X (X = pipeline depth, typically 2-3 slots). Violating timing causes late slot. SCF (Small Cell Forum) defines nFAPI for split gNB. Critical for real-time operation.<br><br><b>🔑 Plain terms:</b> FAPI (Functional API) is the software interface between the 5G NR L2 (MAC) and L1 (PHY) in a gNB implementation. It standardises the messages (DL config, UL config, indication) so that different MAC and PHY implementations can be interchanged.<br><b>💡 Example:</b> <pre><code># FAPI (5G FAPI — Small Cell Forum SCF 222.10.04):\n# Defines messages between L2 and L1 on a per-slot basis\n\n# L2->L1 messages (downlink):\ndl_messages = {\n    'DL_TTI_REQUEST':   'Per-slot: list of DL PDUs to transmit (PDCCH, PDSCH, SSB, CSI-RS)',\n    'TX_DATA_REQUEST':  'Per-slot: actual data bytes for each PDSCH PDU',\n    'UL_TTI_REQUEST':   'Per-slot: expected UL channels (PUSCH, PUCCH, PRACH, SRS)',\n    'UL_DCI_REQUEST':   'Per-slot: DCI for UL scheduling on PDCCH',\n}\n\n# L1->L2 messages (uplink):\nul_messages = {\n    'SLOT_INDICATION':  'Every slot: L1 tells L2 the current slot number (triggers scheduling)',\n    'RX_DATA_INDICATION':'Per-slot: decoded PUSCH data bytes',\n    'CRC_INDICATION':   'Per-slot: HARQ CRC results (pass/fail) per PUSCH TB',\n    'UCI_INDICATION':   'Per-slot: decoded HARQ ACK, CQI, SR from PUCCH/PUSCH',\n    'SRS_INDICATION':   'Per-slot: SRS measurements (channel coefficients) per UE',\n    'RACH_INDICATION':  'When PRACH detected: preamble index and timing',\n}\n\nprint(\"L2 -> L1 (downlink pipeline, per slot):\")\nfor msg, desc in dl_messages.items():\n    print(f\"  {msg}: {desc}\")\nprint(\"L1 -> L2 (uplink pipeline, per slot):\")\nfor msg, desc in ul_messages.items():\n    print(f\"  {msg}: {desc}\")\n\n# Timing: SLOT_INDICATION arrives N_dl slots in advance\n# L2 must complete scheduling and send DL_TTI_REQUEST within the deadline\n# Typical budget: 500-1000 us from SLOT_INDICATION to DL_TTI_REQUEST</code></pre>"}, {"id": 45, "level": "advanced", "q": "What is the O-RAN architecture and how does it relate to 5G NR?", "a": "O-RAN (Open Radio Access Network) disaggregates the gNB into open, interoperable components. O-RAN Alliance defines: O-CU (Open CU): CU-CP + CU-UP. O-DU (Open DU): MAC, RLC, upper PHY. O-RU (Open RU): lower PHY + RF. Open interfaces: Open FH (7.2x split between O-DU and O-RU — eCPRI transport), F1 (CU-DU), E2 (near-RT RIC), A1 (non-RT RIC to near-RT RIC), O1 (management). RIC (RAN Intelligent Controller): non-RT RIC (>1s) for policy, ML training; near-RT RIC (10ms-1s) for xApps — real-time optimisation (beamforming, handover, scheduling hints). O-Cloud: cloud-native deployment of O-CU, O-DU. Benefits: multi-vendor, software-defined, AI/ML-driven optimisation.<br><br><b>🔑 Plain terms:</b> O-RAN (Open RAN) disaggregates the traditional monolithic base station into open interfaces between standardised components — allowing operators to mix vendors and use cloud-native, virtualised network functions.<br><b>💡 Example:</b> <pre><code># O-RAN Alliance architecture:\n# O-DU: O-RAN Distributed Unit (equivalent to gNB DU)\n# O-CU: O-RAN Central Unit (CP + UP split)\n# O-RU: O-RAN Radio Unit (RF front-end)\n# O-Cloud: NFV infrastructure (COTS servers + accelerators)\n# SMO: Service Management and Orchestration\n# Near-RT RIC: Near-Real-Time RAN Intelligent Controller (10ms - 1s)\n# Non-RT RIC: Non-Real-Time RIC (>1s, AI/ML policy)\n\n# Key O-RAN interfaces:\ninterfaces = {\n    'Open Fronthaul (7.2x)': 'O-DU <-> O-RU: eCPRI/Ethernet, IQ samples',\n    'F1':         'O-CU <-> O-DU: 3GPP standard, GTP/UDP',\n    'E1':         'O-CU-CP <-> O-CU-UP: 3GPP standard',\n    'Xn':         'Inter-gNB: handover, interference coordination',\n    'E2':         'Near-RT RIC <-> O-DU/O-CU: xApps southbound API',\n    'A1':         'Non-RT RIC -> Near-RT RIC: ML models, policies',\n    'O1':         'SMO <-> all nodes: NETCONF/YANG management',\n}\nfor iface, desc in interfaces.items():\n    print(f\"  {iface}: {desc}\")\n\n# xApps (Near-RT RIC applications):\nxapps = [\n    \"Traffic Steering: move UEs between cells for load balancing\",\n    \"QoE Optimisation: predict and prevent video stall events\",\n    \"Interference Management: coordinate neighbouring cell parameters\",\n    \"Slice SLA Assurance: enforce per-slice throughput/latency targets\",\n]\nprint(\"Example xApps:\")\nfor x in xapps:\n    print(f\"  - {x}\")</code></pre>"}, {"id": 46, "level": "advanced", "q": "What is the uplink link budget for a 5G NR gNB receiver?", "a": "UL link budget: UE EIRP = P_UE + G_UE - losses. Path loss (3GPP UMa model): PL = 28 + 22log10(d) + 20log10(fc) [dB]. gNB receiver sensitivity: S = kTB + NF + SNR_min = -174 + 10log10(BW_Hz) + NF + SINR_min. For PUSCH with 15 kHz SCS, 1 RB (180 kHz): S ≈ -174 + 52.5 + 3 (NF) + 5 (SINR for QPSK 1/2) = -113.5 dBm. Diversity/array gain: mMIMO 64 antennas → ~18 dB. Maximum coupling loss (MCL): UE EIRP - gNB sensitivity + array gain. MCL = 23 (UE power) - 0 (UE antenna gain) - (-113.5) + 18 = 154.5 dB. Sufficient for macro coverage. Design margin considerations: shadow fading (8 dB), body loss (3 dB), interference margin (3 dB).<br><br><b>🔑 Plain terms:</b> The uplink link budget calculates what SNR the gNB receiver achieves for a UE at a given distance. It adds up all the gains and losses from UE transmitter to gNB baseband. This determines maximum cell range for uplink.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# Uplink link budget (3GPP TR 38.901 parameters):\n# UE transmit side:\nP_UE_max_dBm   = 23      # UE max power (Class 3 = 200 mW)\nG_UE_dBi       = 0       # UE antenna gain (omni)\nbody_loss_dB   = 3       # body absorption loss\n\n# Path (3.5 GHz, 500m distance):\nd_m = 500\nfc_GHz = 3.5\n# UMa NLOS path loss (simplified):\nPL_dB = 28 + 22*np.log10(np.sqrt(d_m**2 + (25-1.5)**2)) + 20*np.log10(fc_GHz) + 5\nshadow_dB = 7.82    # shadow fading margin (90% coverage -> 1.28*sigma, sigma=6.1 dB)\n\n# gNB receive side:\nG_gNB_dBi = 17      # 64-element massive MIMO array gain\nNF_gNB_dB  = 5      # gNB noise figure\nN_RB       = 25     # uplink allocation\nSCS_kHz    = 30     # subcarrier spacing\nBW_Hz      = N_RB * 12 * SCS_kHz * 1e3   # 9 MHz\n\n# Received power:\nP_rx_dBm = P_UE_max_dBm + G_UE_dBi - body_loss_dB - PL_dB - shadow_dB + G_gNB_dBi\n\n# Thermal noise:\nkT_dBm   = -174                                    # dBm/Hz at 290K\nP_noise  = kT_dBm + 10*np.log10(BW_Hz) + NF_gNB_dB\n\n# SNR at gNB:\nSNR_dB = P_rx_dBm - P_noise\nprint(f\"Path loss:       {PL_dB:.1f} dB\")\nprint(f\"Received power:  {P_rx_dBm:.1f} dBm\")\nprint(f\"Noise power:     {P_noise:.1f} dBm\")\nprint(f\"UL SNR at gNB:   {SNR_dB:.1f} dB\")\nprint(f\"Achievable MCS:  {'64-QAM' if SNR_dB > 16 else '16-QAM' if SNR_dB > 10 else 'QPSK'}\")</code></pre>"}, {"id": 47, "level": "advanced", "q": "What is 5G NR PDSCH rate matching around reference signals?", "a": "Rate matching ensures PDSCH REs avoid collision with reserved resources. Resources avoided: DMRS REs (channel estimation pilots — typically 2-4 OFDM symbols worth in first half of slot), PTRS (Phase Tracking Reference Signal — for phase noise compensation at mmWave, sparse in frequency), CSI-RS (configured reference signals), SS/PBCH block (if PDSCH overlaps in time), CORESET (control region). Implementation: rate match pattern bitmap signals to UE which REs are reserved. UE decoder skips these REs when extracting PDSCH LLRs. gNB generates same bitmap and ensures no data mapped there. Correct rate match pattern critical — mismatch causes BLER. PDSCH can span full slot minus DMRS symbols.<br><br><b>🔑 Plain terms:</b> Rate matching shapes the LDPC codeword to exactly fill the available PDSCH resource elements, skipping over positions occupied by DMRS, CSI-RS, and other reference signals. It uses circular buffer + puncturing/repetition so no codeword bits are wasted.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# PDSCH rate matching around reference signals (3GPP TS 38.212):\n\n# Available PDSCH resources:\nN_RB   = 25    # allocated resource blocks\nN_sym  = 12    # PDSCH symbols in slot (slots 2-13, DMRS in sym 2)\nN_RE_total = N_RB * 12 * N_sym   # total REs\n\n# DMRS REs (type 1, single symbol, slot symbol 2):\n# Every other subcarrier in the DMRS symbol -> N_RB * 6 DMRS REs\nN_DMRS  = N_RB * 6    # per DMRS symbol\nN_CSI_RS = 0          # no CSI-RS in this slot\n\n# Overhead: reserved for PDCCH on coreset:\nN_PDCCH = 0   # assuming PDCCH not in PDSCH allocation\n\nN_RE_PDSCH = N_RE_total - N_DMRS - N_CSI_RS - N_PDCCH\nprint(f\"Total REs: {N_RE_total}\")\nprint(f\"DMRS REs:  {N_DMRS}\")\nprint(f\"Data REs:  {N_RE_PDSCH}\")\n\n# Rate matching output size E (bits):\nmod_order  = 8    # 256-QAM: 8 bits/RE\nN_layers   = 2    # 2 spatial layers\nE = N_RE_PDSCH * mod_order * N_layers   # total bits to fill\nprint(f\"Rate matched output: E = {E} bits\")\n\n# The LDPC encoded bits (codeword) are placed in a circular buffer:\n# If TB is small -> some codeword bits repeat (repetition coding)\n# If TB is large -> only a portion of codeword bits are transmitted (puncturing)\nTB_bits = 2000   # transport block size (small example)\ncoded_bits = TB_bits * 2   # code rate ~0.5 -> 2x expansion\nprint(f\"LDPC codeword length: {coded_bits} bits, E = {E} bits\")\nif coded_bits < E:\n    print(f\"Repetition: {E//coded_bits}x repeat + {E%coded_bits} extra bits\")\nelif coded_bits > E:\n    print(f\"Puncturing: transmit only {E}/{coded_bits} coded bits ({E/coded_bits*100:.0f}%)\")</code></pre>"}, {"id": 48, "level": "advanced", "q": "What is 5G NR slot aggregation and multi-slot scheduling?", "a": "NR Rel-15 allows scheduling of multiple consecutive slots in one DCI (slot aggregation / PDSCH repetition). DCI field PDSCH-to-HARQ_feedback timing: K1 value — number of slots after last PDSCH slot before UE sends HARQ feedback on PUCCH. This allows: multi-slot PDSCH (same TB transmitted over multiple slots — time diversity), flexible feedback timing for processing. Rel-16 PDSCH repetition Type A: same TB, same DCI, same RBs — K slots. Type B: separate DCI per repetition. Benefits: coverage extension (more time diversity), latency management. UE must buffer and combine all repetitions before decoding. HARQ combining of repetitions = time diversity gain.<br><br><b>🔑 Plain terms:</b> Slot aggregation allows the gNB to allocate multiple consecutive slots to one UE as one scheduling decision. This reduces PDCCH overhead for large transfers and enables very long PDSCH transmissions spanning multiple slots — used for URLLC low-latency large payloads.<br><b>💡 Example:</b> <pre><code># 5G NR multi-slot scheduling (3GPP TS 38.214):\n# Single DCI can schedule PDSCH in up to 8 consecutive slots\n# Reduces: PDCCH decoding overhead (fewer DCIs), scheduling latency\n\n# Multi-slot PDSCH example:\nN_slots_agg  = 4       # aggregate 4 slots\nmu           = 1       # SCS=30 kHz, slot=0.5ms\nslot_dur_ms  = 0.5 / (2**mu * 0.5)   # hmm, let's be clear:\n# mu=1: 2 slots per subframe (1ms), so slot=0.5ms\nslot_dur_ms  = 0.5\ntotal_dur_ms = N_slots_agg * slot_dur_ms\n\nN_RB   = 100   # allocated resource blocks per slot\nN_sym  = 12    # data symbols per slot (12 of 14)\nN_DMRS = N_RB * 6   # DMRS per DMRS symbol (in first slot and every 2nd thereafter)\n\n# Total data REs:\n# DMRS only in slot 0 (front-loaded) + additional in slot 2:\nN_RE_data = (N_slots_agg * N_RB * 12 * N_sym) - (N_slots_agg//2 * N_DMRS)\n\n# Throughput:\nmod_order = 8    # 256-QAM\nN_layers  = 4    # 4 MIMO layers\ncode_rate = 0.92 # max 5G NR code rate\ninfo_bits = int(N_RE_data * mod_order * N_layers * code_rate)\nprint(f\"Multi-slot ({N_slots_agg} slots, {N_RB} RBs, {N_layers} layers, 256-QAM):\")\nprint(f\"  Duration: {total_dur_ms} ms\")\nprint(f\"  Info bits: {info_bits/1e6:.2f} Mbits\")\nprint(f\"  Throughput: {info_bits/total_dur_ms/1e6:.0f} Mbps\")\n\n# HARQ behaviour in multi-slot:\n# One HARQ process covers all aggregated slots\n# Single HARQ ACK/NACK for the whole multi-slot block</code></pre>"}, {"id": 49, "level": "advanced", "q": "How does 5G NR handle inter-cell interference (ICI) coordination?", "a": "ICI is a key capacity limiter in dense deployments. Methods: Static ICIC: coordinate resource usage between cells (no same-RB assignments to edge UEs in adjacent cells). Fractional Frequency Reuse (FFR): cell-centre UEs use all RBs, edge UEs use sub-band with power boost and coordination. Dynamic ICIC (eICIC, CoMP in NR): gNBs exchange info via Xn. Muting (ABS in LTE/NR NX): aggressor cell mutes some subframes. CoMP (Coordinated Multi-Point): joint processing (JT — multiple gNBs transmit same data via CoMP), coordinated scheduling (CS/CB — avoid RB reuse). Rel-15 NR: enhanced inter-cell interference via TCI state and PDCCH-based CORESET. CLI (Cross Link Interference) in TDD: UL from one cell interferes with DL of another — managed by dynamic TDD coordination.<br><br><b>🔑 Plain terms:</b> Inter-cell interference occurs when signals from neighbouring cells overlap in the same time-frequency resource. 5G NR manages it through fractional frequency reuse, coordinated multi-point transmission (CoMP), and interference-aware scheduling.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# ICI coordination techniques:\n# 1. Fractional Frequency Reuse (FFR):\n#    Cell centre UEs: all RBs available (frequency reuse 1)\n#    Cell edge UEs:   subset of RBs (frequency reuse 3 for edge)\n# -> cell-edge interference reduced while cell-centre is unaffected\n\nFFR_config = {\n    'Cell A edge RBs': [0,  1,  2,  3,  4,  5],    # 6 edge RBs (out of 18 total)\n    'Cell B edge RBs': [6,  7,  8,  9,  10, 11],\n    'Cell C edge RBs': [12, 13, 14, 15, 16, 17],\n    'All cells centre': list(range(18)),             # centre UEs use all RBs\n}\n# A cell-edge UE in cell A never interferes with edge UEs in B or C\n\n# 2. Inter-cell interference coordination (ICIC) via X2/Xn:\n# gNB reports which RBs have high interference (HII - High Interference Indicator)\n# Neighbours avoid those RBs for their edge UEs\n\n# 3. CoMP (Coordinated Multi-Point) - advanced:\n# Multiple gNBs transmit to ONE UE simultaneously (Joint Transmission)\n# Requires tight synchronisation (<500 ns) and backhaul sharing of CSI+data\nCoMP_techniques = {\n    'JT (Joint Transmission)':     'Multiple cells TX same data -> signal combining gain',\n    'CS (Coordinated Scheduling)': 'Cells schedule to avoid mutual interference, simpler',\n    'CB (Coordinated Beamforming)': 'Null steering towards interfered UEs in neighbour cells',\n    'DPS (Dynamic Point Selection)': 'Best cell selected dynamically per slot/subband',\n}\nfor tech, desc in CoMP_techniques.items():\n    print(f\"  {tech}: {desc}\")\n\n# SINR after ICI coordination (estimated improvement):\nSINR_no_coord = 5.0    # dB at cell edge (no coordination)\nSINR_ffr      = 8.0    # dB (FFR, orthogonal edge RBs)\nSINR_comp_jt  = 12.0   # dB (CoMP JT, signal combining gain)\nprint(f\"Cell edge SINR: no coord={SINR_no_coord}dB, FFR={SINR_ffr}dB, CoMP JT={SINR_comp_jt}dB\")</code></pre>"}, {"id": 50, "level": "advanced", "q": "What is the 5G NR end-to-end latency budget?", "a": "User-plane one-way latency budget (URLLC target: ≤0.5 ms one-way, eMBB ≤4 ms): UE processing (UL): ~0.5 ms (UE PHY pipeline, TA adjustment). OTA transmission: slot duration (0.5 ms at μ=1, 0.125 ms at μ=3 mini-slot). gNB PHY processing: ~0.5 ms (channel estimation, LDPC decoding). gNB L2 processing: ~0.1 ms. Fronthaul (RU→DU): ≤100 μs (O-RAN spec). F1 (DU→CU): ~1 ms (if distributed). 5GC UPF processing: ~1 ms. Each HARQ round adds 4-8 ms. Mini-slot scheduling (2-symbol): reduces OTA to ~70 μs. Configured grants: eliminate scheduling request latency. PDCP-to-PDCP one-way latency = sum of all processing + OTA times. gNB-to-gNB via 5GC adds core latency.<br><br><b>🔑 Plain terms:</b> The 5G NR end-to-end latency budget adds up every delay from IP packet leaving a server to being received and acknowledged by the UE. Ultra-low latency (1 ms) requires aggressive optimisation of every stage — including skipping HARQ and using mini-slots.<br><b>💡 Example:</b> <pre><code>import numpy as np\n\n# E2E latency budget (3GPP TR 38.913, minimum for URLLC):\n# Using: mu=3 (120 kHz SCS), mini-slot (2 symbols), no HARQ retransmission\n\nslot_dur_ms = 0.125     # mu=3: 8 slots/ms -> 0.125 ms/slot\nmini_slot_symbols = 2   # 2-symbol mini-slot for URLLC\nmini_slot_dur_ms  = slot_dur_ms * mini_slot_symbols / 14\n\n# Downlink latency budget:\ndl_budget = {\n    'Frame alignment (avg)':            slot_dur_ms / 2,   # avg wait for next slot\n    'DL transmission (mini-slot)':      mini_slot_dur_ms,\n    'UE processing (Nproc,1 slots)':    slot_dur_ms * 3,   # 3 slot minimum\n    'UL HARQ feedback (PUCCH)':         mini_slot_dur_ms,\n    'gNB processing (ACK received)':    slot_dur_ms * 1,\n}\n\nprint(\"Downlink one-way + HARQ feedback latency:\")\ntotal = 0\nfor item, ms in dl_budget.items():\n    print(f\"  {item:<40s}: {ms:.3f} ms\")\n    total += ms\nprint(f\"  {'TOTAL':<40s}: {total:.3f} ms\")\n\n# Full round-trip (DL + UE processing + UL feedback):\nprint(f\"Round-trip air-interface latency: ~{total:.2f} ms\")\n\n# Compare to user-plane latency target:\n# URLLC (IIoT): 1 ms user-plane + 1e-5 reliability\n# Enhanced URLLC (R17+): 0.5 ms with repetition\nprint(f\"3GPP URLLC target: 1 ms  {'MET' if total < 1.0 else 'NOT MET'}\")</cod
