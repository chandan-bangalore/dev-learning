de>. Binary: <code>fread(fid, count, \"float32\")</code>. JSON: <code>jsondecode(fileread(\"f.json\"))</code>. Images: <code>imread/imwrite/imfinfo</code>. Audio: <code>audioread/audiowrite</code>.<br><br><b>🔑 Plain terms:</b> Use high-level functions (readtable, readmatrix) for CSV and Excel — they handle headers, mixed types, and missing values automatically. Drop to low-level fopen/fscanf only for custom binary or unusual text formats.<br><b>💡 Example:</b> <pre><code>% CSV — high-level (auto-detects column names and types):\nT = readtable('experiment.csv');\nT_filtered = T(T.accuracy > 0.9, :);\nwritetable(T_filtered, 'good_runs.csv');\n\n% Excel with specific sheet:\nT = readtable('results.xlsx', 'Sheet', 'Run2', 'Range', 'A1:F50');\n\n% Custom text file (space-delimited: timestamp value flag):\nfid  = fopen('sensor_log.txt', 'r');\ndata = fscanf(fid, '%f %f %d', [3, Inf])';  % 3 cols, all rows\nfclose(fid);\ngood_data = data(data(:,3)==0, 1:2);  % rows with flag==0\n\n% JSON:\nraw  = fileread('config.json');\ncfg  = jsondecode(raw);\nfprintf('Host: %s\n', cfg.host);</code></pre>"},{"id":21,"level":"intermediate","q":"How does cellfun and arrayfun work, and when are they appropriate?","a":"<code>cellfun(@func, C)</code> applies func to each cell. Non-uniform output: <code>cellfun(@func, C, \"UniformOutput\", false)</code>. <code>arrayfun(@(x) x^2, v)</code> applies to each element. <code>arrayfun(@func, A, B)</code> two inputs. Performance note: <code>arrayfun</code> is not faster than a loop — it is a loop with overhead. Use only for convenience when vectorization is awkward. For performance, true vectorization (array operations) is always preferred. Use cellfun for cell arrays where vectorization isn't possible.<br><br><b>🔑 Plain terms:</b> cellfun and arrayfun are NOT faster than for loops — they are loops with extra overhead. Use them for code readability and compactness, not performance. For performance, always prefer true vectorised array operations.<br><b>💡 Example:</b> <pre><code>% cellfun — apply a function to each cell element:\nfiles = {'data_jan.csv', 'data_feb.csv', 'data_mar.csv'};\n\n% Extract month substring from each filename:\nmonths = cellfun(@(f) f(6:8), files, 'UniformOutput', false);\n% {'jan'  'feb'  'mar'}\n\n% Get character count of each string:\nlengths = cellfun(@length, files);   % [12  12  12]\n\n% Non-uniform output (different sizes per cell) — needs UniformOutput false:\nparts = cellfun(@(f) strsplit(f,'_'), files, 'UniformOutput', false);\n\n% Performance reminder:\n% cellfun(@(x) x^2, large_array)  — SLOW (loop with overhead)\n% large_array .^ 2                 — FAST (vectorised C operation)</code></pre>"},{"id":22,"level":"intermediate","q":"What are function handles, anonymous functions, and closures in MATLAB?","a":"Function handle: <code>fh = @sin</code>. Call: <code>fh(pi)</code>. Anonymous: <code>f = @(x,y) x.^2 + y.^2</code>. Closures capture workspace variables at creation: <code>a=3; f = @(x) a*x</code> — f always uses a=3. Pass to math functions: <code>fplot(f, [0 2*pi])</code>, <code>fzero(f, 0)</code>, <code>integral(f, 0, 1)</code>, <code>fminsearch(f, x0)</code>. Arrays of handles: <code>fns = {@sin, @cos, @tan}</code>.<br><br><b>🔑 Plain terms:</b> Function handles (@) let you pass functions as arguments — essential for numerical methods like fzero, fminsearch, integral, ode45. Anonymous functions are inline functions that can capture variables from the surrounding workspace at creation time (closures).<br><b>💡 Example:</b> <pre><code>% Pass a function to a numerical solver:\nf = @(x) x.^3 - 2*x - 5;     % find root of cubic\nroot = fzero(f, 2);           % root near x=2: 2.0946\n\n% Minimise a function:\ncost = @(params) model_error(data, params(1), params(2));\np_opt = fminsearch(cost, [1.0, 0.5]);\n\n% Closure — captures 'fc' from workspace at definition time:\nfc = 1000;   % cutoff frequency\nlowpass = @(x, Fs) filter_signal(x, Fs, fc);   % fc is 'baked in'\ny = lowpass(signal, 44100);\n\n% Array of function handles — dispatch table:\ntransforms = {@fft, @dct, @dwt};\nresult = transforms{2}(signal);   % apply DCT</code></pre>"},{"id":23,"level":"intermediate","q":"How do you handle NaN, Inf, and numerical edge cases?","a":"Check: <code>isnan(x)</code>, <code>isinf(x)</code>, <code>isfinite(x)</code>. NaN propagates: <code>5 + NaN = NaN</code>. NaN-ignoring functions: <code>nanmean, nansum, nanmax, nanmin, nanstd</code>. Replace: <code>x(isnan(x)) = 0</code>. <code>Inf - Inf = NaN</code>. <code>0/0 = NaN</code>. <code>1/0 = Inf</code> (with warning). <code>eps</code> = machine epsilon (2.2e-16). Compare floats: <code>abs(a-b) &lt; tol</code> not <code>a == b</code>. <code>realmax</code>, <code>realmin</code> are largest/smallest finite doubles.<br><br><b>🔑 Plain terms:</b> NaN is MATLAB's marker for 'missing or undefined value' — it propagates through all arithmetic. Use nan-prefixed functions (nanmean, nansum) to ignore NaN in statistics. Never compare with == NaN — always use isnan().<br><b>💡 Example:</b> <pre><code>signal = [22.1, NaN, 21.9, NaN, 22.3, Inf, 22.0];\n\n% NaN propagates — arithmetic with NaN is always NaN:\nmean(signal)          % NaN  (one bad value ruins it)\nnanmean(signal)       % 22.075  (ignores NaN)\n\n% Check and clean:\nbad = ~isfinite(signal);          % logical mask of NaN and Inf\nsignal(bad) = nanmean(signal);    % replace bad values with mean\n\n% Floating point comparison — NEVER use ==:\na = 0.1 + 0.2;\na == 0.3          % false!  (floating point rounding)\nabs(a - 0.3) < 1e-10   % true   (correct way)\n\n% Useful constants:\neps         % 2.2e-16 — machine epsilon (smallest diff from 1.0)\nrealmax     % largest finite double (~1.8e308)</code></pre>"},{"id":24,"level":"intermediate","q":"How do you use MATLAB for signal processing basics?","a":"FFT: <code>N=length(x); Y=fft(x); f=(0:N-1)*Fs/N; plot(f(1:N/2), abs(Y(1:N/2))*2/N)</code>. Power spectral density: <code>pwelch(x,[],[],[],Fs)</code>. Filter design: <code>[b,a]=butter(4,fc/(Fs/2))</code>. Apply: <code>y=filter(b,a,x)</code> or <code>y=filtfilt(b,a,x)</code> (zero-phase). Spectrogram: <code>spectrogram(x,hamming(256),128,512,Fs,\"yaxis\")</code>. Convolution: <code>conv(x,h,\"same\")</code>. Correlation: <code>xcorr(x,y)</code>.<br><br><b>🔑 Plain terms:</b> MATLAB's Signal Processing Toolbox makes DSP accessible — design filters in one line, apply them in another, visualise the result in a third. filtfilt gives zero-phase filtering (no time delay), which is essential for offline analysis.<br><b>💡 Example:</b> <pre><code>Fs = 8000;  % 8 kHz sample rate\nt  = 0:1/Fs:1-1/Fs;\n\n% Create a noisy signal: 300 Hz + 1500 Hz + noise:\nx = sin(2*pi*300*t) + 0.5*sin(2*pi*1500*t) + 0.3*randn(size(t));\n\n% Design a 6th-order Butterworth lowpass at 600 Hz:\n[b, a] = butter(6, 600/(Fs/2), 'low');\n\n% filtfilt: zero-phase (no delay), use for offline/post-processing\ny_filt  = filtfilt(b, a, x);\n% filter: causal (has delay), use for real-time\ny_causal = filter(b, a, x);\n\n% FFT and plot spectrum:\nN   = length(x);\nY   = fft(x) / N;\nf   = (0:N/2-1) * Fs/N;\nplot(f, 2*abs(Y(1:N/2)));\nxlabel('Frequency (Hz)'); ylabel('Magnitude'); grid on;</code></pre>"},{"id":25,"level":"intermediate","q":"What are MATLAB tables and when do you use them?","a":"Tables store heterogeneous columnar data with named columns (like a DataFrame). Create: <code>T = table(names, ages, scores, \"VariableNames\",{\"Name\",\"Age\",\"Score\"})</code>. Read: <code>T = readtable(\"file.csv\")</code>. Access column: <code>T.Age</code> or <code>T{:,\"Age\"}</code>. Filter: <code>T(T.Age > 18, :)</code>. Add column: <code>T.NewCol = values</code>. Join: <code>outerjoin(T1, T2, \"Keys\",\"ID\")</code>. Summary: <code>summary(T)</code>. Convert to matrix: <code>table2array(T)</code>. Ideal for mixed-type datasets.<br><br><b>🔑 Plain terms:</b> MATLAB tables are the equivalent of Python DataFrames or SQL tables — each column can have a different type and a meaningful name. They're the right choice whenever your data is heterogeneous (mix of strings, numbers, booleans).<br><b>💡 Example:</b> <pre><code>% Create from arrays:\nnames  = {'Alice';'Bob';'Carol'};\nscores = [95; 87; 72];\npassed = scores >= 75;\nT = table(names, scores, passed, 'VariableNames', {'Name','Score','Passed'});\n\n% Read from CSV (auto-detects types):\nT = readtable('results.csv');\n\n% Filter and select:\ngood = T(T.Score > 80, :);         % rows where score > 80\ntop_names = T{T.Score > 80, 'Name'}; % just the Name column\n\n% Add a computed column:\nT.Grade = repmat({'F'},height(T),1);\nT.Grade(T.Score >= 90) = {'A'};\nT.Grade(T.Score >= 80 & T.Score < 90) = {'B'};\n\nsummary(T)      % quick stats per column\nsortrows(T, 'Score', 'descend')  % sort by score</code></pre>"},{"id":26,"level":"intermediate","q":"How do you optimise MATLAB code for speed?","a":"1. Pre-allocate arrays: <code>result = zeros(1,n)</code> not growing in a loop. 2. Vectorize — replace loops with array operations. 3. Use in-place operations. 4. Profile first: <code>profile on; ...; profile viewer</code>. 5. Use <code>single</code> precision to halve memory and potentially speed up. 6. Avoid dynamic field names in structs inside loops. 7. Use <code>parfor</code> for embarrassingly parallel loops (Parallel Computing Toolbox). 8. Call MEX files for C-speed critical sections. 9. Use <code>tic/toc</code> for timing.<br><br><b>🔑 Plain terms:</b> Optimising MATLAB code follows a strict order: (1) profile to find the bottleneck, (2) vectorise the hot loop, (3) pre-allocate arrays, (4) consider parfor or MEX. Never optimise before profiling — the bottleneck is almost never where you expect.<br><b>💡 Example:</b> <pre><code>% Step 1 — find the bottleneck:\nprofile on\nrun_my_algorithm(data);\nprofile viewer   % interactive display showing time per line\n\n% Step 2 — vectorise (see Q16)\n% Step 3 — pre-allocate output arrays:\nN = 100000;\n% BAD:  result = [];           for i=1:N, result(end+1)=f(i); end  % ~3s\n% GOOD: result = zeros(1,N);  for i=1:N, result(i)=f(i);     end  % ~0.1s\n\n% Step 4 — parfor (Parallel Computing Toolbox):\nparpool(4);     % start 4 workers\nparfor i = 1:N\n    result(i) = expensive_func(i);   % each iteration independent\nend\n% ~4x speedup on 4-core machine\n\ntic; ...; toc   % simple timing for quick checks</code></pre>"},{"id":27,"level":"intermediate","q":"How does MATLAB handle regular expressions?","a":"<code>regexp(str, pattern)</code> returns start indices. <code>regexp(str, pattern, \"match\")</code> returns matched strings. <code>regexp(str, pattern, \"tokens\")</code> returns capture groups. <code>regexprep(str, pattern, replacement)</code> replace. Case-insensitive: <code>regexpi</code>. Named tokens: <code>(?&lt;name&gt;pattern)</code>. Lookahead: <code>(?=...)</code>. Same syntax as Perl regex. Example: extract numbers from string: <code>nums = regexp(str, \"\\d+\\.?\\d*\", \"match\")</code> → cell of number strings.<br><br><b>🔑 Plain terms:</b> MATLAB regex uses the same Perl-compatible syntax as Python and most other languages. regexp returns start indices; add a third argument ('match', 'tokens', 'names') to get the actual matched text or capture groups.<br><b>💡 Example:</b> <pre><code>% Extract all numbers from a string:\nstr  = 'voltage: 3.14V, current: 0.5A, power: 1.57W';\nnums = regexp(str, '\\d+\\.?\\d*', 'match');\n% {'3.14'  '0.5'  '1.57'}\nvals = cellfun(@str2double, nums);   % [3.14  0.5  1.57]\n\n% Named capture groups:\npattern = '(?<date>\\d{4}-\\d{2}-\\d{2})_(?<id>\\w+)';\ntok = regexp('2024-04-15_sensor01', pattern, 'names');\ntok.date   % '2024-04-15'\ntok.id     % 'sensor01'\n\n% Replace: convert underscores to spaces:\nclean = regexprep('hello_world_test', '_', ' ');   % 'hello world test'</code></pre>"},{"id":28,"level":"intermediate","q":"What is the difference between nargin, nargout, inputParser?","a":"<code>nargin</code>: number of input arguments passed to the function. <code>nargout</code>: number of output arguments requested. Pattern: <code>if nargin &lt; 2; opt = default; end</code>. <code>varargin</code>/<code>varargout</code>: variable arg lists as cell arrays. <code>inputParser</code> (modern): <code>p=inputParser; addRequired(p,\"x\"); addOptional(p,\"tol\",1e-6); addParameter(p,\"Method\",\"fast\"); parse(p,x,varargin{:}); results=p.Results</code>. <code>arguments</code> block (R2019b+): even cleaner, with type validation.<br><br><b>🔑 Plain terms:</b> nargin lets a function check how many inputs were supplied — essential for providing sensible default values. inputParser is the modern structured alternative: it handles required arguments, optional positional arguments, and named parameters all in one place.<br><b>💡 Example:</b> <pre><code>% Simple nargin defaults:\nfunction y = my_filter(signal, Fs, fc)\n    if nargin < 3, fc = 1000; end   % default cutoff 1 kHz\n    if nargin < 2, Fs = 8000; end   % default sample rate\n    [b,a] = butter(4, fc/(Fs/2));\n    y = filtfilt(b, a, signal);\nend\n\n% Modern inputParser (cleaner for many parameters):\nfunction result = process(data, varargin)\n    p = inputParser;\n    addRequired(p,  'data');\n    addOptional(p,  'window', 256, @isnumeric);\n    addParameter(p, 'method', 'fft', @ischar);\n    addParameter(p, 'plot',   false, @islogical);\n    parse(p, data, varargin{:});\n    r = p.Results;\n    % use r.window, r.method, r.plot ...\nend\n% Call: process(x)  OR  process(x, 512, 'method','dct', 'plot',true)</code></pre>"},{"id":29,"level":"intermediate","q":"How do you use MATLAB for matrix operations and linear algebra?","a":"Solve Ax=b: <code>x = A \\ b</code> (backslash, uses LU/QR/etc. as appropriate). Inverse (avoid for solving): <code>inv(A)</code>. Determinant: <code>det(A)</code>. Eigenvalues: <code>[V,D]=eig(A)</code>. SVD: <code>[U,S,V]=svd(A)</code>. QR: <code>[Q,R]=qr(A)</code>. Rank: <code>rank(A)</code>. Norm: <code>norm(v)</code>, <code>norm(A,\"fro\")</code>. Least squares: <code>x = A \\ b</code> when A is non-square. Condition number: <code>cond(A)</code>. Cholesky: <code>R=chol(A)</code>.<br><br><b>🔑 Plain terms:</b> The backslash operator \\ is MATLAB's smartest solver — it automatically picks the best algorithm (LU, QR, Cholesky, least squares) based on the matrix structure. Never use inv(A)*b for solving — it's slower and numerically less stable.<br><b>💡 Example:</b> <pre><code>% Solve Ax = b — use backslash, not inv(A)*b:\nA = [2 1; 5 3];\nb = [8; 21];\nx = A \\ b;   % [3; 2]\n% inv(A)*b  works but is 3× slower and less accurate — avoid!\n\n% Least squares fit (more equations than unknowns):\nt_data = (0:0.1:2)';          % 21 data points\ny_data = 3*t_data.^2 - 2*t_data + 1 + 0.1*randn(size(t_data));\nA_fit  = [t_data.^2, t_data, ones(size(t_data))];\ncoeffs = A_fit \\ y_data;       % [~3; ~-2; ~1]  — least squares solution\n\n% Eigenvalue decomposition:\n[V, D] = eig(A);   % V = eigenvectors, D = diagonal eigenvalue matrix\n% A*V == V*D  (definition of eigendecomposition)</code></pre>"},{"id":30,"level":"intermediate","q":"How does parfor work for parallel loops?","a":"<code>parfor i = 1:n; result(i) = expensive_func(i); end</code> distributes iterations across parallel workers (requires Parallel Computing Toolbox). Start pool: <code>parpool(4)</code>. Restrictions: loop iterations must be independent (no data dependencies between iterations). Each iteration must be a scalar index. Variables classified as: sliced (output arrays), broadcast (read-only), reduced (accumulated with associative ops), temporary (local to iteration). Overhead for small tasks — only worth it for computationally heavy iterations.<br><br><b>🔑 Plain terms:</b> parfor replaces a regular for loop with a parallel version that distributes iterations across worker processes. The golden rule: each iteration must be completely independent — no iteration can depend on the result of another.<br><b>💡 Example:</b> <pre><code>% Only works if result(i) does NOT depend on result(i-1):\nN = 1000;\nresult = zeros(1, N);\n\nparfor i = 1:N\n    result(i) = expensive_simulation(i);   % each i is independent ✓\nend\n\n% Variables inside parfor are classified:\n% - Sliced: result (each i writes its own slice)\n% - Broadcast: any read-only variable (sent to each worker)\n% - Reduction: accumulated with + or * (e.g. total = total + x)\n\n% Start/stop the pool:\nparpool(4);    % 4 workers\ndelete(gcp);   % shutdown pool when done\n\n% Rule of thumb: only use parfor when each iteration takes > ~10ms\n% (otherwise the overhead of distributing work exceeds the benefit)</code></pre>"},{"id":31,"level":"intermediate","q":"What are MATLAB containers.Map and when to use it?","a":"<code>containers.Map</code> is a hash map (dictionary). Create: <code>m = containers.Map({\"a\",\"b\"},{1,2})</code>. Access: <code>m(\"a\")</code>. Add/update: <code>m(\"c\") = 3</code>. Keys: <code>keys(m)</code>. Values: <code>values(m)</code>. Check: <code>isKey(m,\"a\")</code>. Remove: <code>remove(m,\"a\")</code>. Use when you need O(1) key-value lookup. Compared to struct: supports dynamic keys and any key type (numbers, strings). Slower than struct for known fixed keys.<br><br><b>🔑 Plain terms:</b> containers.Map is MATLAB's dictionary — O(1) key-value lookup by string (or number) key. Use it when you need to look up values by name rather than by numeric index, or when the set of keys isn't known in advance.<br><b>💡 Example:</b> <pre><code>% Create with initial data:\ncal = containers.Map({'TEMP01','TEMP02','PRES01'}, {1.023, 0.987, 1.001});\n\n% Add / update:\ncal('HUMID01') = 0.995;\n\n% Lookup:\nfactor = cal('TEMP01');   % 1.023\n\n% Check existence before lookup:\nif isKey(cal, 'TEMP99')\n    f = cal('TEMP99');\nelse\n    f = 1.0;   % default\nend\n\n% Apply calibration to all readings:\nids = {'TEMP01','PRES01','TEMP02'};\nraw = [22.5, 101325, 23.1];\ncalibrated = cellfun(@(id,v) v*cal(id), ids, num2cell(raw));</code></pre>"},{"id":32,"level":"intermediate","q":"What is MEX and when do you use it?","a":"MEX (MATLAB EXecutable) files are C/C++/Fortran functions compiled to shared libraries callable from MATLAB. Use when: a computational bottleneck cannot be vectorised, you need to interface with existing C/C++ code, or you need fine-grained memory control. Create: write <code>myfile.c</code> with <code>#include \"mex.h\"</code> and <code>mexFunction</code> entry point. Compile: <code>mex myfile.c</code>. Call: <code>myfile(args)</code>. Provides near-C performance for loops that cannot be vectorised.<br><br><b>🔑 Plain terms:</b> MEX files are C/C++ functions compiled into shared libraries that MATLAB can call just like a regular function. Use them as a last resort — only when a proven bottleneck genuinely cannot be vectorised and profiling confirms it.<br><b>💡 Example:</b> <pre><code>% When to use MEX:\n% 1. Bottleneck loop that CAN'T be vectorised (complex state machine,\n%    dynamic programming with data dependencies between steps)\n% 2. Wrapping existing C/C++ library code\n\n% myfunction.c — MEX entry point:\n% #include \"mex.h\"\n% void mexFunction(int nlhs, mxArray *plhs[],\n%                  int nrhs, const mxArray *prhs[]) {\n%     double *x = mxGetDoubles(prhs[0]);\n%     mwSize  N = mxGetNumberOfElements(prhs[0]);\n%     plhs[0]   = mxCreateDoubleMatrix(1, N, mxREAL);\n%     double *y = mxGetDoubles(plhs[0]);\n%     for (mwSize i=0; i<N; i++) y[i] = x[i]*x[i];\n% }\n\n% Compile and call:\n% mex myfunction.c\n% y = myfunction(x);   % calls C code at native speed</code></pre>"}],"arm":[{"id":1,"level":"basic","q":"What is SIMD and why does it matter?","a":"SIMD (Single Instruction, Multiple Data) applies one instruction to multiple data elements in parallel. A 128-bit register can hold 4 floats or 16 int8s — one add instruction processes all of them simultaneously. Critical for: DSP, video/image processing, ML inference, audio codecs, cryptography. Typical speedups: 4x (float32), 8x (float16), 16x (int8) over scalar code. All modern CPUs (ARM, x86, RISC-V) have SIMD extensions.<br><br><b>🔑 Plain terms:</b> SIMD is like having a row of identical calculators all doing the same operation simultaneously. A regular CPU adds two numbers at a time; a 128-bit SIMD register can hold 4 floats and add all 4 pairs in ONE instruction — 4× the throughput for free.<br><b>💡 Example:</b> <pre><code>// Scalar (1 add per instruction):\nfor (int i = 0; i < 4; i++)\n    c[i] = a[i] + b[i];   // 4 separate add instructions\n\n// SIMD (4 adds in 1 instruction on 128-bit register):\nfloat32x4_t va = vld1q_f32(a);  // load 4 floats into one register\nfloat32x4_t vb = vld1q_f32(b);\nfloat32x4_t vc = vaddq_f32(va, vb);  // add ALL 4 pairs at once\nvst1q_f32(c, vc);                    // store 4 results\n\n// Real speedups (128-bit registers):\n// float32  → 4 per register → up to 4×\n// int16    → 8 per register → up to 8×\n// int8/uint8 → 16 per register → up to 16×</code></pre>"},{"id":2,"level":"basic","q":"What is ARM NEON?","a":"NEON is ARM's Advanced SIMD ISA extension, available on Cortex-A and most Cortex-R processors. 32 vector registers in AArch64 (128-bit each, named v0-v31). 16 registers in AArch32 (64 or 128-bit, named d0-d15/q0-q15). Supports: 8/16/32/64-bit integer, 16/32/64-bit float, polynomial ops. NEON is mandatory in AArch64. Used in: Android/iOS apps, embedded Linux, Apple Silicon (which extends it further).<br><br><b>🔑 Plain terms:</b> NEON is ARM's built-in SIMD engine — available on every Cortex-A and Cortex-R processor, and mandatory on all 64-bit ARMv8 (AArch64) chips. It's what makes your phone fast enough to do real-time video, audio, and ML inference.<br><b>💡 Example:</b> <pre><code>// Every AArch64 chip (Apple M-series, Snapdragon, Cortex-A53...) has NEON\n// Include the header and you can use all NEON intrinsics:\n#include <arm_neon.h>\n\n// 32 vector registers, each 128 bits wide = 4 floats or 16 bytes\n// Named v0-v31 (128-bit), d0-d31 (64-bit), s0-s31 (32-bit)\n\n// Simple example — add two arrays of 4 floats each:\nfloat a[4] = {1,2,3,4}, b[4] = {5,6,7,8}, c[4];\nfloat32x4_t va = vld1q_f32(a);      // load: v0 = [1,2,3,4]\nfloat32x4_t vb = vld1q_f32(b);      // load: v1 = [5,6,7,8]\nfloat32x4_t vc = vaddq_f32(va, vb); // add:  v2 = [6,8,10,12]\nvst1q_f32(c, vc);                   // store</code></pre>"},{"id":3,"level":"basic","q":"What is RISC-V Vector Extension (RVV)?","a":"RVV is RISC-V's scalable vector ISA (ratified as v1.0 in 2021). Key differentiator: variable-length vectors. VLEN (vector register length in bits) is determined by hardware implementation — can be 128, 256, 512, 1024 bits or more. Code runs unchanged on any VLEN. 32 vector registers v0-v31. Configuration: SEW (Selected Element Width), LMUL (Length Multiplier). Used in: SiFive, Alibaba T-Head, SpacemiT chips.<br><br><b>🔑 Plain terms:</b> RVV's key innovation is that the vector register width (VLEN) is determined by the hardware, not fixed in the instruction encoding. The SAME binary runs on a cheap chip with 128-bit vectors and a high-end chip with 512-bit vectors — and the 512-bit chip automatically processes 4× more data per instruction.<br><b>💡 Example:</b> <pre><code>// The SAME RVV code runs on ANY VLEN hardware:\n// A cheap MCU might have VLEN=128  (4 floats per register)\n// A server chip might have VLEN=512 (16 floats per register)\n// The code below works on BOTH — hardware fills in vl automatically\n\nsize_t n = 1000;\nwhile (n > 0) {\n    // Ask hardware: how many floats can you handle this iteration?\n    size_t vl = __riscv_vsetvl_e32m1(n);   // ≤ n, hardware decides\n\n    vfloat32m1_t va = __riscv_vle32_v_f32m1(a, vl);   // load vl floats\n    vfloat32m1_t vb = __riscv_vle32_v_f32m1(b, vl);\n    vfloat32m1_t vc = __riscv_vadd_vv_f32m1(va, vb, vl);\n    __riscv_vse32_v_f32m1(c, vc, vl);                  // store vl floats\n    a += vl; b += vl; c += vl; n -= vl;\n}</code></pre>"},{"id":4,"level":"basic","q":"What vector register types does NEON provide in AArch64?","a":"64-bit registers: <code>d0-d31</code>. 128-bit: <code>q0-q31</code> (also <code>v0-v31</code> with element type suffix). Type suffixes: <code>int8x8_t</code> (8 lanes of 8-bit), <code>int8x16_t</code> (16 lanes), <code>int16x4_t</code>, <code>int16x8_t</code>, <code>int32x2_t</code>, <code>int32x4_t</code>, <code>int64x2_t</code>, <code>float16x8_t</code>, <code>float32x2_t</code>, <code>float32x4_t</code>, <code>float64x2_t</code>. Multi-register: <code>float32x4x2_t</code> (two 128-bit regs).<br><br><b>🔑 Plain terms:</b> NEON registers are like typed views onto the same 128-bit storage. The type suffix tells the compiler how to interpret the bits — the same register hardware stores the bits, but int8x16_t treats them as 16 bytes while float32x4_t treats them as 4 floats.<br><b>💡 Example:</b> <pre><code>// The naming is: <type><lanes>x<width>_t\n// int8x16_t  = 16 lanes of  8-bit integers  (16×8  = 128 bits)\n// int16x8_t  =  8 lanes of 16-bit integers  ( 8×16 = 128 bits)\n// int32x4_t  =  4 lanes of 32-bit integers  ( 4×32 = 128 bits)\n// float32x4_t =  4 lanes of 32-bit floats   ( 4×32 = 128 bits)\n// float16x8_t =  8 lanes of 16-bit floats   ( 8×16 = 128 bits) ← ML/AI\n\n// All four are 128 bits — just different interpretations of the same bits:\nfloat32x4_t  fa = vld1q_f32(ptr);   // treat as 4 floats\nint32x4_t    ia = vld1q_s32(ptr);   // treat as 4 signed ints\nuint8x16_t   ba = vld1q_u8(ptr);    // treat as 16 unsigned bytes\n\n// Multi-register type for interleaved loads:\nfloat32x4x2_t stereo;   // two 128-bit registers — left and right channels</code></pre>"},{"id":5,"level":"basic","q":"How do you use NEON intrinsics in C code?","a":"Include <code>&lt;arm_neon.h&gt;</code>. Load 4 floats: <code>float32x4_t a = vld1q_f32(ptr)</code>. Add: <code>float32x4_t c = vaddq_f32(a, b)</code>. Store: <code>vst1q_f32(ptr, c)</code>. Duplicate scalar: <code>float32x4_t k = vdupq_n_f32(3.14f)</code>. Compile AArch64: just <code>-O2</code> (NEON mandatory). AArch32: <code>-mfpu=neon -mfloat-abi=hard</code>. Check: <code>__ARM_NEON</code> macro is defined when NEON is available.<br><br><b>🔑 Plain terms:</b> NEON intrinsics are C functions that map directly to single hardware instructions. The pattern is always: load → compute → store. Include arm_neon.h and compile with -O2 on AArch64 — NEON is automatically available with no extra flags.<br><b>💡 Example:</b> <pre><code>#include <arm_neon.h>\n\n// Complete example — element-wise multiply-add: dst = a * b + c\nvoid multiply_add(const float *a, const float *b,\n                  const float *c, float *dst, int n) {\n    int i = 0;\n    for (; i <= n - 4; i += 4) {\n        float32x4_t va  = vld1q_f32(a + i);\n        float32x4_t vb  = vld1q_f32(b + i);\n        float32x4_t vc  = vld1q_f32(c + i);\n        float32x4_t res = vfmaq_f32(vc, va, vb);  // FMA: vc + va*vb\n        vst1q_f32(dst + i, res);\n    }\n    // Scalar tail for remaining elements (n not a multiple of 4):\n    for (; i < n; i++) dst[i] = a[i]*b[i] + c[i];\n}\n// Compile: gcc -O2 prog.c -o prog  (NEON mandatory on AArch64)</code></pre>"},{"id":6,"level":"basic","q":"What is the NEON intrinsic naming convention?","a":"Pattern: <code>v{op}{q}_{type}</code>. <code>q</code> = 128-bit (quadword). No <code>q</code> = 64-bit. Type suffixes: <code>f32</code> float32, <code>f64</code> float64, <code>s8</code> int8, <code>u8</code> uint8, <code>s16</code> int16, <code>u16</code> uint16, <code>s32</code> int32, <code>u32</code> uint32, <code>s64</code> int64, <code>u64</code> uint64, <code>f16</code> float16. Examples: <code>vaddq_f32</code> (128-bit float add), <code>vmul_f32</code> (64-bit float mul), <code>vld1q_u8</code> (load 16 uint8s).<br><br><b>🔑 Plain terms:</b> The naming convention is dense but regular once you know the pattern. Read it as: v [operation] [q for 128-bit] _ [type suffix]. The 'q' doubling the register size is the most important flag — always prefer 128-bit (q) variants to process twice as much data.<br><b>💡 Example:</b> <pre><code>// Pattern: v{op}{q}_{type}\n//   v    = vector intrinsic prefix\n//   op   = the operation (add, mul, ld1, st1, dup, ...)\n//   q    = quadword (128-bit); absent = doubleword (64-bit)\n//   type = f32 f64 f16  s8 s16 s32 s64  u8 u16 u32 u64\n\n// Load:\nvld1_f32(ptr)    // load  2 floats (64-bit)\nvld1q_f32(ptr)   // load  4 floats (128-bit) ← prefer this\n\n// Add:\nvadd_f32(a, b)   // add  2+2 floats (64-bit)\nvaddq_f32(a, b)  // add  4+4 floats (128-bit) ← prefer this\n\n// Multiply-accumulate:\nvmlaq_f32(acc, a, b)  // acc = acc + a*b  (4 floats, 128-bit)\n\n// Duplicate scalar into all lanes:\nvdupq_n_f32(3.14f)    // [3.14, 3.14, 3.14, 3.14]</code></pre>"},{"id":7,"level":"basic","q":"What is the difference between vld1q and vld1?","a":"<code>vld1q_f32(ptr)</code> loads 128 bits = 4 floats into a 128-bit register (<code>float32x4_t</code>). <code>vld1_f32(ptr)</code> loads 64 bits = 2 floats into a 64-bit register (<code>float32x2_t</code>). Prefer 128-bit (quad) variants to maximise lane utilisation. Multi-register variants: <code>vld1q_f32_x2</code> loads 256 bits into two registers in one instruction. <code>vld2q_f32</code> loads with de-interleaving. Indexed: <code>vld1q_lane_f32(ptr, vec, lane)</code>.<br><br><b>🔑 Plain terms:</b> vld1q loads 128 bits (4 floats) into a 128-bit register — always prefer this. vld1 loads only 64 bits (2 floats) into a 64-bit register, leaving half the hardware idle. Think of it as the difference between filling a truck vs a car.<br><b>💡 Example:</b> <pre><code>// vld1q — 128-bit load (prefer this):\nfloat data[8] = {1,2,3,4,5,6,7,8};\nfloat32x4_t va = vld1q_f32(data);     // va = [1,2,3,4]  (128-bit)\nfloat32x4_t vb = vld1q_f32(data+4);   // vb = [5,6,7,8]\n\n// vld1 — 64-bit load (only when you genuinely need 2 floats):\nfloat32x2_t vc = vld1_f32(data);      // vc = [1,2]  (64-bit, wastes half)\n\n// Multi-register load — load 256 bits in one instruction:\nfloat32x4x2_t pair = vld1q_f32_x2(data);  // pair.val[0]=[1,2,3,4]\n                                            // pair.val[1]=[5,6,7,8]\n\n// Indexed lane load:\nfloat32x4_t v = vdupq_n_f32(0);\nv = vld1q_lane_f32(data, v, 2);  // load one float into lane 2</code></pre>"},{"id":8,"level":"basic","q":"What are RVV vector registers and key configuration terms?","a":"32 vector registers <code>v0-v31</code>. Configuration: SEW (Selected Element Width): 8/16/32/64 bits per element. LMUL (Length Multiplier): 1/2/4/8 (groups registers for wider operations) or 1/2/4/8 fractional. VLEN: hardware-determined vector length in bits. VLMAX = LMUL * VLEN / SEW = max elements per operation. <code>vl</code>: actual number of elements processed (≤ VLMAX). <code>vtype</code>: encodes SEW+LMUL. Tail/mask agnostic/undisturbed policies.<br><br><b>🔑 Plain terms:</b> RVV's configuration system (SEW + LMUL + VLEN) is what makes it length-agnostic. SEW chooses element size; LMUL groups multiple registers for wider operations; VLEN is the hardware-fixed register width. You configure all three with a single vsetvli instruction.<br><b>💡 Example:</b> <pre><code>// Key terms:\n// VLEN  = hardware register width (128..2048 bits) — hardware-fixed, read-only\n// SEW   = Selected Element Width (8/16/32/64 bits per element)  — you choose\n// LMUL  = Length Multiplier (1/2/4/8 registers grouped together) — you choose\n// VLMAX = LMUL * VLEN / SEW  = max elements per vsetvli call\n// vl    = actual number of elements hardware will process (≤ VLMAX, ≤ n)\n\n// Example: VLEN=256, SEW=32 (float), LMUL=1\n// VLMAX = 1 * 256 / 32 = 8 floats per operation\n// vsetvli t0, a0, e32, m1, ta, ma\n//   e32 = SEW of 32 bits\n//   m1  = LMUL of 1 (one register group)\n//   ta  = tail-agnostic (don't care about extra elements)\n//   ma  = mask-agnostic (don't care about masked elements)\n//   a0  = requested count; t0 = actual count hardware will do</code></pre>"},{"id":9,"level":"basic","q":"What does vsetvli do and why is it fundamental to RVV?","a":"<code>vsetvli rd, rs1, vtypei</code> configures the vector unit and returns the number of elements the hardware will process in <code>rd</code>. Example: <code>vsetvli t0, a0, e32, m1, ta, ma</code> sets SEW=32, LMUL=1, tail-agnostic, mask-agnostic for remaining element count in a0. The hardware may process fewer elements than requested (it sets <code>t0</code> ≤ <code>a0</code>). Must be called at the start of each strip-mining iteration. This is what makes RVV code length-agnostic.<br><br><b>🔑 Plain terms:</b> vsetvli is the instruction that configures the vector engine before every operation. It tells the hardware 'I want to process this many elements of this type' and the hardware tells you back 'I can do this many at a time'. This handshake is what makes RVV code automatically work on any hardware.<br><b>💡 Example:</b> <pre><code>// Without vsetvli you can't use ANY vector instructions — it must come first\n\n// Pattern for processing an array of floats:\nsize_t n = 1000;   // total elements to process\nconst float *src = ...; float *dst = ...;\n\nwhile (n > 0) {\n    // Configure: request n elements, 32-bit each, 1-register group\n    size_t vl = __riscv_vsetvl_e32m1(n);\n    // vl ≤ n  AND  vl ≤ VLMAX (hardware limit)\n    // On VLEN=256 chip: vl = min(n, 8)  (8 floats per register)\n    // On VLEN=512 chip: vl = min(n, 16) (16 floats per register)\n\n    vfloat32m1_t v = __riscv_vle32_v_f32m1(src, vl);  // load vl elements\n    v = __riscv_vfadd_vf_f32m1(v, 1.0f, vl);           // add 1.0 to each\n    __riscv_vse32_v_f32m1(dst, v, vl);                  // store vl elements\n\n    src += vl; dst += vl; n -= vl;  // advance pointers\n}</code></pre>"},{"id":10,"level":"basic","q":"What is the strip-mining pattern in RVV?","a":"Process an array in hardware-determined chunks:\n<pre><code>while (n > 0) {\n  size_t vl = __riscv_vsetvl_e32m1(n);\n  vfloat32m1_t va = __riscv_vle32_v_f32m1(a, vl);\n  vfloat32m1_t vb = __riscv_vle32_v_f32m1(b, vl);\n  vfloat32m1_t vc = __riscv_vadd_vv_f32m1(va, vb, vl);\n  __riscv_vse32_v_f32m1(c, vc, vl);\n  a+=vl; b+=vl; c+=vl; n-=vl;\n}</code></pre>\nThe final partial chunk is handled automatically — no special-case scalar tail needed.<br><br><b>🔑 Plain terms:</b> Strip-mining is the RVV loop pattern — you ask the hardware 'how many can you do?' each iteration, process that many, then repeat. The genius is that the last partial chunk (when n < VLMAX) is handled automatically by vl — no special-case code needed.<br><b>💡 Example:</b> <pre><code>// Array addition: c[] = a[] + b[]\n// Works on ANY RVV hardware regardless of VLEN:\n\nvoid vec_add(const float *a, const float *b, float *c, size_t n) {\n    while (n > 0) {\n        size_t vl = __riscv_vsetvl_e32m1(n);   // how many this round?\n\n        vfloat32m1_t va = __riscv_vle32_v_f32m1(a, vl);  // load vl floats\n        vfloat32m1_t vb = __riscv_vle32_v_f32m1(b, vl);\n        vfloat32m1_t vc = __riscv_vadd_vv_f32m1(va, vb, vl); // add\n        __riscv_vse32_v_f32m1(c, vc, vl);                // store\n\n        a += vl; b += vl; c += vl; n -= vl;  // advance, reduce remaining\n    }\n    // No special scalar tail needed — last iteration vl handles the remainder\n}</code></pre>"},{"id":11,"level":"basic","q":"How does auto-vectorization work and how do you enable it?","a":"Compilers (GCC, Clang) automatically vectorize loops given sufficient flags. Enable: <code>-O2 -march=native</code> (usually sufficient). More aggressive: <code>-O3 -ftree-vectorize</code>. Check output: <code>-fopt-info-vec-optimized</code> (GCC) or <code>-Rpass=loop-vectorize</code> (Clang). Conditions for auto-vectorization: no pointer aliasing (use <code>restrict</code>), simple loop body, no data-dependent branches, loop-independent iterations. <code>#pragma GCC ivdep</code> asserts no dependencies.<br><br><b>🔑 Plain terms:</b> Auto-vectorization is the compiler doing NEON/SIMD work for you automatically — you write a normal C loop and get SIMD instructions in the binary. The two key ingredients: no pointer aliasing (use restrict) and simple loop body (no complex branches or function calls).<br><b>💡 Example:</b> <pre><code>// Before: scalar loop\nvoid add(float *a, float *b, float *c, int n) {\n    for (int i = 0; i < n; i++) c[i] = a[i] + b[i];\n}\n// After adding restrict (tells compiler: no aliasing):\nvoid add(float *restrict a, float *restrict b, float *restrict c, int n) {\n    for (int i = 0; i < n; i++) c[i] = a[i] + b[i];\n}\n\n// Compile and CHECK that vectorization happened:\n// gcc -O2 -march=native -fopt-info-vec-optimized prog.c\n// Output: \"loop vectorized\" — success\n// If not vectorized: add -fopt-info-vec-missed to see why\n\n// Force vectorization hint (tells compiler: trust me, no dependencies):\n#pragma GCC ivdep\nfor (int i = 0; i < n; i++) c[i] = a[i] + b[i];</code></pre>"},{"id":12,"level":"intermediate","q":"How do you implement an efficient dot product with NEON?","a":"<pre><code>float dot_product(const float* a, const float* b, int n) {\n  float32x4_t acc = vdupq_n_f32(0.0f);\n  int i = 0;\n  for (; i &lt;= n-4; i+=4) {\n    float32x4_t va = vld1q_f32(a+i);\n    float32x4_t vb = vld1q_f32(b+i);\n    acc = vfmaq_f32(acc, va, vb);\n  }\n  float result = vaddvq_f32(acc);\n  for (; i &lt; n; i++) result += a[i]*b[i];\n  return result;\n}</code></pre>\nKey: <code>vfmaq_f32</code> is FMA, <code>vaddvq_f32</code> horizontally reduces to scalar.<br><br><b>🔑 Plain terms:</b> The dot product of two vectors is the sum of element-wise products — the most fundamental operation in ML (neural network layers), DSP (filtering), and linear algebra. NEON makes it ~4× faster by processing 4 multiply-accumulates per instruction.<br><b>💡 Example:</b> <pre><code>float dot_neon(const float *a, const float *b, int n) {\n    float32x4_t acc = vdupq_n_f32(0.0f);  // accumulator = [0,0,0,0]\n    int i = 0;\n\n    // Process 4 elements per iteration:\n    for (; i <= n - 4; i += 4) {\n        float32x4_t va = vld1q_f32(a + i);\n        float32x4_t vb = vld1q_f32(b + i);\n        acc = vfmaq_f32(acc, va, vb);      // acc += va*vb  (FMA, 1 instruction)\n    }\n\n    // Horizontal sum: reduce [a0,a1,a2,a3] → scalar:\n    float result = vaddvq_f32(acc);        // AArch64: single instruction\n\n    // Scalar tail (when n is not a multiple of 4):\n    for (; i < n; i++) result += a[i] * b[i];\n    return result;\n}\n// ~4× faster than scalar for large n (cache-bound for very large n)</code></pre>"},{"id":13,"level":"intermediate","q":"What is the difference between vmlaq and vfmaq?","a":"<code>vmlaq_f32(acc, a, b)</code>: multiply-accumulate, may compute <code>a*b</code> then add to <code>acc</code> as two separate operations (two rounding steps). <code>vfmaq_f32(acc, a, b)</code>: fused multiply-add (FMA) — single instruction on Cortex-A57+, one rounding, better precision. FMA: <code>result = acc + a*b</code> with only one rounding. Also slightly faster on pipelines that support it. Prefer <code>vfmaq</code> for floating-point accumulation. Note: FMA changes floating-point results slightly vs non-FMA.<br><br><b>🔑 Plain terms:</b> vmlaq is the older multiply-accumulate that may do two separate floating-point operations (multiply then add) with two rounding steps. vfmaq is Fused Multiply-Add (FMA) — it does multiply and add in one operation with only one rounding, giving better numerical precision and often higher throughput.<br><b>💡 Example:</b> <pre><code>// vmlaq_f32: acc = acc + (a * b)  — MAY use two steps, two roundings\n// vfmaq_f32: acc = acc + (a * b)  — ALWAYS fused, one rounding, better precision\n\nfloat32x4_t acc = vdupq_n_f32(0.0f);\nfloat32x4_t a   = vld1q_f32(ptr_a);\nfloat32x4_t b   = vld1q_f32(ptr_b);\n\n// Prefer vfmaq for:\n// 1. Better precision (one rounding vs two)\n// 2. Higher throughput on Cortex-A57+ (fused pipeline)\nacc = vfmaq_f32(acc, a, b);   // acc += a*b  (FMA — prefer this)\n// vs:\nacc = vmlaq_f32(acc, a, b);   // acc += a*b  (may be less precise)\n\n// Note: FMA changes floating-point results vs non-FMA\n// so results may differ slightly from scalar reference — this is expected</code></pre>"},{"id":14,"level":"intermediate","q":"How do NEON lane operations work?","a":"Extract a lane: <code>vgetq_lane_f32(v, 2)</code> returns lane 2 as scalar. Set a lane: <code>vsetq_lane_f32(val, v, 2)</code> returns new vector. Duplicate scalar to all lanes: <code>vdupq_n_f32(x)</code>. Duplicate a specific lane: <code>vdupq_laneq_f32(v, 1)</code> — copies lane 1 to all 4 lanes. Reverse lanes: <code>vrev64q_f32</code>. Combine halves: <code>vcombine_f32(low, high)</code>. Split: <code>vget_low_f32(v)</code>, <code>vget_high_f32(v)</code>. Used for: broadcasting a coefficient, extracting final result.<br><br><b>🔑 Plain terms:</b> Lane operations let you extract a single value from a vector register, duplicate a scalar into all lanes, or rearrange elements. The most important in practice: vdupq_n (broadcast a scalar to all lanes) and vaddvq (reduce all lanes to one scalar sum).<br><b>💡 Example:</b> <pre><code>float32x4_t v = vld1q_f32((float[]){1,2,3,4});\n\n// Extract one lane to scalar:\nfloat lane2 = vgetq_lane_f32(v, 2);   // 3.0f  (0-indexed)\n\n// Set one lane (returns new vector):\nv = vsetq_lane_f32(99.0f, v, 2);      // [1,2,99,4]\n\n// Broadcast scalar → all lanes:\nfloat32x4_t ones  = vdupq_n_f32(1.0f);          // [1,1,1,1]\nfloat32x4_t lane1 = vdupq_laneq_f32(v, 1);      // [2,2,2,2]\n\n// Horizontal reduction (sum all lanes → one scalar):\nfloat sum = vaddvq_f32(v);    // 1+2+99+4 = 106.0f\n\n// Split 128-bit into two 64-bit halves:\nfloat32x2_t lo = vget_low_f32(v);    // [1,2]\nfloat32x2_t hi = vget_high_f32(v);   // [99,4]</code></pre>"},{"id":15,"level":"intermediate","q":"What are vld2/vld3/vld4 interleaved loads and when do you use them?","a":"<code>vld2q_u8(ptr)</code> loads 32 bytes and de-interleaves into two registers (e.g. ABABAB → register A and register B). <code>vld3q_u8</code> for RGB → R, G, B registers. <code>vld4q_u8</code> for RGBA → R, G, B, A registers. Eliminates manual de-interleaving. Used in: image processing (separate colour channels), audio (stereo to mono), sensor fusion (AoS to SoA). <code>vst2/vst3/vst4</code> reverses (SoA → AoS). Far faster than manual extraction.<br><br><b>🔑 Plain terms:</b> Interleaved loads are the SIMD equivalent of a database 'deinterleave' operation. RGB image data is stored as RGBRGBRGB... — vld3q_u8 reads 48 bytes and automatically splits them into three separate registers (all R, all G, all B), ready for processing.<br><b>💡 Example:</b> <pre><code>// RGB image processing — without vld3 you'd need complex manual shuffles:\nuint8_t pixels[48];  // 16 pixels of RGB packed as RGBRGBRGB...\n\n// ONE instruction reads 48 bytes and splits into R, G, B channels:\nuint8x16x3_t rgb = vld3q_u8(pixels);\nuint8x16_t r = rgb.val[0];   // all 16 red   values\nuint8x16_t g = rgb.val[1];   // all 16 green values\nuint8x16_t b = rgb.val[2];   // all 16 blue  values\n\n// Process each channel (e.g. brightness):\nuint8x16_t grey = vaddq_u8(\n    vaddq_u8(vshrq_n_u8(r,2), vshrq_n_u8(g,1)),\n    vshrq_n_u8(b,2));         // grey ≈ 0.25R + 0.5G + 0.25B\n\n// Re-interleave back to RGBRGB... for storage:\nuint8x16x3_t out = {r, g, b};\nvst3q_u8(output, out);</code></pre>"},{"id":16,"level":"intermediate","q":"How do you perform type conversion with NEON intrinsics?","a":"Widen (narrow→wide): <code>vmovl_u8(v)</code> 8×uint8 → 8×uint16. <code>vmovl_s16(v)</code> 4×int16 → 4×int32. Narrow (wide→narrow): <code>vmovn_u16(v)</code> 8×uint16 → 8×uint8. Saturating narrow: <code>vqmovn_u16(v)</code> (clips to max instead of wrapping). Float↔int: <code>vcvtq_f32_s32(v)</code> int32→float32, <code>vcvtq_s32_f32(v)</code> float32→int32 (truncate). Reinterpret (bitcast, no conversion): <code>vreinterpretq_s32_f32(v)</code>. Float16: <code>vcvt_f32_f16(v)</code>.<br><br><b>🔑 Plain terms:</b> Type conversion is essential in DSP and ML pipelines — uint8 pixel values need widening to uint16 before summing (to avoid overflow), and float32 activations need narrowing to int8 for quantised inference. Saturating narrow prevents wrap-around corruption.<br><b>💡 Example:</b> <pre><code>// Widening: uint8 → uint16 (needed before summing pixels)\nuint8x8_t  u8   = vld1_u8(ptr);        // 8 bytes\nuint16x8_t u16  = vmovl_u8(u8);        // 8×uint16 — no overflow now\n\n// Widening multiply: uint8×uint8 → uint16\nuint8x8_t  a8 = vld1_u8(ptrA);\nuint8x8_t  b8 = vld1_u8(ptrB);\nuint16x8_t prod = vmull_u8(a8, b8);    // each product is 16-bit (max 255×255=65025)\n\n// Narrowing: float32 → int8  (quantisation for neural networks)\nfloat32x4_t  f32 = vld1q_f32(ptr_f);\nint32x4_t    i32 = vcvtq_s32_f32(f32);          // float → int32 (truncate)\nint16x4_t    i16 = vmovn_s32(i32);               // int32 → int16 (truncate)\nint8x8_t     i8  = vqmovn_s16(vcombine_s16(i16, vdup_n_s16(0)));\n//  vqmovn = saturating narrow: clips to [-128,127] instead of wrapping</code></pre>"},{"id":17,"level":"intermediate","q":"What is vtbl/vtbx and when do you use table lookups?","a":"<code>vtbl1_u8(tbl, idx)</code> uses each byte in <code>idx</code> as an index into <code>tbl</code>, returning the selected bytes. Out-of-range indices return 0 (vtbl) or leave lane unchanged (vtbx). AArch64: <code>vqtbl1q_u8(tbl, idx)</code> (128-bit table). Use for: arbitrary permutations/shuffles, colour space lookup tables (8-bit → 8-bit), bit reversal, byte-swap patterns. More general than fixed-pattern shuffle instructions. Essential for LUT-based processing at SIMD speed.<br><br><b>🔑 Plain terms:</b> vtbl is a vector lookup table — each byte in the index register selects which byte to pull from the table register. It implements arbitrary permutations and byte-level LUTs in a single instruction, which would otherwise take many individual operations.<br><b>💡 Example:</b> <pre><code>// vtbl1: each byte in 'idx' selects a byte from 'tbl'\nuint8_t table_data[8] = {0,10,20,30,40,50,60,70};\nuint8x8_t tbl = vld1_u8(table_data);\n\nuint8_t index_data[8] = {3,0,6,1,7,4,2,5};  // permutation indices\nuint8x8_t idx = vld1_u8(index_data);\n\nuint8x8_t result = vtbl1_u8(tbl, idx);\n// result = [30,0,60,10,70,40,20,50] — arbitrary permutation in 1 instruction!\n\n// AArch64 — 128-bit table (more common in practice):\nuint8x16_t tbl128 = vld1q_u8(table_data_16);\nuint8x16_t result128 = vqtbl1q_u8(tbl128, idx128);\n\n// Real use: colour space conversion LUT\n// Build a 256-entry LUT mapping sRGB → linear:\n// uint8x16_t linear = vqtbl4q_u8(lut, input);</code></pre>"},{"id":18,"level":"intermediate","q":"How does RVV masking work and what are mask registers?","a":"<code>v0</code> is the conventional mask register. Mask instructions generate a mask: <code>vmflt.vf v0, v1, f0, vl</code> sets mask bits where v1[i] < f0. Masked operations: append <code>.m</code> suffix: <code>vadd.vv v2, v3, v4, v0.t</code> adds only where mask is set, leaves other lanes as-is (.u) or undisturbed (.mu). <code>ta</code>/<code>ma</code> in vsetvli sets tail/mask agnostic policy. Masking eliminates branches inside vectorized loops. Efficient for <code>if/else</code> in SIMD without branch mispredictions.<br><br><b>🔑 Plain terms:</b> RVV masking lets you process only the elements where a condition is true — the hardware skips masked-off lanes automatically. This replaces scalar if/else branches inside SIMD loops, which would otherwise stall the pipeline.<br><b>💡 Example:</b> <pre><code>// Compute: out[i] = (src[i] > 0) ? src[i] * 2 : 0\n// Without masking: need separate loops or scalar fallback\n// With masking: one vectorised pass\n\nsize_t n = 100;\nwhile (n > 0) {\n    size_t vl = __riscv_vsetvl_e32m1(n);\n    vfloat32m1_t v = __riscv_vle32_v_f32m1(src, vl);\n\n    // Create mask: 1 where v > 0\n    vbool32_t positive = __riscv_vmfgt_vf_f32m1_b32(v, 0.0f, vl);\n\n    // Multiply only positive elements; others stay 0:\n    vfloat32m1_t doubled = __riscv_vfmul_vf_f32m1_m(\n        positive,                    // mask\n        v, 2.0f, vl);               // multiply where mask=1\n\n    // Merge: out = positive ? doubled : 0\n    vfloat32m1_t out = __riscv_vmerge_vfm_f32m1(doubled, 0.0f, positive, vl);\n    __riscv_vse32_v_f32m1(dst, out, vl);\n    src += vl; dst += vl; n -= vl;\n}</code></pre>"},{"id":19,"level":"intermediate","q":"What is RVV gather/scatter and strided load/store?","a":"Unit-stride: <code>vle32.v v1, (a0)</code> loads consecutive elements (fastest). Strided: <code>vlse32.v v1, (a0), a1</code> loads with stride a1 bytes — for every-nth element or matrix columns. Gather (indexed): <code>vloxei32.v v1, (base), vidx</code> loads from addresses base + vidx[i]. Scatter (indexed store): <code>vsoxei32.v vsrc, (base), vidx</code>. Use case: sparse operations, matrix transposition, AoS→SoA. Strided/gather are slower than unit-stride — minimise or restructure data layout.<br><br><b>🔑 Plain terms:</b> Unit-stride loads (consecutive memory) are fastest. Strided loads skip every N bytes — needed for matrix columns or AoS fields. Gather loads pick elements from arbitrary addresses — most flexible but slowest. Use unit-stride whenever possible.<br><b>💡 Example:</b> <pre><code>// Unit-stride: fastest — elements are consecutive in memory\nvfloat32m1_t v = __riscv_vle32_v_f32m1(ptr, vl);  // ptr[0..vl-1]\n\n// Strided: load every 3rd float (e.g., x-coordinates from {x,y,z} struct array)\nptrdiff_t stride = 3 * sizeof(float);\nvfloat32m1_t vx = __riscv_vlse32_v_f32m1(x_ptr, stride, vl);\n\n// Gather (indexed): arbitrary addresses\n// e.g., gather values at indices stored in vidx\nvuint32m1_t vidx = __riscv_vle32_v_u32m1(idx, vl);  // load index array\nvfloat32m1_t gathered = __riscv_vloxei32_v_f32m1(base, vidx, vl);\n\n// Scatter (indexed store):\n__riscv_vsoxei32_v_f32m1(base, vidx, values, vl);\n\n// Performance hierarchy: unit-stride >> strided >> indexed (gather/scatter)\n// Restructure data to AoS→SoA to avoid strided/gather when possible</code></pre>"},{"id":20,"level":"intermediate","q":"How do you handle data alignment for NEON/SIMD performance?","a":"AArch64 handles any alignment for loads/stores (no fault). But: aligned accesses (to 16-byte boundaries for 128-bit vectors) are faster on many microarchitectures (Cortex-A76/A78, Apple Silicon). Align heap: <code>float* p = (float*)aligned_alloc(16, n*sizeof(float))</code>. Align stack: <code>__attribute__((aligned(16))) float arr[128]</code>. Check alignment: <code>((uintptr_t)ptr & 15) == 0</code>. For critical inner loops, assert alignment and use aligned load variants (<code>vld1q</code> handles both — compiler may emit better code with alignment hints).<br><br><b>🔑 Plain terms:</b> AArch64 handles misaligned loads without faulting, but aligned accesses (to 16-byte boundaries for 128-bit vectors) are faster on many CPUs. The most important alignment fix: ensure heap allocations and stack arrays are 16-byte aligned.<br><b>💡 Example:</b> <pre><code>// Aligned heap allocation:\nfloat *buf = (float *)aligned_alloc(16, n * sizeof(float));\n// 16 bytes = 128 bits = one NEON register width\n\n// Aligned stack array:\nfloat arr[128] __attribute__((aligned(16)));\n\n// Check alignment at runtime (optional):\nassert(((uintptr_t)buf & 15) == 0);\n\n// For critical loops — give the compiler an alignment hint:\nvoid process(float *__restrict__ data, int n) {\n    data = (float *)__builtin_assume_aligned(data, 16);\n    // Compiler can now emit aligned load instructions\n    for (int i = 0; i < n; i++) data[i] *= 2.0f;\n}\n\n// malloc() guarantees 8-byte alignment — not enough for 128-bit NEON\n// Use aligned_alloc(16, ...) or posix_memalign(&ptr, 16, size)</code></pre>"},{"id":21,"level":"intermediate","q":"What is ARM SVE and how does it differ from NEON?","a":"SVE (Scalable Vector Extension, Armv8.2+): predicate-based vector ISA with length-agnostic programming (same source code runs on 128–2048-bit implementations). SVE2 adds more operations. Used in: Fujitsu A64FX (512-bit, used in Fugaku supercomputer), AWS Graviton3/4, Ampere Altra, Apple M4. Differences from NEON: scalable length, predicate registers (not mask vectors), gather/scatter, horizontal reductions, more addressing modes. NEON fixed 128-bit; SVE can be 128-2048. Use SVE intrinsics from <code>&lt;arm_sve.h&gt;</code>.<br><br><b>🔑 Plain terms:</b> SVE is the successor to NEON on high-performance ARM chips (servers, HPC). The key difference: NEON always processes exactly 128 bits; SVE processes a hardware-determined width (128 to 2048 bits) using the same source code — just like RVV.<br><b>💡 Example:</b> <pre><code>// NEON: fixed 128-bit, you know exactly how many elements per loop\nfloat32x4_t v = vld1q_f32(ptr);   // always 4 floats\n\n// SVE: length-agnostic — hardware tells you the vector length at runtime\n#include <arm_sve.h>\nsvfloat32_t v = svld1_f32(svptrue_b32(), ptr);  // could be 4,8,16... floats!\n\n// SVE strip-mining (same pattern as RVV):\nuint64_t n = 1000;\nfor (uint64_t i = 0; i < n; ) {\n    svbool_t pg = svwhilelt_b32(i, n);  // predicate: active lanes\n    svfloat32_t va = svld1_f32(pg, a+i);\n    svfloat32_t vb = svld1_f32(pg, b+i);\n    svst1_f32(pg, c+i, svadd_f32_z(pg, va, vb));\n    i += svcntw();   // advance by hardware's actual vector length\n}\n\n// AWS Graviton3 (SVE 256-bit): 8 floats/cycle\n// Fujitsu A64FX (SVE 512-bit): 16 floats/cycle — same binary!</code></pre>"},{"id":22,"level":"intermediate","q":"How do you profile and optimise NEON code performance?","a":"1. Use <code>perf stat -e cycles,instructions,cache-misses ./prog</code>. 2. Check IPC — well-vectorised code: 2-4+ IPC. 3. <code>perf annotate</code> shows hot assembly. 4. Look for pipeline stalls: <code>perf stat -e stalled-cycles-frontend,stalled-cycles-backend</code>. 5. Check if NEON is actually used: <code>objdump -d binary | grep -E \"ld1|st1|fmla|fadd\"</code>. 6. Memory bandwidth bound? Use <code>-e mem-loads,mem-stores</code>. 7. Always benchmark at <code>-O2/-O3</code> and with CPU frequency scaling disabled (<code>cpupower frequency-set -g performance</code>).<br><br><b>🔑 Plain terms:</b> Profiling NEON code requires verifying the SIMD instructions actually appear in the binary (check with objdump), then measuring IPC (instructions per cycle) — well-vectorised code should exceed 2.0 IPC. Memory bandwidth is often the real bottleneck for large arrays.<br><b>💡 Example:</b> <pre><code># Build with symbols for profiling:\ngcc -O2 -march=native -g prog.c -o prog\n\n# Check NEON instructions are actually generated:\nobjdump -d prog | grep -E 'ld1|st1|fmla|fadd|fmul' | head -20\n# If empty: vectorization failed — check with -fopt-info-vec-missed\n\n# Profile with perf:\nperf stat -e cycles,instructions,cache-misses ./prog\n# Good vectorised code: instructions/cycles > 2.0\n\n# Check for memory bottleneck:\nperf stat -e cache-references,cache-misses,mem-loads ./prog\n# High cache-miss rate → memory bound → restructure data layout\n\n# Disable CPU frequency scaling for consistent benchmarks:\nsudo cpupower frequency-set -g performance\n# Then run benchmark, restore:\nsudo cpupower frequency-set -g ondemand</code></pre>"},{"id":23,"level":"intermediate","q":"What are common pitfalls when writing NEON intrinsics?","a":"1. Type mismatch: <code>float32x4_t</code> vs <code>float32x2_t</code> — always check return types. 2. Uninitialised lanes causing non-deterministic results. 3. Missing <code>-march</code> flag causing scalar fallback (check assembly). 4. Assuming lane ordering = byte ordering (it doesn't — NEON is element-indexed, not byte-indexed). 5. ABI: vector types may not be passed in vector registers in all calling conventions. 6. Over-optimising before profiling. 7. Not handling the scalar tail loop. 8. Using <code>vuzp/vzip</code> when a simpler operation exists.<br><br><b>🔑 Plain terms:</b> NEON pitfalls are mostly type-system traps — the C type system knows about int32x4_t vs float32x4_t, but a cast between them is silently wrong. Always verify with -fsanitize=address and check the assembly output to confirm NEON instructions were generated.<br><b>💡 Example:</b> <pre><code>// Pitfall 1 — type mismatch (common):\nfloat32x4_t a = vld1q_f32(ptr);\nint32x4_t   b = vld1q_s32(ptr);   // same bytes, different interpretation\n// a = vaddq_f32(a, b);  // COMPILE ERROR — type mismatch caught\n\n// Pitfall 2 — uninitialised lanes (subtle):\nfloat32x4_t v;   // uninitialised — lane values undefined!\nv = vsetq_lane_f32(1.0f, v, 0);  // only lane 0 set — others garbage\n// FIX: float32x4_t v = vdupq_n_f32(0.0f);  // initialise all to 0\n\n// Pitfall 3 — forgetting scalar tail:\nfor (int i = 0; i <= n-4; i+=4) { /* NEON */ }\n// Elements n-3..n-1 are SILENTLY SKIPPED if n%4 != 0!\n// Always add: for (; i < n; i++) { /* scalar */ }\n\n// Pitfall 4 — assuming vectorization (check the assembly!):\n// gcc -O2 -S prog.c -o prog.s && grep -i 'fmla\\|ld1\\|st1' prog.s</code></pre>"},{"id":24,"level":"intermediate","q":"How do you use RVV with C intrinsics?","a":"Include <code>&lt;riscv_vector.h&gt;</code>. Configure: <code>size_t vl = __riscv_vsetvl_e32m1(n)</code>. Load: <code>vfloat32m1_t va = __riscv_vle32_v_f32m1(ptr, vl)</code>. FMA: <code>vfloat32m1_t vc = __riscv_vfmacc_vv_f32m1(acc, va, vb, vl)</code>. Store: <code>__riscv_vse32_v_f32m1(out, vc, vl)</code>. Reduction: <code>vfloat32m1_t s = __riscv_vfredusum_vs_f32m1_f32m1(v, zero, vl)</code>. Compile: <code>-march=rv64gcv -O2</code>. LMUL choice: m1 (safe), m2/m4/m8 (more throughput, fewer available registers).<br><br><b>🔑 Plain terms:</b> RVV C intrinsics follow the naming pattern __riscv_{op}_{type}_{returntype}. The vl parameter appears at the end of every intrinsic — always pass the vl returned by the most recent vsetvli. Compile with -march=rv64gcv to enable the vector extension.<br><b>💡 Example:</b> <pre><code>#include <riscv_vector.h>\n\n// Complete RVV dot product example:\nfloat dot_product_rvv(const float *a, const float *b, size_t n) {\n    vfloat32m1_t acc = __riscv_vfmv_v_f_f32m1(0.0f, 1);  // accumulator\n\n    while (n > 0) {\n        size_t vl = __riscv_vsetvl_e32m1(n);\n        vfloat32m1_t va = __riscv_vle32_v_f32m1(a, vl);\n        vfloat32m1_t vb = __riscv_vle32_v_f32m1(b, vl);\n        acc = __riscv_vfmacc_vv_f32m1(acc, va, vb, vl);  // acc += va*vb\n        a += vl; b += vl; n -= vl;\n    }\n\n    // Horizontal sum reduction:\n    vfloat32m1_t zero = __riscv_vfmv_v_f_f32m1(0.0f, 1);\n    vfloat32m1_t sum  = __riscv_vfredusum_vs_f32m1(acc, zero, /* vl */ 1);\n    return __riscv_vfmv_f_s_f32m1_f32(sum);\n}\n// Compile: riscv64-unknown-linux-gnu-gcc -march=rv64gcv -O2 prog.c</code></pre>"},{"id":25,"level":"intermediate","q":"What is the AoS vs SoA memory layout and why does it matter for SIMD?","a":"AoS (Array of Structures): <code>struct {float x,y,z;} pts[N]</code> — memory: xyzxyzxyz. SoA (Structure of Arrays): <code>float x[N], y[N], z[N]</code> — memory: xxx...yyy...zzz. SIMD prefers SoA: loading 4 x-values is one contiguous load. With AoS you need gather instructions or vld3 to separate channels. SoA is more cache-friendly for processing one field across many elements. AoS is better for passing individual elements around. Hybrid: tiles of SoA (AoSoA) balances both. NEON vld3/vst3 converts AoS↔SoA at load/store time.<br><br><b>🔑 Plain terms:</b> AoS (Array of Structures) packs all fields of one element together — great for accessing a single element's all fields. SoA (Structure of Arrays) packs all elements of one field together — great for SIMD because loading 4 x-coordinates is one contiguous load.<br><b>💡 Example:</b> <pre><code>// AoS — natural for OOP, bad for SIMD:\nstruct Point { float x, y, z; };\nPoint pts[N];  // memory: x0 y0 z0 x1 y1 z1 x2 y2 z2 ...\n\n// To load 4 x-values with NEON, need vld3 to deinterleave — slower:\nfloat32x4x3_t xyz = vld3q_f32((float*)pts);  // loads 12 floats, splits channels\nfloat32x4_t x_vals = xyz.val[0];  // [x0,x1,x2,x3]\n\n// SoA — awkward for OOP, perfect for SIMD:\nfloat xs[N], ys[N], zs[N];  // memory: x0 x1 x2 x3 ... | y0 y1 ...\n\n// Load 4 x-values — one contiguous load:\nfloat32x4_t x_vals = vld1q_f32(xs + i);  // [x0,x1,x2,x3] — fast!\n\n// Practical rule:\n// Accessing ONE element's ALL fields → AoS\n// Applying ONE operation to ALL elements' same field → SoA (use for SIMD)\n// Hybrid AoSoA (tiles of SoA) is used in production ML/physics engines</code></pre>"},{"id":26,"level":"intermediate","q":"What are widening and narrowing operations and when do you need them?","a":"Widening: expand elements to larger type before arithmetic (avoids overflow). <code>vmovl_u8(v)</code>: 8×uint8 → 8×uint16. Widening multiply: <code>vmull_u8(a8, b8)</code>: 8×uint8 * 8×uint8 → 8×uint16 result. Critical for: accumulating uint8 pixel sums (256*256=65536 > uint8 max), fixed-point DSP. Narrowing: <code>vmovn_u16(v)</code> truncates. Saturating narrow: <code>vqmovn</code> clips at max value instead of wrapping. Rounding narrow: <code>vrshrn_n_u16(v, shift)</code> — shifts right with rounding before narrowing.<br><br><b>🔑 Plain terms:</b> Widening is critical when accumulating values that can overflow their original type — uint8 pixels (max 255) overflow if you add more than 255 of them in an uint8 accumulator. Widen to uint16 or uint32 first. Saturating narrow (vqmovn) is safer than truncating narrow (vmovn) when values might exceed the target range.<br><b>💡 Example:</b> <pre><code>// WHY widening matters — overflow example:\n// Sum 16 uint8 pixels (each 0-255):\nuint8x16_t pix = vld1q_u8(pixels);\n// uint8 sum would overflow at 255! Use widening:\n\n// Step 1: widen 8 bytes to 8 uint16:\nuint16x8_t lo = vmovl_u8(vget_low_u8(pix));   // [p0..p7]  as uint16\nuint16x8_t hi = vmovl_u8(vget_high_u8(pix));  // [p8..p15] as uint16\n\n// Step 2: safe accumulation in uint16:\nuint16x8_t sum16 = vaddq_u16(lo, hi);\n\n// Narrowing — truncating (wraps on overflow):\nuint8x8_t narrow_t = vmovn_u16(sum16);   // truncate: 256→0 (wrong!)\n\n// Narrowing — saturating (clips on overflow):\nuint8x8_t narrow_s = vqmovn_u16(sum16);  // saturate: 256→255 (correct!)\n\n// Widening multiply (key for dot product of byte vectors):\nuint16x8_t prod = vmull_u8(a8, b8);  // each byte*byte → uint16 (no overflow)</code></pre>"},{"id":27,"level":"intermediate","q":"How do you implement a matrix-vector multiply with NEON?","a":"For 4×4 * 4 (common in graphics/ML): load matrix columns as float32x4_t, multiply-accumulate with broadcast scalar from vector. <code>vfmaq_laneq_f32(acc, col0, vec, 0)</code> multiplies col0 by lane 0 of vec and adds to acc. Repeat for lanes 1,2,3. For larger: tile output, process multiple output elements per inner loop. Use <code>vld1q_f32_x4</code> to load 4 columns in one instruction. For ML inference, quantized int8 matmul: <code>vmull_s8</code> + <code>vpaddlq_s16</code> accumulation pattern.<br><br><b>🔑 Plain terms:</b> Matrix-vector multiply is the core of both graphics (transforming 3D points) and neural network inference (linear layers). NEON's vfmaq_laneq_f32 is the key — it multiplies one column of the matrix by one scalar element of the vector and accumulates.<br><b>💡 Example:</b> <pre><code>// 4×4 matrix × 4-element vector  (common in 3D graphics and ML)\n// mat columns: col0..col3, each float32x4_t\n// vec elements: scalar floats v0..v3\n\nfloat32x4_t mat_vec_mul(const float *mat, const float *vec) {\n    // Load matrix columns:\n    float32x4_t col0 = vld1q_f32(mat);\n    float32x4_t col1 = vld1q_f32(mat + 4);\n    float32x4_t col2 = vld1q_f32(mat + 8);\n    float32x4_t col3 = vld1q_f32(mat + 12);\n\n    // Load vector into one register:\n    float32x4_t v = vld1q_f32(vec);  // [v0,v1,v2,v3]\n\n    // result = col0*v0 + col1*v1 + col2*v2 + col3*v3\n    float32x4_t res = vmulq_laneq_f32(col0, v, 0);    // col0 * v0\n    res = vfmaq_laneq_f32(res, col1, v, 1);            // += col1 * v1\n    res = vfmaq_laneq_f32(res, col2, v, 2);            // += col2 * v2\n    res = vfmaq_laneq_f32(res, col3, v, 3);            // += col3 * v3\n    return res;\n}  // 4 mul + 12 fma = 16 operations in ~4 instructions</code></pre>"},{"id":28,"level":"intermediate","q":"What is the NEON vpadd/vpmax/vpmin and when do you use horizontal operations?","a":"Pairwise add: <code>vpaddq_f32(a, b)</code> adds adjacent pairs — [a0+a1, a2+a3, b0+b1, b2+b3]. Pairwise max: <code>vpmaxq_f32</code>. Pairwise min: <code>vpminq_f32</code>. Horizontal sum (AArch64): <code>vaddvq_f32(v)</code> sums all 4 lanes to scalar. Horizontal max: <code>vmaxvq_f32(v)</code>. Use for: final reduction of accumulator, computing max of 4 values, box filter with summing adjacent pixels. In AArch32 only pairwise (need multiple steps for full reduction); AArch64 has efficient horizontal reductions.<br><br><b>🔑 Plain terms:</b> Pairwise operations (vpadd, vpmax, vpmin) combine adjacent pairs — [a0,a1,a2,a3] + [b0,b1,b2,b3] → [a0+a1, a2+a3, b0+b1, b2+b3]. Horizontal operations (vaddvq, vmaxvq) reduce ALL lanes to a single scalar. Use horizontal ops sparingly — they break the parallel processing pipeline.<br><b>💡 Example:</b> <pre><code>float32x4_t v = vld1q_f32((float[]){1,2,3,4});\nfloat32x4_t w = vld1q_f32((float[]){5,6,7,8});\n\n// Pairwise add — adjacent pairs combined:\nfloat32x4_t pw = vpaddq_f32(v, w);  // [1+2, 3+4, 5+6, 7+8] = [3,7,11,15]\n\n// Horizontal sum — reduce all 4 lanes to one scalar (AArch64 only):\nfloat total = vaddvq_f32(v);         // 1+2+3+4 = 10.0f  (1 instruction!)\nfloat max_v = vmaxvq_f32(v);         // max(1,2,3,4) = 4.0f\n\n// Common pattern — dot product reduction at the end:\nfloat32x4_t acc = /* ... accumulated 4 partial sums ... */;\nfloat result = vaddvq_f32(acc);      // final horizontal sum\n\n// AArch32 didn't have vaddvq — needed 3 pairwise steps:\n// vadd_f32(vget_high_f32(v), vget_low_f32(v)) then vpadd_f32 once more</code></pre>"}],"c":[{"id":1,"level":"basic","q":"What is the difference between a pointer and an array in C?","a":"An array is a fixed-size contiguous allocation. The array name decays to a pointer to its first element in most expressions (but not all — <code>sizeof arr</code> gives array size, not pointer size). A pointer is a variable holding an address, can be reassigned, can be NULL. <code>int arr[5]</code> vs <code>int *ptr = arr</code>. <code>ptr++</code> advances pointer; you cannot do <code>arr++</code>. <code>sizeof ptr</code> = 8 (on 64-bit); <code>sizeof arr</code> = 20.<br><br><b>🔑 Plain terms:</b> An array is a fixed row of post boxes nailed to the wall — you cannot move or reassign them. A pointer is a piece of paper with an address written on it — you can erase and write a new address.<br><b>💡 Example:</b> <pre><code>int arr[5]={10,20,30,40,50};\nint *p=arr;   // p points to arr[0]\np++;          // p now points to arr[1]\nprintf(\"%d\",*p); // 20\n// arr++ is a compile ERROR — arrays can't be reassigned\nprintf(\"%zu\",sizeof(arr)); // 20 (5×4 bytes)\nprintf(\"%zu\",sizeof(p));   // 8  (pointer size on 64-bit)</code></pre>"},{"id":2,"level":"basic","q":"How does memory management work in C?","a":"Stack: automatic management, LIFO, fast, limited (1-8MB). Local variables live here. Heap: manual management. <code>malloc(n)</code> allocates n bytes uninitialized. <code>calloc(count, size)</code> allocates and zero-initialises. <code>realloc(ptr, new_size)</code> resizes. <code>free(ptr)</code> releases. Every malloc/calloc must have a matching free. Failure: <code>malloc</code> returns NULL — always check. Use-after-free and double-free are undefined behaviour.<br><br><b>🔑 Plain terms:</b> Stack is like a cafeteria tray pile — automatic, fast, limited. Heap is a storage warehouse — you book space manually and must return it yourself when done.<br><b>💡 Example:</b> <pre><code>void func() {\n    int x=5;           // stack: auto-destroyed when func returns\n    int *p=malloc(40); // heap: survives after func returns\n    if(!p){perror(\"malloc\");return;}\n    p[0]=42;\n    free(p); p=NULL;   // must free manually — no GC!\n}</code></pre>"},{"id":3,"level":"basic","q":"What is the difference between malloc, calloc, and realloc?","a":"<code>malloc(n)</code>: allocates n bytes, content is uninitialised (garbage). <code>calloc(count, size)</code>: allocates count×size bytes, zero-initialises all — safer but involves a memset. <code>realloc(ptr, new_size)</code>: resizes existing allocation — may return same or different pointer. If new_size > old, new bytes are uninitialised. If ptr is NULL, acts like malloc. If new_size is 0, behaviour is implementation-defined (avoid). Always: <code>new_ptr = realloc(ptr, sz); if (!new_ptr) { free(ptr); error; } ptr = new_ptr;</code><br><br><b>🔑 Plain terms:</b> malloc = 'give me a room, I don't care what's inside'. calloc = 'give me a clean empty room'. realloc = 'I need my room to be bigger — move me if needed and keep my stuff'.<br><b>💡 Example:</b> <pre><code>int *a=malloc(10*sizeof(int));  // uninitialised\nint *b=calloc(10,sizeof(int));  // all zeros — safer for buffers\n// Growing from 10 to 20 elements:\nint *tmp=realloc(a,20*sizeof(int));\nif(!tmp){free(a);return -1;} // handle failure without leak\na=tmp; a[10]=99;</code></pre>"},{"id":4,"level":"basic","q":"What are null pointers and dangling pointers?","a":"Null pointer: <code>int *p = NULL</code>. Dereferencing NULL is undefined behaviour (usually SIGSEGV). Always check after malloc: <code>if (!ptr) { perror(\"malloc\"); exit(1); }</code>. Dangling pointer: points to freed memory (<code>free(p); *p = 5;</code> is UB) or out-of-scope stack memory (<code>return &local_var;</code>). Best practice: set pointer to NULL after free: <code>free(p); p = NULL;</code>. Use AddressSanitizer (<code>-fsanitize=address</code>) to detect both.<br><br><b>🔑 Plain terms:</b> Null pointer = a phone number that says '000-0000' — clearly invalid. Dangling pointer = a number for a demolished house — looks real but leads to disaster when called.<br><b>💡 Example:</b> <pre><code>int *p=NULL; *p=5; // CRASH: OS catches null dereference\nint *q=malloc(4); free(q);\n*q=5; // SILENT UB: memory may be reused — no crash, corrupted data!\n// Fix: q=NULL after free so *q crashes loudly next time</code></pre>"},{"id":5,"level":"basic","q":"What does the const keyword mean with pointers?","a":"<code>const int *p</code>: pointer to const int — cannot modify <code>*p</code>, can change <code>p</code> itself. <code>int *const p</code>: const pointer to int — can modify <code>*p</code>, cannot change <code>p</code>. <code>const int *const p</code>: both. Read right-to-left: \"p is const pointer to int\" vs \"p is pointer to const int\". Function parameters: <code>void f(const char *str)</code> promises not to modify the string. Helps the compiler optimise and documents intent.<br><br><b>🔑 Plain terms:</b> Read pointer declarations right-to-left. 'const' before '*' = data is constant. 'const' after '*' = the pointer itself is constant.<br><b>💡 Example:</b> <pre><code>const int *p;       // pointer to const int — data fixed, ptr moves\nint *const p;       // const pointer to int — ptr fixed, data changes\n// Real use: promise not to modify array:\nvoid print(const int *arr, int n){\n    // arr[0]=5; // compile error — protects callers!\n    for(int i=0;i&lt;n;i++) printf(\"%d\",arr[i]);\n}</code></pre>"},{"id":6,"level":"basic","q":"What is the difference between struct and union?","a":"<code>struct</code>: all members exist simultaneously in memory, sequentially laid out. Size = sum of member sizes + alignment padding. <code>union</code>: all members overlap at the same address. Size = size of largest member. Only one member is \"active\" at a time — writing one and reading another is type-punning (UB in C++ but valid in C99+). Use union for: type-punning, variant types (with a tag field), memory-efficient storage. Tagged union pattern: <code>struct { int type; union { int i; float f; char *s; } value; }</code>.<br><br><b>🔑 Plain terms:</b> struct is a form with many fields — all exist simultaneously. union is a whiteboard — you can write a number OR a string; writing one erases the other.<br><b>💡 Example:</b> <pre><code>typedef struct{\n    int type;  // 0=int, 1=float, 2=string\n    union{int i; float f; char *s;} val;\n} Variant;\nVariant v; v.type=1; v.val.f=3.14f;\n// sizeof(union) = sizeof(largest member)</code></pre>"},{"id":7,"level":"basic","q":"What are the C storage classes?","a":"<code>auto</code>: default for local variables, automatic duration (stack). <code>static</code>: local — persists across calls (in BSS/data segment). File scope — limits visibility to the translation unit (internal linkage). <code>extern</code>: declares a variable/function defined elsewhere (external linkage). <code>register</code>: hint for register storage (ignored by modern compilers, cannot take address). <code>_Thread_local</code> (C11): thread-local storage. Most important: <code>static</code> for encapsulation and persistent state.<br><br><b>🔑 Plain terms:</b> Storage class controls where a variable lives (stack vs data segment) and who can see it. static inside a function = 'remember my value between calls'.<br><b>💡 Example:</b> <pre><code>int counter(){\n    static int c=0; // initialised ONCE, persists across calls\n    return ++c;     // returns 1,2,3,4... per call\n}\nstatic void helper(){} // only callable within this .c file</code></pre>"},{"id":8,"level":"basic","q":"What is the volatile keyword and when do you need it?","a":"<code>volatile</code> tells the compiler the variable may change outside normal program flow, preventing it from caching the value in a register or eliminating reads/writes as \"redundant\". When needed: memory-mapped hardware registers, variables modified by ISRs (interrupt service routines), shared memory with DMA. Example: <code>volatile uint32_t *reg = (volatile uint32_t *)0x40001000; *reg = 0x01;</code>. Not a substitute for proper synchronization in multi-threaded code — use atomics (<code>_Atomic</code>) for that.<br><br><b>🔑 Plain terms:</b> volatile tells the compiler: 'don't be clever — read from memory every time'. Hardware or interrupts might change this variable behind your back.<br><b>💡 Example:</b> <pre><code>// Without volatile: compiler may read register ONCE, loop forever\n// With volatile: re-reads the hardware register every iteration\nvolatile uint32_t *STATUS=(volatile uint32_t *)0x40001000;\nwhile(!(*STATUS & 0x01)){} // polls hardware correctly</code></pre>"},{"id":9,"level":"basic","q":"What is a segmentation fault and how do you debug it?","a":"SIGSEGV occurs when a process accesses memory it shouldn't: dereference NULL/invalid pointer, write to read-only memory, stack overflow, out-of-bounds array access. Debug: <code>gdb ./prog; run; bt</code> (backtrace). Valgrind: <code>valgrind --tool=memcheck ./prog</code>. AddressSanitizer: compile with <code>-fsanitize=address -g</code> — gives exact line number. Core dumps: <code>ulimit -c unlimited</code> then <code>gdb ./prog core</code>. Enable all warnings: <code>-Wall -Wextra</code>.<br><br><b>🔑 Plain terms:</b> The OS kills your process with SIGSEGV when it touches memory it doesn't own — like using the wrong key on a door it can't open.<br><b>💡 Example:</b> <pre><code>int *p=NULL; *p=5;       // CRASH: null dereference\nint arr[10]; arr[10]=1;  // out-of-bounds write\n// Debug: gcc -fsanitize=address -g prog.c\n// Output: ERROR: heap-buffer-overflow at prog.c:42</code></pre>"},{"id":10,"level":"basic","q":"What is the difference between #define and const?","a":"<code>#define MAX 100</code>: preprocessor text substitution before compilation — no type, no scope, no debug visibility, no address. <code>const int MAX = 100</code>: typed, scoped constant — visible in debugger, can take address, respects scope. <code>#define</code> for: header guards, code generation macros, platform-specific switches. <code>const</code> for: typed constants. For enum-style constants, prefer <code>enum { MAX = 100 };</code>. Avoid function-like macros — use <code>static inline</code> functions instead.<br><br><b>🔑 Plain terms:</b> #define is dumb find-and-replace before compilation — no type, no scope. const is a real typed variable the compiler understands and debugger can show.<br><b>💡 Example:</b> <pre><code>#define SQUARE(x) x*x\nSQUARE(1+2) // expands to 1+2*1+2=5, not 9! Macro bug!\nstatic inline int sq(int x){return x*x;} // correct: 9\n// Use #define only for: header guards, platform switches</code></pre>"},{"id":11,"level":"basic","q":"How do you work with strings in C?","a":"C strings: null-terminated <code>char</code> arrays. <code>char s[] = \"hello\"</code> (6 bytes: 5 + '\\0'). String literal: <code>const char *p = \"hello\"</code> (read-only). Key functions in <code>&lt;string.h&gt;</code>: <code>strlen</code>, <code>strcpy/strncpy</code>, <code>strcat/strncat</code>, <code>strcmp/strncmp</code>, <code>strstr</code>, <code>strchr</code>, <code>memcpy/memmove/memset</code>. Always prefer n-variants (<code>strncpy</code>, <code>snprintf</code>) to prevent buffer overflows. <code>snprintf(buf, sizeof(buf), \"fmt\", args)</code> is safe string formatting.<br><br><b>🔑 Plain terms:</b> C strings are just arrays of characters with a '\\0' sentinel at the end. One missing null terminator causes catastrophic overreads.<br><b>💡 Example:</b> <pre><code>char dest[10];\n// UNSAFE: strcpy(dest,src); crashes if src&gt;9 chars\n// SAFE:\nsnprintf(dest,sizeof(dest),\"%s\",src); // always null-terminates\n// strcmp returns 0 for EQUAL (not true!):\nif(strcmp(s1,s2)==0) /* correct */ ;</code></pre>"},{"id":12,"level":"basic","q":"What are function pointers and how do you declare them?","a":"<code>int (*fp)(int, int)</code> — pointer to function taking two ints, returning int. Assign: <code>fp = &add</code> or <code>fp = add</code>. Call: <code>fp(3, 4)</code> or <code>(*fp)(3, 4)</code>. Typedef for readability: <code>typedef int (*BinOp)(int, int)</code>. Array: <code>BinOp ops[] = {add, sub, mul}</code>. Use for: callbacks, event handlers, plugin systems, dispatch tables. Common in: qsort comparators, signal handlers, OS kernel interfaces. Callbacks: <code>void sort(int *arr, int n, int (*cmp)(int,int))</code>.<br><br><b>🔑 Plain terms:</b> A function pointer stores a function's address so you can call a different function at runtime just by changing the pointer — like swapping the recipe book a robot chef reads from.<br><b>💡 Example:</b> <pre><code>int add(int a,int b){return a+b;}\nint sub(int a,int b){return a-b;}\ntypedef int(*Op)(int,int);\nOp ops[]={add,sub};\nprintf(\"%d %d\",ops[0](10,3),ops[1](10,3)); // 13 7\n// Also used for qsort callbacks and event handlers</code></pre>"},{"id":13,"level":"basic","q":"What are the standard C integer types and their sizes?","a":"Guaranteed sizes (C99 <code>&lt;stdint.h&gt;</code>): <code>int8_t/uint8_t</code> (8-bit), <code>int16_t/uint16_t</code> (16-bit), <code>int32_t/uint32_t</code> (32-bit), <code>int64_t/uint64_t</code> (64-bit). Platform-dependent: <code>char</code> (≥8), <code>short</code> (≥16), <code>int</code> (≥16, usually 32), <code>long</code> (≥32, 32 on Windows 64-bit, 64 on Linux 64-bit), <code>long long</code> (≥64). Use <code>&lt;stdint.h&gt;</code> types for portable code. <code>size_t</code> for sizes, <code>ptrdiff_t</code> for pointer differences.<br><br><b>🔑 Plain terms:</b> Plain C types (int, long) have platform-dependent sizes — 'long' is 4 bytes on Windows 64-bit but 8 bytes on Linux 64-bit. Use stdint.h types for guaranteed-width integers.<br><b>💡 Example:</b> <pre><code>// BAD: 'long' is 4 bytes on Windows, 8 on Linux 64-bit\nlong data=0x1234567890ABCDEF; // may truncate on Windows!\n// GOOD: explicit width guaranteed everywhere\nuint64_t data=0x1234567890ABCDEF; // always 8 bytes\nsize_t len=strlen(str); // for sizes — never plain int</code></pre>"},{"id":14,"level":"basic","q":"What are b
