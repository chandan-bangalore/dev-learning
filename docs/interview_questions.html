eB): the 5G base station. Split architecture: CU (Central Unit — handles PDCP, RRC, higher layers), DU (Distributed Unit — handles RLC, MAC, lower PHY), RU/AAU (Radio Unit — handles upper PHY and RF). Connected to 5GC (core network) via NG interface, to other gNBs via Xn. UE (User Equipment): the mobile device (smartphone, modem, IoT device). Contains: RF front end, baseband modem, NAS/RRC stack. UE capabilities reported to gNB: supported bands, MIMO layers, bandwidth, features. gNB manages resource allocation, scheduling, power control, handover. UE performs measurements and reports to gNB."},{"id":6,"level":"basic","q":"What is the 5G NR frame structure?","a":"5G NR frame: 10 ms total. 1 frame = 10 subframes. 1 subframe = 1 ms. Each subframe contains 2^μ slots (1 slot for μ=0, 2 for μ=1, etc.). Slot = 14 OFDM symbols (normal CP). Each symbol has a CP (Cyclic Prefix) prepended. CP duration = 144/2048 · (1/SCS) for normal, 512/2048 for first symbol in slot. Frame/subframe numbering is 10-bit SFN (System Frame Number). Downlink/Uplink/Flexible: symbols configured as D (downlink), U (uplink), or X (flexible) via TDD pattern. Guard period between DL and UL. Periodicity of TDD pattern configurable (e.g., DDDSUUU or DDDDD)."},{"id":7,"level":"basic","q":"What are the key 5G NR physical layer channels?","a":"Downlink channels: PDSCH (Physical Downlink Shared Channel — user data), PDCCH (Physical Downlink Control Channel — scheduling grants/assignments), PBCH (Physical Broadcast Channel — system information in SSB), CSIRS (Channel State Information Reference Signal), DMRS (Demodulation Reference Signal). Uplink channels: PUSCH (Physical Uplink Shared Channel — user data/UCI), PUCCH (Physical Uplink Control Channel — HARQ ACK/NACK, SR, CSI reports), PRACH (Physical Random Access Channel — initial access), DMRS. Signals: PSS/SSS (Synchronisation), SSB (SS/PBCH Block), SRS (Sounding Reference Signal)."},{"id":8,"level":"basic","q":"What is the 5G NR synchronisation signal block (SSB)?","a":"The SSB (SS/PBCH Block) is the primary cell discovery signal transmitted periodically by the gNB. It occupies 4 OFDM symbols × 20 RBs (240 subcarriers) = 4×240 REs. Contents: PSS (Primary Sync Signal, 127 subcarriers, m-sequence) on symbol 0, SSS (Secondary Sync Signal, 127 subcarriers, Gold sequence) on symbol 2, PBCH (Physical Broadcast Channel with MIB) on symbols 1,2,3. Cell ID = 3×NID1 + NID2 (0-1007 unique cell IDs). SSB periodicity: 5, 10, 20, 40, 80, 160 ms (default 20 ms for initial access). Multiple SSBs per half-frame for beam sweeping — up to 8 (FR1) or 64 (FR2)."},{"id":9,"level":"basic","q":"What is OFDM and how is it implemented in 5G NR?","a":"OFDM (Orthogonal Frequency Division Multiplexing): data mapped to QAM symbols on N subcarriers, taken by IFFT to time domain, cyclic prefix added, transmitted. Receiver: remove CP, FFT, one-tap equaliser per subcarrier. 5G NR transmitter chain: bit stream → CRC → LDPC/polar encoding → rate matching → scrambling → modulation (QPSK/16QAM/64QAM/256QAM) → layer mapping → precoding → RE mapping (resource grid) → IFFT → CP addition → digital front end → DAC → RF. Receiver: reverse order. CP length chosen to exceed channel delay spread — eliminates ISI. Subcarrier spacing determines robustness to Doppler and phase noise."},{"id":10,"level":"basic","q":"What is HARQ in 5G NR?","a":"HARQ (Hybrid Automatic Repeat reQuest) combines FEC (Forward Error Correction) with ARQ retransmission. If a packet is decoded incorrectly, the UE sends NACK; gNB retransmits. Chase Combining (CC): retransmit same bits, receiver MRC-combines all copies. Incremental Redundancy (IR): retransmit different redundancy versions (RV0, RV1, RV2, RV3) — different punctured versions of rate-1/3 mother code. IR has better performance — each retransmission adds new information. 5G NR HARQ: up to 16 parallel HARQ processes per UE (vs 8 in LTE). HARQ round-trip time: UE receives PDSCH, sends HARQ feedback on PUCCH, gNB decodes feedback, schedules retransmission. Minimum RTT ~4 ms (FR1)."},{"id":11,"level":"basic","q":"What is the difference between FDD and TDD in 5G NR?","a":"FDD (Frequency Division Duplex): uplink and downlink on separate frequency bands simultaneously. Fixed DL/UL split. Requires paired spectrum. Low latency (simultaneous DL/UL). Used for: LTE bands, n1, n3, n7. TDD (Time Division Duplex): single frequency band shared between DL and UL — time-multiplexed. Configurable DL/UL ratio. Asymmetric traffic support. Better for higher frequencies. Used for: n41, n77, n78, n79 (main 5G NR bands), all mmWave. Reciprocity: TDD channel is reciprocal (UL = DL) — enables massive MIMO beamforming using UL SRS measurements for DL precoding. Cross-link interference (CLI) possible between cells with different TDD configs."},{"id":12,"level":"basic","q":"What is QAM and what modulation orders are supported in 5G NR?","a":"QAM (Quadrature Amplitude Modulation) encodes bits in amplitude and phase of a carrier. M-QAM: log2(M) bits per symbol. 5G NR supported modulations: QPSK (2 bits/symbol, robust), 16QAM (4 bits/symbol), 64QAM (6 bits), 256QAM (8 bits/symbol, requires high SNR), 1024QAM (10 bits/symbol, introduced in Release 17 for high-SNR scenarios). Higher order QAM = higher spectral efficiency but requires higher SNR and more precise carrier/phase synchronisation. CQI (Channel Quality Indicator) reported by UE determines which MCS (Modulation and Coding Scheme) the gNB uses for scheduling."},{"id":13,"level":"basic","q":"What is MIMO and how does it work in 5G NR?","a":"MIMO (Multiple Input Multiple Output) uses multiple antennas at transmitter and receiver. Types: Diversity — transmit same data from multiple antennas (improves reliability, SNR). Spatial multiplexing — transmit independent data streams (layers) simultaneously on same frequency using different spatial directions (increases throughput). Beamforming — combine antenna weights to direct signal energy towards UE. 5G NR: up to 8 DL/4 UL spatial layers per UE. Massive MIMO (mMIMO): gNB with 32-256 antenna ports for simultaneous beamforming to many UEs (MU-MIMO). Precoding: codebook-based (PMI from UE) or non-codebook (SRS-based reciprocity). Layer = independent stream in spatial multiplexing."},{"id":14,"level":"basic","q":"What is the 5G NR random access procedure (RACH)?","a":"RACH allows UE to establish uplink synchronisation and obtain a C-RNTI. 4-step RACH: (1) UE sends PRACH preamble (Msg1) — randomly chosen from configured set, in PRACH occasion. gNB detects preamble, estimates TA (timing advance). (2) gNB sends RAR (Random Access Response, Msg2) on PDCCH/PDSCH — contains TA, UL grant for Msg3, temporary C-RNTI. (3) UE sends RRC setup request (Msg3) on PUSCH — applies TA, first uplink message. (4) gNB sends contention resolution (Msg4) — resolves collisions if multiple UEs sent same preamble. 2-step RACH (Rel-16): Msg1+Msg3 combined (MsgA), gNB responds with MsgB. Reduces latency."},{"id":15,"level":"basic","q":"What is a BWP (Bandwidth Part) in 5G NR?","a":"A BWP (Bandwidth Part) is a contiguous set of PRBs (Physical Resource Blocks) within the carrier bandwidth that a UE is configured to use. Purpose: allows UEs with narrow RF bandwidth capability to operate in wide carriers; enables power saving (use narrow BWP when idle, switch to wide when active). Parameters: centre frequency, subcarrier spacing, number of RBs, CP type. UE can have up to 4 configured DL BWPs and 4 UL BWPs, but only one active at a time. BWP switching triggered by: PDCCH DCI, RRC reconfiguration, inactivity timer. Initial BWP: used during initial access (same numerology as SSB). Active BWP can be different from initial BWP."},{"id":16,"level":"intermediate","q":"How does 5G NR LDPC coding work?","a":"LDPC (Low-Density Parity-Check) codes are the channel codes for 5G NR data channels (PDSCH, PUSCH). Defined by sparse parity check matrix H. Two base graphs: BG1 (larger, for large transport blocks or high code rate ≥ 1/3), BG2 (smaller, for small TBs or low code rate). Lifting factor Z: scales base graph to actual code. Encoder: systematic — information bits + parity. Decoder: belief propagation (sum-product algorithm) over Tanner graph — iterative message passing between variable nodes (bits) and check nodes (parity equations). Quasi-cyclic structure enables parallel hardware implementation. Rate matching: puncturing/shortening for target code rate. Near Shannon capacity at large block lengths."},{"id":17,"level":"intermediate","q":"How does 5G NR Polar coding work and where is it used?","a":"Polar codes (invented by Arikan 2009) achieve Shannon capacity via channel polarisation. Used in 5G NR for: PDCCH, PUCCH, PBCH control channel coding (not data). Principle: N = 2^n bit-channels created from N uses of a physical channel — some polarise to reliable (capacity ≈ 1), others to unreliable (capacity ≈ 0). Information bits placed on reliable channels, frozen bits (known zeros) on unreliable. Decoder: successive cancellation (SC) — decode bits one by one. SC list (SCL) decoder: maintain L candidate paths, improved performance. CRC-aided SCL (CA-SCL): best practical decoder. Rate matching: puncturing, shortening, or repetition. Excellent for short block lengths vs LDPC."},{"id":18,"level":"intermediate","q":"What is the 5G NR physical layer processing chain for PDSCH?","a":"DL PDSCH chain: (1) CRC attachment. (2) Code block segmentation (if TB > max CB size). (3) LDPC encoding (BG1 or BG2). (4) Rate matching (puncturing/repetition to target code rate). (5) Code block concatenation. (6) Scrambling (XOR with PN sequence using cell ID + RNTI). (7) Modulation (QPSK/16/64/256/1024QAM). (8) Layer mapping (up to 8 layers). (9) Antenna port mapping / precoding (codebook or non-codebook). (10) RE mapping (assign to resource grid, avoiding DMRS, CSI-RS, etc.). (11) OFDM modulation (IFFT + CP). (12) Digital front end (CFR, DPD). (13) DAC → RF. Reverse at UE receiver."},{"id":19,"level":"intermediate","q":"What is PDCCH and how does DCI work in 5G NR?","a":"PDCCH (Physical Downlink Control Channel) carries DCI (Downlink Control Information). DCI contains: scheduling grants for PDSCH/PUSCH, power control commands, SRS triggers, HARQ feedback timing. DCI formats: 0_0/0_1 (UL grant for PUSCH), 1_0/1_1 (DL grant for PDSCH), 2_x (power control). PDCCH uses polar coding + QPSK. Search spaces: UE-specific (USS) and common (CSS). CORESET (Control Resource Set): frequency/time region where PDCCH candidates exist. UE blindly decodes all candidates in its search space — aggregation levels 1,2,4,8,16 CCEs. CRC scrambled with RNTI (C-RNTI for UE-specific, SI-RNTI for broadcast, RA-RNTI for random access)."},{"id":20,"level":"intermediate","q":"What is CSI reporting in 5G NR and what does it include?","a":"CSI (Channel State Information) reporting enables gNB to adapt to channel conditions. UE measures CSI-RS (Reference Signal) and reports: CQI (Channel Quality Indicator, 4 bits): suggested MCS, based on target 10% BLER. PMI (Precoding Matrix Indicator): suggested precoder from codebook (for codebook-based beamforming). RI (Rank Indicator): number of useful spatial layers. LI (Layer Indicator, Rel-16): strongest layer. CRI (CSI-RS Resource Indicator, beam selection). Reporting modes: aperiodic (triggered by DCI), periodic (PUCCH), semi-persistent. Type I codebook: single-panel, coarse. Type II codebook: multi-panel, higher resolution, more overhead. Compressed Type II (Rel-16): frequency-domain compression."},{"id":21,"level":"intermediate","q":"What is SRS (Sounding Reference Signal) and how is it used?","a":"SRS (Sounding Reference Signal) is an uplink reference signal transmitted by the UE for channel estimation at the gNB. Uses: (1) UL channel estimation for scheduling and link adaptation. (2) TDD reciprocity-based DL beamforming (gNB estimates DL channel from UL SRS). (3) Positioning. (4) Beam management. SRS configuration: bandwidth, starting RB, comb (every 2nd or 4th subcarrier), number of antenna ports, periodicity. Multiple UEs use different comb offsets and sequence shifts for orthogonality. Aperiodic SRS triggered by DCI for on-demand sounding. Wideband SRS sweeps full carrier bandwidth over multiple slots. Critical for massive MIMO reciprocity-based precoding."},{"id":22,"level":"intermediate","q":"What is timing advance (TA) and how is it managed in 5G NR?","a":"Timing advance compensates for propagation delay so UE uplink transmissions arrive at the gNB within the CP window. Without TA, distant UEs would cause inter-symbol interference. Initial TA: estimated from PRACH preamble (gNB measures preamble arrival time, sends TA command in RAR). TA range: covers cell radius — for μ=1, max TA ~0.52 ms (78 km radius). Closed-loop TA update: gNB sends TA MAC CE periodically (or when error exceeds threshold). TA timer: UE drops connection if no TA update received within configured time (TA misalignment accumulates due to UE movement). TA adjustment: in units of Tc = 1/(480kHz × 4096) ≈ 0.51 ns."},{"id":23,"level":"intermediate","q":"What is the 5G NR PUCCH and what does it carry?","a":"PUCCH (Physical Uplink Control Channel) carries UCI (Uplink Control Information): HARQ-ACK (1-2 bits for each HARQ process — ACK if decoded correctly, NACK otherwise), SR (Scheduling Request — request for UL resource grant), CSI reports (CQI/PMI/RI). PUCCH formats: Format 0 (1-2 bits, 1-2 symbols, sequence-based), Format 1 (1-2 bits, 4-14 symbols, OCC spreading for multiplexing), Format 2 (up to 11 bits, 1-2 symbols, DM-RS, QPSK), Format 3 (>2 bits, 4-14 symbols, OCC), Format 4 (>2 bits, 4-14 symbols, small payload with OCC). Short PUCCH (F0/F2): 1-2 symbols — for slot-based HARQ feedback. Long PUCCH (F1/F3/F4): better coverage."},{"id":24,"level":"intermediate","q":"What is power control in 5G NR uplink?","a":"UL power control ensures UE transmit power is just enough to meet target quality (avoids interference + saves battery). PUSCH open-loop: <code>P_PUSCH = min(Pmax, P0 + α·PL + 10log10(M) + ΔTF + f(i))</code> where PL = path loss (measured from DL reference signal), P0 = target received power, α = path loss compensation factor (0-1), M = number of allocated RBs, ΔTF = MCS-dependent offset, f(i) = closed-loop correction. Closed-loop correction f(i): gNB sends TPC (Transmit Power Control) commands in DCI — UE accumulates corrections. PUCCH has separate power control loop. Fractional path loss compensation (α&lt;1): allows near UEs to interfere less."},{"id":25,"level":"intermediate","q":"What is massive MIMO and how does the 5G NR specification support it?","a":"Massive MIMO: gNB with very many antennas (32-256+) serving multiple UEs simultaneously. 5G NR support: up to 32 DL CSI-RS ports (more with extensions), non-codebook-based precoding using SRS reciprocity, Type II CSI feedback for precise precoding, FD-MIMO antenna ports. gNB estimates DL channel from UL SRS (TDD reciprocity), computes optimal precoder (e.g., zero-forcing, MRT), applies to PDSCH. MU-MIMO: schedule multiple UEs on same RBs — spatial separation via precoding. Benefits: 10x+ capacity increase, 3dB array gain per doubling of antennas, interference nulling. Challenges: CSI acquisition, pilot contamination in multi-cell, calibration for reciprocity."},{"id":26,"level":"intermediate","q":"What is the 5G NR UE measurement and reporting procedure?","a":"UE performs measurements for: handover decisions, beam management, RRM. Measurements: RSRP (Reference Signal Received Power — average power of CSI-RS or SSB RE), RSRQ (Reference Signal Received Quality — RSRP/RSSI), SINR (Signal to Interference plus Noise Ratio). L3 filtering: exponential average to reduce noise: <code>F_n = (1-a)·F_{n-1} + a·M_n</code>, a = 1/2^(k/4). Event-triggered reporting: A3 (neighbour better than serving by offset), A5 (serving below threshold1 and neighbour above threshold2). Time-to-trigger (TTR): measurement condition must hold for TTR before reporting. gNB uses reports for handover, CA management, beam switching."},{"id":27,"level":"intermediate","q":"What is beam management in 5G NR?","a":"Beam management maintains optimal beam pair link between gNB and UE, especially at mmWave. Procedures: P1 (Beam sweeping and selection): gNB sweeps multiple beams (SSB or CSI-RS), UE reports best beam (CRI). P2 (Beam refinement): narrow beam search within selected wide beam. P3 (UE Rx beam refinement): UE tests different Rx beams for same gNB Tx beam. BFR (Beam Failure Recovery): if all configured beams fail (BLER too high), UE initiates recovery — transmits PRACH on candidate beam, gNB responds. L1-RSRP: instantaneous measurement (no L3 filter) for fast beam tracking. TCI (Transmission Configuration Indicator): gNB configures which beam (RS) to use for PDSCH/PDCCH reception."},{"id":28,"level":"intermediate","q":"What is carrier aggregation (CA) in 5G NR?","a":"CA allows a UE to receive/transmit on multiple component carriers (CCs) simultaneously to increase peak throughput and exploit fragmented spectrum. PCell (Primary Cell): mandatory, carries PUCCH, RRC. SCells (Secondary Cells): activated on demand, no PUCCH. Up to 16 CCs in Rel-17. Intra-band contiguous CA: adjacent CCs in same band. Intra-band non-contiguous: same band, different locations. Inter-band CA: different bands (e.g., n78 + n258). NR-DC (Dual Connectivity): UE connected to two gNBs on different carriers. CA requires: carrier capable UE, coordinated scheduling (if intra-gNB), increased RF complexity. Timing advance per CC (for TDD inter-band). HARQ and scheduling per CC."},{"id":29,"level":"intermediate","q":"What is the 5G NR link budget and what factors affect cell coverage?","a":"Link budget: P_Tx (dBm) - Losses + Gains ≥ P_Rx_min. Key terms: EIRP (Effective Isotropic Radiated Power) = Tx power + antenna gain - cable losses. Free space path loss: FSPL = 20log10(4πd/λ). Additional losses: penetration (indoor: 10-25 dB), shadowing margin (8-10 dB), interference margin, body loss. Receiver sensitivity: P_min = kTB + NF + SNR_required. 5G NR factors: gNB Tx power (typically 40-46 dBm macro), UE Tx power (23-26 dBm), mMIMO beam gain (15-20 dB), frequency (higher = more path loss), bandwidth (wider = more noise). mmWave: short range but very high capacity with beamforming gain."},{"id":30,"level":"intermediate","q":"What is the 5G NR physical random access channel (PRACH)?","a":"PRACH carries the random access preamble (Msg1). Preamble: Zadoff-Chu (ZC) sequence of length 139 or 839. Format: long formats (formats 0-3, 839-length ZC) for large cells, short formats (A1-A3, B1-B4, C0, C2 — 139-length ZC) for small cells/high SCS. ZC sequences have ideal cyclic autocorrelation — multiple preambles from a root with different cyclic shifts are orthogonal. 64 preambles per cell (some for contention-free, some for contention-based). PRACH occasions: time-frequency positions signalled in SIB1. gNB detects preamble via correlator (frequency-domain: multiply received signal with conjugate DFT of ZC). TA estimated from correlation peak offset."},{"id":31,"level":"intermediate","q":"What is the 5G NR L2 architecture (MAC, RLC, PDCP)?","a":"Layer 2 sits between PHY and RRC/NAS. PDCP (Packet Data Convergence Protocol): header compression (ROHC), ciphering and integrity protection, reordering for dual connectivity, duplicate detection. RLC (Radio Link Control): three modes — TM (transparent, no header), UM (unacknowledged, in-sequence delivery), AM (acknowledged mode — ARQ retransmission). MAC (Medium Access Control): scheduling decisions (which UE, which RBs, which MCS), HARQ processes, logical channel multiplexing/demultiplexing, random access. Logical channels: BCCH (broadcast), PCCH (paging), CCCH (common control), DCCH (dedicated control), DTCH (dedicated traffic). Transport channels map to physical channels."},{"id":32,"level":"intermediate","q":"What is the UE PHY uplink transmission process?","a":"UE UL PUSCH chain: (1) Receive UL grant (DCI 0_1) on PDCCH — contains RB allocation, MCS, HARQ process, RV, DMRS ports. (2) Generate transport block — MAC layer provides. (3) CRC attach. (4) CB segmentation. (5) LDPC encode + rate match. (6) Data scrambling. (7) Modulate (QPSK/16/64/256QAM). (8) Layer mapping (up to 4 UL layers). (9) Transform precoding (DFT-s-OFDM, Pi/2-BPSK for coverage): optional, reduces PAPR. (10) Precoding (antenna ports). (11) RE mapping + DMRS insertion. (12) IFFT + CP. (13) Power control + timing advance. (14) DAC → PA → antenna. UE must transmit in the scheduled slot and apply correct TA."},{"id":33,"level":"intermediate","q":"What is DFT-s-OFDM and when is it used in 5G NR?","a":"DFT-spread OFDM (also called SC-FDMA in LTE) is a waveform where input symbols are first transformed by a DFT before the IFFT. Spreading makes the signal more single-carrier like — lower PAPR (Peak-to-Average Power Ratio) than pure OFDM. Lower PAPR = UE power amplifier operates more efficiently = better coverage (or lower power for same range). 5G NR: DFT-s-OFDM is optional for PUSCH (transform precoding enabled/disabled by RRC). Mandatory for PRACH. Pi/2-BPSK + DFT-s-OFDM achieves near-constant envelope — ultra-low PAPR for cell-edge coverage. Downside: only single-layer transmission with transform precoding, no frequency-selective scheduling within the DFT block."},{"id":34,"level":"intermediate","q":"What is the gNB split architecture (CU-DU-RU)?","a":"3GPP defines functional splits for 5G NR gNB: CU (Central Unit): PDCP, RRC, SDAP — centralised, can serve multiple DUs. DU (Distributed Unit): MAC, RLC, upper PHY (FAPI interface) — near edge. RU (Radio Unit): lower PHY (FFT/IFFT, PRACH, CP), RF — at antenna. Interfaces: F1 (CU-DU), open FH (DU-RU, e.g., O-RAN 7.2x split). O-RAN 7.2x split: DU handles FEC, MRC, precoding; RU handles FFT, beamforming weights application, time/frequency synchronisation. Benefits: centralisation enables coordination (CoMP, load balancing), RU is simple/cheap, CU can be cloud-native. CU further split: CU-CP (control plane) and CU-UP (user plane)."},{"id":35,"level":"intermediate","q":"What is PDSCH DMRS and why is it needed?","a":"DMRS (Demodulation Reference Signal) is a known pilot signal transmitted along with data, used by the receiver for channel estimation. On PDSCH: UE uses DMRS to estimate the channel H(f) per subcarrier, then equalises: ŷ = H^{-1}·y. Without DMRS, coherent detection is impossible in a fading channel. NR PDSCH DMRS: two types: Type 1 (comb-2, interleaved, up to 4 ports) and Type 2 (comb-2, non-interleaved, up to 6 ports). Front-loaded DMRS: always in symbol 2 of slot. Additional DMRS: more pilot symbols for high Doppler. DMRS overhead vs channel estimation quality trade-off. CDM (Code Division Multiplexing): multiple DMRS ports share same REs via orthogonal sequences."},{"id":36,"level":"advanced","q":"What is the 5G NR channel model and how is it used in link-level simulation?","a":"3GPP TR 38.901 defines 5G channel models. CDL (Clustered Delay Line): fixed delays/angles for conformance testing. TDL (Tapped Delay Line): simplified for baseband simulation. Key parameters: delay spread (DS), angular spread (AS), Rician K-factor, Doppler. CDL-A/B/C: NLOS profiles with different delay/angle spreads. CDL-D/E: LOS (Rician). Procedure: generate time-varying channel matrix H(t, τ) from clusters of paths, each with delay, Doppler, angle. In simulation: convolve Tx signal with H, add AWGN. Used for: MCS design, PDSCH/PUSCH BLER curves, MIMO algorithm testing, HARQ combining gain. Fast fading model: Jake's (Clarke's) spectrum for flat Doppler."},{"id":37,"level":"advanced","q":"What is massive MIMO precoding — MRT, ZF, MMSE?","a":"MRT (Maximum Ratio Transmission): w = h* (conjugate of channel). Maximises received SNR at target UE. Simple, full array gain, but causes interference to other UEs. ZF (Zero Forcing): W = H^H(HH^H)^{-1} (pseudo-inverse). Nulls interference to all UEs — inter-user interference = 0. Performance limited at low SNR (noise amplification). Requires full CSI. MMSE/RZF (Regularised ZF): W = H^H(HH^H + (1/SNR)·I)^{-1}. Balances noise amplification and interference. Optimal linear precoder. FD-MIMO codebook (Type I/II): limited feedback — UE selects from predefined precoders. SRS reciprocity: gNB estimates H from UL SRS, computes W directly. Block diagonalisation: multi-user extension of ZF."},{"id":38,"level":"advanced","q":"What is the 5G NR positioning procedure?","a":"5G NR positioning (TS 38.305, TS 38.215): UE position estimated for regulatory (E911), commercial, IoT use. Methods: DL-TDOA (Downlink Time Difference Of Arrival): UE measures RSTD (Reference Signal Time Difference) between multiple TRPs (Transmission Reception Points) using PRS (Positioning Reference Signal). Multi-lateration. UL-TDOA: gNB/TRP measures TDOA of UE SRS. DL-AoD (Angle of Departure): gNB-side angle estimate. UL-AoA (Angle of Arrival): TRP measures UE signal angle. NR-RAT-independent: GNSS, sensors. Rel-16 target: sub-3m 90th percentile (outdoor), sub-1m (indoor). PRS: dedicated positioning signal, configurable muting patterns to avoid interference."},{"id":39,"level":"advanced","q":"What is the 5G NR scheduler and what algorithms are used?","a":"The MAC scheduler in the gNB decides per slot: which UEs get resources (RBs), how many RBs, which MCS, TDD DL/UL allocation. Goals: maximise throughput, ensure fairness, meet QoS (delay, packet loss rate). Common algorithms: Proportional Fair (PF): schedule UE that maximises R_k(t)/R̄_k(t), where R_k(t) = instantaneous rate, R̄_k(t) = average rate. Balances throughput and fairness. Round-robin: equal time, fair but ignores channel quality. Maximum CQI: always schedule best channel — max throughput, starves weak UEs. MU-MIMO scheduling: select UEs with near-orthogonal channels. QoS-aware: prioritise delay-sensitive traffic (URLLC). Buffer status reports (BSR) from UE inform scheduler of UL data."},{"id":40,"level":"advanced","q":"What is 5G NR URLLC and how is it achieved?","a":"URLLC (Ultra-Reliable Low Latency Communication): target ≤1ms latency, 99.999% reliability. Mechanisms: (1) Mini-slot scheduling: 2/4/7 symbol PDSCH/PUSCH instead of full slot — reduces scheduling granularity. (2) Configured grants: pre-allocated UL resources (no dynamic grant delay). (3) Downlink preemption: URLLC can preempt ongoing eMBB transmission. (4) Short HARQ feedback: PUCCH Format 0 (1-2 symbols). (5) Repetition: multiple transmissions before waiting for HARQ feedback. (6) Higher coding rate + stronger FEC (polar codes). (7) Sub-slot PUCCH. Applications: industrial automation, remote surgery, autonomous driving. Tension with eMBB: URLLC preemption reduces eMBB throughput."},{"id":41,"level":"advanced","q":"What is the 5G NR physical layer processing for PDCCH?","a":"PDCCH chain: (1) CRC (24-bit, scrambled with RNTI). (2) Polar encoding: CRC-aided polar code (CA-polar). (3) Rate matching: puncturing/shortening to fill aggregation level (1/2/4/8/16 CCEs, each CCE = 6 REGs = 6×12 REs). (4) Scrambling (cell-ID + slot/symbol). (5) QPSK modulation. (6) Layer mapping (single layer). (7) Antenna port mapping (precoding with beam). (8) RE mapping within CORESET. CORESET: rectangular region in time-frequency defined by bitmap of 6-RB groups × 1-3 symbols, in each BWP. UE blindly decodes: for each candidate in search space, attempt polar decoding, check CRC pass. AL16 = 96 REs = 192 QPSK bits, after rate matching from polar encoder."},{"id":42,"level":"advanced","q":"What is PAPR in OFDM and how is it reduced?","a":"PAPR (Peak-to-Average Power Ratio) = max instantaneous power / average power. OFDM: sum of N sinusoids can constructively align → very high peaks. High PAPR requires linear PA (power amplifier) with large back-off → reduced efficiency. PAPR for N subcarriers: up to 10log10(N) dB (e.g., 40 dB for 10,000 subcarriers). Reduction techniques: Clipping and filtering (CF): clip peaks above threshold, filter to remove OOB — causes EVM. Selected Mapping (SLM): try multiple phase sequences, transmit lowest PAPR — overhead. Partial Transmit Sequence (PTS): similar. Tone reservation: reserve subcarriers for PAPR reduction signal. DFT-s-OFDM (5G UL): eliminates OFDM PAPR problem. CFR (Crest Factor Reduction): used in gNB to protect PA."},{"id":43,"level":"advanced","q":"What is DPD (Digital Pre-Distortion) and why is it needed in 5G?","a":"Power amplifiers have nonlinear transfer function at high power — cause harmonic/intermodulation distortion, spectral regrowth (ACLR violation). DPD pre-distorts the signal before the PA so PA output is linear. Principle: apply inverse of PA nonlinearity before the PA. PA(DPD(x)) ≈ linear. Memory polynomial DPD: <code>y[n] = Σ_{k,m} a_{km}·x[n-m]·|x[n-m]|^{k-1}</code>. Identification: adaptive — use observation receiver to compare PA output with ideal, update coefficients (least squares, RLS). Critical in 5G: wider bandwidth → more memory effects. ACLR requirement: ≤-45 dBc. Without DPD: must back off 6-10 dB (large efficiency loss). With DPD: operate 1-3 dB from saturation. 5G mmWave: DPD at 400 MHz bandwidth requires very fast sampling (~2 GHz observation bandwidth)."},{"id":44,"level":"advanced","q":"What is the 5G NR L1/L2 interface and FAPI?","a":"FAPI (Femtocell API) or nFAPI is a standardised interface between the MAC (L2) and PHY (L1) in the gNB DU. FAPI messages per slot: DL: MAC sends DL_TTI_REQUEST containing PDCCH PDU, PDSCH PDU, CSI-RS PDU, SSB PDU — includes all parameters per allocation. UL: MAC sends UL_TTI_REQUEST (PUSCH/PUCCH/SRS/PRACH allocation), PHY returns RX_DATA_INDICATION (decoded TB), CRC_INDICATION (HARQ result), UCI_INDICATION (PUCCH/PUSCH UCI), RACH_INDICATION. Timing: FAPI messages for slot n sent at slot n-X (X = pipeline depth, typically 2-3 slots). Violating timing causes late slot. SCF (Small Cell Forum) defines nFAPI for split gNB. Critical for real-time operation."},{"id":45,"level":"advanced","q":"What is the O-RAN architecture and how does it relate to 5G NR?","a":"O-RAN (Open Radio Access Network) disaggregates the gNB into open, interoperable components. O-RAN Alliance defines: O-CU (Open CU): CU-CP + CU-UP. O-DU (Open DU): MAC, RLC, upper PHY. O-RU (Open RU): lower PHY + RF. Open interfaces: Open FH (7.2x split between O-DU and O-RU — eCPRI transport), F1 (CU-DU), E2 (near-RT RIC), A1 (non-RT RIC to near-RT RIC), O1 (management). RIC (RAN Intelligent Controller): non-RT RIC (>1s) for policy, ML training; near-RT RIC (10ms-1s) for xApps — real-time optimisation (beamforming, handover, scheduling hints). O-Cloud: cloud-native deployment of O-CU, O-DU. Benefits: multi-vendor, software-defined, AI/ML-driven optimisation."},{"id":46,"level":"advanced","q":"What is the uplink link budget for a 5G NR gNB receiver?","a":"UL link budget: UE EIRP = P_UE + G_UE - losses. Path loss (3GPP UMa model): PL = 28 + 22log10(d) + 20log10(fc) [dB]. gNB receiver sensitivity: S = kTB + NF + SNR_min = -174 + 10log10(BW_Hz) + NF + SINR_min. For PUSCH with 15 kHz SCS, 1 RB (180 kHz): S ≈ -174 + 52.5 + 3 (NF) + 5 (SINR for QPSK 1/2) = -113.5 dBm. Diversity/array gain: mMIMO 64 antennas → ~18 dB. Maximum coupling loss (MCL): UE EIRP - gNB sensitivity + array gain. MCL = 23 (UE power) - 0 (UE antenna gain) - (-113.5) + 18 = 154.5 dB. Sufficient for macro coverage. Design margin considerations: shadow fading (8 dB), body loss (3 dB), interference margin (3 dB)."},{"id":47,"level":"advanced","q":"What is 5G NR PDSCH rate matching around reference signals?","a":"Rate matching ensures PDSCH REs avoid collision with reserved resources. Resources avoided: DMRS REs (channel estimation pilots — typically 2-4 OFDM symbols worth in first half of slot), PTRS (Phase Tracking Reference Signal — for phase noise compensation at mmWave, sparse in frequency), CSI-RS (configured reference signals), SS/PBCH block (if PDSCH overlaps in time), CORESET (control region). Implementation: rate match pattern bitmap signals to UE which REs are reserved. UE decoder skips these REs when extracting PDSCH LLRs. gNB generates same bitmap and ensures no data mapped there. Correct rate match pattern critical — mismatch causes BLER. PDSCH can span full slot minus DMRS symbols."},{"id":48,"level":"advanced","q":"What is 5G NR slot aggregation and multi-slot scheduling?","a":"NR Rel-15 allows scheduling of multiple consecutive slots in one DCI (slot aggregation / PDSCH repetition). DCI field PDSCH-to-HARQ_feedback timing: K1 value — number of slots after last PDSCH slot before UE sends HARQ feedback on PUCCH. This allows: multi-slot PDSCH (same TB transmitted over multiple slots — time diversity), flexible feedback timing for processing. Rel-16 PDSCH repetition Type A: same TB, same DCI, same RBs — K slots. Type B: separate DCI per repetition. Benefits: coverage extension (more time diversity), latency management. UE must buffer and combine all repetitions before decoding. HARQ combining of repetitions = time diversity gain."},{"id":49,"level":"advanced","q":"How does 5G NR handle inter-cell interference (ICI) coordination?","a":"ICI is a key capacity limiter in dense deployments. Methods: Static ICIC: coordinate resource usage between cells (no same-RB assignments to edge UEs in adjacent cells). Fractional Frequency Reuse (FFR): cell-centre UEs use all RBs, edge UEs use sub-band with power boost and coordination. Dynamic ICIC (eICIC, CoMP in NR): gNBs exchange info via Xn. Muting (ABS in LTE/NR NX): aggressor cell mutes some subframes. CoMP (Coordinated Multi-Point): joint processing (JT — multiple gNBs transmit same data via CoMP), coordinated scheduling (CS/CB — avoid RB reuse). Rel-15 NR: enhanced inter-cell interference via TCI state and PDCCH-based CORESET. CLI (Cross Link Interference) in TDD: UL from one cell interferes with DL of another — managed by dynamic TDD coordination."},{"id":50,"level":"advanced","q":"What is the 5G NR end-to-end latency budget?","a":"User-plane one-way latency budget (URLLC target: ≤0.5 ms one-way, eMBB ≤4 ms): UE processing (UL): ~0.5 ms (UE PHY pipeline, TA adjustment). OTA transmission: slot duration (0.5 ms at μ=1, 0.125 ms at μ=3 mini-slot). gNB PHY processing: ~0.5 ms (channel estimation, LDPC decoding). gNB L2 processing: ~0.1 ms. Fronthaul (RU→DU): ≤100 μs (O-RAN spec). F1 (DU→CU): ~1 ms (if distributed). 5GC UPF processing: ~1 ms. Each HARQ round adds 4-8 ms. Mini-slot scheduling (2-symbol): reduces OTA to ~70 μs. Configured grants: eliminate scheduling request latency. PDCP-to-PDCP one-way latency = sum of all processing + OTA times. gNB-to-gNB via 5GC adds core latency."}]};

let viewed={};let levelFilter={};
TOPICS.forEach(t=>{viewed[t.id]=new Set();levelFilter[t.id]='all';});
let activeTopic='linux';

function switchTopic(id){
  activeTopic=id;
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tbtn-'+id).classList.add('active');
  document.querySelectorAll('.topic-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

function setLevel(tid,level,el){
  levelFilter[tid]=level;
  el.closest('.topic-panel').querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderQuestions(tid);
}
function handleLevel(el){
  const tid=el.getAttribute('data-tid');
  const level=el.getAttribute('data-level');
  setLevel(tid,level,el);
}

function toggle(tid,id){
  const el=document.getElementById('qi-'+tid+'-'+id);
  const wasOpen=el.classList.contains('open');
  el.classList.toggle('open');
  if(!wasOpen){viewed[tid].add(id);updateProgress(tid);}
}
function handleToggle(el){
  const tid=el.getAttribute('data-tid');
  const id=parseInt(el.getAttribute('data-id'));
  toggle(tid,id);
}

function updateProgress(tid){
  const total=ALL_QUESTIONS[tid].length;
  const done=viewed[tid].size;
  const pct=Math.round(done/total*100);
  const fill=document.getElementById('prog-'+tid);
  const txt=document.getElementById('progtxt-'+tid);
  if(fill)fill.style.width=pct+'%';
  if(txt)txt.textContent=done+' / '+total;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderQuestions(tid){
  const qs=ALL_QUESTIONS[tid];
  const level=levelFilter[tid];
  const filtered=level==='all'?qs:qs.filter(q=>q.level===level);
  const basics=filtered.filter(q=>q.level==='basic');
  const ints=filtered.filter(q=>q.level==='intermediate');
  const advs=filtered.filter(q=>q.level==='advanced');

  function renderGroup(items,label,badgeClass,badgeLabel){
    if(!items.length)return '';
    let s='<div class="section-label">'+label+'</div>';
    items.forEach(q=>{
      s+='<div class="q-item" id="qi-'+tid+'-'+q.id+'">'+
        '<div class="q-header" data-tid="'+tid+'" data-id="'+q.id+'" onclick="handleToggle(this)">'+
        '<span class="q-num">'+q.id+'.</span>'+
        '<span class="q-text">'+q.q+'</span>'+
        '<span class="q-chevron">&#9658;</span>'+
        '</div><div class="q-body"><span class="badge '+badgeClass+'">'+badgeLabel+'</span><br>'+q.a+'</div>'+
        '</div>';
    });
    return s;
  }

  const container=document.getElementById('qs-'+tid);
  let html=renderGroup(basics,'Basic','','Basic')+
           renderGroup(ints,'Intermediate','','Intermediate')+
           renderGroup(advs,'Advanced','badge-adv','Advanced');
  if(!html)html='<p class="empty">No questions match this filter.</p>';
  container.innerHTML=html;
}

const nav=document.getElementById('topic-nav');
const panels=document.getElementById('panels');

TOPICS.forEach(t=>{
  const qs=ALL_QUESTIONS[t.id];
  const total=qs.length;
  const basicCount=qs.filter(q=>q.level==='basic').length;
  const intCount=qs.filter(q=>q.level==='intermediate').length;
  const advCount=qs.filter(q=>q.level==='advanced').length;

  const btn=document.createElement('button');
  btn.className='topic-btn '+t.cls+(t.id===activeTopic?' active':'');
  btn.id='tbtn-'+t.id;
  btn.setAttribute('data-tid',t.id);
  btn.onclick=function(){switchTopic(this.getAttribute('data-tid'));};
  btn.innerHTML='<span class="dot"></span>'+t.icon+' '+t.label+' <span style="font-size:11px;opacity:0.7">('+total+')</span>';
  nav.appendChild(btn);

  const panel=document.createElement('div');
  panel.className='topic-panel '+t.cls+(t.id===activeTopic?' active':'');
  panel.id='panel-'+t.id;
  panel.innerHTML=
    '<div class="progress-row">'+
    '<span class="progress-label">Viewed</span>'+
    '<div class="progress-bar"><div class="progress-fill" id="prog-'+t.id+'" style="background:var(--tc);"></div></div>'+
    '<span class="progress-count" id="progtxt-'+t.id+'">0 / '+total+'</span>'+
    '</div>'+
    '<div class="level-tabs">'+
    '<button class="ltab '+t.cls+' active" data-tid="'+t.id+'" data-level="all" onclick="handleLevel(this)">All ('+total+')</button>'+
    '<button class="ltab '+t.cls+'" data-tid="'+t.id+'" data-level="basic" onclick="handleLevel(this)">Basic ('+basicCount+')</button>'+
    '<button class="ltab '+t.cls+'" data-tid="'+t.id+'" data-level="intermediate" onclick="handleLevel(this)">Intermediate ('+intCount+')</button>'+
    (advCount>0?'<button class="ltab '+t.cls+'" data-tid="'+t.id+'" data-level="advanced" onclick="handleLevel(this)">Advanced ('+advCount+')</button>':'')+
    '</div>'+
    '<div id="qs-'+t.id+'"></div>';
  panels.appendChild(panel);
  renderQuestions(t.id);
});
</script>
</body>
</html>
