const ALL_QUESTIONS = {
linux: [
  {id:1,level:'basic',q:'What is Linux and what is the Linux kernel?',a:'Linux is a free, open-source Unix-like OS. The kernel is the core — it manages hardware (CPU, memory, I/O), process scheduling, file systems, and device drivers. Created by Linus Torvalds in 1991. The OS distribution bundles the kernel with utilities, libraries, and package managers.'},
  {id:2,level:'basic',q:'What is the difference between Linux and Unix?',a:'Unix is a proprietary OS from the 1970s (Bell Labs). Linux is open-source and free. Unix variants: AIX, HP-UX, Solaris, macOS. Linux is Unix-like (POSIX-compliant) but not certified Unix. Linux is dominant in servers and embedded; Unix persists in legacy enterprise environments.'},
  {id:3,level:'basic',q:'Name common Linux distributions and their use cases.',a:'Ubuntu (desktop/general), Debian (stability/servers), RHEL/CentOS/Rocky (enterprise), Fedora (cutting-edge), Arch (advanced/minimal), Kali (security/pentesting), Alpine (containers/minimal), SUSE/openSUSE (enterprise), Raspberry Pi OS (embedded).'},
  {id:4,level:'basic',q:'What is the Linux file system hierarchy?',a:'Root <code>/</code> is top-level. <code>/bin</code> essential binaries, <code>/sbin</code> system binaries, <code>/etc</code> config files, <code>/home</code> user directories, <code>/var</code> logs/variable data, <code>/tmp</code> temporary files, <code>/usr</code> user programs, <code>/lib</code> libraries, <code>/dev</code> devices, <code>/proc</code> process info (virtual FS), <code>/sys</code> hardware info, <code>/mnt</code> mount points, <code>/opt</code> optional software.'},
  {id:5,level:'basic',q:'What is the difference between absolute and relative paths?',a:'Absolute paths start from <code>/</code> (e.g. <code>/home/user/docs/file.txt</code>) — always unambiguous. Relative paths start from the current directory (e.g. <code>../docs/file.txt</code>). Special: <code>.</code> = current dir, <code>..</code> = parent dir, <code>~</code> = home dir. <code>pwd</code> shows current absolute path.'},
  {id:6,level:'basic',q:'Explain the basic file operation commands: ls, cp, mv, rm, mkdir, touch.',a:'<code>ls -la</code> lists all files with details. <code>cp -r src dst</code> copies recursively. <code>mv old new</code> moves/renames. <code>rm -rf dir</code> force-removes recursively (dangerous!). <code>mkdir -p a/b/c</code> creates nested dirs. <code>touch file</code> creates empty file or updates timestamp. Always use <code>rm -i</code> for interactive confirmation.'},
  {id:7,level:'basic',q:'What are file permissions in Linux and how do you read them?',a:'Format: <code>-rwxr-xr--</code>. First char: file type (- file, d dir, l symlink). Next 3 groups: owner/group/others permissions. r=4 read, w=2 write, x=1 execute. <code>ls -l</code> shows them. <code>chmod 755 file</code> = rwxr-xr-x. <code>chmod u+x,g-w file</code> symbolic. <code>chown user:group file</code> changes owner.'},
  {id:8,level:'basic',q:'What is the difference between sudo and su?',a:'<code>su username</code> switches to another user requiring their password; without username switches to root. <code>sudo command</code> runs one command elevated using your own password — logged, auditable, controlled by <code>/etc/sudoers</code>. <code>sudo -i</code> opens an interactive root shell. Prefer <code>sudo</code> — it limits exposure and leaves an audit trail.'},
  {id:9,level:'basic',q:'What is a shell and what are the common Linux shells?',a:'A shell is a command interpreter that reads commands and passes them to the kernel. <code>bash</code> (Bourne Again Shell) is most common. <code>sh</code> is POSIX-compatible. <code>zsh</code> has advanced completion and themes (Oh My Zsh). <code>fish</code> has auto-suggestions. <code>ksh</code> is KornShell. Current shell: <code>echo $SHELL</code>. Available shells: <code>cat /etc/shells</code>.'},
  {id:10,level:'basic',q:'How do you check and manage disk usage?',a:'<code>df -h</code> shows filesystem usage (human-readable). <code>du -sh /path</code> shows directory size. <code>du -sh * | sort -h</code> sizes sorted. <code>lsblk</code> shows block devices. <code>fdisk -l</code> shows partitions (root). <code>ncdu</code> is an interactive disk usage explorer. <code>iostat</code> shows I/O statistics.'},
  {id:11,level:'basic',q:'What is the difference between > and >> redirection?',a:'<code>&gt;</code> redirects stdout to file, overwriting it. <code>&gt;&gt;</code> appends to file. <code>2&gt;</code> redirects stderr. <code>&amp;&gt;</code> redirects both stdout and stderr. <code>2&gt;&amp;1</code> redirects stderr to stdout. <code>/dev/null</code> discards output: <code>cmd &amp;&gt; /dev/null</code>. <code>&lt;</code> reads stdin from file.'},
  {id:12,level:'basic',q:'How does piping work and what are common pipe patterns?',a:'<code>|</code> passes stdout of left command to stdin of right. Examples: <code>ps aux | grep nginx</code>, <code>cat log | grep ERROR | wc -l</code> counts errors, <code>ls -la | sort -k5 -n</code> sort by size, <code>history | grep ssh</code>. <code>tee</code> splits to both stdout and file: <code>cmd | tee out.txt | grep pattern</code>.'},
  {id:13,level:'basic',q:'What are environment variables and how do you manage them?',a:'Key-value pairs in process environment. View all: <code>env</code> or <code>printenv</code>. View one: <code>echo $HOME</code>. Set temporarily: <code>export VAR=value</code>. Set permanently: add to <code>~/.bashrc</code> (interactive shells) or <code>~/.profile</code> (login shells), then <code>source ~/.bashrc</code>. Unset: <code>unset VAR</code>. Important: <code>$PATH</code>, <code>$HOME</code>, <code>$USER</code>, <code>$SHELL</code>, <code>$PWD</code>.'},
  {id:14,level:'basic',q:'How do you find files in Linux?',a:'<code>find /path -name "*.log"</code> by name. <code>find . -type f -size +10M</code> files over 10MB. <code>find . -mtime -7</code> modified in last 7 days. <code>find . -name "*.c" -exec grep -l "malloc" {} \\;</code> search inside found files. <code>locate filename</code> is faster (index-based); update: <code>updatedb</code>. <code>which cmd</code> finds executable in PATH.'},
  {id:15,level:'basic',q:'What are hard links and symbolic (soft) links?',a:'Hard link: another directory entry pointing to the same inode. The file data persists until all hard links are removed. Cannot span filesystems. Create: <code>ln file hardlink</code>. Symbolic link: a pointer to a path — breaks if target is deleted. Can span filesystems, can point to directories. Create: <code>ln -s target symlink</code>. View: <code>ls -li</code> shows inode numbers.'},
  {id:16,level:'basic',q:'How do you view and search file contents?',a:'<code>cat file</code> prints all. <code>less file</code> pages through (q to quit, /search, n next). <code>head -n 20 file</code> first 20 lines. <code>tail -n 20 file</code> last 20. <code>tail -f file</code> follows live (log watching). <code>grep "pattern" file</code> search. <code>grep -rn "pattern" dir/</code> recursive with line numbers. <code>wc -l file</code> counts lines.'},
  {id:17,level:'basic',q:'What is the man command and how do you use it?',a:'<code>man command</code> shows the manual page. Sections: 1 user commands, 2 system calls, 3 library functions, 5 file formats, 8 admin commands. Navigate: arrows/PgUp/PgDn, <code>/term</code> search, <code>q</code> quit. <code>man 2 open</code> section 2. <code>man -k keyword</code> searches descriptions. <code>--help</code> flag for quick reference. <code>tldr command</code> for practical examples (install separately).'},
  {id:18,level:'basic',q:'How do you install and manage packages in Linux?',a:'Debian/Ubuntu: <code>apt update &amp;&amp; apt install pkg</code>, <code>apt remove pkg</code>, <code>apt search term</code>. RHEL/CentOS: <code>dnf install pkg</code> (or <code>yum</code>). Arch: <code>pacman -S pkg</code>. SUSE: <code>zypper install pkg</code>. View installed: <code>dpkg -l</code> (Debian) or <code>rpm -qa</code> (RPM). Install from source: <code>./configure &amp;&amp; make &amp;&amp; make install</code>.'},
  {id:19,level:'intermediate',q:'What is the difference between a process and a thread?',a:'A process is an independent program instance with its own memory space, file descriptors, and resources. Processes communicate via IPC (pipes, sockets, signals). A thread is a lightweight execution unit within a process sharing the same memory space and file descriptors. Creating threads is faster than processes. Threads share data easily but need synchronisation (mutexes). Use <code>ps aux</code> for processes, <code>ps -eLf</code> shows threads.'},
  {id:20,level:'intermediate',q:'How do you manage processes — creation, monitoring, and termination?',a:'List: <code>ps aux</code> all processes, <code>ps -ef</code> full format. Live: <code>top</code>, <code>htop</code> (interactive). <code>pgrep nginx</code> finds PIDs by name. Terminate: <code>kill PID</code> (SIGTERM graceful), <code>kill -9 PID</code> (SIGKILL force), <code>killall name</code>. Background: <code>cmd &amp;</code>. Foreground: <code>fg %1</code>. Background suspended: <code>Ctrl+Z</code> then <code>bg</code>. <code>nohup cmd &amp;</code> survives logout.'},
  {id:21,level:'intermediate',q:'What are signals in Linux and how do they work?',a:'Signals are async notifications to processes. Common: SIGTERM (15) — graceful shutdown, SIGKILL (9) — immediate kill (cannot be caught), SIGHUP (1) — terminal closed / reload config, SIGINT (2) — Ctrl+C, SIGCHLD — child terminated, SIGUSR1/2 — user-defined. Send: <code>kill -SIGHUP PID</code>. Handle in code with <code>signal()</code> or <code>sigaction()</code>. <code>trap</code> in bash handles signals.'},
  {id:22,level:'intermediate',q:'What is the /proc filesystem?',a:'<code>/proc</code> is a virtual filesystem exposing kernel and process info as files. <code>/proc/cpuinfo</code> CPU details, <code>/proc/meminfo</code> memory stats, <code>/proc/PID/</code> per-process info (cmdline, fd, maps, status). <code>/proc/net/</code> network stats. <code>cat /proc/loadavg</code> load average. Not on disk — generated on read. Used by <code>ps</code>, <code>top</code>, <code>free</code> etc.'},
  {id:23,level:'intermediate',q:'How do you monitor system resources in detail?',a:'CPU: <code>top</code>/<code>htop</code>, <code>mpstat -P ALL 1</code> per-core. Memory: <code>free -h</code>, <code>/proc/meminfo</code>, <code>vmstat 1</code>. Disk I/O: <code>iostat -xz 1</code>, <code>iotop</code>. Network: <code>ss -s</code>, <code>nethogs</code>, <code>iftop</code>. Load average: <code>uptime</code> (1/5/15 min averages). Historical: <code>sar -u 1 10</code>. Strace: <code>strace -p PID</code> traces system calls.'},
  {id:24,level:'intermediate',q:'What is systemd and how do you manage services?',a:'<code>systemd</code> is the init system (PID 1) on most modern distros — manages services, sockets, timers, mounts. Commands: <code>systemctl start/stop/restart/reload/status service</code>. Enable at boot: <code>systemctl enable service</code>. View all: <code>systemctl list-units --type=service</code>. Logs: <code>journalctl -u service -f</code> (follow), <code>journalctl -b</code> (since boot), <code>journalctl --since "1 hour ago"</code>.'},
  {id:25,level:'intermediate',q:'How do you configure and manage users and groups?',a:'Add user: <code>useradd -m -s /bin/bash username</code>. Set password: <code>passwd username</code>. Delete: <code>userdel -r username</code>. Add group: <code>groupadd grpname</code>. Add user to group: <code>usermod -aG grpname username</code>. View groups: <code>groups username</code> or <code>id username</code>. <code>/etc/passwd</code> user info, <code>/etc/shadow</code> hashed passwords, <code>/etc/group</code> group memberships.'},
  {id:26,level:'intermediate',q:'How do Linux file permissions work in detail, including setuid and sticky bit?',a:'Standard: rwx for owner/group/others. Setuid (4xxx): on executables, runs as file owner (e.g. <code>passwd</code>). Setgid (2xxx): on dirs, new files inherit group. Sticky bit (1xxx): on dirs, only file owner can delete (e.g. <code>/tmp</code>). Example: <code>chmod 4755 file</code> sets setuid+rwxr-xr-x. <code>ls -l</code> shows <code>s</code> (setuid/setgid) or <code>t</code> (sticky) in permission bits.'},
  {id:27,level:'intermediate',q:'What is grep and how do you use it for complex searches?',a:'<code>grep -r "pattern" dir/</code> recursive. <code>-i</code> case-insensitive. <code>-n</code> line numbers. <code>-v</code> invert match. <code>-c</code> count matches. <code>-l</code> list matching files only. <code>-A 3</code> 3 lines after. <code>-B 3</code> before. <code>-E</code> extended regex. <code>-P</code> Perl regex. <code>-w</code> whole word. <code>--include="*.c"</code> filter files. Example: <code>grep -rn --include="*.py" "import os" .</code>'},
  {id:28,level:'intermediate',q:'Explain awk — how does it work and what are its key features?',a:'<code>awk</code> processes text line by line, splitting into fields (<code>$1</code>, <code>$2</code>... <code>$NF</code> last). <code>awk \'{print $1, $3}\' file</code>. Pattern matching: <code>awk \'/error/ {print $0}\' log</code>. Aggregation: <code>awk \'{sum+=$2} END{print sum}\' file</code>. Field separator: <code>awk -F: \'{print $1}\' /etc/passwd</code>. Built-ins: <code>NR</code> line number, <code>NF</code> field count, <code>FS</code> separator. Condition: <code>awk \'$3 > 100 {print}\' file</code>.'},
  {id:29,level:'intermediate',q:'Explain sed — stream editing patterns.',a:'<code>sed \'s/old/new/g\' file</code> substitute all. <code>-i</code> edit in place (<code>-i.bak</code> for backup). <code>sed -n \'5,10p\' file</code> print lines 5-10. <code>sed \'/^#/d\' file</code> delete comment lines. <code>sed \'2i\\new line\' file</code> insert before line 2. Address ranges: <code>sed \'1,5s/foo/bar/\' file</code>. Multiple expressions: <code>sed -e \'s/a/b/\' -e \'s/c/d/\'</code>. Combined pipeline: <code>cat nginx.conf | sed \'/^\\s*#/d\' | sed \'/^$/d\'</code> removes comments and blank lines.'},
  {id:30,level:'intermediate',q:'What are cron jobs and how do you schedule tasks?',a:'<code>crontab -e</code> edit user crontab. Format: <code>MIN HOUR DOM MON DOW CMD</code>. Examples: <code>0 2 * * * /backup.sh</code> (2am daily), <code>*/15 * * * * /check.sh</code> (every 15 min), <code>0 9 * * 1-5 /report.sh</code> (weekdays 9am). System cron: <code>/etc/cron.d/</code>, <code>/etc/cron.daily/</code>. <code>crontab -l</code> list, <code>crontab -r</code> remove. Log: <code>grep CRON /var/log/syslog</code>.'},
  {id:31,level:'intermediate',q:'What are named pipes (FIFOs) and when would you use them?',a:'A FIFO is a special file for IPC between processes. Create: <code>mkfifo /tmp/mypipe</code>. Writer: <code>echo "data" &gt; /tmp/mypipe</code>. Reader: <code>cat /tmp/mypipe</code>. Unlike anonymous pipes, FIFOs exist on the filesystem and allow unrelated processes to communicate. Use case: a log producer and log consumer running independently. Blocks until both ends are open.'},
  {id:32,level:'intermediate',q:'What are SSH keys and how do you set up key-based authentication?',a:'Generate: <code>ssh-keygen -t ed25519 -C "comment"</code> (prefer ed25519 over RSA). Copy public key: <code>ssh-copy-id user@host</code> or manually append to <code>~/.ssh/authorized_keys</code>. Config file <code>~/.ssh/config</code>: <code>Host alias\n  HostName ip\n  User ubuntu\n  IdentityFile ~/.ssh/key</code>. Disable password auth: <code>PasswordAuthentication no</code> in <code>/etc/ssh/sshd_config</code>. Agent: <code>ssh-add ~/.ssh/key</code>.'},
  {id:33,level:'intermediate',q:'How do you check and manage network interfaces and routing?',a:'Interfaces: <code>ip addr show</code> (modern) or <code>ifconfig</code>. Bring up/down: <code>ip link set eth0 up/down</code>. Routes: <code>ip route show</code>, add route: <code>ip route add 10.0.0.0/24 via 192.168.1.1</code>. DNS: <code>cat /etc/resolv.conf</code>. Test connectivity: <code>ping</code>, <code>traceroute</code>, <code>mtr</code>. DNS lookup: <code>dig domain</code> or <code>nslookup domain</code>. Active connections: <code>ss -tuln</code>, <code>netstat -tuln</code>.'},
  {id:34,level:'intermediate',q:'What is iptables and how do you write firewall rules?',a:'<code>iptables</code> manages netfilter firewall rules via chains (INPUT/OUTPUT/FORWARD) and tables (filter/nat/mangle). Accept SSH: <code>iptables -A INPUT -p tcp --dport 22 -j ACCEPT</code>. Drop all other input: <code>iptables -P INPUT DROP</code>. NAT masquerade: <code>iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE</code>. Save: <code>iptables-save &gt; /etc/iptables/rules.v4</code>. Modern alternative: <code>nftables</code>. <code>ufw</code> is a simpler front-end on Ubuntu.'},
  {id:35,level:'intermediate',q:'What is the difference between soft and hard limits (ulimit)?',a:'<code>ulimit</code> controls resource limits per process. <code>-n</code> max open files, <code>-u</code> max user processes, <code>-s</code> stack size, <code>-v</code> virtual memory. Soft limit: current limit, user can raise up to hard limit. Hard limit: maximum, only root can raise. View: <code>ulimit -a</code>. Set permanently in <code>/etc/security/limits.conf</code>. Critical for high-connection servers (increase <code>nofile</code>).'},
  {id:36,level:'intermediate',q:'What is the difference between ext4, XFS, and Btrfs?',a:'ext4: most common Linux FS, mature, journaled, max 16TB file. XFS: high-performance, excellent for large files and parallel I/O, used in RHEL by default. Btrfs: copy-on-write, supports snapshots, RAID, checksumming, subvolumes — more complex. ZFS: powerful (not default Linux), excellent for NAS. For most use: ext4 (safe) or XFS (performance). Check: <code>df -T</code> or <code>lsblk -f</code>.'},
  {id:37,level:'intermediate',q:'What is a Linux namespace and cgroup?',a:'Namespaces isolate process views of system resources: pid (process IDs), net (network), mnt (filesystems), uts (hostname), ipc, user. Each container gets its own namespace. Cgroups (control groups) limit and track resource usage: CPU time, memory, I/O bandwidth, network. Together namespaces + cgroups form the foundation of container technologies like Docker.'},
  {id:38,level:'intermediate',q:'How does the Linux boot process work?',a:'1. BIOS/UEFI POST and boot device selection. 2. Bootloader (GRUB2) loaded from MBR/EFI partition. 3. GRUB loads kernel + initramfs into memory. 4. Kernel initialises hardware, mounts initramfs. 5. initramfs mounts real root filesystem. 6. Kernel runs PID 1 (systemd or SysV init). 7. systemd reads unit files, starts targets/services in dependency order. 8. Login prompt or GUI.'},
  {id:39,level:'intermediate',q:'What is strace and when do you use it?',a:'<code>strace</code> traces system calls and signals made by a process. Diagnose: why a program hangs, what files it opens, why it fails with "permission denied". <code>strace ./program</code> trace from start. <code>strace -p PID</code> attach to running process. <code>-e trace=open,read,write</code> filter calls. <code>-o file.txt</code> output to file. <code>-T</code> show time spent in each call. Pair with <code>ltrace</code> for library calls.'},
  {id:40,level:'intermediate',q:'What is the difference between NFS, CIFS/SMB, and SSHFS?',a:'NFS (Network File System): Linux-native network filesystem, fast on Linux-to-Linux. CIFS/SMB: Windows-compatible, used for Samba shares — <code>mount -t cifs //server/share /mnt</code>. SSHFS: mounts remote filesystem over SSH — <code>sshfs user@host:/path /mnt</code> — easy, encrypted, no extra server config. For persistent mounts add to <code>/etc/fstab</code>. NFS is fastest in Linux-only environments.'},
  {id:41,level:'intermediate',q:'What is the difference between /dev/sda, /dev/nvme0n1, and /dev/vda?',a:'<code>/dev/sda</code>: SATA/SCSI disk (legacy naming). <code>/dev/sda1</code> first partition. <code>/dev/nvme0n1</code>: NVMe SSD (much faster). <code>/dev/nvme0n1p1</code> first partition. <code>/dev/vda</code>: virtual disk (KVM/QEMU VMs). <code>/dev/xvda</code>: Xen virtual disk (AWS older). <code>/dev/mmcblk0</code>: eMMC/SD card. <code>lsblk</code> shows all block devices and their partitions clearly.'},
  {id:42,level:'intermediate',q:'How do you diagnose and resolve a "no space left" error even when df shows free space?',a:'The issue is inode exhaustion. Every file uses one inode regardless of size. Check: <code>df -i</code> shows inode usage. Fix: delete files with many small files (temp files, logs, mail spools). Find culprit: <code>find / -xdev -printf \'%h\\n\' | sort | uniq -c | sort -rn | head</code> shows directories with most files. Also check: full <code>/var/log</code>, leftover tmp files, package cache.'},
  {id:43,level:'intermediate',q:'What is the purpose of /etc/fstab?',a:'<code>/etc/fstab</code> defines filesystems to mount automatically at boot. Format: <code>device mountpoint type options dump pass</code>. Example: <code>UUID=xxxx /home ext4 defaults,noatime 0 2</code>. Options: <code>noatime</code> (faster), <code>ro</code> (read-only), <code>noexec</code> (no executables), <code>nofail</code> (don\'t fail boot if missing). Test without rebooting: <code>mount -a</code>. Use UUIDs (not <code>/dev/sdX</code>) as they are stable.'},
  {id:44,level:'intermediate',q:'What is load average and how do you interpret it?',a:'Load average represents the average number of processes in the run queue (running or waiting for CPU/IO) over 1, 5, and 15 minutes. View: <code>uptime</code> or <code>top</code>. On a 4-core system: load 4.0 = fully utilised, >4 = overloaded. Load 1.0 on single-core = 100% utilised. High load with low CPU% often means I/O wait (<code>iostat</code>). Low CPU with high load: check memory/swap and I/O.'},
  {id:45,level:'intermediate',q:'How do you use lsof and what is it used for?',a:'<code>lsof</code> (list open files) shows every file opened by every process. <code>lsof -u username</code> files by user. <code>lsof -p PID</code> files by process. <code>lsof -i :8080</code> what is using port 8080. <code>lsof /path/to/file</code> which process has file open. <code>lsof +D /dir</code> all files under directory. Useful for: finding process holding a port, finding processes preventing unmount, debugging file descriptor leaks.'},
],

git: [
  {id:1,level:'basic',q:'What is Git and why is version control important?',a:'Git is a distributed version control system tracking changes to files over time. Every developer has a full copy of the repository. Benefits: full history, branching for parallel work, rollback to any state, collaboration without overwriting others\' work, code review via pull requests, and blame/log for understanding why code changed.'},
  {id:2,level:'basic',q:'What is the difference between Git and GitHub/GitLab/Bitbucket?',a:'Git is the local VCS tool. GitHub, GitLab, and Bitbucket are cloud hosting services for Git repositories. They add features: web UI, pull requests, CI/CD pipelines, issue tracking, wikis. GitLab can be self-hosted. GitHub is most popular for open source. Bitbucket integrates with Atlassian tools. You can use Git without any of them.'},
  {id:3,level:'basic',q:'What are the three areas in Git — working tree, staging area, and repository?',a:'Working tree: files on disk as you see them. Staging area (index): a snapshot of what the next commit will include — populated with <code>git add</code>. Repository (.git dir): the committed history. Flow: edit in working tree → <code>git add</code> → staging → <code>git commit</code> → repository. <code>git status</code> shows state of working tree and staging area.'},
  {id:4,level:'basic',q:'What does git init do and what is in the .git directory?',a:'<code>git init</code> creates a new empty repository. The <code>.git/</code> folder contains: <code>HEAD</code> (current branch pointer), <code>config</code> (repo config), <code>objects/</code> (all content — blobs/trees/commits), <code>refs/</code> (branch and tag pointers), <code>index</code> (staging area). Delete <code>.git/</code> to de-git a directory. Never manually edit .git files.'},
  {id:5,level:'basic',q:'How do git add and git commit work?',a:'<code>git add file</code> stages a specific file. <code>git add .</code> stages all changes. <code>git add -p</code> interactively stages hunks (partial staging). <code>git commit -m "message"</code> creates a commit snapshot. <code>git commit -am "msg"</code> stages tracked files and commits. <code>git commit --amend</code> modifies the last commit. Good commit messages: imperative mood, max 72 chars subject, blank line, then body.'},
  {id:6,level:'basic',q:'How do you check git history and understand the output?',a:'<code>git log</code> full history. <code>git log --oneline</code> compact one line per commit. <code>git log --oneline --graph --all</code> visual branch graph. <code>git log -p</code> shows diffs. <code>git log --author="Alice"</code> filter by author. <code>git log --since="2 weeks ago"</code>. <code>git show HASH</code> shows a specific commit. Each commit has: hash, author, date, message, parent hash(es).'},
  {id:7,level:'basic',q:'How do you create, switch, list, and delete branches?',a:'Create: <code>git branch feature</code>. Create + switch: <code>git checkout -b feature</code> or <code>git switch -c feature</code>. Switch: <code>git switch feature</code>. List local: <code>git branch</code>. List all (including remote): <code>git branch -a</code>. Delete merged: <code>git branch -d feature</code>. Force delete: <code>git branch -D feature</code>. Rename: <code>git branch -m old new</code>.'},
  {id:8,level:'basic',q:'What does git clone do and what are its options?',a:'<code>git clone URL</code> creates a full copy of a remote repository. The remote is aliased as <code>origin</code>. Shallow clone (partial history): <code>git clone --depth 1 URL</code> (faster for CI). Specific branch: <code>git clone -b branch URL</code>. Clone into specific dir: <code>git clone URL dirname</code>. After cloning, all remote branches are available as <code>origin/branch</code>; local tracking branches are created on checkout.'},
  {id:9,level:'basic',q:'What is the difference between git pull and git fetch?',a:'<code>git fetch origin</code> downloads all remote changes (commits, branches) but does not touch your working tree or current branch. <code>git pull</code> = <code>git fetch</code> + <code>git merge</code> (or rebase with <code>--rebase</code>). Safe workflow: fetch first, inspect with <code>git log origin/main..HEAD</code>, then merge. <code>git pull --rebase</code> keeps history linear.'},
  {id:10,level:'basic',q:'How do you push changes to a remote repository?',a:'<code>git push origin branch</code> pushes a branch. First push of new branch: <code>git push -u origin feature</code> (sets upstream tracking). Force push (dangerous on shared branches): <code>git push --force-with-lease</code> (safer than <code>--force</code> — fails if remote has new commits you haven\'t seen). Delete remote branch: <code>git push origin --delete branch</code>. Push all branches: <code>git push --all</code>.'},
  {id:11,level:'basic',q:'What is a .gitignore file and how do patterns work?',a:'<code>.gitignore</code> lists patterns of files Git should not track. Patterns: <code>*.log</code> (any .log), <code>build/</code> (directory), <code>!important.log</code> (negate — do track), <code>**/temp</code> (any depth). Scope: applies from the directory containing the file. Global ignore: <code>git config --global core.excludesfile ~/.gitignore_global</code>. Already-tracked files must be untracked: <code>git rm --cached file</code>.'},
  {id:12,level:'basic',q:'How do you undo changes in Git at different stages?',a:'Unstaged changes: <code>git restore file</code> (or <code>git checkout -- file</code>). Staged changes (unstage): <code>git restore --staged file</code>. Undo last commit (keep changes staged): <code>git reset --soft HEAD~1</code>. Undo last commit (keep changes unstaged): <code>git reset HEAD~1</code>. Discard commit + changes: <code>git reset --hard HEAD~1</code>. Safe undo of a public commit: <code>git revert HASH</code> (creates new inverse commit).'},
  {id:13,level:'basic',q:'What is git status and git diff?',a:'<code>git status</code> shows: branch name, untracked files, modified tracked files, staged changes. <code>git diff</code> shows unstaged changes vs last commit. <code>git diff --staged</code> shows staged changes. <code>git diff branch1..branch2</code> compares branches. <code>git diff HEAD~3</code> vs 3 commits ago. <code>git difftool</code> opens configured visual diff tool. Add <code>--stat</code> for summary.'},
  {id:14,level:'basic',q:'What is git merge and what are the types of merges?',a:'<code>git merge branch</code> integrates changes from another branch. Types: Fast-forward (no merge commit, just moves pointer — when target has no new commits). Three-way merge (creates a merge commit — when both branches diverged). Squash merge: <code>git merge --squash branch</code> — collapses all branch commits into staged changes for a clean single commit. <code>--no-ff</code> forces a merge commit even if fast-forward is possible.'},
  {id:15,level:'basic',q:'What is a merge conflict and how do you resolve one?',a:'A conflict occurs when the same lines were changed differently in two branches. Git marks conflicts with <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</code> (your changes), <code>=======</code> (separator), <code>&gt;&gt;&gt;&gt;&gt;&gt;&gt; branch</code> (incoming). Edit the file choosing or combining changes. Then: <code>git add file</code> and <code>git commit</code>. Tools: <code>git mergetool</code>, VS Code\'s merge editor, IntelliJ. Abort: <code>git merge --abort</code>.'},
  {id:16,level:'intermediate',q:'What is the difference between git merge and git rebase?',a:'<code>git merge</code> creates a merge commit preserving full history — shows true branching. <code>git rebase branch</code> replays your commits on top of branch producing linear history. Rebase rewrites commit hashes — never rebase public/shared branches. <code>git rebase -i HEAD~5</code> (interactive rebase): squash, reorder, edit, drop commits. Golden rule: rebase local, merge public.'},
  {id:17,level:'intermediate',q:'What is interactive rebase and what can you do with it?',a:'<code>git rebase -i HEAD~N</code> opens an editor with last N commits. Actions per commit: <code>pick</code> (keep), <code>reword</code> (change message), <code>edit</code> (amend commit), <code>squash</code> (combine with previous), <code>fixup</code> (squash, discard message), <code>drop</code> (remove). Use to: clean up messy commits before PR, combine WIP commits, reorder commits, split a commit. Never on shared history.'},
  {id:18,level:'intermediate',q:'What is git stash and how do you manage multiple stashes?',a:'<code>git stash</code> saves dirty working tree and staging area to a stack. <code>git stash push -m "description"</code> with name. List: <code>git stash list</code>. Apply latest (keep in stash): <code>git stash apply</code>. Apply + remove: <code>git stash pop</code>. Apply specific: <code>git stash apply stash@{2}</code>. Create branch from stash: <code>git stash branch newbranch stash@{1}</code>. Drop: <code>git stash drop stash@{0}</code>. Clear all: <code>git stash clear</code>.'},
  {id:19,level:'intermediate',q:'What is git cherry-pick and when do you use it?',a:'<code>git cherry-pick HASH</code> applies a specific commit from any branch onto the current branch without merging the whole branch. Use cases: apply a hotfix to multiple release branches, pick a specific feature commit without merging in-progress work, rescue a commit made to wrong branch. <code>cherry-pick A..B</code> picks a range. <code>--no-commit</code> stages without committing. Creates new commits with different hashes.'},
  {id:20,level:'intermediate',q:'What are Git tags and how do you use them?',a:'Tags mark specific commits permanently (typically releases). Lightweight tag: <code>git tag v1.0</code> (just a pointer). Annotated tag (recommended): <code>git tag -a v1.0 -m "Release 1.0"</code> (stores tagger, date, message). Push tags: <code>git push origin --tags</code>. List: <code>git tag -l "v1.*"</code>. Delete local: <code>git tag -d v1.0</code>. Delete remote: <code>git push origin --delete v1.0</code>. Checkout: <code>git checkout v1.0</code>.'},
  {id:21,level:'intermediate',q:'What is the difference between git reset, git revert, and git restore?',a:'<code>git reset</code> moves the branch pointer (rewrites history — local only). <code>git revert HASH</code> creates a new commit that undoes a previous one (safe for shared branches). <code>git restore file</code> discards working tree changes (does not affect history). <code>git reset --hard HASH</code> moves branch pointer and discards all changes since. Use revert for public branches, reset for local cleanup.'},
  {id:22,level:'intermediate',q:'What is git reflog and how does it save you?',a:'<code>git reflog</code> records every movement of HEAD — even after resets, amends, and rebases that would normally make commits unreachable. It is your safety net. Recover a "lost" commit: <code>git reflog</code> → find commit hash → <code>git checkout HASH</code> or <code>git branch recover HASH</code>. Reflog is local only, not pushed. Entries expire after 90 days by default.'},
  {id:23,level:'intermediate',q:'What is git bisect and how do you use it to find a bug?',a:'Binary search through history to find which commit introduced a bug. <code>git bisect start</code>. <code>git bisect bad</code> (current is broken). <code>git bisect good v2.0</code> (known good commit). Git checks out midpoint. Test. <code>git bisect good/bad</code>. Repeat until Git identifies the first bad commit. Automate: <code>git bisect run ./test.sh</code>. End: <code>git bisect reset</code>. Finds bugs in O(log n) steps.'},
  {id:24,level:'intermediate',q:'What is a fork vs a clone and what is the fork-PR workflow?',a:'Clone: a local copy of any repo. Fork: a server-side copy under your account (GitHub/GitLab). Fork-PR workflow for open source: 1. Fork the repo on GitHub. 2. Clone your fork. 3. Add upstream: <code>git remote add upstream URL</code>. 4. Create a feature branch. 5. Push to your fork. 6. Open PR from fork:branch to upstream:main. Keep fork current: <code>git fetch upstream; git rebase upstream/main</code>.'},
  {id:25,level:'intermediate',q:'What is git submodule and when should you use it?',a:'A submodule embeds one Git repo inside another at a specific commit. Add: <code>git submodule add URL path</code>. Clone a repo with submodules: <code>git clone --recurse-submodules URL</code>. Update: <code>git submodule update --remote</code>. Tracked in <code>.gitmodules</code>. Useful for shared libraries pinned to a version. Downsides: complex workflow, easy to forget to push submodule changes. Alternatives: git subtree, package managers.'},
  {id:26,level:'intermediate',q:'What is git blame and how do you use it effectively?',a:'<code>git blame file</code> annotates each line with the last commit that modified it — shows commit hash, author, date. Find who wrote a specific line: <code>git blame -L 40,60 file</code> (lines 40–60). Ignore whitespace: <code>-w</code>. Show original commit (detects moved lines): <code>-C</code>. In VS Code: GitLens shows inline blame. Then <code>git show HASH</code> to see the full context of that change.'},
  {id:27,level:'intermediate',q:'What is git worktree and when is it useful?',a:'<code>git worktree</code> checks out multiple branches simultaneously in separate directories from the same repository clone — no need for multiple clones. <code>git worktree add ../hotfix hotfix-branch</code>. List: <code>git worktree list</code>. Remove: <code>git worktree remove ../hotfix</code>. Useful for: reviewing a PR while working on another feature, building a release branch without stashing, running tests on multiple branches simultaneously.'},
  {id:28,level:'intermediate',q:'What is a Git hook and how do you use pre-commit hooks?',a:'Hooks are scripts in <code>.git/hooks/</code> that run at specific Git events. <code>pre-commit</code>: run before a commit (lint, format, tests). <code>commit-msg</code>: validate commit message. <code>pre-push</code>: run before push. <code>post-merge</code>: run after merge (e.g. npm install). Make executable: <code>chmod +x .git/hooks/pre-commit</code>. Share with team via <code>pre-commit</code> framework (Python tool) and <code>.pre-commit-config.yaml</code>.'},
  {id:29,level:'intermediate',q:'What does git log --graph look like and how do you read it?',a:'<code>git log --oneline --graph --all --decorate</code> shows a text-based branch graph. <code>*</code> is a commit. Lines show parent relationships. <code>|</code> vertical, <code>/</code> and <code>\\</code> branches and merges. Labels: <code>HEAD -&gt; main</code>, <code>origin/main</code>, tag names. Diverging branches appear as parallel lines merging at merge commits. Use this to understand branching strategy and spot stray commits.'},
  {id:30,level:'intermediate',q:'What is git clean and when do you use it?',a:'<code>git clean</code> removes untracked files from the working tree. <code>-n</code> dry run (shows what would be removed — always do this first). <code>-f</code> force (actually removes). <code>-d</code> removes untracked directories. <code>-x</code> removes gitignored files too (useful for a clean build). <code>-i</code> interactive. Example: <code>git clean -nfd</code> preview, then <code>git clean -fd</code>. Combined with <code>git reset --hard</code> gives a completely clean state.'},
  {id:31,level:'intermediate',q:'What is sparse checkout and shallow clone?',a:'Shallow clone: <code>git clone --depth 1 URL</code> downloads only the latest commit — no full history. Faster for CI. Deepen: <code>git fetch --unshallow</code>. Sparse checkout: work with only part of a large repository. Enable: <code>git sparse-checkout init --cone; git sparse-checkout set src/module</code>. Only the specified paths are checked out to disk. Useful for monorepos where you only work on one service.'},
  {id:32,level:'intermediate',q:'How do you resolve a detached HEAD state?',a:'Detached HEAD means HEAD points directly to a commit hash, not a branch. Happens after: <code>git checkout HASH</code>, <code>git checkout tag</code>, during rebase. You can commit but the commits won\'t belong to any branch and are hard to find. Fix: <code>git checkout -b new-branch</code> to create a branch at that commit. Or <code>git checkout main</code> to abandon (use reflog to recover commits). Always prefer <code>git checkout branchname</code> over hash.'},
  {id:33,level:'intermediate',q:'What is git config and what are the configuration levels?',a:'Three levels (each overrides the previous): system (<code>/etc/gitconfig</code>), global (<code>~/.gitconfig</code>), local (<code>.git/config</code>). Set: <code>git config --global user.name "Alice"</code>. View all: <code>git config --list --show-origin</code>. Useful settings: <code>core.editor</code>, <code>pull.rebase true</code>, <code>merge.tool</code>, <code>alias.lg "log --oneline --graph"</code>, <code>push.default current</code>, <code>init.defaultBranch main</code>.'},
  {id:34,level:'intermediate',q:'What is the difference between origin and upstream remotes?',a:'By convention: <code>origin</code> is your fork or primary remote (where you push). <code>upstream</code> is the original repo you forked from (where you pull updates from). Add upstream: <code>git remote add upstream URL</code>. Fetch upstream changes: <code>git fetch upstream; git rebase upstream/main</code>. You can have as many remotes as needed. <code>git remote -v</code> shows all. Rename: <code>git remote rename origin myremote</code>.'},
  {id:35,level:'intermediate',q:'How does git handle binary files and large files?',a:'Git stores full copies of every version of binary files — poor for large binaries (images, videos, ML models). Git LFS (Large File Storage) replaces large files with text pointers and stores the actual content on a separate server. Install: <code>git lfs install; git lfs track "*.psd"</code>. The <code>.gitattributes</code> file records tracked patterns. <code>git lfs ls-files</code> shows LFS-tracked files. GitHub has a 100MB file limit (1GB for LFS).'},
],
shell: [
  {id:1,level:'basic',q:'What is a shell script and how do you run one?',a:'A shell script is a text file with shell commands executed sequentially by a shell interpreter. Create: <code>nano script.sh</code>. Run with interpreter: <code>bash script.sh</code>. Make executable: <code>chmod +x script.sh</code> then <code>./script.sh</code>. Or specify interpreter: <code>/bin/bash script.sh</code>. Scripts run in a subshell — changes to variables do not affect the parent shell unless you <code>source script.sh</code> (runs in current shell).'},
  {id:2,level:'basic',q:'What is a shebang line and why does it matter?',a:'The shebang (<code>#!</code>) on line 1 tells the OS which interpreter to use when running the script as an executable. <code>#!/bin/bash</code> uses bash at a fixed path. <code>#!/usr/bin/env bash</code> finds bash in PATH — more portable across systems where bash may be elsewhere (e.g. macOS with Homebrew). <code>#!/usr/bin/env python3</code> for Python scripts. Without shebang, the OS uses the current shell, which may not be bash.'},
  {id:3,level:'basic',q:'How do you declare, assign, and use variables in bash?',a:'Assign: <code>name="Alice"</code> — no spaces around <code>=</code>. Use: <code>echo $name</code> or <code>echo "${name}"</code> (braces for concatenation: <code>"${name}s"</code>). Always quote: <code>echo "$name"</code> (prevents word splitting). Readonly: <code>readonly MAX=100</code>. Local inside functions: <code>local var="x"</code>. Integer: <code>declare -i num=5</code>. Arrays: <code>arr=(a b c)</code>. Unset: <code>unset name</code>.'},
  {id:4,level:'basic',q:'What is the difference between single quotes and double quotes?',a:'Single quotes preserve everything literally — no variable expansion, no escape sequences, no command substitution. <code>echo \'$HOME\'</code> prints <code>$HOME</code>. Double quotes allow: variable expansion (<code>$VAR</code>), command substitution (<code>$(cmd)</code>), escape sequences (<code>\\n</code>, <code>\\t</code>). <code>echo "$HOME"</code> prints the path. Rule: use double quotes for variables (prevents word splitting and globbing), single quotes for literal strings.'},
  {id:5,level:'basic',q:'How do you pass arguments to a script and what are special variables?',a:'<code>$0</code> script name, <code>$1-$9</code> positional params, <code>${10}</code>+ braces needed. <code>$#</code> number of args, <code>$@</code> all args as separate words (use in loops), <code>$*</code> all args as one string. <code>$?</code> last exit code, <code>$$</code> current PID, <code>$!</code> last background PID. <code>shift N</code> removes first N args. Check required args: <code>if [ $# -lt 2 ]; then echo "Usage: $0 arg1 arg2"; exit 1; fi</code>.'},
  {id:6,level:'basic',q:'How do you write if/elif/else conditionals in bash?',a:'<code>if [[ condition ]]; then ... elif [[ ... ]]; then ... else ... fi</code>. Use <code>[[ ]]</code> (bash built-in, preferred). Numeric: <code>-eq -ne -lt -gt -le -ge</code>. String: <code>= != -z</code> (empty) <code>-n</code> (non-empty) <code>=~</code> (regex). File: <code>-f</code> (file) <code>-d</code> (dir) <code>-e</code> (exists) <code>-r -w -x</code> (permissions) <code>-s</code> (non-empty). Logical: <code>&amp;&amp;</code> <code>||</code> <code>!</code>. One-liner: <code>command &amp;&amp; echo ok || echo fail</code>.'},
  {id:7,level:'basic',q:'What are the different loop types in bash?',a:'For range: <code>for i in {1..10}; do echo $i; done</code>. C-style: <code>for ((i=0; i&lt;10; i++)); do ...; done</code>. Over array: <code>for item in "${arr[@]}"; do ...; done</code>. Over files: <code>for f in *.txt; do ...; done</code>. While: <code>while [[ $i -lt 10 ]]; do ((i++)); done</code>. Read lines: <code>while IFS= read -r line; do ...; done &lt; file</code>. Until: <code>until [[ $done == true ]]; do ...; done</code>. Break/continue work as expected.'},
  {id:8,level:'basic',q:'What are exit codes and why do they matter in scripts?',a:'Every command returns an exit code: 0 = success, non-zero = failure. Access: <code>$?</code>. Common codes: 1 general error, 2 misuse, 126 not executable, 127 command not found, 130 Ctrl+C. Set in script: <code>exit 0</code> or <code>exit 1</code>. Use in logic: <code>if grep -q "pattern" file; then ...</code>. <code>set -e</code> exits script on any non-zero exit code. Exit codes enable chaining: <code>cmd1 &amp;&amp; cmd2</code> (run cmd2 only if cmd1 succeeds).'},
  {id:9,level:'basic',q:'How does input/output redirection work?',a:'<code>&gt;</code> stdout to file (overwrite), <code>&gt;&gt;</code> append, <code>2&gt;</code> stderr to file, <code>2&gt;&gt;</code> stderr append, <code>&amp;&gt;</code> both to file, <code>2&gt;&amp;1</code> stderr to same place as stdout, <code>&lt;</code> stdin from file, <code>&lt;&lt; EOF ... EOF</code> heredoc, <code>&lt;&lt;&lt; "string"</code> herestring. Discard output: <code>cmd &amp;&gt; /dev/null</code>. Log both to file and screen: <code>cmd 2&gt;&amp;1 | tee log.txt</code>.'},
  {id:10,level:'basic',q:'How do you read user input in a shell script?',a:'<code>read -p "Enter name: " name</code> prompts and reads into variable. <code>read -s</code> silent (passwords). <code>read -t 10</code> timeout 10 seconds. <code>read -n 1</code> read exactly 1 character. <code>read -a arr</code> read into array. Default variable: <code>read</code> without variable name stores in <code>$REPLY</code>. Read from file: <code>read line &lt; file</code>. Read all lines: <code>mapfile -t arr &lt; file</code> (bash 4+).'},
  {id:11,level:'basic',q:'How do you perform arithmetic in bash?',a:'Integer arithmetic with <code>$(( ))</code>: <code>result=$((a + b * 2))</code>. Operators: <code>+ - * / % ** (( ++ -- ))</code>. Increment: <code>((count++))</code> or <code>count=$((count + 1))</code>. Also: <code>let result=a+b</code>. Floating point — use <code>bc</code>: <code>echo "scale=4; 22/7" | bc</code>. Or awk: <code>awk "BEGIN{printf \"%.2f\\n\", $a/$b}"</code>. Compare: <code>if (( a > b ))</code>.'},
  {id:12,level:'basic',q:'How do you write and call functions in bash?',a:'Define: <code>greet() { local name="$1"; echo "Hello, $name"; }</code> or <code>function greet { ... }</code>. Call: <code>greet "Alice"</code>. Arguments inside function: <code>$1 $2 $#</code> (separate from script args). Return values via echo + command substitution: <code>result=$(get_value)</code>. Return codes via <code>return N</code>. Use <code>local</code> to scope variables. Functions must be defined before being called.'},
  {id:13,level:'basic',q:'How do you use case statements?',a:'<code>case "$var" in\n  pattern1) commands ;;\n  pattern2|pattern3) commands ;;\n  *) default ;;\nesac</code>. Patterns support glob: <code>*.txt</code>, <code>[Yy]es</code>, <code>?</code>. Example: <code>case "$OS" in\n  Linux) install_apt ;;\n  Darwin) install_brew ;;\n  *) echo "unsupported" ; exit 1 ;;\nesac</code>. Cleaner than long if/elif chains for multi-value matching. No fall-through (unlike C) unless using <code>;&amp;</code>.'},
  {id:14,level:'basic',q:'What are common string operations in bash?',a:'Length: <code>${#str}</code>. Substring: <code>${str:2:5}</code> (start, length). Remove prefix: <code>${str#prefix}</code> (shortest) <code>${str##prefix}</code> (longest). Remove suffix: <code>${str%suffix}</code> <code>${str%%suffix}</code>. Replace first: <code>${str/old/new}</code>. Replace all: <code>${str//old/new}</code>. Uppercase: <code>${str^^}</code>. Lowercase: <code>${str,,}</code>. Default value: <code>${var:-default}</code>. Check set: <code>${var:?error if unset}</code>.'},
  {id:15,level:'basic',q:'What are arrays in bash and how do you use them?',a:'Indexed array: <code>arr=(apple banana cherry)</code>. Access: <code>${arr[0]}</code>. All elements: <code>${arr[@]}</code>. Length: <code>${#arr[@]}</code>. Append: <code>arr+=(date)</code>. Slice: <code>${arr[@]:1:2}</code>. Loop: <code>for item in "${arr[@]}"; do ...</code>. Associative array (bash 4+): <code>declare -A map; map[key]="value"; echo "${map[key]}"</code>. All keys: <code>${!map[@]}</code>. Delete element: <code>unset arr[1]</code>.'},
  {id:16,level:'intermediate',q:'What is set -euo pipefail and why should you use it?',a:'<code>set -e</code>: exit script immediately if any command returns non-zero. <code>set -u</code>: treat unset variables as errors (prevents silent bugs from typos). <code>set -o pipefail</code>: a pipeline fails if any command in it fails (without this, <code>false | true</code> succeeds). Together: <code>set -euo pipefail</code> at the top of every serious script. Add <code>-x</code> for debug tracing. Individual command exemptions: <code>cmd || true</code>.'},
  {id:17,level:'intermediate',q:'What is command substitution and process substitution?',a:'Command substitution captures output: <code>today=$(date +%Y-%m-%d)</code>. Nestable. Old backtick form discouraged. Process substitution feeds command output as a file descriptor: <code>diff &lt;(sort file1) &lt;(sort file2)</code> diffs sorted outputs without temp files. <code>&gt;(command)</code> writes to a command. Works in bash/zsh. Useful for: comparing outputs, passing to commands expecting filenames, parallel processing.'},
  {id:18,level:'intermediate',q:'How do you handle errors robustly with trap?',a:'<code>trap</code> registers commands on signals or pseudo-signals. Cleanup on exit: <code>trap "rm -f $tmpfile" EXIT</code>. Handle errors: <code>trap \'echo "Error at line $LINENO"\' ERR</code>. Ctrl+C: <code>trap "echo Interrupted; exit 130" INT</code>. Ignore signal: <code>trap \'\' TERM</code>. Reset to default: <code>trap - EXIT</code>. Pattern: declare cleanup function, register it with <code>trap cleanup EXIT ERR</code>. Works with <code>set -e</code> for comprehensive error handling.'},
  {id:19,level:'intermediate',q:'How do you parse command-line options properly?',a:'<code>getopts</code> for POSIX short options: <code>while getopts ":f:v" opt; do case $opt in f) file="$OPTARG";; v) verbose=1;; \\?) echo "Unknown: -$OPTARG"; exit 1;; esac; done; shift $((OPTIND-1))</code>. Long options: use external <code>getopt</code> or manual <code>while</code> loop. Always include a <code>usage()</code> function. Check required options after parsing. Remaining args after <code>--</code> in <code>$@</code>.'},
  {id:20,level:'intermediate',q:'How do you work with temporary files and directories safely?',a:'Use <code>mktemp</code>: <code>tmpfile=$(mktemp)</code> creates a unique temp file. <code>tmpdir=$(mktemp -d)</code> temp directory. Template: <code>mktemp /tmp/myapp.XXXXXX</code>. Always clean up: <code>trap "rm -rf $tmpdir" EXIT</code>. Never use predictable names like <code>/tmp/myscript.tmp</code> — TOCTOU race condition + symlink attack. Never create temp files in current directory in shared scripts.'},
  {id:21,level:'intermediate',q:'What are here-documents and here-strings?',a:'Heredoc passes multi-line text as stdin: <code>cat &lt;&lt; EOF\nline1\n$var\nEOF</code>. Variables expand by default. Quote delimiter to suppress: <code>&lt;&lt; \'EOF\'</code>. Strip leading tabs: <code>&lt;&lt;- EOF</code> (use tabs, not spaces). Here-string passes a string: <code>grep "pat" &lt;&lt;&lt; "$var"</code>. Use cases: writing config files, SQL queries, generating scripts, passing multi-line strings to commands.'},
  {id:22,level:'intermediate',q:'How do you debug a shell script?',a:'Trace execution: <code>bash -x script.sh</code> or add <code>set -x</code> in script (disable with <code>set +x</code>). Syntax check only: <code>bash -n script.sh</code>. Print each command before running: <code>PS4=\'+ $LINENO: \' bash -x script.sh</code> includes line numbers. ShellCheck: <code>shellcheck script.sh</code> — static analysis tool catching common mistakes. Add <code>echo "DEBUG: var=$var"</code> temporarily. Use <code>set -euo pipefail</code> to catch errors early.'},
  {id:23,level:'intermediate',q:'How do you use sed for complex transformations?',a:'In-place edit: <code>sed -i \'s/old/new/g\' file</code>. Backup: <code>sed -i.bak</code>. Delete lines: <code>sed \'/^#/d\'</code> (comments) <code>sed \'/^$/d\'</code> (blank). Print range: <code>sed -n \'10,20p\'</code>. Insert before line 5: <code>sed \'5i\\new line\'</code>. Append after match: <code>sed \'/pattern/a\\new line\'</code>. Multi-expression: <code>sed -e \'s/a/b/\' -e \'s/c/d/\'</code>. Script file: <code>sed -f script.sed</code>. Address range with regex: <code>sed \'/start/,/end/d\'</code>.'},
  {id:24,level:'intermediate',q:'How do you use awk for data processing?',a:'Print fields: <code>awk \'{print $1, $NF}\' file</code>. Custom separator: <code>awk -F: \'{print $1}\' /etc/passwd</code>. Conditions: <code>awk \'$3 > 100 {print $1}\' file</code>. Sum: <code>awk \'{sum+=$2} END{printf "Total: %d\\n", sum}\'</code>. Count: <code>awk \'/error/ {count++} END{print count}\'</code>. Arrays: <code>awk \'{count[$1]++} END{for(k in count) print k, count[k]}\' file</code>. Multiple files: <code>awk \'FNR==1{print FILENAME}\' *.log</code>.'},
  {id:25,level:'intermediate',q:'What are common text processing pipelines?',a:'Top 10 IPs from log: <code>awk \'{print $1}\' access.log | sort | uniq -c | sort -rn | head -10</code>. Count errors by type: <code>grep "ERROR" app.log | awk \'{print $5}\' | sort | uniq -c | sort -rn</code>. CSV column: <code>cut -d, -f3 data.csv | sort -u</code>. Find large files: <code>find . -type f -size +100M | xargs ls -lh | sort -k5 -rh</code>. JSON with jq: <code>cat data.json | jq \'.users[] | .email\'</code>. Word frequency: <code>tr -s \' \' \'\\n\' &lt; text | sort | uniq -c | sort -rn</code>.'},
  {id:26,level:'intermediate',q:'How do you write robust scripts for production use?',a:'1. <code>set -euo pipefail</code>. 2. Shebang + check bash version. 3. <code>trap cleanup EXIT ERR</code>. 4. Validate all inputs and env vars. 5. Use <code>mktemp</code> for temp files. 6. Log with timestamps: <code>log() { echo "[$(date +%Y-%m-%dT%H:%M:%S)] $*"; }</code>. 7. Idempotent where possible. 8. Run ShellCheck. 9. Handle <code>SIGTERM</code> for graceful shutdown. 10. Use absolute paths or check PATH. 11. Document with usage().'},
  {id:27,level:'intermediate',q:'What is the IFS variable and how does it affect word splitting?',a:'IFS (Internal Field Separator) determines how bash splits words. Default: space, tab, newline. Change for CSV: <code>IFS=\',\' read -ra fields &lt;&lt;&lt; "$line"</code>. Preserve newlines: <code>IFS=$\'\\n\'</code>. Read lines safely: <code>while IFS= read -r line</code> (empty IFS prevents trimming whitespace). Reset: <code>unset IFS</code>. Critical for: processing CSV/TSV, reading files with spaces in names, splitting on custom delimiters.'},
  {id:28,level:'intermediate',q:'How do you run processes in parallel in bash?',a:'Background with <code>&amp;</code>: <code>for f in *.gz; do gunzip $f &amp; done; wait</code>. Wait for all: <code>wait</code> or <code>wait $PID</code>. Limit parallelism: <code>for f in *.gz; do gunzip $f &amp; [[ $(jobs -r -p | wc -l) -ge 4 ]] &amp;&amp; wait -n; done</code>. GNU parallel: <code>parallel -j4 gzip ::: *.log</code> (more powerful). xargs parallel: <code>find . -name "*.py" | xargs -P4 -I{} python3 process.py {}</code>. Collect exit codes from parallel jobs with <code>wait $pid; echo $?</code>.'},
  {id:29,level:'intermediate',q:'What is the difference between [ ], [[ ]], and (( ))?',a:'<code>[ ]</code> POSIX test command — works in sh, requires quoting all variables, no regex. <code>[[ ]]</code> bash built-in — handles unquoted variables safely, supports <code>=~</code> regex, <code>&amp;&amp;</code>/<code>||</code> operators, pattern matching with <code>==</code>. <code>(( ))</code> arithmetic evaluation — for integer comparisons and math: <code>if (( a > b ))</code>. Use <code>[[ ]]</code> for string/file tests in bash, <code>(( ))</code> for numbers. Never use <code>[ ]</code> in bash unless writing for POSIX portability.'},
  {id:30,level:'intermediate',q:'How do you send and receive data over the network in bash?',a:'<code>curl -s URL</code> fetch URL. POST JSON: <code>curl -X POST -H "Content-Type: application/json" -d \'{"key":"val"}\' URL</code>. <code>wget -q -O - URL</code> download. TCP connection: <code>echo "GET / HTTP/1.0" | nc host 80</code>. Check port open: <code>nc -z -w3 host port &amp;&amp; echo open</code>. SSH tunnel: <code>ssh -L 8080:target:80 jumphost</code>. Send file over nc: <code>cat file | nc -l 9999</code> sender, <code>nc host 9999 &gt; file</code> receiver.'},
  {id:31,level:'intermediate',q:'How do you work with JSON in shell scripts?',a:'Use <code>jq</code>: <code>cat data.json | jq \'.name\'</code>. Array element: <code>jq \'.[0].id\'</code>. Filter: <code>jq \'.users[] | select(.age > 18) | .name\'</code>. Modify: <code>jq \'.version = "2.0"\'</code>. Output raw (no quotes): <code>jq -r</code>. Construct: <code>jq -n --arg name "Alice" \'{"name":$name}\'</code>. In loops: <code>jq -c \'.items[]\' file.json | while IFS= read -r item; do name=$(echo "$item" | jq -r \'.name\'); done</code>. Without jq: use Python one-liner.'},
  {id:32,level:'intermediate',q:'What is a subshell and when is it created?',a:'A subshell is a child process that inherits the parent\'s environment but changes do not propagate back. Created by: <code>( commands )</code> explicitly, pipes (<code>cmd1 | cmd2</code> — both run in subshells), command substitution <code>$()</code>, background processes <code>&amp;</code>. Variables set in a pipe loop are lost: <code>while read line; do count=$((count+1)); done &lt; file</code> — <code>count</code> reset after loop. Fix: use <code>done &lt; &lt;(cmd)</code> (process substitution, no subshell).'},
  {id:33,level:'intermediate',q:'How do you use file descriptors and custom redirections?',a:'Default: 0=stdin, 1=stdout, 2=stderr. Open custom FD: <code>exec 3&gt; output.txt</code>. Write: <code>echo "msg" &gt;&amp;3</code>. Close: <code>exec 3&gt;&amp;-</code>. Redirect for a code block: <code>{ cmd1; cmd2; } &gt; combined.txt 2&gt;&amp;1</code>. Swap stdout/stderr: <code>cmd 3&gt;&amp;1 1&gt;&amp;2 2&gt;&amp;3</code>. Read from FD: <code>exec 4&lt; input.txt; read -u 4 line</code>. Log to both file and stderr: <code>exec 2&gt; &gt;(tee error.log &gt;&amp;2)</code>.'},
],

python: [
  {id:1,level:'basic',q:'What are Python\'s core data types?',a:'Numbers: <code>int</code> (arbitrary precision), <code>float</code> (64-bit), <code>complex</code>. Text: <code>str</code> (immutable). Collections: <code>list</code> (mutable ordered), <code>tuple</code> (immutable ordered), <code>dict</code> (mutable key-value), <code>set</code> (mutable unique unordered), <code>frozenset</code> (immutable set). Binary: <code>bytes</code>, <code>bytearray</code>. Boolean: <code>bool</code>. None: <code>NoneType</code>. Everything is an object.'},
  {id:2,level:'basic',q:'What is the difference between a list and a tuple?',a:'Lists are mutable: <code>[1, 2, 3]</code> — elements can be added, removed, changed. Tuples are immutable: <code>(1, 2, 3)</code> — cannot be modified after creation. Tuples are hashable (usable as dict keys / set members). Tuples are slightly faster. Convention: tuples for heterogeneous fixed-size data (x,y coordinates, RGB), lists for homogeneous variable-length sequences. Single-element tuple: <code>(1,)</code> — the comma is required.'},
  {id:3,level:'basic',q:'How do list, dict, and set comprehensions work?',a:'List: <code>[x**2 for x in range(10) if x % 2 == 0]</code>. Dict: <code>{k: v.upper() for k, v in d.items() if v}</code>. Set: <code>{x % 3 for x in range(9)}</code>. Nested: <code>[cell for row in matrix for cell in row]</code>. Generator (lazy, memory-efficient): <code>(x**2 for x in range(1000000))</code>. Prefer comprehensions over <code>map()</code>/<code>filter()</code> for readability. Avoid deeply nested comprehensions.'},
  {id:4,level:'basic',q:'What is the difference between == and is?',a:'<code>==</code> checks value equality — calls <code>__eq__</code>. <code>is</code> checks object identity (same memory address). <code>a = [1,2]; b = [1,2]; a == b</code> → True but <code>a is b</code> → False. Integers -5 to 256 and short strings are cached (interned) so <code>is</code> may return True by coincidence. Always use <code>is</code> for <code>None</code>, <code>True</code>, <code>False</code>: <code>if x is None</code>. Never <code>if x == None</code>.'},
  {id:5,level:'basic',q:'How does Python handle mutable default arguments?',a:'Default arguments are evaluated once at function definition, not each call. <code>def f(lst=[]):</code> — all calls share the same list object! Bug: <code>f(); f()</code> accumulates items. Fix: use <code>None</code> as sentinel: <code>def f(lst=None): if lst is None: lst = []</code>. This is a common Python gotcha. Applies to any mutable default: lists, dicts, sets. Immutable defaults (int, str, tuple) are safe.'},
  {id:6,level:'basic',q:'What are *args and **kwargs?',a:'<code>*args</code> collects extra positional args as a tuple. <code>**kwargs</code> collects extra keyword args as a dict. <code>def f(a, *args, **kwargs)</code>. Call: <code>f(1, 2, 3, x=4)</code> → <code>a=1, args=(2,3), kwargs={\'x\':4}</code>. Unpack: <code>f(*list_, **dict_)</code>. Order: regular args, *args, keyword-only args, **kwargs. Keyword-only args (after <code>*</code>): <code>def f(a, *, b)</code> — b must be passed as keyword.'},
  {id:7,level:'basic',q:'What are Python decorators and how do you write one?',a:'A decorator wraps a function: <code>@deco</code> is sugar for <code>func = deco(func)</code>. Basic decorator: <code>from functools import wraps\ndef timer(f):\n  @wraps(f)\n  def wrapper(*a, **kw):\n    t=time.time(); result=f(*a,**kw); print(time.time()-t); return result\n  return wrapper</code>. <code>@wraps</code> preserves original function metadata. Decorator with arguments needs an extra layer. Built-ins: <code>@staticmethod</code>, <code>@classmethod</code>, <code>@property</code>, <code>@functools.lru_cache</code>.'},
  {id:8,level:'basic',q:'How does exception handling work in Python?',a:'<code>try: ... except ValueError as e: ... except (TypeError, KeyError): ... else: ... finally: ...</code>. <code>else</code> runs only if no exception. <code>finally</code> always runs (cleanup). Raise: <code>raise ValueError("msg")</code>. Re-raise: <code>raise</code> (bare). Chain: <code>raise RuntimeError("msg") from original_exc</code>. Custom exception: <code>class AppError(Exception): pass</code>. Catch broadly last: always put specific exceptions before general ones.'},
  {id:9,level:'basic',q:'What are Python\'s built-in functions you should know?',a:'<code>len, range, enumerate, zip, map, filter, sorted, reversed, any, all, sum, min, max, abs, round, isinstance, type, id, print, input, open, repr, str, int, float, list, dict, set, tuple</code>. Key patterns: <code>enumerate(iterable, start=0)</code>, <code>zip(a, b)</code>, <code>sorted(items, key=lambda x: x[1], reverse=True)</code>, <code>any(x > 0 for x in lst)</code>, <code>all(isinstance(x, int) for x in lst)</code>.'},
  {id:10,level:'basic',q:'What are lambda functions and when should you use them?',a:'Anonymous one-expression functions: <code>square = lambda x: x**2</code>. Common uses: <code>sorted(data, key=lambda x: x[\'age\'])</code>, <code>filter(lambda x: x > 0, lst)</code>, <code>map(lambda x: x*2, lst)</code>. Cannot contain statements (assignments, loops). For anything complex, use a named function — it is more readable and testable. OK for short key functions; avoid nested lambdas. <code>attrgetter</code> and <code>itemgetter</code> from <code>operator</code> are faster alternatives.'},
  {id:11,level:'basic',q:'How does Python\'s with statement and context managers work?',a:'<code>with open("f") as f:</code> automatically calls <code>f.close()</code> on exit even if an exception occurs. Implements <code>__enter__</code> and <code>__exit__</code>. Create with <code>contextlib.contextmanager</code>: <code>@contextmanager\ndef managed(): setup(); try: yield resource; finally: teardown()</code>. Multiple: <code>with open(a) as f1, open(b) as f2:</code>. Use for: files, locks, DB connections, timing blocks, mocking.'},
  {id:12,level:'basic',q:'What is the difference between shallow copy and deep copy?',a:'Assignment (<code>b = a</code>) creates another reference to the same object. <code>copy.copy(obj)</code> shallow copy — new container, same nested object references. <code>copy.deepcopy(obj)</code> recursively copies everything. Example: <code>a = [[1,2],[3,4]]; b = a.copy(); b[0].append(5); print(a)</code> → <code>[[1,2,5],[3,4]]</code> — shallow copy shares inner lists. Deep copy is independent. Slice <code>lst[:]</code> is shallow.'},
  {id:13,level:'basic',q:'How do file I/O operations work in Python?',a:'Text read: <code>with open("f.txt", "r", encoding="utf-8") as f: content = f.read()</code>. Read lines: <code>f.readlines()</code> or iterate <code>for line in f:</code>. Write: <code>open("f", "w")</code>. Append: <code>"a"</code>. Binary: <code>"rb"/"wb"</code>. Check existence: <code>os.path.exists()</code> or <code>Path("f").exists()</code>. Pathlib (modern): <code>from pathlib import Path; Path("f").read_text()</code>. Always use <code>with</code> to ensure file close.'},
  {id:14,level:'basic',q:'How do you read and write CSV and JSON files?',a:'CSV with stdlib: <code>import csv; with open("f.csv") as f: reader = csv.DictReader(f)</code>. Write: <code>csv.DictWriter(f, fieldnames=["a","b"])</code>. With pandas: <code>df = pd.read_csv("f.csv"); df.to_csv("out.csv", index=False)</code>. JSON: <code>import json; data = json.loads(str)</code> / <code>json.load(file)</code>. Write: <code>json.dumps(obj, indent=2)</code> / <code>json.dump(obj, file)</code>. Handle encoding: <code>json.dumps(obj, ensure_ascii=False)</code>.'},
  {id:15,level:'basic',q:'What are Python generators and iterators?',a:'An iterator implements <code>__iter__</code> and <code>__next__</code>. A generator function uses <code>yield</code> — it pauses at yield and resumes on <code>next()</code>. Generator expression: <code>(x**2 for x in range(n))</code>. Benefits: O(1) memory regardless of sequence size, lazy evaluation. Infinite sequences: <code>def count(n=0):\n while True: yield n; n+=1</code>. <code>yield from iterable</code> delegates to sub-generator. Use <code>itertools</code> for composing generators.'},
  {id:16,level:'intermediate',q:'What is NumPy and why is it fast?',a:'NumPy provides multi-dimensional arrays and mathematical operations implemented in C. Speed comes from: contiguous memory layout (cache-friendly), vectorised operations (no Python loops), BLAS/LAPACK for linear algebra, and optional SIMD via OpenBLAS. Python loops are slow because each iteration has interpreter overhead. NumPy operations apply once across all elements in compiled C. Result: 50-200x speedup for numerical code.'},
  {id:17,level:'intermediate',q:'What is vectorization and how do you apply it in NumPy?',a:'Replace Python loops with array operations: instead of <code>for i in range(n): y[i] = sin(x[i])</code>, write <code>y = np.sin(x)</code>. The operation runs in C on the entire array. Key vectorization tools: universal functions (ufuncs): <code>np.add, np.multiply, np.sin, np.log</code>. Aggregations: <code>np.sum, np.max, np.mean, np.cumsum</code>. Boolean masks: <code>x[x > 0]</code>. Operations: <code>a @ b</code> matrix multiply. Avoid <code>np.vectorize</code> — it is a loop in disguise, not truly fast.'},
  {id:18,level:'intermediate',q:'How does NumPy broadcasting work?',a:'Broadcasting applies operations between arrays of different shapes by stretching dimensions of size 1. Rules (applied right-to-left): dimensions are equal OR one of them is 1. Example: (4,3) + (3,) → (3,) broadcast to (1,3) → (4,3). <code>np.array([[1],[2],[3]]) + np.array([10,20,30])</code> → (3,1)+(1,3) → (3,3). <code>np.newaxis</code> adds a dimension: <code>x[:, np.newaxis]</code>. Avoids explicit <code>np.tile</code>/<code>np.repeat</code>.'},
  {id:19,level:'intermediate',q:'What are NumPy array operations you should know?',a:'Create: <code>np.zeros/ones/empty/full/eye/arange/linspace/random.randn</code>. Shape: <code>arr.shape, .ndim, .dtype, .size</code>. Reshape: <code>arr.reshape(3,4)</code>, <code>arr.ravel()</code> flatten, <code>arr.T</code> transpose. Stack: <code>np.concatenate, np.vstack, np.hstack, np.stack</code>. Math: <code>np.dot(a,b)</code> or <code>a@b</code>, <code>np.linalg.inv/eig/svd</code>. Boolean: <code>np.where(cond, x, y)</code>. Sort: <code>np.sort, np.argsort</code>. Unique: <code>np.unique(arr, return_counts=True)</code>.'},
  {id:20,level:'intermediate',q:'How do you do advanced indexing in NumPy?',a:'Slice: <code>arr[1:3, ::2]</code>. Boolean: <code>arr[arr > 0]</code> returns 1D array of matches. <code>arr[arr > 0] = 0</code> in-place modification. Integer array indexing (fancy): <code>arr[[0,2,4]]</code> picks rows. 2D fancy: <code>arr[[0,1],[2,3]]</code> picks elements (0,2) and (1,3). <code>np.ix_([0,1],[2,3])</code> for outer-product indexing. Note: slicing returns a view (shares memory); fancy indexing returns a copy.'},
  {id:21,level:'intermediate',q:'How do you create basic plots with Matplotlib?',a:'<code>import matplotlib.pyplot as plt</code>. Line: <code>plt.plot(x, y, "r-o", linewidth=2)</code>. Scatter: <code>plt.scatter(x, y, c=color, s=size)</code>. Bar: <code>plt.bar(x, height)</code>. Histogram: <code>plt.hist(data, bins=30, density=True)</code>. Heatmap: <code>plt.imshow(matrix, cmap="viridis")</code>. Labels: <code>plt.xlabel/ylabel/title</code>. Legend: <code>plt.legend()</code>. Grid: <code>plt.grid(True)</code>. Save: <code>plt.savefig("out.png", dpi=150, bbox_inches="tight")</code>. Show: <code>plt.show()</code>.'},
  {id:22,level:'intermediate',q:'How do you use subplots and the object-oriented Matplotlib API?',a:'<code>fig, axes = plt.subplots(2, 3, figsize=(12, 8), sharex=True)</code>. Access: <code>axes[0,1].plot(x, y)</code>. OO API (preferred for complex figures): <code>ax.set_xlabel/ylabel/title/xlim/ylim/legend/grid</code>. <code>ax.twinx()</code> dual y-axes. Layout: <code>plt.tight_layout()</code> or <code>fig.subplots_adjust(hspace=0.4)</code>. Custom figure: <code>fig = plt.figure(figsize=(10,6)); ax = fig.add_subplot(111)</code>. Always use OO API for multi-panel figures.'},
  {id:23,level:'intermediate',q:'What are common Matplotlib plot customizations?',a:'Colors: hex <code>"#2196F3"</code>, named <code>"steelblue"</code>, RGBA. Markers: <code>"o" "s" "^" "D" "*"</code>. Linestyle: <code>"--" "-." ":"</code>. Colormap: <code>cmap="plasma"</code>. Log scale: <code>ax.set_yscale("log")</code>. Annotations: <code>ax.annotate("label", xy=(x,y), xytext=(xt,yt), arrowprops=dict(...))</code>. Fill: <code>ax.fill_between(x, y1, y2, alpha=0.3)</code>. Error bars: <code>plt.errorbar(x, y, yerr=err)</code>. Gridspec for complex layouts.'},
  {id:24,level:'intermediate',q:'What is Seaborn and what plot types does it offer?',a:'Seaborn is a statistical visualization library on top of Matplotlib. Distribution: <code>sns.histplot, sns.kdeplot, sns.violinplot, sns.boxplot</code>. Categorical: <code>sns.barplot, sns.stripplot, sns.swarmplot</code>. Relationships: <code>sns.scatterplot, sns.lineplot, sns.regplot</code>. Matrix: <code>sns.heatmap(df.corr(), annot=True, cmap="coolwarm")</code>. Grid: <code>sns.pairplot(df, hue="species")</code>. FacetGrid for subplots by category. Better defaults than Matplotlib for statistical plots.'},
  {id:25,level:'intermediate',q:'What are core Pandas operations for data analysis?',a:'Load: <code>pd.read_csv/excel/json/sql</code>. Inspect: <code>df.head(), info(), describe(), shape, dtypes</code>. Select: <code>df["col"], df[["a","b"]], df.loc[rows, cols], df.iloc[0:3, 1:4]</code>. Filter: <code>df[df["age"] > 18]</code>. Add col: <code>df["new"] = df["a"] + df["b"]</code>. Drop: <code>df.drop(columns=["col"])</code>. Sort: <code>df.sort_values("col", ascending=False)</code>. Rename: <code>df.rename(columns={"old":"new"})</code>. Reset index: <code>df.reset_index(drop=True)</code>.'},
  {id:26,level:'intermediate',q:'How do you do groupby and aggregation in Pandas?',a:'<code>df.groupby("category")["value"].mean()</code>. Multiple aggregations: <code>df.groupby("cat").agg({"a":"sum", "b":["mean","std"]})</code>. Named agg: <code>df.groupby("cat").agg(total=("val","sum"), avg=("val","mean"))</code>. Transform (returns same-shape df): <code>df["z_score"] = df.groupby("cat")["val"].transform(lambda x: (x-x.mean())/x.std())</code>. Filter groups: <code>df.groupby("cat").filter(lambda x: len(x) > 5)</code>. Apply custom function: <code>df.groupby("cat").apply(func)</code>.'},
  {id:27,level:'intermediate',q:'How do you handle missing values in Pandas?',a:'Detect: <code>df.isna()</code>, <code>df.isna().sum()</code>, <code>df.isna().any(axis=1)</code>. Drop: <code>df.dropna()</code>, <code>df.dropna(subset=["col"])</code>, <code>df.dropna(thresh=5)</code>. Fill: <code>df.fillna(0)</code>, <code>df["col"].fillna(df["col"].mean())</code>. Forward fill: <code>df.fillna(method="ffill")</code>. Interpolate: <code>df.interpolate(method="linear")</code>. Replace specific: <code>df.replace(-999, np.nan)</code>. Check: <code>pd.isna(val)</code>. Document your imputation strategy — it affects results significantly.'},
  {id:28,level:'intermediate',q:'How do you merge and join DataFrames in Pandas?',a:'<code>pd.merge(left, right, on="id", how="inner")</code>. How options: <code>inner</code> (intersection), <code>outer</code> (union), <code>left</code>, <code>right</code>. Different column names: <code>on=[("left_col","right_col")]</code> or <code>left_on/right_on</code>. Index join: <code>df1.join(df2)</code>. Concat vertically: <code>pd.concat([df1, df2], ignore_index=True)</code>. Concat horizontally: <code>pd.concat([df1, df2], axis=1)</code>. Check for duplicate keys after merge: <code>merged.shape</code> vs expected.'},
  {id:29,level:'intermediate',q:'What is the GIL and how does it affect concurrency?',a:'The Global Interpreter Lock (GIL) in CPython prevents multiple threads from executing Python bytecode simultaneously. Impact: multi-threaded Python cannot use multiple CPU cores for CPU-bound work. Solutions: <code>multiprocessing</code> module (separate processes, each with own GIL — true parallelism), <code>concurrent.futures.ProcessPoolExecutor</code>. For I/O-bound work, threads are fine (GIL is released during I/O). <code>asyncio</code> uses a single thread with cooperative concurrency for I/O. NumPy releases GIL during operations.'},
  {id:30,level:'intermediate',q:'How do you write and use Python modules and packages?',a:'Module: any <code>.py</code> file. Import: <code>import module</code>, <code>from module import func</code>, <code>from module import *</code> (avoid). Package: directory with <code>__init__.py</code>. Relative import inside package: <code>from . import sibling</code>. <code>__all__</code> in module controls what <code>from m import *</code> exports. <code>if __name__ == "__main__":</code> runs only when file is executed directly, not imported. <code>sys.path</code> controls where Python looks. Virtual envs isolate package versions.'},
  {id:31,level:'intermediate',q:'What is Numba and when should you use it for vectorization?',a:'Numba is a JIT compiler that compiles Python functions to machine code at runtime. <code>@numba.jit(nopython=True)</code> or <code>@numba.njit</code> on a function makes it run at near-C speed. Works on: numerical loops, NumPy operations. Not all Python is supported. <code>@numba.vectorize</code> creates true NumPy ufuncs. <code>@numba.guvectorize</code> for generalized ufuncs. Use when NumPy vectorization is awkward (complex conditional logic) and you need maximum performance without writing C.'},
  {id:32,level:'intermediate',q:'How do you profile Python code for performance?',a:'Time a snippet: <code>%timeit</code> in Jupyter or <code>python -m timeit "code"</code>. Profile function calls: <code>python -m cProfile -s cumtime script.py</code>. Line-by-line: <code>line_profiler</code> (<code>@profile</code> decorator + <code>kernprof -lv script.py</code>). Memory: <code>memory_profiler</code>. Flame graph: <code>py-spy top --pid PID</code>. Rule: always profile before optimizing. The bottleneck is rarely where you think.'},
  {id:33,level:'intermediate',q:'What are Python\'s functional programming tools?',a:'<code>map(func, iterable)</code> — apply function to each element (return iterator). <code>filter(pred, iterable)</code> — keep elements where predicate is True. <code>functools.reduce(func, iterable, init)</code> — fold. <code>functools.partial(func, *args)</code> — partial application. <code>functools.lru_cache(maxsize=128)</code> — memoization. <code>itertools</code> module: <code>chain, islice, groupby, product, permutations, combinations, count, cycle</code>. Prefer comprehensions over map/filter for readability.'},
  {id:34,level:'intermediate',q:'How do you use virtual environments and manage dependencies?',a:'Create: <code>python -m venv venv</code>. Activate: <code>source venv/bin/activate</code> (Unix) / <code>venv\\Scripts\\activate</code> (Windows). Deactivate: <code>deactivate</code>. Install: <code>pip install package</code>. Freeze: <code>pip freeze &gt; requirements.txt</code>. Install from file: <code>pip install -r requirements.txt</code>. Modern tools: <code>poetry</code> (dependency management + packaging), <code>pipenv</code>, <code>uv</code> (fast). Always commit <code>requirements.txt</code> or <code>pyproject.toml</code>, not the venv directory.'},
  {id:35,level:'intermediate',q:'How do you use pathlib for file system operations?',a:'<code>from pathlib import Path</code>. Create: <code>p = Path("/home/user/file.txt")</code>. Join: <code>p / "subdir" / "file.txt"</code>. Parts: <code>p.parent, p.name, p.stem, p.suffix</code>. Check: <code>p.exists(), p.is_file(), p.is_dir()</code>. Read: <code>p.read_text(encoding="utf-8")</code>. Write: <code>p.write_text("content")</code>. List: <code>list(p.iterdir())</code>. Glob: <code>list(p.glob("**/*.py"))</code>. Create dir: <code>p.mkdir(parents=True, exist_ok=True)</code>. Prefer pathlib over <code>os.path</code> for new code.'},
],
matlab: [
  {id:1,level:'basic',q:'What is MATLAB and what is it used for?',a:'MATLAB (Matrix Laboratory) is a proprietary numerical computing environment by MathWorks. Designed around matrix operations. Used in: signal/image processing, control systems, machine learning, financial modelling, scientific research. Toolboxes extend it (Signal Processing, Statistics, Deep Learning, Control System, Simulink). Alternatives: NumPy/SciPy (Python), Octave (open-source MATLAB-compatible), Julia.'},
