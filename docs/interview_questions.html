const ALL_QUESTIONS={"linux":[{"id":1,"level":"basic","q":"What is Linux and what is the Linux kernel?","a":"Linux is a free, open-source Unix-like OS. The kernel is the core — it manages hardware (CPU, memory, I/O), process scheduling, file systems, and device drivers. Created by Linus Torvalds in 1991. The OS distribution bundles the kernel with utilities, libraries, and package managers.<br><br><b>🔑 Plain terms:</b> Think of the kernel as the engine inside a car — you never touch it directly, but everything depends on it. Ubuntu and Debian are different car models built around the same Linux engine.<br><b>💡 Example:</b> <pre><code># See kernel version:\nuname -r            # e.g. 6.5.0-18-generic\n\n# See full OS info:\ncat /etc/os-release\n\n# PID 1 is the first user-space process started by the kernel:\nps aux | head -5    # PID 1 = systemd (the init system)</code></pre>"},{"id":2,"level":"basic","q":"What is the difference between Linux and Unix?","a":"Unix is a proprietary OS from the 1970s (Bell Labs). Linux is open-source and free. Unix variants: AIX, HP-UX, Solaris, macOS. Linux is Unix-like (POSIX-compliant) but not certified Unix. Linux is dominant in servers and embedded; Unix persists in legacy enterprise environments.<br><br><b>🔑 Plain terms:</b> Unix is the original 1970s recipe. Linux is a free reimplementation — legally independent but functionally identical. macOS is actually certified Unix; Linux is Unix-like (POSIX-compliant but not certified).<br><b>💡 Example:</b> <pre><code># Check which OS family you're on:\nuname -s            # Linux / Darwin (macOS) / FreeBSD\n\n# Commands that work on Linux AND macOS (POSIX-standard):\nls -la\ngrep -r \"pattern\" .\nfind . -name \"*.txt\"\n\n# Distro-specific package managers reveal the family:\nwhich apt    && echo \"Debian/Ubuntu family\"\nwhich dnf    && echo \"RHEL/Fedora family\"\nwhich pacman && echo \"Arch family\"</code></pre>"},{"id":3,"level":"basic","q":"Name common Linux distributions and their use cases.","a":"Ubuntu (desktop/general), Debian (stability/servers), RHEL/CentOS/Rocky (enterprise), Fedora (cutting-edge), Arch (advanced/minimal), Kali (security/pentesting), Alpine (containers/minimal), SUSE/openSUSE (enterprise), Raspberry Pi OS (embedded).<br><br><b>🔑 Plain terms:</b> Like car brands — same Linux kernel engine, different bodies. Alpine is a motorbike (tiny, fast), Ubuntu is a family sedan (easy, general), Kali is a police vehicle (security tools pre-loaded).<br><b>💡 Example:</b> <pre><code># Which distro are you on?\ncat /etc/os-release | grep -E \"^NAME|^VERSION\"\n\n# Package manager reveals the family:\nwhich apt  && echo \"Debian/Ubuntu\"\nwhich dnf  && echo \"RHEL/Fedora\"\n\n# Docker often uses Alpine (only ~5 MB!):\ndocker run alpine sh -c \"cat /etc/os-release\"\n# vs Ubuntu base image (~30 MB)\ndocker images | grep -E \"alpine|ubuntu\"</code></pre>"},{"id":4,"level":"basic","q":"What is the Linux file system hierarchy?","a":"Root <code>/</code> is top-level. <code>/bin</code> essential binaries, <code>/sbin</code> system binaries, <code>/etc</code> config files, <code>/home</code> user directories, <code>/var</code> logs/variable data, <code>/tmp</code> temporary files, <code>/usr</code> user programs, <code>/lib</code> libraries, <code>/dev</code> devices, <code>/proc</code> process info (virtual FS), <code>/sys</code> hardware info, <code>/mnt</code> mount points, <code>/opt</code> optional software.<br><br><b>🔑 Plain terms:</b> Think of / as the root of a tree. /etc is the 'settings drawer', /home is 'personal offices', /var is 'the growing pile of logs', /tmp is 'the whiteboard that gets erased on reboot'.<br><b>💡 Example:</b> <pre><code># Explore the hierarchy:\nls /                  # top-level dirs\nls /etc | head -10    # config files\nls /proc | head -10   # virtual filesystem — live kernel data\n\n# Where does a program live?\nwhich python3         # /usr/bin/python3\nwhich nginx           # /usr/sbin/nginx\n\n# Memory trick:\n# /etc  = Editable Text Config\n# /var  = Variable (grows over time — logs, databases)\n# /tmp  = Temporary (cleared on reboot)\n# /proc = Process/kernel info (not real files on disk)</code></pre>"},{"id":5,"level":"basic","q":"What is the difference between absolute and relative paths?","a":"Absolute paths start from <code>/</code> (e.g. <code>/home/user/docs/file.txt</code>) — always unambiguous. Relative paths start from the current directory (e.g. <code>../docs/file.txt</code>). Special: <code>.</code> = current dir, <code>..</code> = parent dir, <code>~</code> = home dir. <code>pwd</code> shows current absolute path.<br><br><b>🔑 Plain terms:</b> Absolute path = full postal address (always works from anywhere). Relative path = 'turn left at the corner' — only makes sense if you know your starting point.<br><b>💡 Example:</b> <pre><code># Where am I?\npwd                         # /home/chandan/projects\n\n# Absolute — same regardless of current directory:\nls /home/chandan/projects\n\n# Relative — depends on current directory:\nls ../projects              # go up one level, then into projects\nls ~/documents              # ~ always expands to your home dir\n\n# Practical example:\ncp /etc/nginx/nginx.conf ./nginx.conf.bak   # absolute → relative\ncp ../config/app.conf /tmp/app.conf.bak      # relative → absolute</code></pre>"},{"id":6,"level":"basic","q":"Explain the basic file operation commands: ls, cp, mv, rm, mkdir, touch.","a":"<code>ls -la</code> lists all files with details. <code>cp -r src dst</code> copies recursively. <code>mv old new</code> moves/renames. <code>rm -rf dir</code> force-removes recursively (dangerous!). <code>mkdir -p a/b/c</code> creates nested dirs. <code>touch file</code> creates empty file or updates timestamp. Always use <code>rm -i</code> for interactive confirmation.<br><br><b>🔑 Plain terms:</b> These are your file manager actions typed out. The most dangerous: rm -rf with no undo. Rule: always do ls first to verify what you're targeting before rm.<br><b>💡 Example:</b> <pre><code># ls — list with details\nls -lah /var/log        # -l=long -a=all(hidden) -h=human sizes\n\n# cp — copy (use -r for directories)\ncp config.json config.json.bak\ncp -r /var/www/html /tmp/html_bak  # recursive\n\n# mv — move OR rename\nmv old_name.py new_name.py         # rename\nmv /tmp/file.txt /var/data/        # move\n\n# mkdir — create dirs including parents\nmkdir -p src/utils/helpers\n\n# rm — DANGER: no recycle bin!\nls /tmp/test_dir        # ALWAYS check first\nrm -rf /tmp/test_dir    # then delete\n\n# touch — create empty file or update timestamp\ntouch deploy.log</code></pre>"},{"id":7,"level":"basic","q":"What are file permissions in Linux and how do you read them?","a":"Format: <code>-rwxr-xr--</code>. First char: file type (- file, d dir, l symlink). Next 3 groups: owner/group/others permissions. r=4 read, w=2 write, x=1 execute. <code>ls -l</code> shows them. <code>chmod 755 file</code> = rwxr-xr-x. <code>chmod u+x,g-w file</code> symbolic. <code>chown user:group file</code> changes owner.<br><br><b>🔑 Plain terms:</b> Permissions are like building access cards. Owner=master key (rwx=7). Group=colleagues (r-x=5). Others=public (r--=4). The number is just r(4)+w(2)+x(1) added together.<br><b>💡 Example:</b> <pre><code># Read permissions:\nls -la /usr/bin/passwd\n# -rwsr-xr-x root root  (the 's' = setuid — runs as root)\n\nls -la /tmp\n# drwxrwxrwt root root  (the 't' = sticky bit)\n\n# Set permissions numerically:\nchmod 755 script.sh     # rwxr-xr-x\nchmod 644 config.txt    # rw-r--r--\nchmod 600 secret.key    # rw------- (only owner)\n\n# Set permissions symbolically:\nchmod +x deploy.sh              # add execute for everyone\nchmod u+x,go-w file             # add exec for user, remove write for group/others\n\n# Change owner:\nchown www-data:www-data /var/www/html</code></pre>"},{"id":8,"level":"basic","q":"What is the difference between sudo and su?","a":"<code>su username</code> switches to another user requiring their password; without username switches to root. <code>sudo command</code> runs one command elevated using your own password — logged, auditable, controlled by <code>/etc/sudoers</code>. <code>sudo -i</code> opens an interactive root shell. Prefer <code>sudo</code> — it limits exposure and leaves an audit trail.<br><br><b>🔑 Plain terms:</b> sudo = 'borrow root power for ONE command, using YOUR password, fully logged'. su = 'become a completely different user, using THEIR password'. sudo is like a security escort; su is like changing identity.<br><b>💡 Example:</b> <pre><code># sudo — run ONE command as root:\nsudo apt update                # your password, your audit trail\nsudo systemctl restart nginx\n\n# Every sudo call is logged:\nsudo grep sudo /var/log/auth.log | tail -5\n\n# su — fully become another user:\nsu - deploy                    # need deploy's password\nwhoami                         # deploy\nexit                           # back to original user\n\n# sudo -i — open interactive root shell (use sparingly):\nsudo -i && whoami              # root\n\n# sudo -u — run as specific non-root user:\nsudo -u www-data cat /var/log/nginx/error.log</code></pre>"},{"id":9,"level":"basic","q":"What is a shell and what are the common Linux shells?","a":"A shell is a command interpreter that reads commands and passes them to the kernel. <code>bash</code> (Bourne Again Shell) is most common. <code>sh</code> is POSIX-compatible. <code>zsh</code> has advanced completion and themes (Oh My Zsh). <code>fish</code> has auto-suggestions. <code>ksh</code> is KornShell. Current shell: <code>echo $SHELL</code>. Available shells: <code>cat /etc/shells</code>.<br><br><b>🔑 Plain terms:</b> The shell is the translator between your typed commands and the OS kernel. Bash is the most common; zsh is fancier with better autocomplete. The shell reads commands, interprets them, and asks the kernel to execute them.<br><b>💡 Example:</b> <pre><code># Which shell am I using?\necho $SHELL         # /bin/bash or /bin/zsh\necho $0             # current shell name\n\n# What shells are installed?\ncat /etc/shells\n\n# Switch shell temporarily:\nbash; exit          # start bash session, exit returns to previous\n\n# Change default shell permanently:\nchsh -s /usr/bin/zsh   # log out and back in for effect\n\n# Shell portability:\n#!/bin/bash         # use bash specifically\n#!/usr/bin/env sh   # use any POSIX shell (most portable)</code></pre>"},{"id":10,"level":"basic","q":"How do you check and manage disk usage?","a":"<code>df -h</code> shows filesystem usage (human-readable). <code>du -sh /path</code> shows directory size. <code>du -sh * | sort -h</code> sizes sorted. <code>lsblk</code> shows block devices. <code>fdisk -l</code> shows partitions (root). <code>ncdu</code> is an interactive disk usage explorer. <code>iostat</code> shows I/O statistics.<br><br><b>🔑 Plain terms:</b> df = 'how full is each hard drive'. du = 'how big is each folder'. When a server says disk full, the workflow is: df -h to find the full partition, then du -sh * to drill down.<br><b>💡 Example:</b> <pre><code># df — disk usage per filesystem:\ndf -h               # human-readable (GB, MB)\ndf -i               # inode usage (see Q42 — different problem!)\n\n# du — directory sizes:\ndu -sh /var/log     # total size of /var/log\ndu -sh /var/log/*   # size of each item inside\ndu -sh * | sort -h  # sort by size\n\n# Real debugging — server disk full:\ndf -h                           # find which partition is 100%\ncd /var\ndu -sh * 2>/dev/null | sort -h | tail -10   # top 10 largest dirs\ndu -sh /var/log/* | sort -h | tail -5       # drill into logs</code></pre>"},{"id":11,"level":"basic","q":"What is the difference between > and >> redirection?","a":"<code>&gt;</code> redirects stdout to file, overwriting it. <code>&gt;&gt;</code> appends to file. <code>2&gt;</code> redirects stderr. <code>&amp;&gt;</code> redirects both stdout and stderr. <code>2&gt;&amp;1</code> redirects stderr to stdout. <code>/dev/null</code> discards output: <code>cmd &amp;&gt; /dev/null</code>. <code>&lt;</code> reads stdin from file.<br><br><b>🔑 Plain terms:</b> '>' is 'write a new letter' (replaces old one). '>>' is 'add a postscript'. 2> captures only errors. /dev/null is the trash bin — anything sent there disappears silently.<br><b>💡 Example:</b> <pre><code># > overwrite:\necho \"server=prod\" > config.txt     # creates or overwrites\n\n# >> append:\necho \"port=8080\" >> config.txt      # adds to end\n\n# 2> redirect errors only:\nfind / -name \"*.conf\" 2>/dev/null   # hide \"permission denied\" errors\n\n# &> redirect BOTH stdout and stderr:\n./build.sh &> build.log\n\n# 2>&1 merge stderr into stdout:\nmake 2>&1 | grep -i error\n\n# Cron pattern — log everything:\n0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1</code></pre>"},{"id":12,"level":"basic","q":"How does piping work and what are common pipe patterns?","a":"<code>|</code> passes stdout of left command to stdin of right. Examples: <code>ps aux | grep nginx</code>, <code>cat log | grep ERROR | wc -l</code> counts errors, <code>ls -la | sort -k5 -n</code> sort by size, <code>history | grep ssh</code>. <code>tee</code> splits to both stdout and file: <code>cmd | tee out.txt | grep pattern</code>.<br><br><b>🔑 Plain terms:</b> Pipes are an assembly line — each worker does one job and passes the result to the next. grep filters, awk extracts columns, sort orders, uniq counts, head limits.<br><b>💡 Example:</b> <pre><code># Basic pipe:\nps aux | grep nginx\n\n# Multi-stage pipeline — top 5 IPs hitting your server:\ncat /var/log/nginx/access.log     | awk '{print $1}'     | sort     | uniq -c     | sort -rn     | head -5\n\n# Count ERROR lines today:\ngrep \"$(date +%Y-%m-%d)\" app.log | grep ERROR | wc -l\n\n# tee — write to file AND still see output on screen:\n./deploy.sh | tee deploy.log\n\n# Find largest files:\nfind /var -type f -size +50M 2>/dev/null     | xargs ls -lh     | sort -k5 -rh</code></pre>"},{"id":13,"level":"basic","q":"What are environment variables and how do you manage them?","a":"Key-value pairs in process environment. View all: <code>env</code> or <code>printenv</code>. View one: <code>echo $HOME</code>. Set temporarily: <code>export VAR=value</code>. Set permanently: add to <code>~/.bashrc</code> (interactive shells) or <code>~/.profile</code> (login shells), then <code>source ~/.bashrc</code>. Unset: <code>unset VAR</code>. Important: <code>$PATH</code>, <code>$HOME</code>, <code>$USER</code>, <code>$SHELL</code>, <code>$PWD</code>.<br><br><b>🔑 Plain terms:</b> Environment variables are sticky notes every program can read. PATH tells the shell WHERE to look for commands. If you install a tool and it 'doesn't work', 90% of the time PATH is the issue.<br><b>💡 Example:</b> <pre><code># View variables:\nenv | sort              # all variables\necho $PATH              # command search path\n\n# Set temporarily (this session only):\nexport API_KEY=\"sk-abc123\"\nexport DEBUG=1\n\n# Set permanently — add to ~/.bashrc:\necho 'export JAVA_HOME=/usr/lib/jvm/java-17' >> ~/.bashrc\nsource ~/.bashrc        # reload without logging out\n\n# Prepend to PATH (your version wins):\nexport PATH=\"$HOME/.local/bin:$PATH\"\n\n# Debug 'command not found':\nwhich python3           # not found?\nls /usr/local/bin/python3   # it's here but not in PATH\nexport PATH=\"/usr/local/bin:$PATH\"   # fix it</code></pre>"},{"id":14,"level":"basic","q":"How do you find files in Linux?","a":"<code>find /path -name \"*.log\"</code> by name. <code>find . -type f -size +10M</code> files over 10MB. <code>find . -mtime -7</code> modified in last 7 days. <code>find . -name \"*.c\" -exec grep -l \"malloc\" {} \\;</code> search inside found files. <code>locate filename</code> is faster (index-based); update: <code>updatedb</code>. <code>which cmd</code> finds executable in PATH.<br><br><b>🔑 Plain terms:</b> find is a detective that searches in real-time. locate uses a pre-built index (fast but may be stale). Always use 2>/dev/null with find to hide permission errors from directories you can't read.<br><b>💡 Example:</b> <pre><code># Find by name:\nfind /etc -name \"*.conf\" 2>/dev/null\nfind . -name \"*.py\" -type f         # only files\n\n# Find by size:\nfind / -size +100M -type f 2>/dev/null\n\n# Find by time (modified in last 7 days):\nfind /tmp -mtime -7\nfind /tmp -mtime +7 -delete         # delete files older than 7 days\n\n# Find and run a command on results:\nfind . -name \"*.log\" -exec gzip {} \\;\n\n# locate — fast database search:\nsudo updatedb && locate nginx.conf\n\n# which — find executable in PATH:\nwhich python3           # /usr/bin/python3</code></pre>"},{"id":15,"level":"basic","q":"What are hard links and symbolic (soft) links?","a":"Hard link: another directory entry pointing to the same inode. The file data persists until all hard links are removed. Cannot span filesystems. Create: <code>ln file hardlink</code>. Symbolic link: a pointer to a path — breaks if target is deleted. Can span filesystems, can point to directories. Create: <code>ln -s target symlink</code>. View: <code>ls -li</code> shows inode numbers.<br><br><b>🔑 Plain terms:</b> Hard link = two names for the same file (like a person having two ID cards). Symlink = a shortcut that points to the real file. Delete the original: hard link still works, symlink breaks.<br><b>💡 Example:</b> <pre><code># Create links:\nln   original.txt hardlink.txt     # hard link — same inode\nln -s original.txt symlink.txt     # symbolic link\n\n# Hard links share the same inode:\nls -li original.txt hardlink.txt   # same inode number!\nrm original.txt                    # data still accessible via hardlink.txt\n\n# Symlinks show the arrow:\nls -la /usr/bin/python3\n# lrwxrwxrwx  python3 -> python3.11\n\n# Zero-downtime deploy with symlinks:\nln -sfn /var/www/releases/v2.2 /var/www/current  # atomic swap!\n\n# Find broken symlinks:\nfind /usr/local -type l ! -exec test -e {} \\; -print</code></pre>"},{"id":16,"level":"basic","q":"How do you view and search file contents?","a":"<code>cat file</code> prints all. <code>less file</code> pages through (q to quit, /search, n next). <code>head -n 20 file</code> first 20 lines. <code>tail -n 20 file</code> last 20. <code>tail -f file</code> follows live (log watching). <code>grep \"pattern\" file</code> search. <code>grep -rn \"pattern\" dir/</code> recursive with line numbers. <code>wc -l file</code> counts lines.<br><br><b>🔑 Plain terms:</b> cat dumps the whole file at once. less is a pager — read page by page, search with /. tail -f watches a log file live. grep is Ctrl+F for files.<br><b>💡 Example:</b> <pre><code># View contents:\ncat /etc/hostname           # small file\nless /var/log/syslog        # large file — /pattern to search, q to quit\n\n# Head and tail:\nhead -n 20 /var/log/nginx/access.log\ntail -n 50 /var/log/nginx/error.log\ntail -f /var/log/nginx/access.log    # LIVE follow\n\n# Search inside files:\ngrep \"ERROR\" app.log\ngrep -n \"ERROR\" app.log              # with line numbers\ngrep -c \"404\" /var/log/nginx/access.log  # count\n\n# Live monitoring — only show errors:\ntail -f /var/log/app.log | grep --line-buffered \"ERROR\\|WARN\"</code></pre>"},{"id":17,"level":"basic","q":"What is the man command and how do you use it?","a":"<code>man command</code> shows the manual page. Sections: 1 user commands, 2 system calls, 3 library functions, 5 file formats, 8 admin commands. Navigate: arrows/PgUp/PgDn, <code>/term</code> search, <code>q</code> quit. <code>man 2 open</code> section 2. <code>man -k keyword</code> searches descriptions. <code>--help</code> flag for quick reference. <code>tldr command</code> for practical examples (install separately).<br><br><b>🔑 Plain terms:</b> man is the built-in instruction manual — comprehensive but dense. Press / to search inside it. Use --help for a quick summary. tldr (install separately) gives practical examples.<br><b>💡 Example:</b> <pre><code># Basic man usage:\nman ls                  # press /, type keyword to search; q to quit\n\n# Sections matter for C developers:\nman 1 printf            # the shell printf command\nman 3 printf            # the C library printf() function\nman 5 crontab           # file format reference\n\n# Search for a command by keyword:\nman -k compress         # all commands related to \"compress\"\napropos compress        # same thing\n\n# Quick help:\nls --help\ncp --help | grep \"\\-r\"  # find -r option\n\n# tldr — practical examples (install: npm i -g tldr):\ntldr find               # common find usage patterns</code></pre>"},{"id":18,"level":"basic","q":"How do you install and manage packages in Linux?","a":"Debian/Ubuntu: <code>apt update &amp;&amp; apt install pkg</code>, <code>apt remove pkg</code>, <code>apt search term</code>. RHEL/CentOS: <code>dnf install pkg</code> (or <code>yum</code>). Arch: <code>pacman -S pkg</code>. SUSE: <code>zypper install pkg</code>. View installed: <code>dpkg -l</code> (Debian) or <code>rpm -qa</code> (RPM). Install from source: <code>./configure &amp;&amp; make &amp;&amp; make install</code>.<br><br><b>🔑 Plain terms:</b> Package managers are app stores for Linux — they download, install, and manage all dependencies automatically. Always run update before install to get the latest package list.<br><b>💡 Example:</b> <pre><code># Debian/Ubuntu (apt):\nsudo apt update                 # refresh package list FIRST\nsudo apt install nginx          # install\nsudo apt remove nginx           # uninstall (keep config)\nsudo apt purge nginx            # uninstall + delete config\nsudo apt upgrade                # upgrade all packages\nsudo apt autoremove             # remove orphaned dependencies\napt search \"web server\"         # search packages\n\n# RHEL/CentOS/Fedora (dnf):\nsudo dnf install nginx\nsudo dnf remove nginx\n\n# Check if installed:\ndpkg -l | grep nginx            # Debian/Ubuntu\nrpm -qa | grep nginx            # RHEL\n\n# Install from .deb file:\nsudo dpkg -i package.deb\nsudo apt -f install             # fix missing dependencies</code></pre>"},{"id":19,"level":"intermediate","q":"What is the difference between a process and a thread?","a":"A process is an independent program instance with its own memory space, file descriptors, and resources. Processes communicate via IPC (pipes, sockets, signals). A thread is a lightweight execution unit within a process sharing the same memory space and file descriptors. Creating threads is faster than processes. Threads share data easily but need synchronisation (mutexes). Use <code>ps aux</code> for processes, <code>ps -eLf</code> shows threads.<br><br><b>🔑 Plain terms:</b> Process = a person with their own house, computer, and bank account (fully isolated). Thread = two people sharing the same house — faster to coordinate but they can mess up each other's belongings.<br><b>💡 Example:</b> <pre><code># Processes (each has its own memory space):\nps aux | head -10\n# Chrome: each TAB = separate PROCESS (crash isolation)\n\n# Threads within a process:\nps -eLf | grep nginx        # -L shows threads (LWP column)\n# Nginx: each REQUEST = thread within one worker process\n\n# Monitor in real time:\ntop                         # press H to include threads\nhtop                        # press t to show thread tree\n\n# Difference matters for debugging:\n# Crash in one process = only that process dies\n# Crash in one thread  = entire process dies (shared memory)</code></pre>"},{"id":20,"level":"intermediate","q":"How do you manage processes — creation, monitoring, and termination?","a":"List: <code>ps aux</code> all processes, <code>ps -ef</code> full format. Live: <code>top</code>, <code>htop</code> (interactive). <code>pgrep nginx</code> finds PIDs by name. Terminate: <code>kill PID</code> (SIGTERM graceful), <code>kill -9 PID</code> (SIGKILL force), <code>killall name</code>. Background: <code>cmd &amp;</code>. Foreground: <code>fg %1</code>. Background suspended: <code>Ctrl+Z</code> then <code>bg</code>. <code>nohup cmd &amp;</code> survives logout.<br><br><b>🔑 Plain terms:</b> SIGTERM is asking politely ('please save your work and quit'). SIGKILL is pulling the power cable — instant, no cleanup. Always try SIGTERM first and wait a few seconds before SIGKILL.<br><b>💡 Example:</b> <pre><code># Find and kill a process:\npgrep -la nginx                 # pgrep: find by name, show command\nkill 1234                       # SIGTERM — graceful, app cleans up\nkill -15 1234                   # same thing explicitly\nkillall nginx                   # kill all processes named nginx\n\n# Force kill (no cleanup possible):\nkill -9 1234                    # when SIGTERM failed after ~5 seconds\n\n# Background & foreground:\n./long_script.sh &              # start in background\njobs                            # list background jobs\nfg %1                           # bring job 1 to foreground\n\n# Survive logout:\nnohup ./server.sh &             # keep running after disconnect\ndisown                          # detach current background job</code></pre>"},{"id":21,"level":"intermediate","q":"What are signals in Linux and how do they work?","a":"Signals are async notifications to processes. Common: SIGTERM (15) — graceful shutdown, SIGKILL (9) — immediate kill (cannot be caught), SIGHUP (1) — terminal closed / reload config, SIGINT (2) — Ctrl+C, SIGCHLD — child terminated, SIGUSR1/2 — user-defined. Send: <code>kill -SIGHUP PID</code>. Handle in code with <code>signal()</code> or <code>sigaction()</code>. <code>trap</code> in bash handles signals.<br><br><b>🔑 Plain terms:</b> Signals are taps on the shoulder with pre-agreed meanings. SIGTERM = 'please wrap up and leave'. SIGKILL = fire alarm (OS cleans up). SIGHUP = 'reload your config' (used by nginx, apache).<br><b>💡 Example:</b> <pre><code># Send signals:\nkill -SIGTERM 1234\nkill -SIGHUP  $(pidof nginx)    # reload nginx config — zero downtime!\nkill -SIGUSR1 $(pidof apache2)  # rotate logs (apache convention)\n\n# Common signals:\n# SIGTERM (15) = please stop (default kill, catchable)\n# SIGKILL  (9) = stop NOW (cannot be caught — OS kills process)\n# SIGHUP   (1) = terminal hung up / reload config\n# SIGINT   (2) = Ctrl+C\n\n# Trap signals in bash scripts:\ntrap 'echo \"Caught Ctrl+C, cleaning up...\"; rm -f /tmp/lock; exit 1' INT\n\n# Check what a process is ignoring:\ncat /proc/$(pidof nginx)/status | grep -E \"Sig(Blk|Ign|Cgt)\"</code></pre>"},{"id":22,"level":"intermediate","q":"What is the /proc filesystem?","a":"<code>/proc</code> is a virtual filesystem exposing kernel and process info as files. <code>/proc/cpuinfo</code> CPU details, <code>/proc/meminfo</code> memory stats, <code>/proc/PID/</code> per-process info (cmdline, fd, maps, status). <code>/proc/net/</code> network stats. <code>cat /proc/loadavg</code> load average. Not on disk — generated on read. Used by <code>ps</code>, <code>top</code>, <code>free</code> etc.<br><br><b>🔑 Plain terms:</b> /proc is a magic window into the kernel — it looks like files on disk but nothing is actually stored there. Reading a 'file' is like asking the kernel a live question. Every tool like ps, top, free reads from /proc internally.<br><b>💡 Example:</b> <pre><code># CPU info:\ncat /proc/cpuinfo | grep \"model name\" | head -1\n\n# Memory info:\ncat /proc/meminfo | grep -E \"MemTotal|MemAvailable\"\n\n# Look inside a running process:\ncat /proc/1234/cmdline | tr '\u0000' ' '    # what command is it running?\nls /proc/1234/fd | wc -l               # how many files does it have open?\ncat /proc/1234/status | grep VmRSS     # how much RAM is it using?\n\n# Live kernel stats:\ncat /proc/loadavg                       # load averages\ncat /proc/net/dev                       # network interface stats\ncat /proc/uptime                        # seconds since boot</code></pre>"},{"id":23,"level":"intermediate","q":"How do you monitor system resources in detail?","a":"CPU: <code>top</code>/<code>htop</code>, <code>mpstat -P ALL 1</code> per-core. Memory: <code>free -h</code>, <code>/proc/meminfo</code>, <code>vmstat 1</code>. Disk I/O: <code>iostat -xz 1</code>, <code>iotop</code>. Network: <code>ss -s</code>, <code>nethogs</code>, <code>iftop</code>. Load average: <code>uptime</code> (1/5/15 min averages). Historical: <code>sar -u 1 10</code>. Strace: <code>strace -p PID</code> traces system calls.<br><br><b>🔑 Plain terms:</b> Think of monitoring like a car dashboard. CPU% is engine RPM. Memory is fuel level. Disk I/O is how hard the brakes are working. Check each gauge in order to find the bottleneck.<br><b>💡 Example:</b> <pre><code># Server slow? Check in this order:\n\n# 1. CPU and memory overview:\ntop                         # q to quit; press 1 for per-CPU view\nhtop                        # interactive, color-coded\n\n# 2. Is disk I/O the bottleneck?\niostat -x 1                 # %util column — above 80% = disk saturated\niotop                       # which process is hammering disk (needs sudo)\n\n# 3. Network connections:\nss -s                       # socket summary\nss -tuln                    # listening ports\n\n# 4. What is the slow process actually doing?\nstrace -p $(pidof myapp)    # trace syscalls\n\n# Per-CPU load:\nmpstat -P ALL 1 3           # 3 snapshots, 1 second apart</code></pre>"},{"id":24,"level":"intermediate","q":"What is systemd and how do you manage services?","a":"<code>systemd</code> is the init system (PID 1) on most modern distros — manages services, sockets, timers, mounts. Commands: <code>systemctl start/stop/restart/reload/status service</code>. Enable at boot: <code>systemctl enable service</code>. View all: <code>systemctl list-units --type=service</code>. Logs: <code>journalctl -u service -f</code> (follow), <code>journalctl -b</code> (since boot), <code>journalctl --since \"1 hour ago\"</code>.<br><br><b>🔑 Plain terms:</b> systemd is the manager that starts everything at boot. It's like a business manager who hires all employees (services), watches over them, and restarts them if they crash.<br><b>💡 Example:</b> <pre><code># Essential systemctl commands:\nsudo systemctl status nginx          # is it running? recent logs?\nsudo systemctl start   nginx\nsudo systemctl stop    nginx\nsudo systemctl restart nginx         # stop + start (drops connections!)\nsudo systemctl reload  nginx         # reload config — NO dropped connections\nsudo systemctl enable  nginx         # start automatically at boot\nsudo systemctl disable nginx         # don't start at boot\n\n# View logs (journalctl):\njournalctl -u nginx                  # all nginx logs\njournalctl -u nginx -f               # follow live (like tail -f)\njournalctl -u nginx --since \"1 hour ago\"\njournalctl -b                        # current boot only\njournalctl -b -p err                 # only errors from this boot</code></pre>"},{"id":25,"level":"intermediate","q":"How do you configure and manage users and groups?","a":"Add user: <code>useradd -m -s /bin/bash username</code>. Set password: <code>passwd username</code>. Delete: <code>userdel -r username</code>. Add group: <code>groupadd grpname</code>. Add user to group: <code>usermod -aG grpname username</code>. View groups: <code>groups username</code> or <code>id username</code>. <code>/etc/passwd</code> user info, <code>/etc/shadow</code> hashed passwords, <code>/etc/group</code> group memberships.<br><br><b>🔑 Plain terms:</b> Users are individuals; groups are teams. The -aG flag is critical: it APPENDS to groups; without -a it REPLACES all existing groups (you could accidentally remove someone from sudo!).<br><b>💡 Example:</b> <pre><code># Create user:\nsudo useradd -m -s /bin/bash alice   # -m creates home dir\nsudo passwd alice                    # set password\n\n# Add to group (ALWAYS use -aG, not -G alone!):\nsudo usermod -aG sudo alice          # give sudo access\nsudo usermod -aG docker alice        # add to docker group\n# User must log out and back in for group changes to take effect\n\n# Verify:\nid alice\n# uid=1001(alice) gid=1001(alice) groups=1001(alice),27(sudo),999(docker)\n\n# Key files:\ncat /etc/passwd | grep alice         # user info\ncat /etc/group  | grep docker        # group memberships\n\n# Delete user and home directory:\nsudo userdel -r alice</code></pre>"},{"id":26,"level":"intermediate","q":"How do Linux file permissions work in detail, including setuid and sticky bit?","a":"Standard: rwx for owner/group/others. Setuid (4xxx): on executables, runs as file owner (e.g. <code>passwd</code>). Setgid (2xxx): on dirs, new files inherit group. Sticky bit (1xxx): on dirs, only file owner can delete (e.g. <code>/tmp</code>). Example: <code>chmod 4755 file</code> sets setuid+rwxr-xr-x. <code>ls -l</code> shows <code>s</code> (setuid/setgid) or <code>t</code> (sticky) in permission bits.<br><br><b>🔑 Plain terms:</b> setuid is like a master key attached to a door — anyone who uses that door temporarily gets the master key's power. The sticky bit on /tmp means 'you can drop files here, but only YOU can delete YOUR own files'.<br><b>💡 Example:</b> <pre><code># See special bits in action:\nls -la /usr/bin/passwd\n# -rwsr-xr-x root root   <- 's' in execute position = setuid\n# You run passwd, but it temporarily runs AS ROOT\n# That's how a normal user can change their own password\n\nls -la /tmp\n# drwxrwxrwt root root   <- 't' at end = sticky bit\n# Everyone can write to /tmp\n# But you can ONLY delete YOUR OWN files, not others'\n\n# Set setuid:\nsudo chmod u+s /usr/bin/myapp   # runs as file owner\n# or numeric: chmod 4755 myapp  (4=setuid + 755)\n\n# Set sticky bit on shared directory:\nsudo mkdir /shared\nsudo chmod 1777 /shared         # 1=sticky + 777</code></pre>"},{"id":27,"level":"intermediate","q":"What is grep and how do you use it for complex searches?","a":"<code>grep -r \"pattern\" dir/</code> recursive. <code>-i</code> case-insensitive. <code>-n</code> line numbers. <code>-v</code> invert match. <code>-c</code> count matches. <code>-l</code> list matching files only. <code>-A 3</code> 3 lines after. <code>-B 3</code> before. <code>-E</code> extended regex. <code>-P</code> Perl regex. <code>-w</code> whole word. <code>--include=\"*.c\"</code> filter files. Example: <code>grep -rn --include=\"*.py\" \"import os\" .</code><br><br><b>🔑 Plain terms:</b> grep is Ctrl+F for your entire filesystem. The flags are what make it powerful: -r for recursive, -n for line numbers, -i for case-insensitive, -v to invert, -l to just list filenames.<br><b>💡 Example:</b> <pre><code># Basic search:\ngrep \"error\" /var/log/syslog\ngrep -i \"error\" /var/log/syslog     # case-insensitive\ngrep -n \"error\" app.log             # with line numbers\n\n# Recursive search:\ngrep -rn \"database_url\" /etc/\ngrep -rn \"TODO\" src/ --include=\"*.py\"   # only .py files\n\n# Invert match — lines NOT matching:\ngrep -v \"^#\" /etc/nginx/nginx.conf  # strip comments\ngrep -v \"^$\" config.txt             # strip blank lines\n\n# Context around match:\ngrep -A 3 -B 3 \"CRITICAL\" app.log  # 3 lines before AND after\n\n# Count and list files:\ngrep -c \"404\" /var/log/nginx/access.log     # count of 404 lines\ngrep -l \"password\" /etc/*.conf              # list files containing \"password\"\n\n# Multiple patterns (OR):\ngrep -E \"ERROR|WARN|CRITICAL\" app.log</code></pre>"},{"id":28,"level":"intermediate","q":"Explain awk — how does it work and what are its key features?","a":"<code>awk</code> processes text line by line, splitting into fields (<code>$1</code>, <code>$2</code>... <code>$NF</code> last). <code>awk '{print $1, $3}' file</code>. Pattern matching: <code>awk '/error/ {print $0}' log</code>. Aggregation: <code>awk '{sum+=$2} END{print sum}' file</code>. Field separator: <code>awk -F: '{print $1}' /etc/passwd</code>. Built-ins: <code>NR</code> line number, <code>NF</code> field count, <code>FS</code> separator. Condition: <code>awk '$3 > 100 {print}' file</code>.<br><br><b>🔑 Plain terms:</b> awk is a mini spreadsheet processor in your terminal. It reads each line, splits it into numbered fields ($1, $2...), and lets you filter, transform, or compute. $NF is always the last field.<br><b>💡 Example:</b> <pre><code># Print specific columns:\nps aux | awk '{print $1, $2, $11}'       # user, PID, command\nawk -F: '{print $1}' /etc/passwd         # usernames (colon separator)\n\n# Filter rows by condition:\nps aux | awk '$3 > 5.0 {print $11, $3}' # processes using > 5% CPU\n\n# Sum a column:\nps aux | awk '{sum += $4} END {print \"Total %MEM:\", sum}'\n\n# Top HTTP status codes from nginx log:\nawk '{print $9}' /var/log/nginx/access.log     | sort | uniq -c | sort -rn | head -5\n\n# Reformat df output:\ndf -h | awk 'NR>1 {printf \"%-20s %s full\n\", $6, $5}'</code></pre>"},{"id":29,"level":"intermediate","q":"Explain sed — stream editing patterns.","a":"<code>sed 's/old/new/g' file</code> substitute all. <code>-i</code> edit in place (<code>-i.bak</code> for backup). <code>sed -n '5,10p' file</code> print lines 5-10. <code>sed '/^#/d' file</code> delete comment lines. <code>sed '2i\\\new line' file</code> insert before line 2. Address ranges: <code>sed '1,5s/foo/bar/' file</code>. Multiple expressions: <code>sed -e 's/a/b/' -e 's/c/d/'</code>. Combined pipeline: <code>cat nginx.conf | sed '/^\\s*#/d' | sed '/^$/d'</code> removes comments and blank lines.<br><br><b>🔑 Plain terms:</b> sed is find-and-replace on steroids — processes a file line by line. The s/old/new/g pattern is 80% of sed use. -i edits in-place (always add .bak suffix for safety).<br><b>💡 Example:</b> <pre><code># Basic substitution:\necho \"hello world\" | sed 's/world/bash/'    # hello bash\n\n# In-place edit with backup:\nsed -i.bak 's/localhost/192.168.1.10/g' config.txt\n# config.txt is updated, config.txt.bak is the original\n\n# Delete lines:\nsed '/^#/d' config.txt          # delete comment lines\nsed '/^$/d' config.txt          # delete blank lines\nsed '/^#/d; /^$/d' config.txt   # delete both\n\n# Extract line range:\nsed -n '5,10p' server.log       # print only lines 5-10\n\n# Bulk update all config files:\nfind /etc/myapp -name \"*.conf\"     -exec sed -i 's/db.old.com/db.new.com/g' {} \\;</code></pre>"},{"id":30,"level":"intermediate","q":"What are cron jobs and how do you schedule tasks?","a":"<code>crontab -e</code> edit user crontab. Format: <code>MIN HOUR DOM MON DOW CMD</code>. Examples: <code>0 2 * * * /backup.sh</code> (2am daily), <code>*/15 * * * * /check.sh</code> (every 15 min), <code>0 9 * * 1-5 /report.sh</code> (weekdays 9am). System cron: <code>/etc/cron.d/</code>, <code>/etc/cron.daily/</code>. <code>crontab -l</code> list, <code>crontab -r</code> remove. Log: <code>grep CRON /var/log/syslog</code>.<br><br><b>🔑 Plain terms:</b> cron is your automated scheduler. The 5-field format reads: Minute Hour DayOfMonth Month DayOfWeek. Always redirect output to a log file — cron runs silently and you'll never know if it failed.<br><b>💡 Example:</b> <pre><code># Edit crontab:\ncrontab -e          # opens in your default editor\ncrontab -l          # list current crontab\n\n# Format: MIN HOUR DOM MON DOW COMMAND\n# Examples:\n# 0  2 * * *   /scripts/backup.sh >> /var/log/backup.log 2>&1  # 2am daily\n# */15 * * * * /scripts/healthcheck.sh                          # every 15 min\n# 0  9 * * 1-5 /scripts/report.sh                              # weekdays 9am\n# 0  0 1 * *   /scripts/monthly.sh                             # 1st of month\n\n# Debug — did cron run?\ngrep CRON /var/log/syslog | tail -20\n\n# System-wide cron:\nls /etc/cron.d/        # per-application cron files\nls /etc/cron.daily/    # scripts run once a day</code></pre>"},{"id":31,"level":"intermediate","q":"What are named pipes (FIFOs) and when would you use them?","a":"A FIFO is a special file for IPC between processes. Create: <code>mkfifo /tmp/mypipe</code>. Writer: <code>echo \"data\" &gt; /tmp/mypipe</code>. Reader: <code>cat /tmp/mypipe</code>. Unlike anonymous pipes, FIFOs exist on the filesystem and allow unrelated processes to communicate. Use case: a log producer and log consumer running independently. Blocks until both ends are open.<br><br><b>🔑 Plain terms:</b> A named pipe is like a physical labeled tube between two rooms — one process pushes data in one end, another reads from the other. Unlike anonymous pipes (|), any process can find a FIFO by its filename.<br><b>💡 Example:</b> <pre><code># Create a named pipe:\nmkfifo /tmp/mypipe\nls -la /tmp/mypipe    # prw-r--r--  (p = named pipe)\n\n# Terminal 1 — write (blocks until reader opens):\necho \"hello from producer\" > /tmp/mypipe\n\n# Terminal 2 — read:\ncat /tmp/mypipe\n# => hello from producer\n\n# Real use — compress logs on the fly without temp files:\nmkfifo /tmp/log_pipe\ngzip -c < /tmp/log_pipe > /var/log/app.log.gz &  # reader in background\n./myapp > /tmp/log_pipe                           # app writes to pipe\n\n# Clean up:\nrm /tmp/mypipe</code></pre>"},{"id":32,"level":"intermediate","q":"What are SSH keys and how do you set up key-based authentication?","a":"Generate: <code>ssh-keygen -t ed25519 -C \"comment\"</code> (prefer ed25519 over RSA). Copy public key: <code>ssh-copy-id user@host</code> or manually append to <code>~/.ssh/authorized_keys</code>. Config file <code>~/.ssh/config</code>: <code>Host alias\n  HostName ip\n  User ubuntu\n  IdentityFile ~/.ssh/key</code>. Disable password auth: <code>PasswordAuthentication no</code> in <code>/etc/ssh/sshd_config</code>. Agent: <code>ssh-add ~/.ssh/key</code>.<br><br><b>🔑 Plain terms:</b> SSH keys are a padlock/key pair. You put the padlock (public key) on servers. You keep the key (private key) on your laptop. No password needed — the server checks if your key fits its padlock.<br><b>💡 Example:</b> <pre><code># Generate a key pair (ed25519 is modern and secure):\nssh-keygen -t ed25519 -C \"your@email.com\"\n# Creates: ~/.ssh/id_ed25519     (PRIVATE — never share!)\n#          ~/.ssh/id_ed25519.pub (public — copy to servers)\n\n# Copy public key to server:\nssh-copy-id user@server.com\n\n# ~/.ssh/config — shortcuts for servers:\ncat >> ~/.ssh/config << 'EOF'\nHost prod\n    HostName 54.123.45.67\n    User ubuntu\n    IdentityFile ~/.ssh/id_ed25519\nEOF\nssh prod                         # just works!\n\n# Disable password auth on server (after keys work!):\n# In /etc/ssh/sshd_config: PasswordAuthentication no\nsudo systemctl reload sshd</code></pre>"},{"id":33,"level":"intermediate","q":"How do you check and manage network interfaces and routing?","a":"Interfaces: <code>ip addr show</code> (modern) or <code>ifconfig</code>. Bring up/down: <code>ip link set eth0 up/down</code>. Routes: <code>ip route show</code>, add route: <code>ip route add 10.0.0.0/24 via 192.168.1.1</code>. DNS: <code>cat /etc/resolv.conf</code>. Test connectivity: <code>ping</code>, <code>traceroute</code>, <code>mtr</code>. DNS lookup: <code>dig domain</code> or <code>nslookup domain</code>. Active connections: <code>ss -tuln</code>, <code>netstat -tuln</code>.<br><br><b>🔑 Plain terms:</b> Network debugging follows the OSI model bottom-up: (1) Is the interface up? (2) Does it have an IP? (3) Can I reach the gateway? (4) Can I reach internet? (5) Does DNS resolve?<br><b>💡 Example:</b> <pre><code># Check interfaces and IP addresses:\nip addr show                    # modern (replaces ifconfig)\nip link show                    # just link state (UP/DOWN)\n\n# Check routes:\nip route show                   # default via 192.168.1.1 dev eth0\n\n# Test connectivity step by step:\nping -c 3 192.168.1.1           # 1. gateway reachable?\nping -c 3 8.8.8.8               # 2. internet reachable (by IP)?\nping -c 3 google.com            # 3. DNS working?\n\n# DNS lookup:\ndig google.com\ncat /etc/resolv.conf            # what DNS servers am I using?\n\n# Open ports and connections:\nss -tuln                        # listening ports\nss -tulnp                       # with process names (needs sudo)</code></pre>"},{"id":34,"level":"intermediate","q":"What is iptables and how do you write firewall rules?","a":"<code>iptables</code> manages netfilter firewall rules via chains (INPUT/OUTPUT/FORWARD) and tables (filter/nat/mangle). Accept SSH: <code>iptables -A INPUT -p tcp --dport 22 -j ACCEPT</code>. Drop all other input: <code>iptables -P INPUT DROP</code>. NAT masquerade: <code>iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE</code>. Save: <code>iptables-save &gt; /etc/iptables/rules.v4</code>. Modern alternative: <code>nftables</code>. <code>ufw</code> is a simpler front-end on Ubuntu.<br><br><b>🔑 Plain terms:</b> iptables rules are checked top to bottom — first match wins. The three chains handle different traffic: INPUT (coming in), OUTPUT (going out), FORWARD (passing through). ALWAYS allow SSH before setting default DROP.<br><b>💡 Example:</b> <pre><code># View current rules:\nsudo iptables -L -n -v\n\n# CRITICAL ORDER — allow SSH FIRST, then set DROP:\nsudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT\nsudo iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT\nsudo iptables -A INPUT -p tcp --dport 80  -j ACCEPT\nsudo iptables -A INPUT -p tcp --dport 443 -j ACCEPT\nsudo iptables -P INPUT DROP     # NOW set default drop\n\n# Save (so rules survive reboot):\nsudo iptables-save > /etc/iptables/rules.v4\n\n# Simpler alternative on Ubuntu:\nsudo ufw allow ssh\nsudo ufw allow 80/tcp\nsudo ufw enable</code></pre>"},{"id":35,"level":"intermediate","q":"What is the difference between soft and hard limits (ulimit)?","a":"<code>ulimit</code> controls resource limits per process. <code>-n</code> max open files, <code>-u</code> max user processes, <code>-s</code> stack size, <code>-v</code> virtual memory. Soft limit: current limit, user can raise up to hard limit. Hard limit: maximum, only root can raise. View: <code>ulimit -a</code>. Set permanently in <code>/etc/security/limits.conf</code>. Critical for high-connection servers (increase <code>nofile</code>).<br><br><b>🔑 Plain terms:</b> Hard limit = maximum speed your car can physically go. Soft limit = the speed limit sign — you start here but can raise up to the hard limit. Most common production issue: nofile (max open files) too low for busy servers.<br><b>💡 Example:</b> <pre><code># View current limits:\nulimit -a                   # all limits for current session\nulimit -n                   # open files limit (default often 1024)\n\n# Raise for current session:\nulimit -n 65536\n\n# Set permanently in /etc/security/limits.conf:\ncat >> /etc/security/limits.conf << 'EOF'\nnginx soft nofile 65536\nnginx hard nofile 65536\n* soft nproc 4096\n* hard nproc 4096\nEOF\n\n# Check limits of a running process:\ncat /proc/$(pidof nginx)/limits\n# Max open files  65536  65536</code></pre>"},{"id":36,"level":"intermediate","q":"What is the difference between ext4, XFS, and Btrfs?","a":"ext4: most common Linux FS, mature, journaled, max 16TB file. XFS: high-performance, excellent for large files and parallel I/O, used in RHEL by default. Btrfs: copy-on-write, supports snapshots, RAID, checksumming, subvolumes — more complex. ZFS: powerful (not default Linux), excellent for NAS. For most use: ext4 (safe) or XFS (performance). Check: <code>df -T</code> or <code>lsblk -f</code>.<br><br><b>🔑 Plain terms:</b> ext4 is the reliable default — like a standard filing cabinet. XFS is high-performance for large files. Btrfs adds snapshots and self-healing but is more complex.<br><b>💡 Example:</b> <pre><code># Check current filesystem type:\ndf -T                           # filesystem type per mount\nlsblk -f                        # type and UUID per device\n\n# Which to use?\n# General-purpose server     → ext4 (stable, well-understood)\n# Large video/database files → XFS (parallel I/O, large file support)\n# NAS / want snapshots        → Btrfs or ZFS\n# Docker host                → XFS (overlay2 performs better)\n\n# Create filesystems (on a new partition):\nsudo mkfs.ext4 /dev/sdb1\nsudo mkfs.xfs  /dev/sdb1\n\n# Check filesystem health:\nsudo e2fsck -f /dev/sdb1        # check ext4 (must be unmounted)\nsudo xfs_repair /dev/sdb1       # check/repair XFS</code></pre>"},{"id":37,"level":"intermediate","q":"What is a Linux namespace and cgroup?","a":"Namespaces isolate process views of system resources: pid (process IDs), net (network), mnt (filesystems), uts (hostname), ipc, user. Each container gets its own namespace. Cgroups (control groups) limit and track resource usage: CPU time, memory, I/O bandwidth, network. Together namespaces + cgroups form the foundation of container technologies like Docker.<br><br><b>🔑 Plain terms:</b> Namespaces give each container its own private view of the world — like VR headsets. Each container thinks it's alone on the machine. Cgroups are resource quotas — this container gets at most 2 CPUs and 512MB RAM, no more.<br><b>💡 Example:</b> <pre><code># See namespaces of a process:\nls -la /proc/self/ns/           # namespaces of the current process\n\n# What Docker does under the hood:\ndocker run --rm ubuntu sh -c \"hostname && ps aux\"\n# hostname = container's own (different from host)\n# ps = only its own processes (namespace isolation)\n\n# See cgroup limits of a container:\ndocker run --rm --memory=256m --cpus=1 ubuntu     sh -c \"cat /sys/fs/cgroup/memory/memory.limit_in_bytes\"\n# => 268435456  (256MB in bytes)\n\n# View cgroup of current process:\ncat /proc/self/cgroup</code></pre>"},{"id":38,"level":"intermediate","q":"How does the Linux boot process work?","a":"1. BIOS/UEFI POST and boot device selection. 2. Bootloader (GRUB2) loaded from MBR/EFI partition. 3. GRUB loads kernel + initramfs into memory. 4. Kernel initialises hardware, mounts initramfs. 5. initramfs mounts real root filesystem. 6. Kernel runs PID 1 (systemd or SysV init). 7. systemd reads unit files, starts targets/services in dependency order. 8. Login prompt or GUI.<br><br><b>🔑 Plain terms:</b> Boot is like starting a car: BIOS turns the key, GRUB is the starter motor, kernel fires up, initramfs loads initial fuel, then systemd starts all systems before you can drive.<br><b>💡 Example:</b> <pre><code># Debug boot issues:\nsystemd-analyze                     # total boot time\nsystemd-analyze blame               # which services took longest\nsystemd-analyze critical-chain      # the bottleneck dependency chain\n\n# View logs from last boot:\njournalctl -b -0                    # current boot\njournalctl -b -1                    # previous boot\njournalctl -b -1 -p err             # only errors from previous boot\n\n# Failed services from last boot:\nsystemctl list-units --failed\n\n# GRUB rescue mode:\n# At GRUB menu: press 'e' to edit the entry\n# Find 'linux' line, add: single\n# Ctrl+X to boot in single-user mode</code></pre>"},{"id":39,"level":"intermediate","q":"What is strace and when do you use it?","a":"<code>strace</code> traces system calls and signals made by a process. Diagnose: why a program hangs, what files it opens, why it fails with \"permission denied\". <code>strace ./program</code> trace from start. <code>strace -p PID</code> attach to running process. <code>-e trace=open,read,write</code> filter calls. <code>-o file.txt</code> output to file. <code>-T</code> show time spent in each call. Pair with <code>ltrace</code> for library calls.<br><br><b>🔑 Plain terms:</b> strace is X-ray vision for programs — you see every file they open, every network call, every sleep. If a program fails mysteriously, strace tells you exactly which system call failed and why.<br><b>💡 Example:</b> <pre><code># Trace a command from start:\nstrace ls /etc 2>&1 | head -20     # shows open(), read(), write() calls\n\n# Attach to running process:\nsudo strace -p $(pidof nginx) 2>&1 | head -20\n\n# Filter to specific syscalls:\nstrace -e trace=open,openat,read ls /etc 2>&1 | grep ENOENT\n\n# Real debugging — \"file not found\" but you don't know which file:\nstrace -e trace=openat ./myapp 2>&1 | grep \"ENOENT\"\n# openat(AT_FDCWD, \"/etc/myapp/config.json\", O_RDONLY) = -1 ENOENT\n# Now you know exactly which file it's looking for!\n\n# Summary of time per syscall:\nstrace -c ./myapp                  # shows slowest syscall types</code></pre>"},{"id":40,"level":"intermediate","q":"What is the difference between NFS, CIFS/SMB, and SSHFS?","a":"NFS (Network File System): Linux-native network filesystem, fast on Linux-to-Linux. CIFS/SMB: Windows-compatible, used for Samba shares — <code>mount -t cifs //server/share /mnt</code>. SSHFS: mounts remote filesystem over SSH — <code>sshfs user@host:/path /mnt</code> — easy, encrypted, no extra server config. For persistent mounts add to <code>/etc/fstab</code>. NFS is fastest in Linux-only environments.<br><br><b>🔑 Plain terms:</b> NFS is fast native Linux-to-Linux. CIFS/SMB is Windows-compatible. SSHFS requires zero server setup — if you can SSH in, you can mount the filesystem. Use SSHFS for quick secure one-off mounts.<br><b>💡 Example:</b> <pre><code># SSHFS — mount over SSH (no server config needed):\nsshfs user@server.com:/data /mnt/remote\nls /mnt/remote                      # browse remote files\numount /mnt/remote                  # unmount when done\n\n# NFS — fast Linux-to-Linux:\n# Server /etc/exports: /data  192.168.1.0/24(rw,sync)\nsudo mount -t nfs server:/data /mnt/nfs\n\n# CIFS/SMB — Windows or Samba share:\nsudo mount -t cifs //server/share /mnt/win     -o username=user,password=pass\n\n# Persistent mounts — add to /etc/fstab:\n# server:/data /mnt/nfs nfs defaults,nofail 0 0</code></pre>"},{"id":41,"level":"intermediate","q":"What is the difference between /dev/sda, /dev/nvme0n1, and /dev/vda?","a":"<code>/dev/sda</code>: SATA/SCSI disk (legacy naming). <code>/dev/sda1</code> first partition. <code>/dev/nvme0n1</code>: NVMe SSD (much faster). <code>/dev/nvme0n1p1</code> first partition. <code>/dev/vda</code>: virtual disk (KVM/QEMU VMs). <code>/dev/xvda</code>: Xen virtual disk (AWS older). <code>/dev/mmcblk0</code>: eMMC/SD card. <code>lsblk</code> shows all block devices and their partitions clearly.<br><br><b>🔑 Plain terms:</b> The device name tells you what type of storage it is: sda = SATA/SCSI, nvme = ultra-fast PCIe SSD, vda = virtual disk in a VM. Partitions add a number suffix: sda1, nvme0n1p1.<br><b>💡 Example:</b> <pre><code># List all block devices (best overview):\nlsblk                           # tree view\nlsblk -f                        # adds filesystem type and UUID\n\n# Typical output:\n# NAME        FSTYPE  SIZE MOUNTPOINT\n# sda                 500G\n# ├─sda1      ext4    499G /\n# └─sda2      swap      1G [SWAP]\n# nvme0n1             1.8T\n# └─nvme0n1p1 ext4    1.8T /data\n\n# In AWS EC2:\n# Root volume: /dev/xvda or /dev/nvme0n1\n# Data volumes: /dev/nvme1n1, /dev/nvme2n1 ...\n\n# Check disk info:\nsudo hdparm -I /dev/sda         # SATA drive info\nsudo nvme smart-log /dev/nvme0n1  # NVMe health (install nvme-cli)</code></pre>"},{"id":42,"level":"intermediate","q":"How do you diagnose and resolve a \"no space left\" error even when df shows free space?","a":"The issue is inode exhaustion. Every file uses one inode regardless of size. Check: <code>df -i</code> shows inode usage. Fix: delete files with many small files (temp files, logs, mail spools). Find culprit: <code>find / -xdev -printf '%h\\\n' | sort | uniq -c | sort -rn | head</code> shows directories with most files. Also check: full <code>/var/log</code>, leftover tmp files, package cache.<br><br><b>🔑 Plain terms:</b> inode exhaustion: you can run out of 'file index cards' even when there's plenty of disk space. Each file needs one inode regardless of size. Millions of tiny files exhaust inodes fast.<br><b>💡 Example:</b> <pre><code># Check inode usage (df may show free space but df -i shows the real problem!):\ndf -i\n# Filesystem      Inodes   IUsed  IFree IUse%\n# /dev/sda1      6553600 6553600      0  100%  <- FULL!\n\n# Find which directory has the most files:\nfind / -xdev -printf '%h\n' 2>/dev/null     | sort | uniq -c | sort -rn | head -10\n\n# Common culprits:\nls /var/lib/php/sessions/ | wc -l   # PHP session files\nls /var/spool/mail/ | wc -l         # mail spools\n\n# Fix — delete old session files:\nfind /var/lib/php/sessions -mtime +1 | wc -l   # count first\nfind /var/lib/php/sessions -mtime +1 -delete   # then delete</code></pre>"},{"id":43,"level":"intermediate","q":"What is the purpose of /etc/fstab?","a":"<code>/etc/fstab</code> defines filesystems to mount automatically at boot. Format: <code>device mountpoint type options dump pass</code>. Example: <code>UUID=xxxx /home ext4 defaults,noatime 0 2</code>. Options: <code>noatime</code> (faster), <code>ro</code> (read-only), <code>noexec</code> (no executables), <code>nofail</code> (don't fail boot if missing). Test without rebooting: <code>mount -a</code>. Use UUIDs (not <code>/dev/sdX</code>) as they are stable.<br><br><b>🔑 Plain terms:</b> fstab is the 'mount at boot' shopping list. Without it, you'd manually mount every disk after every reboot. Always use UUIDs instead of /dev/sdX — device names can change when you add new disks.<br><b>💡 Example:</b> <pre><code># View current fstab:\ncat /etc/fstab\n# UUID=abc123  /       ext4  defaults,noatime  0 1\n# UUID=def456  /home   ext4  defaults,noatime  0 2\n# UUID=ghi789  none    swap  sw                0 0\n\n# Add a new disk — complete workflow:\n# 1. Get UUID:\nblkid /dev/sdb1       # UUID=\"1234-abcd\" TYPE=\"ext4\"\n# 2. Create mount point:\nsudo mkdir /data\n# 3. Add to /etc/fstab:\n# UUID=1234-abcd /data ext4 defaults,noatime,nofail 0 2\n# 4. Test without rebooting:\nsudo mount -a\ndf -h /data           # confirms it mounted\n# nofail = won't halt boot if disk is missing (for removable drives)</code></pre>"},{"id":44,"level":"intermediate","q":"What is load average and how do you interpret it?","a":"Load average represents the average number of processes in the run queue (running or waiting for CPU/IO) over 1, 5, and 15 minutes. View: <code>uptime</code> or <code>top</code>. On a 4-core system: load 4.0 = fully utilised, >4 = overloaded. Load 1.0 on single-core = 100% utilised. High load with low CPU% often means I/O wait (<code>iostat</code>). Low CPU with high load: check memory/swap and I/O.<br><br><b>🔑 Plain terms:</b> Load average = average number of processes wanting the CPU right now. For a 4-core machine, load 4.0 = perfectly saturated. The three numbers are 1, 5, and 15 minute averages.<br><b>💡 Example:</b> <pre><code># View load average:\nuptime\n# 14:32:18 up 5 days,  load average: 0.52, 1.23, 2.45\n#                                     ^1min ^5min ^15min\n\n# Interpret for 4-core machine:\n# load 1.0 = 25% utilised\n# load 4.0 = 100% utilised (all cores busy)\n# load 8.0 = 200% — queue building up!\n\n# High load but low CPU%? Check disk I/O:\ntop                             # look at %wa (I/O wait column)\niostat -x 1                     # check %util per disk\n\n# Pattern analysis:\n# 1min >> 15min = sudden spike, investigate now\n# 15min >> 1min = was worse, calming down\n# All three equal = sustained load (normal or problematic)</code></pre>"},{"id":45,"level":"intermediate","q":"How do you use lsof and what is it used for?","a":"<code>lsof</code> (list open files) shows every file opened by every process. <code>lsof -u username</code> files by user. <code>lsof -p PID</code> files by process. <code>lsof -i :8080</code> what is using port 8080. <code>lsof /path/to/file</code> which process has file open. <code>lsof +D /dir</code> all files under directory. Useful for: finding process holding a port, finding processes preventing unmount, debugging file descriptor leaks.<br><br><b>🔑 Plain terms:</b> lsof = 'list open files'. In Linux, everything is a file (sockets, pipes, devices). lsof tells you which process has what open. Most useful for: finding what's using a port, or why you can't unmount a drive.<br><b>💡 Example:</b> <pre><code># What is using port 8080?\nsudo lsof -i :8080\n# COMMAND  PID   USER   FD  TYPE  NODE NAME\n# node    1234  alice   22u IPv4  TCP *:8080 (LISTEN)\n\n# All files opened by a process:\nsudo lsof -p 1234\nsudo lsof -c nginx              # by process name\n\n# Why can't I unmount /mnt/usb?\nsudo lsof +D /mnt/usb           # what process has files open there?\n\n# Network connections only:\nsudo lsof -i                    # all network connections\nsudo lsof -i :443               # everything on port 443\n\n# Count open files per process:\nsudo lsof -p 1234 | wc -l      # if high, could be an fd leak</code></pre>"}],"git":[{"id":1,"level":"basic","q":"What is Git and why is version control important?","a":"Git is a distributed version control system tracking changes to files over time. Every developer has a full copy of the repository. Benefits: full history, branching for parallel work, rollback to any state, collaboration without overwriting others' work, code review via pull requests, and blame/log for understanding why code changed.<br><br><b>🔑 Plain terms:</b> Git is a time machine + collaborative editing tool for code. Every save (commit) is a snapshot you can return to. Without Git, teams emailed zip files named 'project_FINAL_v2_USE_THIS.zip' and constantly overwrote each other.<br><b>💡 Example:</b> <pre><code># Start tracking a project:\ngit init my_project\ncd my_project\n\n# The fundamental workflow:\ngit status                      # what changed?\ngit add file.py                 # stage it\ngit commit -m \"Add login feature\"  # save snapshot\n\n# Time travel:\ngit log --oneline               # see all snapshots\ngit checkout abc1234            # jump to any snapshot\ngit checkout main               # jump back to latest\n\n# Blame a bug instantly:\ngit blame src/auth.py           # who wrote each line</code></pre>"},{"id":2,"level":"basic","q":"What is the difference between Git and GitHub/GitLab/Bitbucket?","a":"Git is the local VCS tool. GitHub, GitLab, and Bitbucket are cloud hosting services for Git repositories. They add features: web UI, pull requests, CI/CD pipelines, issue tracking, wikis. GitLab can be self-hosted. GitHub is most popular for open source. Bitbucket integrates with Atlassian tools. You can use Git without any of them.<br><br><b>🔑 Plain terms:</b> Git is the engine (the actual tracking tool). GitHub is a garage where you park your car — it hosts Git repos and adds pull requests, CI/CD, issue tracking. You can use Git without GitHub.<br><b>💡 Example:</b> <pre><code># Git works entirely locally — no internet needed:\ngit init && git add . && git commit -m \"init\"\n\n# GitHub is just a remote copy + web UI:\ngit remote add origin https://github.com/you/repo.git\ngit push origin main\n\n# You can store repos on other services too:\n# git clone git@gitlab.com:you/repo.git\n# git clone git@bitbucket.org:you/repo.git\n\n# Key differences:\n# GitHub    = largest open-source community, GitHub Actions CI/CD\n# GitLab    = can self-host, built-in CI/CD pipelines\n# Bitbucket = integrates with Jira/Confluence</code></pre>"},{"id":3,"level":"basic","q":"What are the three areas in Git — working tree, staging area, and repository?","a":"Working tree: files on disk as you see them. Staging area (index): a snapshot of what the next commit will include — populated with <code>git add</code>. Repository (.git dir): the committed history. Flow: edit in working tree → <code>git add</code> → staging → <code>git commit</code> → repository. <code>git status</code> shows state of working tree and staging area.<br><br><b>🔑 Plain terms:</b> Working tree = actual files on disk. Staging area = draft of your next commit. Repository = permanent sealed history. git add moves to staging. git commit seals staging into history.<br><b>💡 Example:</b> <pre><code># See all three areas at once:\ngit status\n\n# On branch main\n# Changes to be committed:        <- STAGING AREA\n#   modified: login.py\n#\n# Changes not staged for commit:  <- WORKING TREE\n#   modified: dashboard.py\n#\n# Untracked files:                <- WORKING TREE (new)\n#   new_feature.py\n\n# Move between areas:\ngit add login.py                # working tree -> staging\ngit add -p                      # interactively pick which LINES to stage\ngit restore --staged login.py   # staging -> back to working tree\ngit commit -m \"Fix login\"       # staging -> repository (permanent)</code></pre>"},{"id":4,"level":"basic","q":"What does git init do and what is in the .git directory?","a":"<code>git init</code> creates a new empty repository. The <code>.git/</code> folder contains: <code>HEAD</code> (current branch pointer), <code>config</code> (repo config), <code>objects/</code> (all content — blobs/trees/commits), <code>refs/</code> (branch and tag pointers), <code>index</code> (staging area). Delete <code>.git/</code> to de-git a directory. Never manually edit .git files.<br><br><b>🔑 Plain terms:</b> git init creates a new empty repo. The .git folder IS the entire repository — all history, all branches, all config. Delete .git and the directory becomes a plain folder.<br><b>💡 Example:</b> <pre><code># Start a new project:\ngit init my_project\ncd my_project\n\n# What's inside .git:\nls .git/\n# HEAD     <- which branch you're on (cat: ref: refs/heads/main)\n# config   <- repo-level settings\n# objects/ <- ALL content (every version of every file, compressed)\n# refs/    <- branch and tag pointers\n\n# Clone = copy an existing repo (creates .git automatically):\ngit clone https://github.com/user/repo.git\ncd repo && ls .git/     # full history is here\n\n# Remove git from a project:\nrm -rf .git             # now it's just a regular directory</code></pre>"},{"id":5,"level":"basic","q":"How do git add and git commit work?","a":"<code>git add file</code> stages a specific file. <code>git add .</code> stages all changes. <code>git add -p</code> interactively stages hunks (partial staging). <code>git commit -m \"message\"</code> creates a commit snapshot. <code>git commit -am \"msg\"</code> stages tracked files and commits. <code>git commit --amend</code> modifies the last commit. Good commit messages: imperative mood, max 72 chars subject, blank line, then body.<br><br><b>🔑 Plain terms:</b> git add selects which changes go in the next commit (like choosing photos for an album). git commit seals them with a caption. Good commit messages say WHY, not WHAT — the diff already shows what changed.<br><b>💡 Example:</b> <pre><code># The daily workflow:\necho \"print('hello')\" > app.py\ngit add app.py              # stage\ngit status                  # confirm it's staged\ngit commit -m \"Add hello world script\"\n\n# Stage everything at once:\ngit add .                   # all changed files\ngit add src/                # everything in src/\n\n# Stage only part of a file (very useful!):\ngit add -p app.py           # pick which hunks to stage\n\n# Good vs bad commit messages:\ngit commit -m \"Fix authentication bypass in login endpoint\"  # GOOD\ngit commit -m \"fix\"                                          # BAD — useless\ngit commit -m \"WIP\"                                          # BAD\n\n# Amend last commit (before pushing):\ngit commit --amend -m \"Fix auth bypass — closes #234\"</code></pre>"},{"id":6,"level":"basic","q":"How do you check git history and understand the output?","a":"<code>git log</code> full history. <code>git log --oneline</code> compact one line per commit. <code>git log --oneline --graph --all</code> visual branch graph. <code>git log -p</code> shows diffs. <code>git log --author=\"Alice\"</code> filter by author. <code>git log --since=\"2 weeks ago\"</code>. <code>git show HASH</code> shows a specific commit. Each commit has: hash, author, date, message, parent hash(es).<br><br><b>🔑 Plain terms:</b> git log is the project's diary. The oneline + graph view shows the entire branching history as an ASCII subway map.<br><b>💡 Example:</b> <pre><code># Basic log:\ngit log                         # full details\ngit log --oneline               # one line per commit\ngit log --oneline -10           # last 10 commits\n\n# Visual branch graph:\ngit log --oneline --graph --all --decorate\n# * abc1234 (HEAD -> main) Latest commit\n# * def5678 Fix typo\n# | * ghi9012 (feature/auth) WIP auth\n# |/\n# * jkl3456 Initial commit\n\n# Filter log:\ngit log --author=\"Alice\"\ngit log --since=\"2 weeks ago\"\ngit log --grep=\"fix\"                        # commits mentioning \"fix\"\ngit log -- src/auth.py                      # commits touching this file\ngit log -S \"password_hash\"                  # commits that changed this string\n\n# Set up a permanent pretty alias:\ngit config --global alias.lg \"log --oneline --graph --all --decorate\"\ngit lg</code></pre>"},{"id":7,"level":"basic","q":"How do you create, switch, list, and delete branches?","a":"Create: <code>git branch feature</code>. Create + switch: <code>git checkout -b feature</code> or <code>git switch -c feature</code>. Switch: <code>git switch feature</code>. List local: <code>git branch</code>. List all (including remote): <code>git branch -a</code>. Delete merged: <code>git branch -d feature</code>. Force delete: <code>git branch -D feature</code>. Rename: <code>git branch -m old new</code>.<br><br><b>🔑 Plain terms:</b> Branches are parallel universes of your code. Creating a branch is instant and costs almost nothing — it's just a pointer to a commit.<br><b>💡 Example:</b> <pre><code># Create and switch in one step:\ngit switch -c feature/user-login    # modern syntax\n\n# List branches:\ngit branch                  # local branches (* = current)\ngit branch -a               # all including remote\ngit branch -v               # with last commit message\n\n# Switch branches:\ngit switch main\ngit switch feature/auth\n\n# Delete branches:\ngit branch -d feature/merged    # delete if already merged\ngit branch -D feature/old       # force delete (unmerged)\n\n# Naming conventions:\n# feature/add-oauth\n# bugfix/fix-login-crash\n# hotfix/security-patch-cve-2024\n# release/v2.1.0</code></pre>"},{"id":8,"level":"basic","q":"What does git clone do and what are its options?","a":"<code>git clone URL</code> creates a full copy of a remote repository. The remote is aliased as <code>origin</code>. Shallow clone (partial history): <code>git clone --depth 1 URL</code> (faster for CI). Specific branch: <code>git clone -b branch URL</code>. Clone into specific dir: <code>git clone URL dirname</code>. After cloning, all remote branches are available as <code>origin/branch</code>; local tracking branches are created on checkout.<br><br><b>🔑 Plain terms:</b> git clone creates a full independent copy — all history, all branches. Shallow clone (--depth 1) downloads only the latest commit — much faster for CI pipelines.<br><b>💡 Example:</b> <pre><code># Standard clone:\ngit clone https://github.com/org/repo.git\ncd repo\ngit log --oneline | wc -l      # all history is here\n\n# Shallow clone for CI (much faster, no full history):\ngit clone --depth 1 https://github.com/org/repo.git\ncd repo\ngit log --oneline | wc -l      # only 1 commit downloaded\n\n# Clone specific branch:\ngit clone -b develop https://github.com/org/repo.git\n\n# Clone into specific directory:\ngit clone https://github.com/org/repo.git /var/www/myapp\n\n# After cloning — check remote branches:\ngit branch -a\n# * main\n#   remotes/origin/develop\n#   remotes/origin/feature/auth</code></pre>"},{"id":9,"level":"basic","q":"What is the difference between git pull and git fetch?","a":"<code>git fetch origin</code> downloads all remote changes (commits, branches) but does not touch your working tree or current branch. <code>git pull</code> = <code>git fetch</code> + <code>git merge</code> (or rebase with <code>--rebase</code>). Safe workflow: fetch first, inspect with <code>git log origin/main..HEAD</code>, then merge. <code>git pull --rebase</code> keeps history linear.<br><br><b>🔑 Plain terms:</b> git fetch downloads changes but leaves your working directory untouched — like downloading emails but not reading them yet. Always fetch + inspect before merging.<br><b>💡 Example:</b> <pre><code># SAFE workflow: fetch first, look, then merge:\ngit fetch origin                        # download remote changes\ngit log HEAD..origin/main --oneline     # what's new on remote?\ngit diff HEAD origin/main               # see the actual changes\ngit merge origin/main                   # integrate when ready\n\n# Quick pull (fetch + merge in one step):\ngit pull\ngit pull --rebase                       # fetch + rebase (cleaner history)\n\n# See all remote branches after fetch:\ngit branch -a                           # remote branches appear as origin/xxx\n\n# Fetch from all remotes:\ngit fetch --all</code></pre>"},{"id":10,"level":"basic","q":"How do you push changes to a remote repository?","a":"<code>git push origin branch</code> pushes a branch. First push of new branch: <code>git push -u origin feature</code> (sets upstream tracking). Force push (dangerous on shared branches): <code>git push --force-with-lease</code> (safer than <code>--force</code> — fails if remote has new commits you haven't seen). Delete remote branch: <code>git push origin --delete branch</code>. Push all branches: <code>git push --all</code>.<br><br><b>🔑 Plain terms:</b> Pushing uploads your local commits so teammates can see them. The -u flag sets upstream tracking so future pushes just need 'git push'. Force push on main is catastrophic — never do it.<br><b>💡 Example:</b> <pre><code># First push of a new branch:\ngit push -u origin feature/login    # -u sets upstream tracking\n# Now future pushes just need: git push\n\n# Push after commits:\ngit push\n\n# Delete a remote branch:\ngit push origin --delete feature/old-idea\n\n# Push tags (not sent by default):\ngit tag v1.2.0 -m \"Release 1.2.0\"\ngit push origin v1.2.0              # push one tag\ngit push origin --tags              # push all tags\n\n# Safe force push (only on YOUR feature branches, NEVER on main):\ngit push --force-with-lease         # fails if remote has new commits</code></pre>"},{"id":11,"level":"basic","q":"What is a .gitignore file and how do patterns work?","a":"<code>.gitignore</code> lists patterns of files Git should not track. Patterns: <code>*.log</code> (any .log), <code>build/</code> (directory), <code>!important.log</code> (negate — do track), <code>**/temp</code> (any depth). Scope: applies from the directory containing the file. Global ignore: <code>git config --global core.excludesfile ~/.gitignore_global</code>. Already-tracked files must be untracked: <code>git rm --cached file</code>.<br><br><b>🔑 Plain terms:</b> .gitignore tells Git to pretend certain files don't exist. Essential for: credentials (.env files), build artifacts, and IDE settings. A file already tracked won't be ignored until you explicitly untrack it.<br><b>💡 Example:</b> <pre><code># Common .gitignore patterns:\n\n# Secrets — NEVER commit these:\n# .env\n# *.pem\n# config/secrets.yml\n\n# Build artifacts:\n# node_modules/\n# __pycache__/\n# *.pyc\n# build/\n# dist/\n\n# IDE files:\n# .idea/\n# .vscode/\n# .DS_Store\n\n# Already tracking a file you want to ignore:\ngit rm --cached secret.env      # untrack without deleting from disk\necho \"secret.env\" >> .gitignore\ngit commit -m \"Stop tracking secret.env\"\n\n# Generate .gitignore for your tech stack:\n# Visit: https://www.gitignore.io</code></pre>"},{"id":12,"level":"basic","q":"How do you undo changes in Git at different stages?","a":"Unstaged changes: <code>git restore file</code> (or <code>git checkout -- file</code>). Staged changes (unstage): <code>git restore --staged file</code>. Undo last commit (keep changes staged): <code>git reset --soft HEAD~1</code>. Undo last commit (keep changes unstaged): <code>git reset HEAD~1</code>. Discard commit + changes: <code>git reset --hard HEAD~1</code>. Safe undo of a public commit: <code>git revert HASH</code> (creates new inverse commit).<br><br><b>🔑 Plain terms:</b> Git undo has three levels based on where your changes are. Unstaged: just restore. Staged: unstage. Committed: reset (local only) or revert (safe for shared branches).<br><b>💡 Example:</b> <pre><code># Undo unstaged changes (not yet staged):\ngit restore file.py              # discard changes\ngit restore .                    # discard ALL unstaged changes\n\n# Undo staged changes (git add was run):\ngit restore --staged file.py    # unstage (keep changes in working tree)\n\n# Undo last commit — keep changes in working tree:\ngit reset HEAD~1\n\n# Undo last commit — keep changes in staging:\ngit reset --soft HEAD~1         # ready to recommit immediately\n\n# Undo last commit — DISCARD all changes (local only!):\ngit reset --hard HEAD~1\n\n# Safe undo of a PUSHED commit:\ngit revert abc1234               # creates new 'undo' commit\ngit push                         # safe — history preserved</code></pre>"},{"id":13,"level":"basic","q":"What is git status and git diff?","a":"<code>git status</code> shows: branch name, untracked files, modified tracked files, staged changes. <code>git diff</code> shows unstaged changes vs last commit. <code>git diff --staged</code> shows staged changes. <code>git diff branch1..branch2</code> compares branches. <code>git diff HEAD~3</code> vs 3 commits ago. <code>git difftool</code> opens configured visual diff tool. Add <code>--stat</code> for summary.<br><br><b>🔑 Plain terms:</b> git status is 'what's on my desk right now'. git diff is 'show me the exact line-by-line changes'. Check both before EVERY commit to avoid accidentally committing debug code.<br><b>💡 Example:</b> <pre><code># Before every commit — this ritual:\ngit status                  # what files changed?\ngit diff                    # exact unstaged changes\ngit diff --staged           # what's actually going into the commit?\ngit commit -m \"message\"     # NOW commit\n\n# Compare branches:\ngit diff main..feature/login           # what changed on the feature branch?\ngit diff HEAD~3                        # changes in last 3 commits\ngit diff --stat HEAD~5                 # summary: which files, how many lines\n\n# See changes for one file:\ngit diff -- src/auth.py\ngit diff main..feature/login -- src/auth.py</code></pre>"},{"id":14,"level":"basic","q":"What is git merge and what are the types of merges?","a":"<code>git merge branch</code> integrates changes from another branch. Types: Fast-forward (no merge commit, just moves pointer — when target has no new commits). Three-way merge (creates a merge commit — when both branches diverged). Squash merge: <code>git merge --squash branch</code> — collapses all branch commits into staged changes for a clean single commit. <code>--no-ff</code> forces a merge commit even if fast-forward is possible.<br><br><b>🔑 Plain terms:</b> Merge integrates branches. Fast-forward (no merge commit) = just moving a pointer forward when there's nothing to diverge. Squash merge = collapse all messy feature commits into one clean commit on main.<br><b>💡 Example:</b> <pre><code># Fast-forward merge (clean — no merge commit):\ngit switch main\ngit merge feature/quick-fix\n# * c3 (HEAD->main, feature/quick-fix) Fix typo\n# * c2 Add login\n\n# Three-way merge (creates merge commit when branches diverged):\ngit merge feature/auth\n# *   Merge branch 'feature/auth'\n# |# | * f2 Add OAuth\n# * c2 Fix bug on main\n\n# Squash merge (clean up messy feature commits into one):\ngit merge --squash feature/auth\ngit commit -m \"Add OAuth authentication\"\n\n# Force a merge commit even when fast-forward is possible:\ngit merge --no-ff feature/hotfix</code></pre>"},{"id":15,"level":"basic","q":"What is a merge conflict and how do you resolve one?","a":"A conflict occurs when the same lines were changed differently in two branches. Git marks conflicts with <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</code> (your changes), <code>=======</code> (separator), <code>&gt;
