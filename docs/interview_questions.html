&gt;&gt;&gt;&gt;&gt;&gt; branch</code> (incoming). Edit the file choosing or combining changes. Then: <code>git add file</code> and <code>git commit</code>. Tools: <code>git mergetool</code>, VS Code's merge editor, IntelliJ. Abort: <code>git merge --abort</code>.<br><br><b>🔑 Plain terms:</b> A merge conflict happens when two branches changed the SAME line differently. Git shows you both versions with <<< === >>> markers. You edit the file to keep what you want, then commit.<br><b>💡 Example:</b> <pre><code># What a conflict looks like in the file:\n# <<<<<<< HEAD            <- your current branch version\n# color: red\n# =======                 <- separator\n# color: blue\n# >>>>>>> feature/theme   <- incoming branch version\n\n# Resolve options:\n# 1. Manual: edit file, delete all 3 marker lines, keep what you want\n# 2. Accept yours:   git checkout --ours   style.css\n# 3. Accept theirs:  git checkout --theirs style.css\n# 4. Visual tool:    git mergetool  (opens configured tool)\n\n# After resolving ALL conflicted files:\ngit add style.css           # mark file as resolved\ngit commit                  # complete the merge\n\n# Abort and go back to before the merge:\ngit merge --abort</code></pre>"},{"id":16,"level":"intermediate","q":"What is the difference between git merge and git rebase?","a":"<code>git merge</code> creates a merge commit preserving full history — shows true branching. <code>git rebase branch</code> replays your commits on top of branch producing linear history. Rebase rewrites commit hashes — never rebase public/shared branches. <code>git rebase -i HEAD~5</code> (interactive rebase): squash, reorder, edit, drop commits. Golden rule: rebase local, merge public.<br><br><b>🔑 Plain terms:</b> Merge preserves true history — you can see where branches diverged and merged. Rebase rewrites history to look linear — cleaner log but rewrites commit hashes. Rule: rebase your local work, merge when integrating to shared branches.<br><b>💡 Example:</b> <pre><code># MERGE — preserves history:\n# *   Merge branch 'feature' into main\n# |\\\n# | * f2 Add OAuth\n# | * f1 Add JWT\n# * m2 Fix bug on main\n# * m1 Initial\n\n# REBASE — linear history (feature replayed on top of main):\n# * f2' Add OAuth\n# * f1' Add JWT\n# * m2 Fix bug on main\n# * m1 Initial\n\n# Typical rebase workflow:\ngit switch feature\ngit rebase main             # replay feature commits on top of latest main\ngit switch main\ngit merge feature           # now fast-forward: clean, no merge commit</code></pre>"},{"id":17,"level":"intermediate","q":"What is interactive rebase and what can you do with it?","a":"<code>git rebase -i HEAD~N</code> opens an editor with last N commits. Actions per commit: <code>pick</code> (keep), <code>reword</code> (change message), <code>edit</code> (amend commit), <code>squash</code> (combine with previous), <code>fixup</code> (squash, discard message), <code>drop</code> (remove). Use to: clean up messy commits before PR, combine WIP commits, reorder commits, split a commit. Never on shared history.<br><br><b>🔑 Plain terms:</b> Interactive rebase is a time machine that rewrites your recent local history — merge messy 'WIP' commits into clean ones, fix commit messages, or remove a commit. NEVER use on commits already pushed to shared branches.<br><b>💡 Example:</b> <pre><code># Open interactive rebase for last 5 commits:\ngit rebase -i HEAD~5\n\n# The editor opens:\n# pick abc1234 Add user model\n# pick def5678 WIP login\n# pick ghi9012 fix typo in login\n# pick jkl3456 WIP login continued\n# pick mno7890 done with login\n\n# Change 'pick' to:\n# s (squash) = combine with previous commit\n# f (fixup)  = squash, discard this message\n# r (reword) = keep but edit the commit message\n# d (drop)   = delete this commit entirely\n\n# Result after squashing:\n# pick abc1234 Add user model\n# s def5678 (combined into next clean commit)\n# f ghi9012 (squash, discard message)\n# ... two clean commits instead of five messy ones</code></pre>"},{"id":18,"level":"intermediate","q":"What is git stash and how do you manage multiple stashes?","a":"<code>git stash</code> saves dirty working tree and staging area to a stack. <code>git stash push -m \"description\"</code> with name. List: <code>git stash list</code>. Apply latest (keep in stash): <code>git stash apply</code>. Apply + remove: <code>git stash pop</code>. Apply specific: <code>git stash apply stash@{2}</code>. Create branch from stash: <code>git stash branch newbranch stash@{1}</code>. Drop: <code>git stash drop stash@{0}</code>. Clear all: <code>git stash clear</code>.<br><br><b>🔑 Plain terms:</b> git stash is a desk drawer for half-finished work — shove it in there, handle the emergency, pull it back out. You can have multiple named stashes.<br><b>💡 Example:</b> <pre><code># Stash current work:\ngit stash push -m \"half-done login\"\n\n# List stashes:\ngit stash list\n# stash@{0}: On main: half-done login\n# stash@{1}: On feature: WIP dashboard\n\n# Apply and remove latest stash:\ngit stash pop\n\n# Apply without removing (keep in stash):\ngit stash apply stash@{1}       # apply specific stash\n\n# Create a branch from a stash:\ngit stash branch feature/login stash@{0}\n\n# Delete stashes:\ngit stash drop stash@{0}        # delete one\ngit stash clear                 # delete all</code></pre>"},{"id":19,"level":"intermediate","q":"What is git cherry-pick and when do you use it?","a":"<code>git cherry-pick HASH</code> applies a specific commit from any branch onto the current branch without merging the whole branch. Use cases: apply a hotfix to multiple release branches, pick a specific feature commit without merging in-progress work, rescue a commit made to wrong branch. <code>cherry-pick A..B</code> picks a range. <code>--no-commit</code> stages without committing. Creates new commits with different hashes.<br><br><b>🔑 Plain terms:</b> cherry-pick copies one specific commit from any branch to your current branch — like taking one cherry off someone else's cake without taking the whole cake. Classic use: applying a hotfix to multiple release branches.<br><b>💡 Example:</b> <pre><code># Find the commit to cherry-pick:\ngit log --oneline feature/fixes\n# abc1234 Fix SQL injection in login\n\n# Apply just that commit to current branch:\ngit switch main\ngit cherry-pick abc1234\n\n# Apply same fix to multiple release branches:\ngit switch release/v2.0\ngit cherry-pick abc1234\ngit switch release/v1.9\ngit cherry-pick abc1234\n\n# Stage without committing (to modify before committing):\ngit cherry-pick --no-commit abc1234\ngit status                      # see what was staged</code></pre>"},{"id":20,"level":"intermediate","q":"What are Git tags and how do you use them?","a":"Tags mark specific commits permanently (typically releases). Lightweight tag: <code>git tag v1.0</code> (just a pointer). Annotated tag (recommended): <code>git tag -a v1.0 -m \"Release 1.0\"</code> (stores tagger, date, message). Push tags: <code>git push origin --tags</code>. List: <code>git tag -l \"v1.*\"</code>. Delete local: <code>git tag -d v1.0</code>. Delete remote: <code>git push origin --delete v1.0</code>. Checkout: <code>git checkout v1.0</code>.<br><br><b>🔑 Plain terms:</b> Tags are permanent bookmarks — unlike branches, they never move forward. Use annotated tags for releases. Push tags explicitly — git push doesn't send them by default.<br><b>💡 Example:</b> <pre><code># Create annotated tag (recommended for releases):\ngit tag -a v1.2.0 -m \"Release 1.2.0 — Add OAuth support\"\n\n# Create lightweight tag (just a pointer):\ngit tag v1.2.0-beta\n\n# List tags:\ngit tag\ngit tag -l \"v1.*\"           # tags matching pattern\n\n# Push tags:\ngit push origin v1.2.0      # push one tag\ngit push origin --tags      # push all tags\n\n# GitHub auto-creates release pages for annotated tags\n\n# Checkout a tag (read-only — detached HEAD):\ngit checkout v1.2.0\n\n# Delete:\ngit tag -d v1.2.0\ngit push origin --delete v1.2.0</code></pre>"},{"id":21,"level":"intermediate","q":"What is the difference between git reset, git revert, and git restore?","a":"<code>git reset</code> moves the branch pointer (rewrites history — local only). <code>git revert HASH</code> creates a new commit that undoes a previous one (safe for shared branches). <code>git restore file</code> discards working tree changes (does not affect history). <code>git reset --hard HASH</code> moves branch pointer and discards all changes since. Use revert for public branches, reset for local cleanup.<br><br><b>🔑 Plain terms:</b> reset moves the branch pointer backwards (rewrites history — local only!). revert creates a new 'undo commit' (safe for shared branches). restore only touches working tree files.<br><b>💡 Example:</b> <pre><code># restore — discard file changes (no history impact):\ngit restore file.py              # discard unstaged changes\ngit restore --staged file.py    # unstage\n\n# reset — move branch pointer (local only!):\ngit reset --soft HEAD~1         # undo commit, keep in staging\ngit reset HEAD~1                # undo commit, keep in working tree\ngit reset --hard HEAD~1         # undo commit AND discard changes\n\n# revert — safe undo for PUSHED commits:\ngit revert abc1234              # creates new commit that undoes abc1234\ngit push                        # safe — history preserved, no rewriting\n\n# Decision tree:\n# File not yet staged?              → git restore file.py\n# File staged but not committed?    → git restore --staged file.py\n# Local commit not yet pushed?      → git reset HEAD~1\n# Commit already pushed?            → git revert abc1234</code></pre>"},{"id":22,"level":"intermediate","q":"What is git reflog and how does it save you?","a":"<code>git reflog</code> records every movement of HEAD — even after resets, amends, and rebases that would normally make commits unreachable. It is your safety net. Recover a \"lost\" commit: <code>git reflog</code> → find commit hash → <code>git checkout HASH</code> or <code>git branch recover HASH</code>. Reflog is local only, not pushed. Entries expire after 90 days by default.<br><br><b>🔑 Plain terms:</b> reflog is Git's black box flight recorder — every position HEAD has ever been at, even after resets. You basically can't lose committed work within 90 days — reflog will save you.<br><b>💡 Example:</b> <pre><code># View reflog:\ngit reflog\n# abc1234 HEAD@{0}: commit: Add OAuth\n# def5678 HEAD@{1}: reset: moving to HEAD~1   <- the dangerous reset\n# ghi9012 HEAD@{2}: commit: Add JWT\n\n# Scenario: ran git reset --hard HEAD~5 and regret it:\ngit reflog                      # find state before the reset\ngit reset --hard ghi9012        # jump back — commits restored!\n\n# Or create a rescue branch:\ngit branch rescue-branch ghi9012\n\n# Also useful after a bad rebase:\ngit reflog                      # find pre-rebase state\ngit reset --hard HEAD@{5}       # restore to before rebase</code></pre>"},{"id":23,"level":"intermediate","q":"What is git bisect and how do you use it to find a bug?","a":"Binary search through history to find which commit introduced a bug. <code>git bisect start</code>. <code>git bisect bad</code> (current is broken). <code>git bisect good v2.0</code> (known good commit). Git checks out midpoint. Test. <code>git bisect good/bad</code>. Repeat until Git identifies the first bad commit. Automate: <code>git bisect run ./test.sh</code>. End: <code>git bisect reset</code>. Finds bugs in O(log n) steps.<br><br><b>🔑 Plain terms:</b> bisect uses binary search to find which commit introduced a bug. Instead of checking 1000 commits manually, it takes only 10 steps. Automated bisect runs your test suite at each step.<br><b>💡 Example:</b> <pre><code># Manual bisect:\ngit bisect start\ngit bisect bad                      # current HEAD is broken\ngit bisect good v2.3.0              # this version was known good\n\n# Git checks out midpoint. Test it. Then:\ngit bisect good                     # this one is OK, bug is later\n# or:\ngit bisect bad                      # this one is broken, bug is earlier\n# Repeat ~10 times -> Git identifies the exact bad commit\n\n# Automated bisect (much better!):\ngit bisect start HEAD v2.3.0\ngit bisect run ./test.sh            # exit 0=good, non-zero=bad\n# Git runs test.sh automatically at each midpoint\n\n# End bisect:\ngit bisect reset                    # returns to original HEAD</code></pre>"},{"id":24,"level":"intermediate","q":"What is a fork vs a clone and what is the fork-PR workflow?","a":"Clone: a local copy of any repo. Fork: a server-side copy under your account (GitHub/GitLab). Fork-PR workflow for open source: 1. Fork the repo on GitHub. 2. Clone your fork. 3. Add upstream: <code>git remote add upstream URL</code>. 4. Create a feature branch. 5. Push to your fork. 6. Open PR from fork:branch to upstream:main. Keep fork current: <code>git fetch upstream; git rebase upstream/main</code>.<br><br><b>🔑 Plain terms:</b> Fork = make your own copy on GitHub where you have full write access. Clone = download any repo to your laptop. Fork to contribute to projects you don't own; clone to work locally.<br><b>💡 Example:</b> <pre><code># Open-source contribution workflow:\n# 1. Fork on GitHub (click Fork button)\n\n# 2. Clone your fork:\ngit clone https://github.com/YOU/repo.git\ncd repo\n\n# 3. Add original as upstream:\ngit remote add upstream https://github.com/ORIGINAL/repo.git\ngit remote -v\n# origin   https://github.com/YOU/repo.git\n# upstream https://github.com/ORIGINAL/repo.git\n\n# 4. Create feature branch, work, push to YOUR fork:\ngit switch -c fix/login-bug\ngit push origin fix/login-bug\n\n# 5. Open Pull Request on GitHub: YOUR fork -> ORIGINAL repo\n\n# Stay in sync with original:\ngit fetch upstream\ngit rebase upstream/main</code></pre>"},{"id":25,"level":"intermediate","q":"What is git submodule and when should you use it?","a":"A submodule embeds one Git repo inside another at a specific commit. Add: <code>git submodule add URL path</code>. Clone a repo with submodules: <code>git clone --recurse-submodules URL</code>. Update: <code>git submodule update --remote</code>. Tracked in <code>.gitmodules</code>. Useful for shared libraries pinned to a version. Downsides: complex workflow, easy to forget to push submodule changes. Alternatives: git subtree, package managers.<br><br><b>🔑 Plain terms:</b> A submodule embeds one Git repo inside another at a pinned commit. Useful for pinning a library's source code. Downside: complex workflow — teammates must use --recurse-submodules or submodule dirs are empty.<br><b>💡 Example:</b> <pre><code># Add a submodule:\ngit submodule add https://github.com/lib/utils.git vendor/utils\ngit commit -m \"Add utils as submodule\"\n\n# Clone a repo that has submodules:\ngit clone --recurse-submodules https://github.com/you/repo.git\n# Without --recurse-submodules: subdirectory will be EMPTY (common gotcha!)\n\n# If you forgot --recurse-submodules:\ngit submodule update --init --recursive\n\n# Update submodule to latest:\ncd vendor/utils && git pull origin main\ncd ../..\ngit add vendor/utils\ngit commit -m \"Update utils to latest\"\n\n# Alternative: use package managers (npm, pip, cargo) — simpler workflow</code></pre>"},{"id":26,"level":"intermediate","q":"What is git blame and how do you use it effectively?","a":"<code>git blame file</code> annotates each line with the last commit that modified it — shows commit hash, author, date. Find who wrote a specific line: <code>git blame -L 40,60 file</code> (lines 40–60). Ignore whitespace: <code>-w</code>. Show original commit (detects moved lines): <code>-C</code>. In VS Code: GitLens shows inline blame. Then <code>git show HASH</code> to see the full context of that change.<br><br><b>🔑 Plain terms:</b> git blame annotates every line with who last changed it and when. It's not about blaming people — it's archaeology for code. Follow up with git show <hash> to read the full commit explaining WHY.<br><b>💡 Example:</b> <pre><code># Blame a file:\ngit blame src/auth.py\n# abc1234 (Alice 2024-03-15) def authenticate(user, password):\n# def5678 (Bob   2024-04-01)     return check_hash(user.password_hash, password)\n\n# Blame specific lines only:\ngit blame -L 40,60 src/auth.py\n\n# Found a suspicious commit? Investigate the full context:\ngit show abc1234            # see full diff and commit message explaining WHY\n\n# Find when a function was introduced:\ngit log -S \"def authenticate\" --all -- src/auth.py</code></pre>"},{"id":27,"level":"intermediate","q":"What is git worktree and when is it useful?","a":"<code>git worktree</code> checks out multiple branches simultaneously in separate directories from the same repository clone — no need for multiple clones. <code>git worktree add ../hotfix hotfix-branch</code>. List: <code>git worktree list</code>. Remove: <code>git worktree remove ../hotfix</code>. Useful for: reviewing a PR while working on another feature, building a release branch without stashing, running tests on multiple branches simultaneously.<br><br><b>🔑 Plain terms:</b> git worktree checks out multiple branches simultaneously in different directories — without cloning the repo twice. Perfect for reviewing a PR while actively working on a feature.<br><b>💡 Example:</b> <pre><code># Currently working on feature/auth\n# Need to urgently review teammate's feature/dashboard PR:\n\n# WITHOUT worktree: stash everything, switch, review, switch back\n# WITH worktree: just open a second directory!\ngit worktree add ../review-dashboard feature/dashboard\n\n# Now:\n# ~/project/           <- your feature/auth (untouched!)\n# ~/review-dashboard/  <- feature/dashboard checked out here\n\n# Open review-dashboard in another terminal for review.\n# When done:\ngit worktree remove ../review-dashboard\n\n# List active worktrees:\ngit worktree list</code></pre>"},{"id":28,"level":"intermediate","q":"What is a Git hook and how do you use pre-commit hooks?","a":"Hooks are scripts in <code>.git/hooks/</code> that run at specific Git events. <code>pre-commit</code>: run before a commit (lint, format, tests). <code>commit-msg</code>: validate commit message. <code>pre-push</code>: run before push. <code>post-merge</code>: run after merge (e.g. npm install). Make executable: <code>chmod +x .git/hooks/pre-commit</code>. Share with team via <code>pre-commit</code> framework (Python tool) and <code>.pre-commit-config.yaml</code>.<br><br><b>🔑 Plain terms:</b> Git hooks are scripts that auto-run at key Git events. Pre-commit catches lint errors and secrets in code before they enter the repo's history. Use the pre-commit tool to share hooks with your team.<br><b>💡 Example:</b> <pre><code># Hooks live in .git/hooks/ (not committed to repo):\nls .git/hooks/          # pre-commit.sample, commit-msg.sample ...\n\n# Create a pre-commit hook:\ncat > .git/hooks/pre-commit << 'EOF'\n#!/bin/bash\nset -e\necho \"Running lint...\"\nflake8 .                # fail if linting errors\necho \"Running tests...\"\npython -m pytest tests/ -q\nEOF\nchmod +x .git/hooks/pre-commit\n# Now git commit runs lint + tests first!\n\n# Share hooks with team — use pre-commit tool:\n# pip install pre-commit\n# Create .pre-commit-config.yaml:\n# repos:\n#   - repo: https://github.com/pycqa/flake8\n#     rev: 6.0.0\n#     hooks: [{id: flake8}]\npre-commit install       # installs hooks for all team members</code></pre>"},{"id":29,"level":"intermediate","q":"What does git log --graph look like and how do you read it?","a":"<code>git log --oneline --graph --all --decorate</code> shows a text-based branch graph. <code>*</code> is a commit. Lines show parent relationships. <code>|</code> vertical, <code>/</code> and <code>\\</code> branches and merges. Labels: <code>HEAD -&gt; main</code>, <code>origin/main</code>, tag names. Diverging branches appear as parallel lines merging at merge commits. Use this to understand branching strategy and spot stray commits.<br><br><b>🔑 Plain terms:</b> The --graph output is a subway map of your project's history. * is a commit, | is track, backslash and forward slash are where branches split or merge. Labels show which branch each commit belongs to.<br><b>💡 Example:</b> <pre><code># The command:\ngit log --oneline --graph --all --decorate\n\n# Reading the output:\n# * abc1234 (HEAD -> main) Latest commit on main\n# * def5678 Fix button styling\n# | * ghi9012 (feature/auth) Add OAuth\n# | * jkl3456 Add JWT middleware\n# |/           <- branches diverged here\n# * mno7890 Initial commit\n\n# When branches merge:\n# *   pqr2345 Merge branch 'feature/auth'\n# |\\\n# | * ghi9012 Add OAuth\n# * | stu6789 Fix bug on main\n# |/\n# * mno7890 Initial commit\n\n# Set up as a permanent alias:\ngit config --global alias.lg \"log --oneline --graph --all --decorate\"\ngit lg</code></pre>"},{"id":30,"level":"intermediate","q":"What is git clean and when do you use it?","a":"<code>git clean</code> removes untracked files from the working tree. <code>-n</code> dry run (shows what would be removed — always do this first). <code>-f</code> force (actually removes). <code>-d</code> removes untracked directories. <code>-x</code> removes gitignored files too (useful for a clean build). <code>-i</code> interactive. Example: <code>git clean -nfd</code> preview, then <code>git clean -fd</code>. Combined with <code>git reset --hard</code> gives a completely clean state.<br><br><b>🔑 Plain terms:</b> git clean removes untracked files — files Git doesn't know about. Always run -n (dry run) first to see what would be deleted — there's no undo.<br><b>💡 Example:</b> <pre><code># ALWAYS dry run first:\ngit clean -n                # show what WOULD be deleted\ngit clean -nd               # show files AND directories\ngit clean -ndx              # show files, dirs, AND gitignored files\n\n# Then actually delete:\ngit clean -f                # delete untracked files\ngit clean -fd               # files + untracked directories\ngit clean -fdx              # everything including gitignored\n\n# Common use — completely fresh build state:\ngit reset --hard HEAD       # undo all uncommitted changes\ngit clean -fdx              # remove all untracked + build artifacts\n# Now: identical to a fresh git clone\n\n# Use case — build acting weird:\ngit clean -fdx && ./build.sh   # nuclear clean then fresh build</code></pre>"},{"id":31,"level":"intermediate","q":"What is sparse checkout and shallow clone?","a":"Shallow clone: <code>git clone --depth 1 URL</code> downloads only the latest commit — no full history. Faster for CI. Deepen: <code>git fetch --unshallow</code>. Sparse checkout: work with only part of a large repository. Enable: <code>git sparse-checkout init --cone; git sparse-checkout set src/module</code>. Only the specified paths are checked out to disk. Useful for monorepos where you only work on one service.<br><br><b>🔑 Plain terms:</b> Shallow clone downloads only the latest commit history. Fast for CI. Sparse checkout lets you work on only one subfolder of a huge monorepo.<br><b>💡 Example:</b> <pre><code># Shallow clone — only latest commit (CI pipelines):\ngit clone --depth 1 https://github.com/org/repo.git\ncd repo\ngit log --oneline | wc -l          # only 1 commit!\ndu -sh .git                        # much smaller .git folder\n\n# Deepen if you need history later:\ngit fetch --unshallow\n\n# Sparse checkout — only one directory of a monorepo:\ngit clone --no-checkout https://github.com/org/monorepo.git\ncd monorepo\ngit sparse-checkout init --cone\ngit sparse-checkout set services/payments\ngit checkout main\n# Only services/payments/ is on disk\n\n# Combine for maximum speed:\ngit clone --depth 1 --sparse https://github.com/org/repo.git\ncd repo && git sparse-checkout set src/myservice</code></pre>"},{"id":32,"level":"intermediate","q":"How do you resolve a detached HEAD state?","a":"Detached HEAD means HEAD points directly to a commit hash, not a branch. Happens after: <code>git checkout HASH</code>, <code>git checkout tag</code>, during rebase. You can commit but the commits won't belong to any branch and are hard to find. Fix: <code>git checkout -b new-branch</code> to create a branch at that commit. Or <code>git checkout main</code> to abandon (use reflog to recover commits). Always prefer <code>git checkout branchname</code> over hash.<br><br><b>🔑 Plain terms:</b> Detached HEAD means HEAD points directly at a commit hash instead of a branch name. Any commits you make are floating — not attached to any branch and easily lost.<br><b>💡 Example:</b> <pre><code># How you get into detached HEAD:\ngit checkout abc1234        # checking out a specific commit hash\ngit checkout v1.5.0         # checking out a tag\n\n# Git warns you:\n# You are in 'detached HEAD' state...\n# If you want to create a new branch, run: git checkout -b <name>\n\n# Safe exploration — just looking around:\ngit checkout v1.5.0\n# look around, run tests\ngit checkout main           # back to normal — no harm done\n\n# If you made commits in detached HEAD and want to keep them:\ngit branch save-my-work     # create branch at current position NOW\ngit checkout main           # then switch back\n\n# Recovery — already left detached HEAD:\ngit reflog                  # find the floating commit hash\ngit branch recover abc1234  # create branch at that hash</code></pre>"},{"id":33,"level":"intermediate","q":"What is git config and what are the configuration levels?","a":"Three levels (each overrides the previous): system (<code>/etc/gitconfig</code>), global (<code>~/.gitconfig</code>), local (<code>.git/config</code>). Set: <code>git config --global user.name \"Alice\"</code>. View all: <code>git config --list --show-origin</code>. Useful settings: <code>core.editor</code>, <code>pull.rebase true</code>, <code>merge.tool</code>, <code>alias.lg \"log --oneline --graph\"</code>, <code>push.default current</code>, <code>init.defaultBranch main</code>.<br><br><b>🔑 Plain terms:</b> git config has three levels: system (all users), global (your account), local (this specific repo). Each overrides the previous. The most important global settings: user.name, user.email, and core.editor.<br><b>💡 Example:</b> <pre><code># Required setup — set your identity:\ngit config --global user.name  \"Your Name\"\ngit config --global user.email \"you@example.com\"\n\n# Set default editor:\ngit config --global core.editor \"code --wait\"    # VS Code\ngit config --global core.editor \"vim\"             # vim\n\n# Useful quality-of-life settings:\ngit config --global pull.rebase true              # rebase on pull\ngit config --global init.defaultBranch main       # new repos start on 'main'\ngit config --global push.default current          # push current branch\n\n# Per-repo override (e.g. work email):\ngit config --local user.email \"you@company.com\"\n\n# View all settings and where they come from:\ngit config --list --show-origin\n\n# Useful aliases:\ngit config --global alias.lg \"log --oneline --graph --all --decorate\"\ngit config --global alias.st \"status -s\"</code></pre>"},{"id":34,"level":"intermediate","q":"What is the difference between origin and upstream remotes?","a":"By convention: <code>origin</code> is your fork or primary remote (where you push). <code>upstream</code> is the original repo you forked from (where you pull updates from). Add upstream: <code>git remote add upstream URL</code>. Fetch upstream changes: <code>git fetch upstream; git rebase upstream/main</code>. You can have as many remotes as needed. <code>git remote -v</code> shows all. Rename: <code>git remote rename origin myremote</code>.<br><br><b>🔑 Plain terms:</b> By convention: origin = your repo (where you push). upstream = the original repo you forked from. If you didn't fork, you usually just have origin.<br><b>💡 Example:</b> <pre><code># View current remotes:\ngit remote -v\n# origin   https://github.com/YOU/repo.git (fetch)\n# origin   https://github.com/YOU/repo.git (push)\n\n# After forking — add upstream:\ngit remote add upstream https://github.com/ORIGINAL/repo.git\ngit remote -v\n# origin   https://github.com/YOU/repo.git\n# upstream https://github.com/ORIGINAL/repo.git\n\n# Stay in sync with upstream (open source workflow):\ngit fetch upstream\ngit rebase upstream/main    # replay your commits on latest upstream\ngit push origin main        # update your fork\n\n# Other remote operations:\ngit remote rename origin myorigin       # rename\ngit remote remove oldremote             # remove\ngit remote set-url origin https://...  # change URL</code></pre>"},{"id":35,"level":"intermediate","q":"How does git handle binary files and large files?","a":"Git stores full copies of every version of binary files — poor for large binaries (images, videos, ML models). Git LFS (Large File Storage) replaces large files with text pointers and stores the actual content on a separate server. Install: <code>git lfs install; git lfs track \"*.psd\"</code>. The <code>.gitattributes</code> file records tracked patterns. <code>git lfs ls-files</code> shows LFS-tracked files. GitHub has a 100MB file limit (1GB for LFS).<br><br><b>🔑 Plain terms:</b> Git stores full binary blobs for every version of every binary file — ML models and videos balloon the repo. Git LFS stores only pointers in git and the actual content on a separate server.<br><b>💡 Example:</b> <pre><code># The problem:\ngit add model_weights.h5        # 500MB file\ngit commit -m \"Add model\"       # .git grows by 500MB per version!\n# After 10 versions: 5GB .git, 10-minute clones\n\n# The solution — Git LFS:\ngit lfs install                 # one-time setup\ngit lfs track \"*.h5\"            # track this file type\ngit lfs track \"*.psd\" \"*.mp4\"\ngit add .gitattributes          # commit the tracking rules\ngit add model_weights.h5        # now LFS handles it\ngit commit -m \"Add model (via LFS)\"\ngit push                        # uploads to LFS storage\n\n# Clone a repo with LFS:\ngit clone https://github.com/org/repo.git  # LFS files auto-downloaded\n\n# Check what's tracked:\ngit lfs ls-files</code></pre>"}],"shell":[{"id":1,"level":"basic","q":"What is a shell script and how do you run one?","a":"A shell script is a text file with shell commands executed sequentially by a shell interpreter. Create: <code>nano script.sh</code>. Run with interpreter: <code>bash script.sh</code>. Make executable: <code>chmod +x script.sh</code> then <code>./script.sh</code>. Or specify interpreter: <code>/bin/bash script.sh</code>. Scripts run in a subshell — changes to variables do not affect the parent shell unless you <code>source script.sh</code> (runs in current shell).<br><br><b>🔑 Plain terms:</b> A shell script is a recipe card — a list of commands executed in order. source runs in the CURRENT shell (environment changes persist). ./script runs in a NEW subshell (changes disappear when it ends).<br><b>💡 Example:</b> <pre><code># Create and run a simple script:\ncat > deploy.sh << 'EOF'\n#!/bin/bash\necho \"Pulling latest code...\"\ngit pull origin main\nsudo systemctl restart myapp\necho \"Done!\"\nEOF\nchmod +x deploy.sh\n./deploy.sh             # runs in subshell\n\n# source — runs in current shell (env changes persist):\nsource ~/.bashrc        # reload bash config into current session\n. ~/.bashrc             # same thing (. is shorthand for source)\n\n# Run without making executable:\nbash deploy.sh          # explicitly use bash interpreter</code></pre>"},{"id":2,"level":"basic","q":"What is a shebang line and why does it matter?","a":"The shebang (<code>#!</code>) on line 1 tells the OS which interpreter to use when running the script as an executable. <code>#!/bin/bash</code> uses bash at a fixed path. <code>#!/usr/bin/env bash</code> finds bash in PATH — more portable across systems where bash may be elsewhere (e.g. macOS with Homebrew). <code>#!/usr/bin/env python3</code> for Python scripts. Without shebang, the OS uses the current shell, which may not be bash.<br><br><b>🔑 Plain terms:</b> The shebang (#!) is the 'language tag' on line 1 — it tells the OS which interpreter to use. Without it, the OS guesses (usually /bin/sh) which may not be bash. Always use #!/usr/bin/env bash for portability.<br><b>💡 Example:</b> <pre><code>#!/usr/bin/env bash\n# ^^^ MUST be line 1, no blank lines before it\n\n# Why /usr/bin/env bash instead of /bin/bash?\n# /bin/bash       = hardcoded path (fails if bash is elsewhere)\n# /usr/bin/env bash = finds bash in $PATH — works everywhere\n\n# Common shebangs:\n#!/usr/bin/env bash     # bash script\n#!/usr/bin/env python3  # python script\n#!/usr/bin/env node     # node.js script\n#!/bin/sh               # POSIX sh (max compatibility)\n\n# Verify which interpreter your script uses:\nhead -1 script.sh       # show just the shebang line\nfile script.sh          # file type including interpreter</code></pre>"},{"id":3,"level":"basic","q":"How do you declare, assign, and use variables in bash?","a":"Assign: <code>name=\"Alice\"</code> — no spaces around <code>=</code>. Use: <code>echo $name</code> or <code>echo \"${name}\"</code> (braces for concatenation: <code>\"${name}s\"</code>). Always quote: <code>echo \"$name\"</code> (prevents word splitting). Readonly: <code>readonly MAX=100</code>. Local inside functions: <code>local var=\"x\"</code>. Integer: <code>declare -i num=5</code>. Arrays: <code>arr=(a b c)</code>. Unset: <code>unset name</code>.<br><br><b>🔑 Plain terms:</b> Variables in bash are strict about spaces: name = 'Alice' FAILS (bash thinks 'name' is a command). name='Alice' WORKS. Always double-quote variables to prevent word-splitting on spaces.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Assign — NO spaces around =:\nname=\"Alice\"\ncount=42\ngreeting=\"Hello, $name!\"\n\n# Use variables:\necho \"$name\"            # Alice  (double quotes are correct)\necho \"${name}s\"         # Alices (braces for concatenation)\n\n# Variable with spaces — ALWAYS double-quote:\nfilename=\"my report.pdf\"\ncat \"$filename\"         # CORRECT: one argument\n# cat $filename         # WRONG: tries to cat 'my' and 'report.pdf' separately\n\n# Capture command output:\ntoday=$(date +%Y-%m-%d)\nfile_count=$(ls | wc -l)\n\n# Default value if unset:\necho \"${TIMEOUT:-30}\"   # prints 30 if TIMEOUT is unset</code></pre>"},{"id":4,"level":"basic","q":"What is the difference between single quotes and double quotes?","a":"Single quotes preserve everything literally — no variable expansion, no escape sequences, no command substitution. <code>echo '$HOME'</code> prints <code>$HOME</code>. Double quotes allow: variable expansion (<code>$VAR</code>), command substitution (<code>$(cmd)</code>), escape sequences (<code>\\\n</code>, <code>\\\t</code>). <code>echo \"$HOME\"</code> prints the path. Rule: use double quotes for variables (prevents word splitting and globbing), single quotes for literal strings.<br><br><b>🔑 Plain terms:</b> Single quotes = zero magic (no variable expansion). Double quotes = variables work inside them. No quotes = maximum danger — word splitting and glob expansion can cause unexpected behaviour.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\nname=\"Alice\"\n\n# Single quotes — everything is literal:\necho '$name'            # $name      (not expanded)\necho '$(date)'          # $(date)    (not expanded)\n\n# Double quotes — variables and commands expand:\necho \"$name\"            # Alice\necho \"$(date)\"          # Mon Apr 15 14:32:18 UTC 2024\necho \"Hello, $name!\"    # Hello, Alice!\n\n# No quotes — DANGEROUS with spaces:\nfile=\"my report.pdf\"\nls $file                # WRONG: splits to 'my' and 'report.pdf'\nls \"$file\"              # CORRECT: one filename\n\n# Rule: use double quotes by default for variables\n# Single quotes: literal strings, regex patterns, SQL</code></pre>"},{"id":5,"level":"basic","q":"How do you pass arguments to a script and what are special variables?","a":"<code>$0</code> script name, <code>$1-$9</code> positional params, <code>${10}</code>+ braces needed. <code>$#</code> number of args, <code>$@</code> all args as separate words (use in loops), <code>$*</code> all args as one string. <code>$?</code> last exit code, <code>$$</code> current PID, <code>$!</code> last background PID. <code>shift N</code> removes first N args. Check required args: <code>if [ $# -lt 2 ]; then echo \"Usage: $0 arg1 arg2\"; exit 1; fi</code>.<br><br><b>🔑 Plain terms:</b> $1, $2... are arguments passed to the script. $# is how many. $@ is 'all of them as separate words'. $? is the last exit code. Always validate argument count at the top of your script.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n# Run as: ./backup.sh /data /backups daily\n\necho \"Script name: $0\"   # ./backup.sh\necho \"Source:      $1\"   # /data\necho \"Destination: $2\"   # /backups\necho \"Frequency:   $3\"   # daily\necho \"Total args:  $#\"   # 3\n\n# Validate argument count early:\nif [[ $# -lt 2 ]]; then\n    echo \"Usage: $0 <source> <destination> [frequency]\"\n    exit 1\nfi\n\n# Loop over ALL arguments safely:\nfor arg in \"$@\"; do       # \"$@\" keeps each arg as a separate word\n    echo \"Processing: $arg\"\ndone\n\n# Special variables:\n# $0 = script name\n# $1-$9 = positional arguments\n# $# = number of arguments\n# $@ = all arguments (use this, not $*)\n# $? = last command exit code (0=success)\n# $$ = current process PID</code></pre>"},{"id":6,"level":"basic","q":"How do you write if/elif/else conditionals in bash?","a":"<code>if [[ condition ]]; then ... elif [[ ... ]]; then ... else ... fi</code>. Use <code>[[ ]]</code> (bash built-in, preferred). Numeric: <code>-eq -ne -lt -gt -le -ge</code>. String: <code>= != -z</code> (empty) <code>-n</code> (non-empty) <code>=~</code> (regex). File: <code>-f</code> (file) <code>-d</code> (dir) <code>-e</code> (exists) <code>-r -w -x</code> (permissions) <code>-s</code> (non-empty). Logical: <code>&amp;&amp;</code> <code>||</code> <code>!</code>. One-liner: <code>command &amp;&amp; echo ok || echo fail</code>.<br><br><b>🔑 Plain terms:</b> Use [[ ]] (double brackets) for all conditions in bash — safer and more powerful than [ ]. Numeric: -eq -gt -lt. String: = !=. File: -f (file), -d (directory), -e (exists).<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Numeric comparison:\ncount=5\nif [[ $count -gt 3 ]]; then\n    echo \"Count is greater than 3\"\nelif [[ $count -eq 3 ]]; then\n    echo \"Count is exactly 3\"\nfi\n\n# String comparison:\nenv=\"production\"\nif [[ \"$env\" == \"production\" ]]; then\n    echo \"CAREFUL — this is prod!\"\nfi\n\n# File checks:\nconfig=\"/etc/myapp/config.yml\"\nif [[ -f \"$config\" ]]; then         # is a regular file?\n    echo \"Config found\"\nelif [[ -d \"$(dirname $config)\" ]]; then   # is a directory?\n    echo \"Dir exists but no config\"\nfi\n\n# Regex match (=~ only in [[]):\nemail=\"user@example.com\"\nif [[ \"$email\" =~ ^[a-z]+@[a-z]+\\.[a-z]+$ ]]; then\n    echo \"Valid email format\"\nfi</code></pre>"},{"id":7,"level":"basic","q":"What are the different loop types in bash?","a":"For range: <code>for i in {1..10}; do echo $i; done</code>. C-style: <code>for ((i=0; i&lt;10; i++)); do ...; done</code>. Over array: <code>for item in \"${arr[@]}\"; do ...; done</code>. Over files: <code>for f in *.txt; do ...; done</code>. While: <code>while [[ $i -lt 10 ]]; do ((i++)); done</code>. Read lines: <code>while IFS= read -r line; do ...; done &lt; file</code>. Until: <code>until [[ $done == true ]]; do ...; done</code>. Break/continue work as expected.<br><br><b>🔑 Plain terms:</b> For loop = do this FOR each item in a list. While loop = keep doing this WHILE a condition is true. Reading a file line by line safely requires: while IFS= read -r line — IFS= preserves spaces, -r prevents backslash interpretation.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# For loop over a list:\nfor server in web1 web2 web3; do\n    echo \"Deploying to $server\"\n    ssh \"$server\" \"sudo systemctl restart myapp\"\ndone\n\n# For loop with numeric range:\nfor i in {1..5}; do\n    echo \"Attempt $i\"\ndone\n\n# For loop over files:\nfor file in /var/log/*.log; do\n    gzip \"$file\"\ndone\n\n# Read file line by line (correct way):\nwhile IFS= read -r line; do    # IFS= preserves spaces; -r no backslash escape\n    echo \"Line: $line\"\ndone < /etc/hosts\n\n# While loop with condition:\nretries=0\nwhile [[ $retries -lt 3 ]]; do\n    ./check_service.sh && break\n    ((retries++))\n    sleep 5\ndone</code></pre>"},{"id":8,"level":"basic","q":"What are exit codes and why do they matter in scripts?","a":"Every command returns an exit code: 0 = success, non-zero = failure. Access: <code>$?</code>. Common codes: 1 general error, 2 misuse, 126 not executable, 127 command not found, 130 Ctrl+C. Set in script: <code>exit 0</code> or <code>exit 1</code>. Use in logic: <code>if grep -q \"pattern\" file; then ...</code>. <code>set -e</code> exits script on any non-zero exit code. Exit codes enable chaining: <code>cmd1 &amp;&amp; cmd2</code> (run cmd2 only if cmd1 succeeds).<br><br><b>🔑 Plain terms:</b> Exit codes are thumbs up (0=success) or thumbs down (non-zero=failure) from every command. && means 'only run if previous succeeded'. || means 'only run if previous failed'. set -e makes your script auto-exit on any failure.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Check exit code:\nls /etc > /dev/null 2>&1\necho $?                 # 0 = success\n\nls /nonexistent > /dev/null 2>&1\necho $?                 # 2 = error\n\n# Chain with && (only if previous succeeded):\ngit pull origin main && ./run_tests.sh && ./deploy.sh\n\n# Chain with || (only if previous FAILED):\n./deploy.sh || { echo \"Deploy FAILED, rolling back\"; ./rollback.sh; exit 1; }\n\n# Use exit code in if statement:\nif grep -q \"nginx\" /etc/hosts; then\n    echo \"Found nginx entry\"\nfi\n\n# Set exit code from your script:\nexit 0      # success\nexit 1      # general error\n\n# Auto-exit on any error (add to top of script):\nset -e</code></pre>"},{"id":9,"level":"basic","q":"How does input/output redirection work?","a":"<code>&gt;</code> stdout to file (overwrite), <code>&gt;&gt;</code> append, <code>2&gt;</code> stderr to file, <code>2&gt;&gt;</code> stderr append, <code>&amp;&gt;</code> both to file, <code>2&gt;&amp;1</code> stderr to same place as stdout, <code>&lt;</code> stdin from file, <code>&lt;&lt; EOF ... EOF</code> heredoc, <code>&lt;&lt;&lt; \"string\"</code> herestring. Discard output: <code>cmd &amp;&gt; /dev/null</code>. Log both to file and screen: <code>cmd 2&gt;&amp;1 | tee log.txt</code>.<br><br><b>🔑 Plain terms:</b> 0=stdin (keyboard), 1=stdout (screen), 2=stderr (error screen). Redirection changes where these go. 2>&1 means 'send stderr to wherever stdout is going'. /dev/null is the trash bin.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Basic redirections:\ncommand > output.txt        # stdout to file (overwrite)\ncommand >> output.txt       # stdout to file (append)\ncommand 2> errors.txt       # stderr only\ncommand 2>/dev/null         # discard errors silently\ncommand &> all.txt          # both stdout and stderr\ncommand 2>&1 | tee all.txt  # both to file AND screen simultaneously\n\n# Heredoc — pass multiline text as stdin:\nmysql -u root << 'SQL'\nCREATE DATABASE myapp;\nGRANT ALL ON myapp.* TO 'appuser'@'localhost';\nSQL\n\n# Herestring — single string as stdin:\ngrep \"pattern\" <<< \"$variable\"\n\n# Cron pattern — log everything:\n0 2 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1</code></pre>"},{"id":10,"level":"basic","q":"How do you read user input in a shell script?","a":"<code>read -p \"Enter name: \" name</code> prompts and reads into variable. <code>read -s</code> silent (passwords). <code>read -t 10</code> timeout 10 seconds. <code>read -n 1</code> read exactly 1 character. <code>read -a arr</code> read into array. Default variable: <code>read</code> without variable name stores in <code>$REPLY</code>. Read from file: <code>read line &lt; file</code>. Read all lines: <code>mapfile -t arr &lt; file</code> (bash 4+).<br><br><b>🔑 Plain terms:</b> read pauses the script and waits for user input. -p shows a prompt, -s is silent (for passwords), -t sets a timeout. Put $REPLY if you don't specify a variable name.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Basic input with prompt:\nread -p \"Enter your name: \" name\necho \"Hello, $name!\"\n\n# Password — input not shown:\nread -sp \"Enter password: \" password\necho                            # newline after hidden input\n\n# Timeout — proceed with default if no answer:\nif read -t 10 -p \"Continue? (y/n): \" answer; then\n    echo \"You answered: $answer\"\nelse\n    echo \"Timed out — using default: yes\"\n    answer=\"y\"\nfi\n\n# Read file line by line:\nwhile IFS= read -r line; do\n    [[ \"$line\" =~ ^#  ]] && continue    # skip comments\n    [[ -z \"$line\"      ]] && continue    # skip blank lines\n    echo \"Config line: $line\"\ndone < config.txt</code></pre>"},{"id":11,"level":"basic","q":"How do you perform arithmetic in bash?","a":"Integer arithmetic with <code>$(( ))</code>: <code>result=$((a + b * 2))</code>. Operators: <code>+ - * / % ** (( ++ -- ))</code>. Increment: <code>((count++))</code> or <code>count=$((count + 1))</code>. Also: <code>let result=a+b</code>. Floating point — use <code>bc</code>: <code>echo \"scale=4; 22/7\" | bc</code>. Or awk: <code>awk \"BEGIN{printf \"%.2f\\\n\", $a/$b}\"</code>. Compare: <code>if (( a > b ))</code>.<br><br><b>🔑 Plain terms:</b> Bash only does integer arithmetic natively with $(( )). For floating point, delegate to bc or awk. $(( )) is cleaner and faster than using expr.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\na=10; b=3\n\n# Integer arithmetic:\necho $((a + b))         # 13\necho $((a - b))         # 7\necho $((a * b))         # 30\necho $((a / b))         # 3   (integer division — truncates)\necho $((a % b))         # 1   (remainder)\necho $((a ** 2))        # 100 (exponent)\n\n# Increment:\ncount=0\n((count++))\n((count += 5))\necho $count             # 6\n\n# Floating point — use bc:\necho \"scale=4; 22/7\" | bc          # 3.1428\n\n# Floating point — use awk:\nawk \"BEGIN { printf \"%.2f\n\", $a / $b }\"  # 3.33\n\n# Arithmetic comparison:\nif (( count > 3 && count < 10 )); then\n    echo \"count is between 3 and 10\"\nfi</code></pre>"},{"id":12,"level":"basic","q":"How do you write and call functions in bash?","a":"Define: <code>greet() { local name=\"$1\"; echo \"Hello, $name\"; }</code> or <code>function greet { ... }</code>. Call: <code>greet \"Alice\"</code>. Arguments inside function: <code>$1 $2 $#</code> (separate from script args). Return values via echo + command substitution: <code>result=$(get_value)</code>. Return codes via <code>return N</code>. Use <code>local</code> to scope variables. Functions must be defined before being called.<br><br><b>🔑 Plain terms:</b> Functions in bash are named reusable blocks. Always use local for variables inside functions — without local, variables are global and pollute the whole script. Return values via echo + command substitution.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Define a function with local variables:\nlog() {\n    local level=\"$1\"\n    local message=\"$2\"\n    echo \"[$(date '+%Y-%m-%d %H:%M:%S')] [$level] $message\"\n}\n\nlog \"INFO\"  \"Starting deployment\"\nlog \"ERROR\" \"Connection failed\"\n\n# Return a value via echo + command substitution:\nget_file_count() {\n    local dir=\"$1\"\n    find \"$dir\" -type f | wc -l\n}\ncount=$(get_file_count /var/log)\necho \"Found $count log files\"\n\n# Return success/failure via exit code:\nis_running() {\n    pgrep -x \"$1\" > /dev/null 2>&1\n}\nif is_running nginx; then\n    echo \"nginx is running\"\nfi</code></pre>"},{"id":13,"level":"basic","q":"How do you use case statements?","a":"<code>case \"$var\" in\n  pattern1) commands ;;\n  pattern2|pattern3) commands ;;\n  *) default ;;\nesac</code>. Patterns support glob: <code>*.txt</code>, <code>[Yy]es</code>, <code>?</code>. Example: <code>case \"$OS\" in\n  Linux) install_apt ;;\n  Darwin) install_brew ;;\n  *) echo \"unsupported\" ; exit 1 ;;\nesac</code>. Cleaner than long if/elif chains for multi-value matching. No fall-through (unlike C) unless using <code>;&amp;</code>.<br><br><b>🔑 Plain terms:</b> case is cleaner than long if/elif chains when checking one variable against many values. Patterns support wildcards (*, ?), alternation (|), and character ranges ([Yy]).<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\naction=\"$1\"\ncase \"$action\" in\n    start)\n        sudo systemctl start myapp\n        echo \"Started myapp\"\n        ;;\n    stop)\n        sudo systemctl stop myapp\n        ;;\n    restart|reload)         # two patterns for same block\n        sudo systemctl restart myapp\n        ;;\n    status)\n        sudo systemctl status myapp\n        ;;\n    [Yy]|[Yy]es)           # match Y, y, Yes, yes\n        echo \"Proceeding...\"\n        ;;\n    \"\")\n        echo \"Error: no action specified\"\n        exit 1\n        ;;\n    *)                      # default: matches anything else\n        echo \"Usage: $0 {start|stop|restart|status}\"\n        exit 1\n        ;;\nesac</code></pre>"},{"id":14,"level":"basic","q":"What are common string operations in bash?","a":"Length: <code>${#str}</code>. Substring: <code>${str:2:5}</code> (start, length). Remove prefix: <code>${str#prefix}</code> (shortest) <code>${str##prefix}</code> (longest). Remove suffix: <code>${str%suffix}</code> <code>${str%%suffix}</code>. Replace first: <code>${str/old/new}</code>. Replace all: <code>${str//old/new}</code>. Uppercase: <code>${str^^}</code>. Lowercase: <code>${str,,}</code>. Default value: <code>${var:-default}</code>. Check set: <code>${var:?error if unset}</code>.<br><br><b>🔑 Plain terms:</b> Bash has built-in string operations using ${} syntax — faster than calling sed or awk for simple operations. ## and %% are the greedy (longest match) versions of # and %.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\npath=\"/home/alice/documents/report.pdf\"\n\n# Length:\necho ${#path}               # 36\n\n# Remove suffix (get filename without extension):\necho ${path%.pdf}           # /home/alice/documents/report\n# Greedy — remove everything from last /:\necho ${path##*/}            # report.pdf  (like basename)\n\n# Remove prefix (get everything after first /):\necho ${path#/}              # home/alice/documents/report.pdf\n\n# Replace:\necho ${path/alice/bob}      # replace first match\necho ${path//o/0}           # replace ALL 'o' with '0'\n\n# Uppercase / lowercase:\nname=\"hello world\"\necho ${name^^}              # HELLO WORLD\necho ${name^}               # Hello world (first char only)\n\n# Default value if variable unset:\necho ${TIMEOUT:-30}         # 30 if TIMEOUT unset</code></pre>"},{"id":15,"level":"basic","q":"What are arrays in bash and how do you use them?","a":"Indexed array: <code>arr=(apple banana cherry)</code>. Access: <code>${arr[0]}</code>. All elements: <code>${arr[@]}</code>. Length: <code>${#arr[@]}</code>. Append: <code>arr+=(date)</code>. Slice: <code>${arr[@]:1:2}</code>. Loop: <code>for item in \"${arr[@]}\"; do ...</code>. Associative array (bash 4+): <code>declare -A map; map[key]=\"value\"; echo \"${map[key]}\"</code>. All keys: <code>${!map[@]}</code>. Delete element: <code>unset arr[1]</code>.<br><br><b>🔑 Plain terms:</b> Arrays in bash are zero-indexed lists. Always use ${arr[@]} (with quotes) to reference all elements — each element stays as one word even if it contains spaces. Associative arrays work like Python dicts.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Indexed array:\nservers=(\"web1\" \"web2\" \"db1\" \"db2\")\n\necho \"${servers[0]}\"        # web1  (first element)\necho \"${#servers[@]}\"       # 4     (count)\n\n# Loop over array:\nfor server in \"${servers[@]}\"; do    # quotes prevent splitting on spaces\n    ping -c 1 \"$server\" &> /dev/null && echo \"$server OK\" || echo \"$server UNREACHABLE\"\ndone\n\n# Append:\nservers+=(\"cache1\")\n\n# Array slice:\necho \"${servers[@]:1:2}\"    # elements at index 1 and 2\n\n# Associative array (bash 4+):\ndeclare -A config\nconfig[host]=\"localhost\"\nconfig[port]=\"5432\"\n\necho \"${config[host]}\"      # localhost\necho \"${!config[@]}\"        # all keys: host port</code></pre>"},{"id":16,"level":"intermediate","q":"What is set -euo pipefail and why should you use it?","a":"<code>set -e</code>: exit script immediately if any command returns non-zero. <code>set -u</code>: treat unset variables as errors (prevents silent bugs from typos). <code>set -o pipefail</code>: a pipeline fails if any command in it fails (without this, <code>false | true</code> succeeds). Together: <code>set -euo pipefail</code> at the top of every serious script. Add <code>-x</code> for debug tracing. Individual command exemptions: <code>cmd || true</code>.<br><br><b>🔑 Plain terms:</b> set -euo pipefail is the safety belt for bash scripts. Without it, bash silently ignores errors and keeps running — scripts can do partial work and leave things broken. Add it to every serious script.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\nset -euo pipefail   # ALWAYS near the top of serious scripts\n# -e = exit if any command fails\n# -u = error on unset variables (catches typos like $USRE instead of $USER)\n# -o pipefail = pipeline fails if ANY command in it fails\n\n# Without pipefail:\n# false | true; echo $?    # prints 0 — 'false' failure is hidden!\n\n# set -u catches typos:\n# echo $DATABSE_URL         # error: DATABSE_URL: unbound variable\n\n# Allow a specific command to fail without exiting:\ngit pull || true                        # don't exit if git pull fails\nvalue=${OPTIONAL_VAR:-\"default\"}        # ok — default handles unset\n\n# Debug mode — shows every command as it runs:\nset -x          # turn on trace\n./some_function\nset +x          # turn off trace</code></pre>"},{"id":17,"level":"intermediate","q":"What is command substitution and process substitution?","a":"Command substitution captures output: <code>today=$(date +%Y-%m-%d)</code>. Nestable. Old backtick form discouraged. Process substitution feeds command output as a file descriptor: <code>diff &lt;(sort file1) &lt;(sort file2)</code> diffs sorted outputs without temp files. <code>&gt;(command)</code> writes to a command. Works in bash/zsh. Useful for: comparing outputs, passing to commands expecting filenames, parallel processing.<br><br><b>🔑 Plain terms:</b> Command substitution $(cmd) captures a command's output as a value. Process substitution <(cmd) makes a command's output look like a file — lets you feed it to commands that expect a filename.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Command substitution — capture output:\ntoday=$(date +%Y-%m-%d)\nhostname=$(hostname -f)\nnum_cpus=$(nproc)\necho \"Running on $hostname with $num_cpus CPUs on $today\"\n\n# Process substitution — treat command output as a file:\n# diff two directories' file lists without temp files:\ndiff <(ls /etc/nginx/sites-available/) <(ls /etc/nginx/sites-enabled/)\n\n# Sort and compare two command outputs:\ndiff <(sort file1.txt) <(sort file2.txt)\n\n# Process substitution vs pipe for loops:\n# pipe version — loop runs in SUBSHELL, variables are lost after:\ncat file.txt | while read line; do count=$((count+1)); done\necho $count   # 0 — count was in a subshell!\n\n# Process substitution — no subshell, variables persist:\nwhile read line; do ((count++)); done < <(cat file.txt)\necho $count   # CORRECT</code></pre>"},{"id":18,"level":"intermediate","q":"How do you handle errors robustly with trap?","a":"<code>trap</code> registers commands on signals or pseudo-signals. Cleanup on exit: <code>trap \"rm -f $tmpfile\" EXIT</code>. Handle errors: <code>trap 'echo \"Error at line $LINENO\"' ERR</code>. Ctrl+C: <code>trap \"echo Interrupted; exit 130\" INT</code>. Ignore signal: <code>trap '' TERM</code>. Reset to default: <code>trap - EXIT</code>. Pattern: declare cleanup function, register it with <code>trap cleanup EXIT ERR</code>. Works with <code>set -e</code> for comprehensive error handling.<br><br><b>🔑 Plain terms:</b> trap registers cleanup code that runs no matter how the script exits — success, error, or Ctrl+C. The EXIT pseudo-signal fires in all cases, guaranteeing temp files are cleaned up even if the script crashes.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\nset -euo pipefail\n\ntmpdir=$(mktemp -d)\nlockfile=/var/run/myapp.lock\n\n# Cleanup runs on ANY exit:\ncleanup() {\n    echo \"Cleaning up...\"\n    rm -rf \"$tmpdir\"\n    rm -f \"$lockfile\"\n}\ntrap cleanup EXIT           # fires on success, error, OR signal\n\n# Handle Ctrl+C:\ntrap 'echo; echo \"Interrupted by user\"; exit 130' INT\n\n# Handle SIGTERM (docker stop, systemctl stop):\ntrap 'echo \"Received SIGTERM, shutting down\"; exit 0' TERM\n\n# Now the script body:\necho \"Working in $tmpdir\"\ncp /etc/important.conf \"$tmpdir/\"\n# ... do work ...\n# Cleanup runs automatically no matter how we exit</code></pre>"},{"id":19,"level":"intermediate","q":"How do you parse command-line options properly?","a":"<code>getopts</code> for POSIX short options: <code>while getopts \":f:v\" opt; do case $opt in f) file=\"$OPTARG\";; v) verbose=1;; \\?) echo \"Unknown: -$OPTARG\"; exit 1;; esac; done; shift $((OPTIND-1))</code>. Long options: use external <code>getopt</code> or manual <code>while</code> loop. Always include a <code>usage()</code> function. Check required options after parsing. Remaining args after <code>--</code> in <code>$@</code>.<br><br><b>🔑 Plain terms:</b> getopts parses short options like -v, -f filename. Built into bash — no external tool needed. Always provide a usage() function — it makes your script professional and self-documenting.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\nusage() {\n    echo \"Usage: $0 [-v] [-e env] [-f config_file]\"\n    echo \"  -v           Verbose mode\"\n    echo \"  -e ENV       Environment: dev|staging|prod [default: dev]\"\n    echo \"  -f FILE      Config file path\"\n    exit 1\n}\n\nverbose=false; env=\"dev\"; config=\"\"\n\nwhile getopts \":ve:f:\" opt; do\n    case \"$opt\" in\n        v) verbose=true ;;\n        e) env=\"$OPTARG\" ;;\n        f) config=\"$OPTARG\" ;;\n        :) echo \"Option -$OPTARG requires an argument\"; usage ;;\n        ?) echo \"Unknown option: -$OPTARG\"; usage ;;\n    esac\ndone\nshift $((OPTIND - 1))   # remove parsed options; $@ = remaining args\n\n# Validate:\n[[ \"$env\" =~ ^(dev|staging|prod)$ ]] || { echo \"Invalid env: $env\"; usage; }\n\n$verbose && echo \"Verbose mode on\"\necho \"Environment: $env\"</code></pre>"},{"id":20,"level":"intermediate","q":"How do you work with temporary files and directories safely?","a":"Use <code>mktemp</code>: <code>tmpfile=$(mktemp)</code> creates a unique temp file. <code>tmpdir=$(mktemp -d)</code> temp directory. Template: <code>mktemp /tmp/myapp.XXXXXX</code>. Always clean up: <code>trap \"rm -rf $tmpdir\" EXIT</code>. Never use predictable names like <code>/tmp/myscript.tmp</code> — TOCTOU race condition + symlink attack. Never create temp files in current directory in shared scripts.<br><br><b>🔑 Plain terms:</b> mktemp creates a guaranteed-unique temp file or directory. Never use predictable names like /tmp/myscript.tmp — it's a security hole (race condition attack). Always clean up with trap EXIT.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\nset -euo pipefail\n\n# Create temp file and directory:\ntmpfile=$(mktemp)           # e.g. /tmp/tmp.aK3j9m\ntmpdir=$(mktemp -d)         # temp directory\n\n# Custom name template:\ntmpfile=$(mktemp /tmp/deploy.XXXXXX)   # XXXXXX = random chars\n\n# Cleanup always runs, even on error:\ntrap 'rm -rf \"$tmpfile\" \"$tmpdir\"' EXIT\n\necho \"Temp file: $tmpfile\"\necho \"Temp dir:  $tmpdir\"\n\n# Safe download pattern:\ncurl -fsSL \"https://example.com/file.tar.gz\" -o \"$tmpfile\"\ntar -xzf \"$tmpfile\" -C \"$tmpdir\"\ncp \"$tmpdir/binary\" /usr/local/bin/\n# Cleanup happens automatically via trap</code></pre>"},{"id":21,"level":"intermediate","q":"What are here-documents and here-strings?","a":"Heredoc passes multi-line text as stdin: <code>cat &lt;&lt; EOF\nline1\n$var\nEOF</code>. Variables expand by default. Quote delimiter to suppress: <code>&lt;&lt; 'EOF'</code>. Strip leading tabs: <code>&lt;&lt;- EOF</code> (use tabs, not spaces). Here-string passes a string: <code>grep \"pat\" &lt;&lt;&lt; \"$var\"</code>. Use cases: writing config files, SQL queries, generating scripts, passing multi-line strings to commands.<br><br><b>🔑 Plain terms:</b> A heredoc passes multiple lines to a command's stdin. Quote the delimiter (<<'EOF') to prevent variable expansion. Use <<-EOF (with a dash) to allow indented heredoc content with tabs.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Basic heredoc — variables are expanded:\ncat > /etc/myapp/config.yml << EOF\ndatabase:\n  host: ${DB_HOST:-localhost}\n  port: ${DB_PORT:-5432}\n  workers: $(nproc)\nEOF\n\n# Quoted heredoc — NO variable expansion (literal text):\ncat > /etc/myapp/template.yml << 'EOF'\ndatabase:\n  host: ${DB_HOST}      # this stays literal\n  port: ${DB_PORT}\nEOF\n\n# Heredoc for multi-line SQL:\nmysql -u root -p\"$DB_PASS\" << 'SQL'\nCREATE DATABASE IF NOT EXISTS myapp;\nGRANT ALL ON myapp.* TO 'appuser'@'localhost';\nFLUSH PRIVILEGES;\nSQL\n\n# Herestring — single string as stdin:\nif grep -q \"error\" <<< \"$log_output\"; then\n    echo \"Errors found in log\"\nfi</code></pre>"},{"id":22,"level":"intermediate","q":"How do you debug a shell script?","a":"Trace execution: <code>bash -x script.sh</code> or add <code>set -x</code> in script (disable with <code>set +x</code>). Syntax check only: <code>bash -n script.sh</code>. Print each command before running: <code>PS4='+ $LINENO: ' bash -x script.sh</code> includes line numbers. ShellCheck: <code>shellcheck script.sh</code> — static analysis tool catching common mistakes. Add <code>echo \"DEBUG: var=$var\"</code> temporarily. Use <code>set -euo pipefail</code> to catch errors early.<br><br><b>🔑 Plain terms:</b> bash -x prints every command before executing it — like watching the script narrate itself. Set PS4 to include the line number so you can pinpoint exactly where things go wrong. ShellCheck catches bugs before they run.<br><b>💡 Example:</b> <pre><code># Run with debug trace:\nbash -x script.sh\n\n# Include line numbers in trace (put at top of script):\nexport PS4='[${BASH_SOURCE}:${LINENO}] '\nset -x\n\n# Example trace output:\n# [script.sh:15] DB_HOST=localhost\n# [script.sh:16] mysql -u root myapp\n# [script.sh:17] echo 'Database initialized'\n\n# Syntax check without executing:\nbash -n script.sh           # prints nothing if OK\n\n# Debug only one section:\nset -x                      # start tracing\ncomplex_function \"$arg\"\nset +x                      # stop tracing\n\n# ShellCheck — static analysis (install: apt install shellcheck):\nshellcheck script.sh\n# Catches: unquoted variables, wrong test syntax, word splitting bugs</code></pre>"},{"id":23,"level":"intermediate","q":"How do you use sed for complex transformations?","a":"In-place edit: <code>sed -i 's/old/new/g' file</code>. Backup: <code>sed -i.bak</code>. Delete lines: <code>sed '/^#/d'</code> (comments) <code>sed '/^$/d'</code> (blank). Print range: <code>sed -n '10,20p'</code>. Insert before line 5: <code>sed '5i\\\new line'</code>. Append after match: <code>sed '/pattern/a\\\new line'</code>. Multi-expression: <code>sed -e 's/a/b/' -e 's/c/d/'</code>. Script file: <code>sed -f script.sed</code>. Address range with regex: <code>sed '/start/,/end/d'</code>.<br><br><b>🔑 Plain terms:</b> sed is find-and-replace on steroids — processes text line by line. The s/old/new/g pattern covers 80% of use cases. -i edits in-place. Always add .bak suffix for a safety backup.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Basic substitution:\necho \"hello world\" | sed 's/world/bash/'    # hello bash\n\n# In-place edit with backup:\nsed -i.bak 's/localhost/192.168.1.10/g' config.txt\n\n# Multiple substitutions:\nsed -e 's/http:/https:/g'     -e 's/old-server/new-server/g'     nginx.conf > nginx_updated.conf\n\n# Delete lines:\nsed '/^#/d' config.txt          # delete comment lines\nsed '/^$/d' config.txt          # delete blank lines\nsed '/^#/d; /^$/d' config.txt   # delete both at once\n\n# Extract line range:\nsed -n '5,10p' server.log\n\n# Bulk update all config files in a directory:\nfind /etc/myapp -name \"*.conf\"     -exec sed -i 's/db.old.com/db.new.com/g' {} +</code></pre>"},{"id":24,"level":"intermediate","q":"How do you use awk for data processing?","a":"Print fields: <code>awk '{print $1, $NF}' file</code>. Custom separator: <code>awk -F: '{print $1}' /etc/passwd</code>. Conditions: <code>awk '$3 > 100 {print $1}' file</code>. Sum: <code>awk '{sum+=$2} END{printf \"Total: %d\\\n\", sum}'</code>. Count: <code>awk '/error/ {count++} END{print count}'</code>. Arrays: <code>awk '{count[$1]++} END{for(k in count) print k, count[k]}' file</code>. Multiple files: <code>awk 'FNR==1{print FILENAME}' *.log</code>.<br><br><b>🔑 Plain terms:</b> awk is a mini-spreadsheet processor. $1, $2... are the fields (columns). $NF is the last field. NR is the line number. BEGIN and END run before/after all lines. Perfect for structured logs and command output.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Print specific columns:\nps aux | awk '{print $1, $2, $11}'          # user, PID, command\n\n# Custom separator — parse /etc/passwd:\nawk -F: '{print $1, $3, $6}' /etc/passwd    # username, UID, home\n\n# Filter rows by condition:\nps aux | awk '$3 > 5.0 {print $11, \"uses\", $3\"% CPU\"}'\n\n# Count and summarise:\nawk '\n    /ERROR/   { errors++ }\n    /WARNING/ { warns++ }\n    END { printf \"Errors: %d, Warnings: %d\n\", errors+0, warns+0 }\n' /var/log/app.log\n\n# Top 5 IPs from nginx log:\nawk '{print $1}' /var/log/nginx/access.log     | sort | uniq -c | sort -rn | head -5\n\n# Reformat df output:\ndf -h | awk 'NR>1 {printf \"%-20s %s used\n\", $6, $5}'</code></pre>"},{"id":25,"level":"intermediate","q":"What are common text processing pipelines?","a":"Top 10 IPs from log: <code>awk '{print $1}' access.log | sort | uniq -c | sort -rn | head -10</code>. Count errors by type: <code>grep \"ERROR\" app.log | awk '{print $5}' | sort | uniq -c | sort -rn</code>. CSV column: <code>cut -d, -f3 data.csv | sort -u</code>. Find large files: <code>find . -type f -size +100M | xargs ls -lh | sort -k5 -rh</code>. JSON with jq: <code>cat data.json | jq '.users[] | .email'</code>. Word frequency: <code>tr -s ' ' '\\\n' &lt; text | sort | uniq -c | sort -rn</code>.<br><br><b>🔑 Plain terms:</b> Unix philosophy: each tool does one thing well, combine them with pipes. These five tools cover 90% of log analysis: grep (filter), awk (extract columns), sort (order), uniq -c (count), head (limit).<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Top 10 IPs hitting your web server:\nawk '{print $1}' /var/log/nginx/access.log     | sort | uniq -c | sort -rn | head -10\n\n# Count HTTP status codes:\nawk '{print $9}' /var/log/nginx/access.log     | sort | uniq -c | sort -rn\n# 15243 200\n#  1028 304\n#   342 404\n\n# Find users consuming most disk space:\nfind /home -maxdepth 2 -name \"*.log\" -printf \"%u %s\n\"     | awk '{user[$1]+=$2} END {for(u in user) print u, user[u]/1024/1024 \"MB\"}'     | sort -k2 -rn\n\n# Disk usage by file extension:\nfind /var/www -type f     | awk -F. '{print $NF}'     | sort | uniq -c | sort -rn | head -10</code></pre>"},{"id":26,"level":"intermediate","q":"How do you write robust scripts for production use?","a":"1. <code>set -euo pipefail</code>. 2. Shebang + check bash version. 3. <code>trap cleanup EXIT ERR</code>. 4. Validate all inputs and env vars. 5. Use <code>mktemp</code> for temp files. 6. Log with timestamps: <code>log() { echo \"[$(date +%Y-%m-%dT%H:%M:%S)] $*\"; }</code>. 7. Idempotent where possible. 8. Run ShellCheck. 9. Handle <code>SIGTERM</code> for graceful shutdown. 10. Use absolute paths or check PATH. 11. Document with usage().<br><br><b>🔑 Plain terms:</b> A production-grade script checks all prerequisites before starting, logs with timestamps, cleans up after itself, and fails loudly rather than silently corrupting data.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\nset -euo pipefail\n\nreadonly SCRIPT_NAME=\"$(basename \"$0\")\"\nreadonly LOG_FILE=\"/var/log/${SCRIPT_NAME%.sh}.log\"\nreadonly LOCK_FILE=\"/var/run/${SCRIPT_NAME%.sh}.lock\"\n\n# Logging helpers:\nlog()  { echo \"[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [INFO]  $*\" | tee -a \"$LOG_FILE\"; }\nwarn() { echo \"[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [WARN]  $*\" | tee -a \"$LOG_FILE\" >&2; }\ndie()  { echo \"[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] [ERROR] $*\" | tee -a \"$LOG_FILE\" >&2; exit 1; }\n\n# Cleanup on exit:\ncleanup() { rm -f \"$LOCK_FILE\"; log \"Finished.\"; }\ntrap cleanup EXIT\n\n# Prerequisite checks:\n[[ -f \"$LOCK_FILE\" ]] && die \"Already running (PID $(cat \"$LOCK_FILE\"))\"\necho \"$$\" > \"$LOCK_FILE\"\ncommand -v curl &>/dev/null    || die \"curl is required\"\n[[ -n \"${DB_URL:-}\" ]]         || die \"DB_URL env var must be set\"\n\nlog \"Starting $SCRIPT_NAME\"\n# ... actual work here ...</code></pre>"},{"id":27,"level":"intermediate","q":"What is the IFS variable and how does it affect word splitting?","a":"IFS (Internal Field Separator) determines how bash splits words. Default: space, tab, newline. Change for CSV: <code>IFS=',' read -ra fields &lt;&lt;&lt; \"$line\"</code>. Preserve newlines: <code>IFS=$'\\\n'</code>. Read lines safely: <code>while IFS= read -r line</code> (empty IFS prevents trimming whitespace). Reset: <code>unset IFS</code>. Critical for: processing CSV/TSV, reading files with spaces in names, splitting on custom delimiters.<br><br><b>🔑 Plain terms:</b> IFS is bash's split character — default splits on space, tab, and newline. Changing IFS lets you parse CSV or colon-separated data. Empty IFS= disables splitting entirely — critical for reading filenames with spaces.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Default IFS causes problems with CSV:\nline=\"Alice,30,New York\"\nread name age city <<< \"$line\"   # WRONG: splits on space\n\n# Fix: change IFS to comma:\nIFS=',' read -r name age city <<< \"$line\"\necho \"$name / $age / $city\"   # Alice / 30 / New York\n\n# Process CSV file:\nwhile IFS=',' read -r name age city; do\n    echo \"Processing: $name from $city\"\ndone < users.csv\n\n# IFS= (empty) — read without trimming whitespace:\nwhile IFS= read -r line; do    # preserves leading spaces\n    echo \"Line: [$line]\"\ndone < config.txt\n\n# Split PATH into array:\nIFS=':' read -ra path_parts <<< \"$PATH\"\nfor p in \"${path_parts[@]}\"; do echo \"$p\"; done</code></pre>"},{"id":28,"level":"intermediate","q":"How do you run processes in parallel in bash?","a":"Background with <code>&amp;</code>: <code>for f in *.gz; do gunzip $f &amp; done; wait</code>. Wait for all: <code>wait</code> or <code>wait $PID</code>. Limit parallelism: <code>for f in *.gz; do gunzip $f &amp; [[ $(jobs -r -p | wc -l) -ge 4 ]] &amp;&amp; wait -n; done</code>. GNU parallel: <code>parallel -j4 gzip ::: *.log</code> (more powerful). xargs parallel: <code>find . -name \"*.py\" | xargs -P4 -I{} python3 process.py {}</code>. Collect exit codes from parallel jobs with <code>wait $pid; echo $?</code>.<br><br><b>🔑 Plain terms:</b> Parallel processing = sending multiple workers to do tasks simultaneously. & starts a job in background; wait blocks until all finish. GNU parallel is cleaner for complex cases.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Parallel with & and wait:\nfor server in web1 web2 web3 db1; do\n    ssh \"$server\" \"sudo apt update && sudo apt upgrade -y\" &\ndone\nwait                    # wait for ALL background jobs\necho \"All servers updated\"\n\n# Collect exit codes — detect failures:\npids=()\nfor file in /data/input/*.csv; do\n    process_file.sh \"$file\" &\n    pids+=($!)\ndone\n\nfailed=0\nfor pid in \"${pids[@]}\"; do\n    wait \"$pid\" || ((failed++))\ndone\n[[ $failed -eq 0 ]] || echo \"WARNING: $failed jobs failed\"\n\n# Limit concurrency (max 4 at a time):\nfor file in /data/*.gz; do\n    gunzip \"$file\" &\n    while (( $(jobs -r | wc -l) >= 4 )); do sleep 0.1; done\ndone\nwait</code></pre>"},{"id":29,"level":"intermediate","q":"What is the difference between [ ], [[ ]], and (( ))?","a":"<code>[ ]</code> POSIX test command — works in sh, requires quoting all variables, no regex. <code>[[ ]]</code> bash built-in — handles unquoted variables safely, supports <code>=~</code> regex, <code>&amp;&amp;</code>/<code>||</code> operators, pattern matching with <code>==</code>. <code>(( ))</code> arithmetic evaluation — for integer comparisons and math: <code>if (( a > b ))</code>. Use <code>[[ ]]</code> for string/file tests in bash, <code>(( ))</code> for numbers. Never use <code>[ ]</code> in bash unless writing for POSIX portability.<br><br><b>🔑 Plain terms:</b> [ ] is the old POSIX test command — fragile with unquoted variables. [[ ]] is the modern bash built-in — safe, supports regex. (( )) is exclusively for integer arithmetic.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# [[ ]] — use this in bash for string and file tests:\nname=\"Alice Smith\"\n[[ \"$name\" == \"Alice Smith\" ]]  # correct\n[[ $name == \"Alice Smith\" ]]    # also works (handles spaces safely in [[]])\n\n# Old [ ] would FAIL with spaces:\n# [ $name == \"Alice Smith\" ]    # ERROR: splits to [ Alice Smith == ... ]\n\n# [[ ]] regex support:\nemail=\"user@example.com\"\nif [[ \"$email\" =~ ^[a-z]+@[a-z]+\\.[a-z]+$ ]]; then\n    echo \"Valid email\"\nfi\n\n# (( )) for arithmetic — no $ needed:\ncount=5\nif (( count > 3 && count < 10 )); then\n    echo \"count is between 3 and 10\"\nfi\n(( count++ ))           # increment\n(( total = a + b ))     # arithmetic assignment\n\n# Summary:\n# [[ ]] -> string/file tests, regex  -> use in bash\n# (( )) -> integer arithmetic        -> use for numbers\n# [ ]   -> only for POSIX /bin/sh portability</code></pre>"},{"id":30,"level":"intermediate","q":"How do you send and receive data over the network in bash?","a":"<code>curl -s URL</code> fetch URL. POST JSON: <code>curl -X POST -H \"Content-Type: application/json\" -d '{\"key\":\"val\"}' URL</code>. <code>wget -q -O - URL</code> download. TCP connection: <code>echo \"GET / HTTP/1.0\" | nc host 80</code>. Check port open: <code>nc -z -w3 host port &amp;&amp; echo open</code>. SSH tunnel: <code>ssh -L 8080:target:80 jumphost</code>. Send file over nc: <code>cat file | nc -l 9999</code> sender, <code>nc host 9999 &gt; file</code> receiver.<br><br><b>🔑 Plain terms:</b> Bash can make HTTP requests with curl, check port connectivity with nc, and call APIs. Essential for scripts that health-check services or trigger webhooks on completion.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Check if a service is up:\ncheck_health() {\n    local url=\"$1\"\n    local http_code\n    http_code=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 5 \"$url\")\n    [[ \"$http_code\" == \"200\" ]]\n}\n\nif check_health \"https://api.example.com/health\"; then\n    echo \"Service is healthy\"\nelse\n    echo \"Service is DOWN\"\n    # Send Slack alert:\n    curl -s -X POST -H 'Content-type: application/json'         --data '{\"text\":\"ALERT: API is down!\"}'         \"$SLACK_WEBHOOK_URL\"\nfi\n\n# POST JSON to an API:\nresponse=$(curl -s -X POST     -H \"Content-Type: application/json\"     -H \"Authorization: Bearer $API_TOKEN\"     -d \"{\"event\":\"deploy\",\"version\":\"$VERSION\"}\"     \"https://api.example.com/events\")\n\n# Check if port is open:\nnc -z -w3 db.example.com 5432 && echo \"DB port open\" || echo \"DB port closed\"</code></pre>"},{"id":31,"level":"intermediate","q":"How do you work with JSON in shell scripts?","a":"Use <code>jq</code>: <code>cat data.json | jq '.name'</code>. Array element: <code>jq '.[0].id'</code>. Filter: <code>jq '.users[] | select(.age > 18) | .name'</code>. Modify: <code>jq '.version = \"2.0\"'</code>. Output raw (no quotes): <code>jq -r</code>. Construct: <code>jq -n --arg name \"Alice\" '{\"name\":$name}'</code>. In loops: <code>jq -c '.items[]' file.json | while IFS= read -r item; do name=$(echo \"$item\" | jq -r '.name'); done</code>. Without jq: use Python one-liner.<br><br><b>🔑 Plain terms:</b> jq is the command-line JSON processor — the grep/awk of JSON. It lets you extract fields, filter arrays, and transform JSON in shell scripts. Use -r for raw output (no quotes around strings).<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# Parse API response:\nresponse=$(curl -s \"https://api.github.com/repos/bash/bash/releases/latest\")\n\n# Extract a field:\nversion=$(echo \"$response\" | jq -r '.tag_name')\necho \"Latest bash version: $version\"\n\n# Extract from array — all download URLs:\necho \"$response\" | jq -r '.assets[].browser_download_url'\n\n# Filter array by condition:\necho \"$response\" | jq -r '.assets[] | select(.content_type == \"application/gzip\") | .name'\n\n# Build JSON output:\njq -n     --arg host \"$(hostname)\"     --arg ts \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"     --argjson cpu \"$(nproc)\"     '{hostname: $host, timestamp: $ts, cpu_cores: $cpu}'\n\n# Process each item in a JSON array:\ncurl -s \"https://api.example.com/servers\"     | jq -r '.[].ip'     | while read -r ip; do\n        ping -c1 \"$ip\" &>/dev/null && echo \"$ip UP\" || echo \"$ip DOWN\"\n    done</code></pre>"},{"id":32,"level":"intermediate","q":"What is a subshell and when is it created?","a":"A subshell is a child process that inherits the parent's environment but changes do not propagate back. Created by: <code>( commands )</code> explicitly, pipes (<code>cmd1 | cmd2</code> — both run in subshells), command substitution <code>$()</code>, background processes <code>&amp;</code>. Variables set in a pipe loop are lost: <code>while read line; do count=$((count+1)); done &lt; file</code> — <code>count</code> reset after loop. Fix: use <code>done &lt; &lt;(cmd)</code> (process substitution, no subshell).<br><br><b>🔑 Plain terms:</b> A subshell is a child process — it inherits all parent variables but changes don't propagate back. Pipes create subshells (both sides). Classic gotcha: variables set inside a pipe loop vanish after the loop.<br><b>💡 Example:</b> <pre><code>#!/bin/bash\n\n# CLASSIC BUG — variable set inside pipe loop doesn't persist:\ncount=0\ncat /etc/passwd | while read -r line; do\n    ((count++))\ndone\necho \"Count: $count\"    # 0 !! loop ran in a subshell\n\n# FIX 1 — redirect file instead of pipe (no subshell):\ncount=0\nwhile read -r line; do\n    ((count++))\ndone < /etc/passwd      # < redirects input, no subshell\necho \"Count: $count\"    # CORRECT!\n\n# FIX 2 — process substitution:\ncount=0\nwhile read -r line; do\n    ((count++))\ndone < <(grep \"nologin\" /etc/passwd)   # < <(cmd) is process substitution\necho \"Count: $count\"    # correct\n\n# Explicit subshell with ( ):\n(\n    cd /tmp\n    ls                  # changes directory in subshell\n)\npwd                     # still in original directory</code></pre>"},{"id":33,"level":"intermediate","q":"How do you use file descriptors and custom redirections?","a":"Default: 0=stdin, 1=stdout, 2=stderr. Open custom FD: <code>exec 3&gt; output.txt</code>. Write: <code>echo \"msg\" &gt;&amp;3</code>. Close: <code>exec 3&gt;&amp;-</code>. Redirect for a code block: <code>{ cmd1; cmd2; } &gt; combined.txt 2&gt;&amp;1</code>. Swap stdout/stderr: <code>cmd 3&gt;&amp;1 1&gt;&amp;2 2&gt;&amp;3</code>. Read from FD: <code>exec 4&lt; input.txt; read -u 4 line</code>. Log to both file and stderr: <code>exec 2&gt; &gt;(tee error.log &gt;&amp;2)</code>.<br><br><b>🔑 Plain terms:</b> File descriptors are numbered channels: 0=stdin, 1=stdout,
