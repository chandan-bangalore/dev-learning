.glob(\"**/*.py\"))</code>. Create dir: <code>p.mkdir(parents=True, exist_ok=True)</code>. Prefer pathlib over <code>os.path</code> for new code."}],"matlab":[{"id":1,"level":"basic","q":"What is MATLAB and what is it used for?","a":"MATLAB (Matrix Laboratory) is a proprietary numerical computing environment by MathWorks. Designed around matrix operations. Used in: signal/image processing, control systems, machine learning, financial modelling, scientific research. Toolboxes extend it (Signal Processing, Statistics, Deep Learning, Control System, Simulink). Alternatives: NumPy/SciPy (Python), Octave (open-source MATLAB-compatible), Julia."},{"id":2,"level":"basic","q":"What are the core data types in MATLAB?","a":"<code>double</code> (default, 64-bit float), <code>single</code> (32-bit), <code>int8/16/32/64</code>, <code>uint8/16/32/64</code>, <code>logical</code> (true/false), <code>char</code> (character array), <code>string</code> (string object, R2016b+), <code>cell</code> (heterogeneous container), <code>struct</code> (named fields), function handle (<code>@</code>). Everything is a matrix by default — a scalar is a 1×1 double matrix."},{"id":3,"level":"basic","q":"How do you create scalars, vectors, and matrices?","a":"Scalar: <code>x = 3.14</code>. Row vector: <code>v = [1 2 3 4]</code>. Column vector: <code>v = [1; 2; 3]</code> or <code>v'</code> (transpose). Matrix: <code>A = [1 2 3; 4 5 6; 7 8 9]</code>. Range: <code>1:5</code>, <code>0:0.1:1</code>. <code>linspace(0,1,11)</code> 11 evenly spaced. <code>zeros(m,n)</code>, <code>ones(m,n)</code>, <code>eye(n)</code> identity, <code>rand(m,n)</code> uniform, <code>randn(m,n)</code> normal, <code>diag(v)</code> diagonal matrix."},{"id":4,"level":"basic","q":"What is the difference between * and .* operators?","a":"<code>*</code> is matrix multiplication: A*B requires compatible dimensions (m×n times n×p). <code>.*</code> is element-wise multiplication: A.*B requires same size (or broadcasting-compatible). Similarly: <code>./</code> element-wise division, <code>.^</code> element-wise power, <code>.\\ </code> element-wise left divide. <code>/</code> and <code>\\ </code> are matrix division (solve linear systems). When unsure, add the dot — it is safer for element-wise intent."},{"id":5,"level":"basic","q":"How does MATLAB indexing work?","a":"1-based indexing. <code>v(3)</code> third element. <code>A(2,3)</code> row 2, col 3. <code>A(end,:)</code> last row. <code>A(1:3,:)</code> first 3 rows. <code>A([1 3 5], 2:end)</code> specific rows. Linear indexing: <code>A(5)</code> column-major order. Logical indexing: <code>v(v > 0)</code>. <code>A(A == 0) = NaN</code> conditional assignment. <code>sub2ind</code>/<code>ind2sub</code> convert between linear and subscript indices. <code>A(:)</code> flattens to column vector."},{"id":6,"level":"basic","q":"What does the semicolon do in MATLAB?","a":"In statements: suppresses output to the Command Window. Without it: MATLAB prints the result. Always suppress in scripts/functions/loops to avoid slowdown and cluttered output. In matrix literals: separates rows: <code>[1 2; 3 4]</code>. Omit semicolons during debugging to inspect intermediate values. Rule: suppress everything in production code, unsuppress for debugging."},{"id":7,"level":"basic","q":"How do you write control flow in MATLAB?","a":"If: <code>if cond; ...; elseif cond; ...; else; ...; end</code>. For: <code>for i = 1:n; ...; end</code>. While: <code>while cond; ...; end</code>. Switch: <code>switch expr; case val; ...; otherwise; ...; end</code>. Break: exits loop. Continue: next iteration. Return: exit function early. Try-catch: <code>try; ...; catch ME; disp(ME.message); end</code>. All blocks end with <code>end</code> keyword."},{"id":8,"level":"basic","q":"How do you define and call functions in MATLAB?","a":"Each function in its own file: <code>function [out1, out2] = fname(in1, in2)\n  ...\nend</code> saved as <code>fname.m</code>. Multiple outputs: <code>[a, b] = fname(x)</code>. Ignore output: <code>[~, idx] = max(v)</code>. Anonymous function: <code>f = @(x) x.^2 + 1</code>. Local functions can follow the main function in the same file. Check arguments: <code>narginchk(min,max)</code>, <code>nargin</code>, <code>nargout</code>."},{"id":9,"level":"basic","q":"How do you create basic plots in MATLAB?","a":"Line: <code>plot(x, y)</code>. Multiple: <code>plot(x, y1, x, y2)</code>. Labels: <code>xlabel(\"x\"); ylabel(\"y\"); title(\"Title\")</code>. Legend: <code>legend(\"sin\",\"cos\")</code>. Grid: <code>grid on</code>. Hold for overlay: <code>hold on; plot(x,y2); hold off</code>. Scatter: <code>scatter(x,y)</code>. Bar: <code>bar(x,y)</code>. Histogram: <code>histogram(data, 30)</code>. Save: <code>saveas(gcf,\"plot.png\")</code> or <code>exportgraphics(gca,\"out.pdf\",\"Resolution\",300)</code>."},{"id":10,"level":"basic","q":"What is the difference between scripts and function files?","a":"Scripts run in the base workspace — all variables persist there. No inputs or outputs. Function files define functions with local scope — variables do not pollute the workspace. Since R2016b, scripts can define local functions after the main code. Best practice: use functions for reusable, testable code; scripts only for top-level workflows. <code>run script.m</code> from Command Window or another script. Functions can be called by name without <code>run</code>."},{"id":11,"level":"basic","q":"How does MATLAB handle strings?","a":"Old style char arrays: <code>s = 'hello'</code> — comparing with <code>strcmp(s1,s2)</code>. Modern string objects (R2016b+): <code>s = \"hello\"</code> — supports <code>==</code> operator. Convert: <code>char(str)</code>, <code>string(charArr)</code>. Operations: <code>strcat, strsplit, strtrim, strrep, contains, startsWith, endsWith, sprintf</code>. Format: <code>s = sprintf(\"Value: %.2f\", x)</code>. Build strings: <code>compose(\"Name: %s, Age: %d\", name, age)</code>. Prefer string objects for new code."},{"id":12,"level":"basic","q":"How do you save and load data in MATLAB?","a":"MAT files: <code>save(\"data.mat\", \"var1\", \"var2\")</code> saves specific variables. <code>save(\"data.mat\")</code> saves all workspace. <code>load(\"data.mat\")</code> loads all. <code>S = load(\"data.mat\"); S.var1</code> loads to struct. CSV: <code>writematrix(M, \"file.csv\")</code>, <code>M = readmatrix(\"file.csv\")</code>. Table: <code>writetable(T, \"file.csv\")</code>, <code>T = readtable(\"file.csv\")</code>. Images: <code>imwrite(img, \"file.png\")</code>, <code>img = imread(\"file.png\")</code>. Audio: <code>audiowrite/audioread</code>."},{"id":13,"level":"basic","q":"What are cell arrays and when do you use them?","a":"Cell arrays (<code>{}</code>) store heterogeneous data of any type and size. Create: <code>c = {1, \"hello\", [1 2 3], {nested}}</code>. Access content: <code>c{2}</code> (curly braces for content). Access cell: <code>c(2)</code> (parentheses — returns a cell, not content). <code>c{end}</code>. Assign: <code>c{5} = new_val</code>. Create empty: <code>cell(m,n)</code>. Common use: storing strings of different lengths, function return values of mixed types, lists of matrices of different sizes."},{"id":14,"level":"basic","q":"What are structs and struct arrays?","a":"Struct: <code>s.name = \"Alice\"; s.age = 30; s.scores = [90 85 92]</code>. Access: <code>s.name</code>. Dynamic field: <code>s.(fieldname)</code>. Create with <code>struct()</code>: <code>s = struct(\"name\",\"Alice\",\"age\",30)</code>. Field names: <code>fieldnames(s)</code>. Check field: <code>isfield(s,\"age\")</code>. Remove: <code>rmfield(s,\"age\")</code>. Struct array: <code>s(2).name = \"Bob\"</code> — vectorised field access: <code>[s.age]</code> returns array of ages. Use for records/objects."},{"id":15,"level":"basic","q":"How does the colon operator work in MATLAB?","a":"Range: <code>1:5</code> → [1 2 3 4 5]. Step: <code>0:0.5:2</code> → [0 0.5 1 1.5 2]. Reverse: <code>10:-1:1</code>. All elements: <code>A(:,2)</code> all rows, column 2. <code>A(3,:)</code> row 3. Flatten: <code>A(:)</code> column-major vector. In reshape: <code>A(:) = 1:6</code>. In for: <code>for i = 1:n</code>. Avoid using colon inside performance-critical loops when vectorization is possible."},{"id":16,"level":"intermediate","q":"What is vectorization in MATLAB and why is it critical for performance?","a":"MATLAB is an interpreted language — for loops have high overhead. Vectorization replaces loops with array operations executed in optimised C/FORTRAN. Example: <code>for i=1:n; y(i)=sin(x(i))*cos(x(i)); end</code> → <code>y = sin(x).*cos(x)</code>. 10-100x speedup typical. MATLAB JIT has improved, but vectorization is still faster. Profile with <code>profile on; ... profile viewer</code>. Pre-allocate arrays to avoid repeated memory allocation: <code>result = zeros(1,n)</code> before the loop."},{"id":17,"level":"intermediate","q":"What is implicit expansion (broadcasting) in MATLAB?","a":"Since R2016b, MATLAB supports implicit expansion: operations between compatible-sized arrays automatically broadcast. Rules: compatible if sizes are equal or one of them is 1 in that dimension. Example: (5×1) + (1×3) → (5×3). <code>A = (1:5)'; B = 1:3; A + B</code> creates a 5×3 matrix. Replaces old <code>bsxfun(@plus, A, B)</code> (still works). Applies to all arithmetic operators and many functions. Eliminates <code>repmat</code> calls."},{"id":18,"level":"intermediate","q":"How do you use logical indexing effectively in MATLAB?","a":"Logical index: <code>v(v > 0)</code> selects positive elements. Assignment: <code>A(A < 0) = 0</code> clip negatives. Combined: <code>v(v > 0 &amp; v &lt; 10)</code>. Find indices: <code>idx = find(v > 0)</code> returns linear indices. 2D: <code>A(A > mean(A(:)))</code>. Replace based on another array: <code>result(mask) = source(mask)</code>. Logical operations: <code>&amp;</code> AND, <code>|</code> OR, <code>~</code> NOT, <code>xor</code>. <code>any(v > 0)</code>, <code>all(v > 0)</code>. <code>sum(v > 0)</code> counts True elements."},{"id":19,"level":"intermediate","q":"How do you create subplots and customise figures in MATLAB?","a":"Old: <code>subplot(2,3,1); plot(x,y)</code> — subplot(rows, cols, idx). Tiled (R2019b+): <code>t = tiledlayout(2,3,\"TileSpacing\",\"compact\"); nexttile; plot(x,y); nexttile; scatter(a,b)</code>. Figure size: <code>figure(\"Position\",[100 100 900 600])</code>. Axes properties: <code>ax = gca; ax.FontSize = 14; ax.LineWidth = 1.5</code>. Color: <code>ax.ColorOrder = myColors</code>. Style: <code>plot(x,y,\"r--o\",\"LineWidth\",2,\"MarkerSize\",8)</code>. Colormap: <code>colormap(ax, \"parula\")</code>."},{"id":20,"level":"intermediate","q":"How do you read and write various file types in MATLAB?","a":"CSV/text: <code>readmatrix, readtable, writematrix, writetable</code>. Excel: <code>readtable(\"file.xlsx\",\"Sheet\",\"Sheet2\")</code>, <code>writecell/writematrix</code>. Low-level text: <code>fid=fopen(\"f.txt\",\"r\"); data=fscanf(fid,\"%f %f\",[2 Inf])'</code>; <code>fclose(fid)</code>. HDF5: <code>h5read/h5write</code>. Binary: <code>fread(fid, count, \"float32\")</code>. JSON: <code>jsondecode(fileread(\"f.json\"))</code>. Images: <code>imread/imwrite/imfinfo</code>. Audio: <code>audioread/audiowrite</code>."},{"id":21,"level":"intermediate","q":"How does cellfun and arrayfun work, and when are they appropriate?","a":"<code>cellfun(@func, C)</code> applies func to each cell. Non-uniform output: <code>cellfun(@func, C, \"UniformOutput\", false)</code>. <code>arrayfun(@(x) x^2, v)</code> applies to each element. <code>arrayfun(@func, A, B)</code> two inputs. Performance note: <code>arrayfun</code> is not faster than a loop — it is a loop with overhead. Use only for convenience when vectorization is awkward. For performance, true vectorization (array operations) is always preferred. Use cellfun for cell arrays where vectorization isn't possible."},{"id":22,"level":"intermediate","q":"What are function handles, anonymous functions, and closures in MATLAB?","a":"Function handle: <code>fh = @sin</code>. Call: <code>fh(pi)</code>. Anonymous: <code>f = @(x,y) x.^2 + y.^2</code>. Closures capture workspace variables at creation: <code>a=3; f = @(x) a*x</code> — f always uses a=3. Pass to math functions: <code>fplot(f, [0 2*pi])</code>, <code>fzero(f, 0)</code>, <code>integral(f, 0, 1)</code>, <code>fminsearch(f, x0)</code>. Arrays of handles: <code>fns = {@sin, @cos, @tan}</code>."},{"id":23,"level":"intermediate","q":"How do you handle NaN, Inf, and numerical edge cases?","a":"Check: <code>isnan(x)</code>, <code>isinf(x)</code>, <code>isfinite(x)</code>. NaN propagates: <code>5 + NaN = NaN</code>. NaN-ignoring functions: <code>nanmean, nansum, nanmax, nanmin, nanstd</code>. Replace: <code>x(isnan(x)) = 0</code>. <code>Inf - Inf = NaN</code>. <code>0/0 = NaN</code>. <code>1/0 = Inf</code> (with warning). <code>eps</code> = machine epsilon (2.2e-16). Compare floats: <code>abs(a-b) &lt; tol</code> not <code>a == b</code>. <code>realmax</code>, <code>realmin</code> are largest/smallest finite doubles."},{"id":24,"level":"intermediate","q":"How do you use MATLAB for signal processing basics?","a":"FFT: <code>N=length(x); Y=fft(x); f=(0:N-1)*Fs/N; plot(f(1:N/2), abs(Y(1:N/2))*2/N)</code>. Power spectral density: <code>pwelch(x,[],[],[],Fs)</code>. Filter design: <code>[b,a]=butter(4,fc/(Fs/2))</code>. Apply: <code>y=filter(b,a,x)</code> or <code>y=filtfilt(b,a,x)</code> (zero-phase). Spectrogram: <code>spectrogram(x,hamming(256),128,512,Fs,\"yaxis\")</code>. Convolution: <code>conv(x,h,\"same\")</code>. Correlation: <code>xcorr(x,y)</code>."},{"id":25,"level":"intermediate","q":"What are MATLAB tables and when do you use them?","a":"Tables store heterogeneous columnar data with named columns (like a DataFrame). Create: <code>T = table(names, ages, scores, \"VariableNames\",{\"Name\",\"Age\",\"Score\"})</code>. Read: <code>T = readtable(\"file.csv\")</code>. Access column: <code>T.Age</code> or <code>T{:,\"Age\"}</code>. Filter: <code>T(T.Age > 18, :)</code>. Add column: <code>T.NewCol = values</code>. Join: <code>outerjoin(T1, T2, \"Keys\",\"ID\")</code>. Summary: <code>summary(T)</code>. Convert to matrix: <code>table2array(T)</code>. Ideal for mixed-type datasets."},{"id":26,"level":"intermediate","q":"How do you optimise MATLAB code for speed?","a":"1. Pre-allocate arrays: <code>result = zeros(1,n)</code> not growing in a loop. 2. Vectorize — replace loops with array operations. 3. Use in-place operations. 4. Profile first: <code>profile on; ...; profile viewer</code>. 5. Use <code>single</code> precision to halve memory and potentially speed up. 6. Avoid dynamic field names in structs inside loops. 7. Use <code>parfor</code> for embarrassingly parallel loops (Parallel Computing Toolbox). 8. Call MEX files for C-speed critical sections. 9. Use <code>tic/toc</code> for timing."},{"id":27,"level":"intermediate","q":"How does MATLAB handle regular expressions?","a":"<code>regexp(str, pattern)</code> returns start indices. <code>regexp(str, pattern, \"match\")</code> returns matched strings. <code>regexp(str, pattern, \"tokens\")</code> returns capture groups. <code>regexprep(str, pattern, replacement)</code> replace. Case-insensitive: <code>regexpi</code>. Named tokens: <code>(?&lt;name&gt;pattern)</code>. Lookahead: <code>(?=...)</code>. Same syntax as Perl regex. Example: extract numbers from string: <code>nums = regexp(str, \"\\d+\\.?\\d*\", \"match\")</code> → cell of number strings."},{"id":28,"level":"intermediate","q":"What is the difference between nargin, nargout, inputParser?","a":"<code>nargin</code>: number of input arguments passed to the function. <code>nargout</code>: number of output arguments requested. Pattern: <code>if nargin &lt; 2; opt = default; end</code>. <code>varargin</code>/<code>varargout</code>: variable arg lists as cell arrays. <code>inputParser</code> (modern): <code>p=inputParser; addRequired(p,\"x\"); addOptional(p,\"tol\",1e-6); addParameter(p,\"Method\",\"fast\"); parse(p,x,varargin{:}); results=p.Results</code>. <code>arguments</code> block (R2019b+): even cleaner, with type validation."},{"id":29,"level":"intermediate","q":"How do you use MATLAB for matrix operations and linear algebra?","a":"Solve Ax=b: <code>x = A \\ b</code> (backslash, uses LU/QR/etc. as appropriate). Inverse (avoid for solving): <code>inv(A)</code>. Determinant: <code>det(A)</code>. Eigenvalues: <code>[V,D]=eig(A)</code>. SVD: <code>[U,S,V]=svd(A)</code>. QR: <code>[Q,R]=qr(A)</code>. Rank: <code>rank(A)</code>. Norm: <code>norm(v)</code>, <code>norm(A,\"fro\")</code>. Least squares: <code>x = A \\ b</code> when A is non-square. Condition number: <code>cond(A)</code>. Cholesky: <code>R=chol(A)</code>."},{"id":30,"level":"intermediate","q":"How does parfor work for parallel loops?","a":"<code>parfor i = 1:n; result(i) = expensive_func(i); end</code> distributes iterations across parallel workers (requires Parallel Computing Toolbox). Start pool: <code>parpool(4)</code>. Restrictions: loop iterations must be independent (no data dependencies between iterations). Each iteration must be a scalar index. Variables classified as: sliced (output arrays), broadcast (read-only), reduced (accumulated with associative ops), temporary (local to iteration). Overhead for small tasks — only worth it for computationally heavy iterations."},{"id":31,"level":"intermediate","q":"What are MATLAB containers.Map and when to use it?","a":"<code>containers.Map</code> is a hash map (dictionary). Create: <code>m = containers.Map({\"a\",\"b\"},{1,2})</code>. Access: <code>m(\"a\")</code>. Add/update: <code>m(\"c\") = 3</code>. Keys: <code>keys(m)</code>. Values: <code>values(m)</code>. Check: <code>isKey(m,\"a\")</code>. Remove: <code>remove(m,\"a\")</code>. Use when you need O(1) key-value lookup. Compared to struct: supports dynamic keys and any key type (numbers, strings). Slower than struct for known fixed keys."},{"id":32,"level":"intermediate","q":"What is MEX and when do you use it?","a":"MEX (MATLAB EXecutable) files are C/C++/Fortran functions compiled to shared libraries callable from MATLAB. Use when: a computational bottleneck cannot be vectorised, you need to interface with existing C/C++ code, or you need fine-grained memory control. Create: write <code>myfile.c</code> with <code>#include \"mex.h\"</code> and <code>mexFunction</code> entry point. Compile: <code>mex myfile.c</code>. Call: <code>myfile(args)</code>. Provides near-C performance for loops that cannot be vectorised."}],"arm":[{"id":1,"level":"basic","q":"What is SIMD and why does it matter?","a":"SIMD (Single Instruction, Multiple Data) applies one instruction to multiple data elements in parallel. A 128-bit register can hold 4 floats or 16 int8s — one add instruction processes all of them simultaneously. Critical for: DSP, video/image processing, ML inference, audio codecs, cryptography. Typical speedups: 4x (float32), 8x (float16), 16x (int8) over scalar code. All modern CPUs (ARM, x86, RISC-V) have SIMD extensions."},{"id":2,"level":"basic","q":"What is ARM NEON?","a":"NEON is ARM's Advanced SIMD ISA extension, available on Cortex-A and most Cortex-R processors. 32 vector registers in AArch64 (128-bit each, named v0-v31). 16 registers in AArch32 (64 or 128-bit, named d0-d15/q0-q15). Supports: 8/16/32/64-bit integer, 16/32/64-bit float, polynomial ops. NEON is mandatory in AArch64. Used in: Android/iOS apps, embedded Linux, Apple Silicon (which extends it further)."},{"id":3,"level":"basic","q":"What is RISC-V Vector Extension (RVV)?","a":"RVV is RISC-V's scalable vector ISA (ratified as v1.0 in 2021). Key differentiator: variable-length vectors. VLEN (vector register length in bits) is determined by hardware implementation — can be 128, 256, 512, 1024 bits or more. Code runs unchanged on any VLEN. 32 vector registers v0-v31. Configuration: SEW (Selected Element Width), LMUL (Length Multiplier). Used in: SiFive, Alibaba T-Head, SpacemiT chips."},{"id":4,"level":"basic","q":"What vector register types does NEON provide in AArch64?","a":"64-bit registers: <code>d0-d31</code>. 128-bit: <code>q0-q31</code> (also <code>v0-v31</code> with element type suffix). Type suffixes: <code>int8x8_t</code> (8 lanes of 8-bit), <code>int8x16_t</code> (16 lanes), <code>int16x4_t</code>, <code>int16x8_t</code>, <code>int32x2_t</code>, <code>int32x4_t</code>, <code>int64x2_t</code>, <code>float16x8_t</code>, <code>float32x2_t</code>, <code>float32x4_t</code>, <code>float64x2_t</code>. Multi-register: <code>float32x4x2_t</code> (two 128-bit regs)."},{"id":5,"level":"basic","q":"How do you use NEON intrinsics in C code?","a":"Include <code>&lt;arm_neon.h&gt;</code>. Load 4 floats: <code>float32x4_t a = vld1q_f32(ptr)</code>. Add: <code>float32x4_t c = vaddq_f32(a, b)</code>. Store: <code>vst1q_f32(ptr, c)</code>. Duplicate scalar: <code>float32x4_t k = vdupq_n_f32(3.14f)</code>. Compile AArch64: just <code>-O2</code> (NEON mandatory). AArch32: <code>-mfpu=neon -mfloat-abi=hard</code>. Check: <code>__ARM_NEON</code> macro is defined when NEON is available."},{"id":6,"level":"basic","q":"What is the NEON intrinsic naming convention?","a":"Pattern: <code>v{op}{q}_{type}</code>. <code>q</code> = 128-bit (quadword). No <code>q</code> = 64-bit. Type suffixes: <code>f32</code> float32, <code>f64</code> float64, <code>s8</code> int8, <code>u8</code> uint8, <code>s16</code> int16, <code>u16</code> uint16, <code>s32</code> int32, <code>u32</code> uint32, <code>s64</code> int64, <code>u64</code> uint64, <code>f16</code> float16. Examples: <code>vaddq_f32</code> (128-bit float add), <code>vmul_f32</code> (64-bit float mul), <code>vld1q_u8</code> (load 16 uint8s)."},{"id":7,"level":"basic","q":"What is the difference between vld1q and vld1?","a":"<code>vld1q_f32(ptr)</code> loads 128 bits = 4 floats into a 128-bit register (<code>float32x4_t</code>). <code>vld1_f32(ptr)</code> loads 64 bits = 2 floats into a 64-bit register (<code>float32x2_t</code>). Prefer 128-bit (quad) variants to maximise lane utilisation. Multi-register variants: <code>vld1q_f32_x2</code> loads 256 bits into two registers in one instruction. <code>vld2q_f32</code> loads with de-interleaving. Indexed: <code>vld1q_lane_f32(ptr, vec, lane)</code>."},{"id":8,"level":"basic","q":"What are RVV vector registers and key configuration terms?","a":"32 vector registers <code>v0-v31</code>. Configuration: SEW (Selected Element Width): 8/16/32/64 bits per element. LMUL (Length Multiplier): 1/2/4/8 (groups registers for wider operations) or 1/2/4/8 fractional. VLEN: hardware-determined vector length in bits. VLMAX = LMUL * VLEN / SEW = max elements per operation. <code>vl</code>: actual number of elements processed (≤ VLMAX). <code>vtype</code>: encodes SEW+LMUL. Tail/mask agnostic/undisturbed policies."},{"id":9,"level":"basic","q":"What does vsetvli do and why is it fundamental to RVV?","a":"<code>vsetvli rd, rs1, vtypei</code> configures the vector unit and returns the number of elements the hardware will process in <code>rd</code>. Example: <code>vsetvli t0, a0, e32, m1, ta, ma</code> sets SEW=32, LMUL=1, tail-agnostic, mask-agnostic for remaining element count in a0. The hardware may process fewer elements than requested (it sets <code>t0</code> ≤ <code>a0</code>). Must be called at the start of each strip-mining iteration. This is what makes RVV code length-agnostic."},{"id":10,"level":"basic","q":"What is the strip-mining pattern in RVV?","a":"Process an array in hardware-determined chunks:\n<code>while (n > 0) {\n  size_t vl = __riscv_vsetvl_e32m1(n);\n  vfloat32m1_t va = __riscv_vle32_v_f32m1(a, vl);\n  vfloat32m1_t vb = __riscv_vle32_v_f32m1(b, vl);\n  vfloat32m1_t vc = __riscv_vadd_vv_f32m1(va, vb, vl);\n  __riscv_vse32_v_f32m1(c, vc, vl);\n  a+=vl; b+=vl; c+=vl; n-=vl;\n}</code>\nThe final partial chunk is handled automatically — no special-case scalar tail needed."},{"id":11,"level":"basic","q":"How does auto-vectorization work and how do you enable it?","a":"Compilers (GCC, Clang) automatically vectorize loops given sufficient flags. Enable: <code>-O2 -march=native</code> (usually sufficient). More aggressive: <code>-O3 -ftree-vectorize</code>. Check output: <code>-fopt-info-vec-optimized</code> (GCC) or <code>-Rpass=loop-vectorize</code> (Clang). Conditions for auto-vectorization: no pointer aliasing (use <code>restrict</code>), simple loop body, no data-dependent branches, loop-independent iterations. <code>#pragma GCC ivdep</code> asserts no dependencies."},{"id":12,"level":"intermediate","q":"How do you implement an efficient dot product with NEON?","a":"<code>float dot_product(const float* a, const float* b, int n) {\n  float32x4_t acc = vdupq_n_f32(0.0f);\n  int i = 0;\n  for (; i &lt;= n-4; i+=4) {\n    float32x4_t va = vld1q_f32(a+i);\n    float32x4_t vb = vld1q_f32(b+i);\n    acc = vfmaq_f32(acc, va, vb);\n  }\n  float result = vaddvq_f32(acc);\n  for (; i &lt; n; i++) result += a[i]*b[i];\n  return result;\n}</code>\nKey: <code>vfmaq_f32</code> is FMA, <code>vaddvq_f32</code> horizontally reduces to scalar."},{"id":13,"level":"intermediate","q":"What is the difference between vmlaq and vfmaq?","a":"<code>vmlaq_f32(acc, a, b)</code>: multiply-accumulate, may compute <code>a*b</code> then add to <code>acc</code> as two separate operations (two rounding steps). <code>vfmaq_f32(acc, a, b)</code>: fused multiply-add (FMA) — single instruction on Cortex-A57+, one rounding, better precision. FMA: <code>result = acc + a*b</code> with only one rounding. Also slightly faster on pipelines that support it. Prefer <code>vfmaq</code> for floating-point accumulation. Note: FMA changes floating-point results slightly vs non-FMA."},{"id":14,"level":"intermediate","q":"How do NEON lane operations work?","a":"Extract a lane: <code>vgetq_lane_f32(v, 2)</code> returns lane 2 as scalar. Set a lane: <code>vsetq_lane_f32(val, v, 2)</code> returns new vector. Duplicate scalar to all lanes: <code>vdupq_n_f32(x)</code>. Duplicate a specific lane: <code>vdupq_laneq_f32(v, 1)</code> — copies lane 1 to all 4 lanes. Reverse lanes: <code>vrev64q_f32</code>. Combine halves: <code>vcombine_f32(low, high)</code>. Split: <code>vget_low_f32(v)</code>, <code>vget_high_f32(v)</code>. Used for: broadcasting a coefficient, extracting final result."},{"id":15,"level":"intermediate","q":"What are vld2/vld3/vld4 interleaved loads and when do you use them?","a":"<code>vld2q_u8(ptr)</code> loads 32 bytes and de-interleaves into two registers (e.g. ABABAB → register A and register B). <code>vld3q_u8</code> for RGB → R, G, B registers. <code>vld4q_u8</code> for RGBA → R, G, B, A registers. Eliminates manual de-interleaving. Used in: image processing (separate colour channels), audio (stereo to mono), sensor fusion (AoS to SoA). <code>vst2/vst3/vst4</code> reverses (SoA → AoS). Far faster than manual extraction."},{"id":16,"level":"intermediate","q":"How do you perform type conversion with NEON intrinsics?","a":"Widen (narrow→wide): <code>vmovl_u8(v)</code> 8×uint8 → 8×uint16. <code>vmovl_s16(v)</code> 4×int16 → 4×int32. Narrow (wide→narrow): <code>vmovn_u16(v)</code> 8×uint16 → 8×uint8. Saturating narrow: <code>vqmovn_u16(v)</code> (clips to max instead of wrapping). Float↔int: <code>vcvtq_f32_s32(v)</code> int32→float32, <code>vcvtq_s32_f32(v)</code> float32→int32 (truncate). Reinterpret (bitcast, no conversion): <code>vreinterpretq_s32_f32(v)</code>. Float16: <code>vcvt_f32_f16(v)</code>."},{"id":17,"level":"intermediate","q":"What is vtbl/vtbx and when do you use table lookups?","a":"<code>vtbl1_u8(tbl, idx)</code> uses each byte in <code>idx</code> as an index into <code>tbl</code>, returning the selected bytes. Out-of-range indices return 0 (vtbl) or leave lane unchanged (vtbx). AArch64: <code>vqtbl1q_u8(tbl, idx)</code> (128-bit table). Use for: arbitrary permutations/shuffles, colour space lookup tables (8-bit → 8-bit), bit reversal, byte-swap patterns. More general than fixed-pattern shuffle instructions. Essential for LUT-based processing at SIMD speed."},{"id":18,"level":"intermediate","q":"How does RVV masking work and what are mask registers?","a":"<code>v0</code> is the conventional mask register. Mask instructions generate a mask: <code>vmflt.vf v0, v1, f0, vl</code> sets mask bits where v1[i] < f0. Masked operations: append <code>.m</code> suffix: <code>vadd.vv v2, v3, v4, v0.t</code> adds only where mask is set, leaves other lanes as-is (.u) or undisturbed (.mu). <code>ta</code>/<code>ma</code> in vsetvli sets tail/mask agnostic policy. Masking eliminates branches inside vectorized loops. Efficient for <code>if/else</code> in SIMD without branch mispredictions."},{"id":19,"level":"intermediate","q":"What is RVV gather/scatter and strided load/store?","a":"Unit-stride: <code>vle32.v v1, (a0)</code> loads consecutive elements (fastest). Strided: <code>vlse32.v v1, (a0), a1</code> loads with stride a1 bytes — for every-nth element or matrix columns. Gather (indexed): <code>vloxei32.v v1, (base), vidx</code> loads from addresses base + vidx[i]. Scatter (indexed store): <code>vsoxei32.v vsrc, (base), vidx</code>. Use case: sparse operations, matrix transposition, AoS→SoA. Strided/gather are slower than unit-stride — minimise or restructure data layout."},{"id":20,"level":"intermediate","q":"How do you handle data alignment for NEON/SIMD performance?","a":"AArch64 handles any alignment for loads/stores (no fault). But: aligned accesses (to 16-byte boundaries for 128-bit vectors) are faster on many microarchitectures (Cortex-A76/A78, Apple Silicon). Align heap: <code>float* p = (float*)aligned_alloc(16, n*sizeof(float))</code>. Align stack: <code>__attribute__((aligned(16))) float arr[128]</code>. Check alignment: <code>((uintptr_t)ptr & 15) == 0</code>. For critical inner loops, assert alignment and use aligned load variants (<code>vld1q</code> handles both — compiler may emit better code with alignment hints)."},{"id":21,"level":"intermediate","q":"What is ARM SVE and how does it differ from NEON?","a":"SVE (Scalable Vector Extension, Armv8.2+): predicate-based vector ISA with length-agnostic programming (same source code runs on 128–2048-bit implementations). SVE2 adds more operations. Used in: Fujitsu A64FX (512-bit, used in Fugaku supercomputer), AWS Graviton3/4, Ampere Altra, Apple M4. Differences from NEON: scalable length, predicate registers (not mask vectors), gather/scatter, horizontal reductions, more addressing modes. NEON fixed 128-bit; SVE can be 128-2048. Use SVE intrinsics from <code>&lt;arm_sve.h&gt;</code>."},{"id":22,"level":"intermediate","q":"How do you profile and optimise NEON code performance?","a":"1. Use <code>perf stat -e cycles,instructions,cache-misses ./prog</code>. 2. Check IPC — well-vectorised code: 2-4+ IPC. 3. <code>perf annotate</code> shows hot assembly. 4. Look for pipeline stalls: <code>perf stat -e stalled-cycles-frontend,stalled-cycles-backend</code>. 5. Check if NEON is actually used: <code>objdump -d binary | grep -E \"ld1|st1|fmla|fadd\"</code>. 6. Memory bandwidth bound? Use <code>-e mem-loads,mem-stores</code>. 7. Always benchmark at <code>-O2/-O3</code> and with CPU frequency scaling disabled (<code>cpupower frequency-set -g performance</code>)."},{"id":23,"level":"intermediate","q":"What are common pitfalls when writing NEON intrinsics?","a":"1. Type mismatch: <code>float32x4_t</code> vs <code>float32x2_t</code> — always check return types. 2. Uninitialised lanes causing non-deterministic results. 3. Missing <code>-march</code> flag causing scalar fallback (check assembly). 4. Assuming lane ordering = byte ordering (it doesn't — NEON is element-indexed, not byte-indexed). 5. ABI: vector types may not be passed in vector registers in all calling conventions. 6. Over-optimising before profiling. 7. Not handling the scalar tail loop. 8. Using <code>vuzp/vzip</code> when a simpler operation exists."},{"id":24,"level":"intermediate","q":"How do you use RVV with C intrinsics?","a":"Include <code>&lt;riscv_vector.h&gt;</code>. Configure: <code>size_t vl = __riscv_vsetvl_e32m1(n)</code>. Load: <code>vfloat32m1_t va = __riscv_vle32_v_f32m1(ptr, vl)</code>. FMA: <code>vfloat32m1_t vc = __riscv_vfmacc_vv_f32m1(acc, va, vb, vl)</code>. Store: <code>__riscv_vse32_v_f32m1(out, vc, vl)</code>. Reduction: <code>vfloat32m1_t s = __riscv_vfredusum_vs_f32m1_f32m1(v, zero, vl)</code>. Compile: <code>-march=rv64gcv -O2</code>. LMUL choice: m1 (safe), m2/m4/m8 (more throughput, fewer available registers)."},{"id":25,"level":"intermediate","q":"What is the AoS vs SoA memory layout and why does it matter for SIMD?","a":"AoS (Array of Structures): <code>struct {float x,y,z;} pts[N]</code> — memory: xyzxyzxyz. SoA (Structure of Arrays): <code>float x[N], y[N], z[N]</code> — memory: xxx...yyy...zzz. SIMD prefers SoA: loading 4 x-values is one contiguous load. With AoS you need gather instructions or vld3 to separate channels. SoA is more cache-friendly for processing one field across many elements. AoS is better for passing individual elements around. Hybrid: tiles of SoA (AoSoA) balances both. NEON vld3/vst3 converts AoS↔SoA at load/store time."},{"id":26,"level":"intermediate","q":"What are widening and narrowing operations and when do you need them?","a":"Widening: expand elements to larger type before arithmetic (avoids overflow). <code>vmovl_u8(v)</code>: 8×uint8 → 8×uint16. Widening multiply: <code>vmull_u8(a8, b8)</code>: 8×uint8 * 8×uint8 → 8×uint16 result. Critical for: accumulating uint8 pixel sums (256*256=65536 > uint8 max), fixed-point DSP. Narrowing: <code>vmovn_u16(v)</code> truncates. Saturating narrow: <code>vqmovn</code> clips at max value instead of wrapping. Rounding narrow: <code>vrshrn_n_u16(v, shift)</code> — shifts right with rounding before narrowing."},{"id":27,"level":"intermediate","q":"How do you implement a matrix-vector multiply with NEON?","a":"For 4×4 * 4 (common in graphics/ML): load matrix columns as float32x4_t, multiply-accumulate with broadcast scalar from vector. <code>vfmaq_laneq_f32(acc, col0, vec, 0)</code> multiplies col0 by lane 0 of vec and adds to acc. Repeat for lanes 1,2,3. For larger: tile output, process multiple output elements per inner loop. Use <code>vld1q_f32_x4</code> to load 4 columns in one instruction. For ML inference, quantized int8 matmul: <code>vmull_s8</code> + <code>vpaddlq_s16</code> accumulation pattern."},{"id":28,"level":"intermediate","q":"What is the NEON vpadd/vpmax/vpmin and when do you use horizontal operations?","a":"Pairwise add: <code>vpaddq_f32(a, b)</code> adds adjacent pairs — [a0+a1, a2+a3, b0+b1, b2+b3]. Pairwise max: <code>vpmaxq_f32</code>. Pairwise min: <code>vpminq_f32</code>. Horizontal sum (AArch64): <code>vaddvq_f32(v)</code> sums all 4 lanes to scalar. Horizontal max: <code>vmaxvq_f32(v)</code>. Use for: final reduction of accumulator, computing max of 4 values, box filter with summing adjacent pixels. In AArch32 only pairwise (need multiple steps for full reduction); AArch64 has efficient horizontal reductions."}],"c":[{"id":1,"level":"basic","q":"What is the difference between a pointer and an array in C?","a":"An array is a fixed-size contiguous allocation. The array name decays to a pointer to its first element in most expressions (but not all — <code>sizeof arr</code> gives array size, not pointer size). A pointer is a variable holding an address, can be reassigned, can be NULL. <code>int arr[5]</code> vs <code>int *ptr = arr</code>. <code>ptr++</code> advances pointer; you cannot do <code>arr++</code>. <code>sizeof ptr</code> = 8 (on 64-bit); <code>sizeof arr</code> = 20."},{"id":2,"level":"basic","q":"How does memory management work in C?","a":"Stack: automatic management, LIFO, fast, limited (1-8MB). Local variables live here. Heap: manual management. <code>malloc(n)</code> allocates n bytes uninitialized. <code>calloc(count, size)</code> allocates and zero-initialises. <code>realloc(ptr, new_size)</code> resizes. <code>free(ptr)</code> releases. Every malloc/calloc must have a matching free. Failure: <code>malloc</code> returns NULL — always check. Use-after-free and double-free are undefined behaviour."},{"id":3,"level":"basic","q":"What is the difference between malloc, calloc, and realloc?","a":"<code>malloc(n)</code>: allocates n bytes, content is uninitialised (garbage). <code>calloc(count, size)</code>: allocates count×size bytes, zero-initialises all — safer but involves a memset. <code>realloc(ptr, new_size)</code>: resizes existing allocation — may return same or different pointer. If new_size > old, new bytes are uninitialised. If ptr is NULL, acts like malloc. If new_size is 0, behaviour is implementation-defined (avoid). Always: <code>new_ptr = realloc(ptr, sz); if (!new_ptr) { free(ptr); error; } ptr = new_ptr;</code>"},{"id":4,"level":"basic","q":"What are null pointers and dangling pointers?","a":"Null pointer: <code>int *p = NULL</code>. Dereferencing NULL is undefined behaviour (usually SIGSEGV). Always check after malloc: <code>if (!ptr) { perror(\"malloc\"); exit(1); }</code>. Dangling pointer: points to freed memory (<code>free(p); *p = 5;</code> is UB) or out-of-scope stack memory (<code>return &local_var;</code>). Best practice: set pointer to NULL after free: <code>free(p); p = NULL;</code>. Use AddressSanitizer (<code>-fsanitize=address</code>) to detect both."},{"id":5,"level":"basic","q":"What does the const keyword mean with pointers?","a":"<code>const int *p</code>: pointer to const int — cannot modify <code>*p</code>, can change <code>p</code> itself. <code>int *const p</code>: const pointer to int — can modify <code>*p</code>, cannot change <code>p</code>. <code>const int *const p</code>: both. Read right-to-left: \"p is const pointer to int\" vs \"p is pointer to const int\". Function parameters: <code>void f(const char *str)</code> promises not to modify the string. Helps the compiler optimise and documents intent."},{"id":6,"level":"basic","q":"What is the difference between struct and union?","a":"<code>struct</code>: all members exist simultaneously in memory, sequentially laid out. Size = sum of member sizes + alignment padding. <code>union</code>: all members overlap at the same address. Size = size of largest member. Only one member is \"active\" at a time — writing one and reading another is type-punning (UB in C++ but valid in C99+). Use union for: type-punning, variant types (with a tag field), memory-efficient storage. Tagged union pattern: <code>struct { int type; union { int i; float f; char *s; } value; }</code>."},{"id":7,"level":"basic","q":"What are the C storage classes?","a":"<code>auto</code>: default for local variables, automatic duration (stack). <code>static</code>: local — persists across calls (in BSS/data segment). File scope — limits visibility to the translation unit (internal linkage). <code>extern</code>: declares a variable/function defined elsewhere (external linkage). <code>register</code>: hint for register storage (ignored by modern compilers, cannot take address). <code>_Thread_local</code> (C11): thread-local storage. Most important: <code>static</code> for encapsulation and persistent state."},{"id":8,"level":"basic","q":"What is the volatile keyword and when do you need it?","a":"<code>volatile</code> tells the compiler the variable may change outside normal program flow, preventing it from caching the value in a register or eliminating reads/writes as \"redundant\". When needed: memory-mapped hardware registers, variables modified by ISRs (interrupt service routines), shared memory with DMA. Example: <code>volatile uint32_t *reg = (volatile uint32_t *)0x40001000; *reg = 0x01;</code>. Not a substitute for proper synchronization in multi-threaded code — use atomics (<code>_Atomic</code>) for that."},{"id":9,"level":"basic","q":"What is a segmentation fault and how do you debug it?","a":"SIGSEGV occurs when a process accesses memory it shouldn't: dereference NULL/invalid pointer, write to read-only memory, stack overflow, out-of-bounds array access. Debug: <code>gdb ./prog; run; bt</code> (backtrace). Valgrind: <code>valgrind --tool=memcheck ./prog</code>. AddressSanitizer: compile with <code>-fsanitize=address -g</code> — gives exact line number. Core dumps: <code>ulimit -c unlimited</code> then <code>gdb ./prog core</code>. Enable all warnings: <code>-Wall -Wextra</code>."},{"id":10,"level":"basic","q":"What is the difference between #define and const?","a":"<code>#define MAX 100</code>: preprocessor text substitution before compilation — no type, no scope, no debug visibility, no address. <code>const int MAX = 100</code>: typed, scoped constant — visible in debugger, can take address, respects scope. <code>#define</code> for: header guards, code generation macros, platform-specific switches. <code>const</code> for: typed constants. For enum-style constants, prefer <code>enum { MAX = 100 };</code>. Avoid function-like macros — use <code>static inline</code> functions instead."},{"id":11,"level":"basic","q":"How do you work with strings in C?","a":"C strings: null-terminated <code>char</code> arrays. <code>char s[] = \"hello\"</code> (6 bytes: 5 + '\\0'). String literal: <code>const char *p = \"hello\"</code> (read-only). Key functions in <code>&lt;string.h&gt;</code>: <code>strlen</code>, <code>strcpy/strncpy</code>, <code>strcat/strncat</code>, <code>strcmp/strncmp</code>, <code>strstr</code>, <code>strchr</code>, <code>memcpy/memmove/memset</code>. Always prefer n-variants (<code>strncpy</code>, <code>snprintf</code>) to prevent buffer overflows. <code>snprintf(buf, sizeof(buf), \"fmt\", args)</code> is safe string formatting."},{"id":12,"level":"basic","q":"What are function pointers and how do you declare them?","a":"<code>int (*fp)(int, int)</code> — pointer to function taking two ints, returning int. Assign: <code>fp = &add</code> or <code>fp = add</code>. Call: <code>fp(3, 4)</code> or <code>(*fp)(3, 4)</code>. Typedef for readability: <code>typedef int (*BinOp)(int, int)</code>. Array: <code>BinOp ops[] = {add, sub, mul}</code>. Use for: callbacks, event handlers, plugin systems, dispatch tables. Common in: qsort comparators, signal handlers, OS kernel interfaces. Callbacks: <code>void sort(int *arr, int n, int (*cmp)(int,int))</code>."},{"id":13,"level":"basic","q":"What are the standard C integer types and their sizes?","a":"Guaranteed sizes (C99 <code>&lt;stdint.h&gt;</code>): <code>int8_t/uint8_t</code> (8-bit), <code>int16_t/uint16_t</code> (16-bit), <code>int32_t/uint32_t</code> (32-bit), <code>int64_t/uint64_t</code> (64-bit). Platform-dependent: <code>char</code> (≥8), <code>short</code> (≥16), <code>int</code> (≥16, usually 32), <code>long</code> (≥32, 32 on Windows 64-bit, 64 on Linux 64-bit), <code>long long</code> (≥64). Use <code>&lt;stdint.h&gt;</code> types for portable code. <code>size_t</code> for sizes, <code>ptrdiff_t</code> for pointer differences."},{"id":14,"level":"basic","q":"What are bitwise operators in C and when do you use them?","a":"<code>&amp;</code> AND, <code>|</code> OR, <code>^</code> XOR, <code>~</code> NOT, <code>&lt;&lt;</code> left shift, <code>&gt;&gt;</code> right shift. Common patterns: check bit: <code>if (flags &amp; BIT_N)</code>. Set bit: <code>flags |= BIT_N</code>. Clear bit: <code>flags &amp;= ~BIT_N</code>. Toggle: <code>flags ^= BIT_N</code>. Mask: <code>val &amp; 0xFF</code> lower byte. Power of 2: <code>!(n &amp; (n-1))</code>. Align up: <code>(n + align-1) &amp; ~(align-1)</code>. Use <code>unsigned</code> types for bit ops — right-shifting signed types is implementation-defined."},{"id":15,"level":"basic","q":"How does the C preprocessor work?","a":"Runs before compilation, performs textual transformations. <code>#include &lt;header&gt;</code> inserts file content. <code>#define NAME value</code> text substitution. <code>#ifdef/#ifndef/#endif</code> conditional compilation. <code>#pragma once</code> header guard (modern). <code>#error \"msg\"</code> compile-time error. <code>__FILE__</code>, <code>__LINE__</code>, <code>__DATE__</code> predefined macros. View preprocessed output: <code>gcc -E file.c</code>. Token paste: <code>##</code>. Stringify: <code>#arg</code>. Variadic macro: <code>#define LOG(fmt, ...) fprintf(stderr, fmt, ##__VA_ARGS__)</code>."},{"id":16,"level":"intermediate","q":"What is undefined behaviour (UB) in C and why is it dangerous?","a":"UB is code the C standard leaves undefined — the compiler may do anything: crash, produce wrong results, or \"work\" by coincidence and break with a different compiler/optimization level. Common UB: signed integer overflow (use unsigned or check before), null/dangling pointer dereference, out-of-bounds access, data races, reading uninitialized variables, violating strict aliasing, shift by ≥ width. Compilers exploit UB assumptions for optimization (e.g. assume no overflow → optimize away safety checks). Detect: <code>-fsanitize=undefined,address</code>."},{"id":17,"level":"intermediate","q":"What is strict aliasing and why does it matter?","a":"The strict aliasing rule says the compiler may assume two pointers of incompatible types do not alias (point to same memory). This allows aggressive load/store reordering. Violation: reading a float via int pointer (UB). Exceptions: <code>char*</code> may alias anything, and members of compatible struct/union. Fix: use <code>memcpy</code> for type-punning, or <code>union</code>. Disable for legacy code: <code>-fno-strict-aliasing</code>. The <code>restrict</code> keyword is related but different — it says a pointer is the only way to access its object."},{"id":18,"level":"intermediate","q":"What is the restrict keyword and when should you use it?","a":"<code>restrict</code> (C99) is a promise that a pointer is the only alias for the object it points to within its scope. Enables the compiler to assume no aliasing and apply vectorization and other optimisations. Example: <code>void add(float *restrict dst, const float *restrict a, const float *restrict b, int n)</code>. Essential for SIMD auto-vectorization of loops involving pointer parameters. Violating the contract is UB. Check with <code>-fsanitize=address</code> if you suspect aliasing."},{"id":19,"level":"intermediate","q":"What is memory alignment and how do you control it in C?","a":"Alignment requirement: most CPUs require data at addresses that are multiples of their size (int at 4-byte boundary). Misalignment: fault on strict architectures (ARM before AArch64), performance penalty on x86. Struct padding: compiler inserts padding bytes to align members. Check: <code>offsetof(struct, member)</code>. Force alignment: <code>__attribute__((aligned(16)))</code> or <code>_Alignas(16)</code> (C11). Aligned heap: <code>aligned_alloc(16, size)</code>. Pack struct (disable padding): <code>__attribute__((packed))</code> — unsafe for misaligned access."},{"id":20,"level":"intermediate","q":"How do you detect and prevent buffer overflows in C?","a":"Buffer overflow: writing past array end — undefined behaviour, security vulnerability (classic attack vector). Prevention: always use n-variants: <code>strncpy(dst, src, sizeof(dst)-1); dst[sizeof(dst)-1] = 0</code>. Prefer <code>snprintf</code> over <code>sprintf</code>. Check bounds before memcpy. Static analysis: <code>-Wall -Wextra -fstack-protector-strong</code> (adds canaries). Runtime: <code>-fsanitize=address</code> (AddressSanitizer). <code>-D_FORTIFY_SOURCE=2</code> adds runtime checks on common library functions."},{"id":21,"level":"intermediate","q":"What are common memory bugs and how do you find them?","a":"Memory leaks: allocate, lose pointer, never free. Use Valgrind: <code>valgrind --leak-check=full ./prog</code>. Use-after-free: dereference after <code>free()</code>. Double-free: call <code>free()</code> twice. Buffer overflow: write past allocation. Heap corruption: usually manifests as crash or wrong values elsewhere. Tools: AddressSanitizer (<code>-fsanitize=address</code> — best for overflow/use-after-free), Valgrind (more thorough, slower), Electric Fence, scan-build (Clang static analyzer). Always compile with <code>-g</code> for readable error output."},{"id":22,"level":"intermediate","q":"What is the difference between memcpy and memmove?","a":"<code>memcpy(dst, src, n)</code>: copies n bytes. Undefined behaviour if src and dst overlap. Fast — may use SIMD internally. <code>memmove(dst, src, n)</code>: handles overlapping regions correctly — copies via temporary buffer or direction-aware copy. Slightly slower in theory (though in practice often the same on modern libc). Rule: always use <code>memmove</code> when buffers might overlap (e.g. shifting elements within an array). Use <code>memcpy</code> only when you are certain there is no overlap."},{"id":23,"level":"intermediate","q":"What is a variadic function and how do you implement one?","a":"A function accepting variable arguments. Declare: <code>int myprintf(const char *fmt, ...)</code>. Implement with <code>&lt;stdarg.h&gt;</code>: <code>va_list ap; va_start(ap, fmt); int i = va_arg(ap, int); double d = va_arg(ap, double); va_end(ap);</code>. Must have at least one fixed argument. No type safety — caller and callee must agree on types. <code>va_copy(dst, src)</code> copies va_list for multiple passes. Always call <code>va_end</code>. Common use: logging functions, formatted output wrappers."},{"id":24,"level":"intermediate","q":"What are common C compiler flags for development and production?","a":"Development: <code>-Wall -Wextra -Wconversion -Wshadow -Wpedantic</code> (warnings), <code>-g</code> (debug info), <code>-O0</code> (no optimization, easier debugging), <code>-fsanitize=address,undefined</code> (runtime checks). Production: <code>-O2</code> (safe optimization), <code>-O3</code> (aggressive, may break UB-dependent code), <code>-march=native</code> (CPU-specific), <code>-fstack-protector-strong</code> (security). Size: <code>-Os</code>. LTO: <code>-flto</code>. Strip: <code>-s</code>. Profile-guided: <code>-fprofile-generate/-fprofile-use</code>."},{"id":25,"level":"intermediate","q":"What is a linked list and how do you implement it in C?","a":"<code>typedef struct Node { int val; struct Node *next; } Node;</code>. Create: <code>Node *n = malloc(sizeof(Node)); n-&gt;val=5; n-&gt;next=NULL</code>. Insert at head: <code>n-&gt;next = head; head = n</code>. Traverse: <code>Node *cur = head; while(cur) { use(cur-&gt;val); cur = cur-&gt;next; }</code>. Delete: find predecessor, <code>prev-&gt;next = cur-&gt;next; free(cur)</code>. Free all: traverse and free each node. Doubly-linked: add <code>prev</code> pointer. Common bugs: forgetting to free, NULL dereference, lost head pointer."},{"id":26,"level":"intermediate","q":"What are bit fields and when do you use them?","a":"Struct members with explicit bit widths: <code>struct { uint8_t enabled : 1; uint8_t mode : 3; uint8_t speed : 4; } config;</code>. Size: one byte. Use for: packing hardware registers, protocol headers, saving memory in large arrays of flags. Limitations: bit order and padding are implementation-defined (not portable for binary protocols). For portable bit manipulation in network/file formats, use explicit shifts/masks. Bit fields are great for device register maps where you control both sides."},{"id":27,"level":"intermediate","q":"What is the C11 _Atomic type and when do you use it?","a":"<code>_Atomic int counter = 0</code> (or <code>atomic_int</code> via <code>&lt;stdatomic.h&gt;</code>). Operations: <code>atomic_fetch_add(&amp;counter, 1)</code>, <code>atomic_load/store</code>, <code>atomic_compare_exchange_weak/strong</code>. Memory orders: <code>memory_order_relaxed</code> (no sync), <code>memory_order_acquire/release</code> (sync with paired ops), <code>memory_order_seq_cst</code> (default, strongest). Use instead of volatile for multi-threaded shared variables. Atomic operations are visible to all threads without locks for simple counters and flags."},{"id":28,"level":"intermediate","q":"What is a memory-mapped file and how do you use it?","a":"Maps a file into virtual address space — read/write the file like an array. <code>fd = open(\"file\", O_RDWR); fstat(fd, &amp;st); void *map = mmap(NULL, st.st_size, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0); close(fd);</code>. Access: <code>char *data = map; data[0] = 'A'</code>. Unmap: <code>munmap(map, st.st_size)</code>. Advantages: OS handles I/O, no read/write syscalls for each access, efficient for large files, multiple processes can share. Use for: large data files, IPC, high-performance I/O."},{"id":29,"level":"intermediate","q":"What is the difference between static and dynamic linking?","a":"Static linking: library code is copied into the executable at link time (<code>libfoo.a</code>). Produces a self-contained binary, no runtime dependencies, slightly faster (no PLT). Larger binary. Dynamic linking: library code stays in shared library (<code>libfoo.so</code>), loaded at runtime. Smaller binaries, shared memory between processes (one copy of library in RAM), security patches apply without recompiling. <code>ldd binary</code> shows shared library dependencies. <code>LD_PRELOAD</code> injects a library."},{"id":30,"level":"intermediate","q":"What are POSIX threads (pthreads) and basic usage?","a":"<code>#include &lt;pthread.h&gt;</code>. Create: <code>pthread_create(&amp;tid, NULL, thread_func, arg)</code>. Function signature: <code>void *thread_func(void *arg)</code>. Join: <code>pthread_join(tid, &amp;retval)</code>. Detach: <code>pthread_detach(tid)</code> (auto-cleanup on exit). Mutex: <code>pthread_mutex_t m = PTHREAD_MUTEX_INITIALIZER; pthread_mutex_lock(&amp;m); ... pthread_mutex_unlock(&amp;m)</code>. Condition variable: <code>pthread_cond_wait(&amp;cond, &amp;mutex)</code>. Compile: <code>-lpthread</code>. Use <code>_Atomic</code> for simple shared counters instead of mutex."},{"id":31,"level":"intermediate","q":"What are common anti-patterns in C code?","a":"1. Returning pointer to local variable. 2. <code>scanf(\"%s\", buf)</code> — no bounds check. 3. <code>gets()</code> — removed in C11, inherently unsafe. 4. Ignoring return values of <code>malloc</code>/<code>fclose</code>/<code>write</code>. 5. Integer overflow in size calculation: <code>malloc(n * sizeof(T))</code> — use <code>calloc(n, sizeof(T))</code>. 6. <code>strcmp</code> return value confusion (0 = equal, not true). 7. Off-by-one in buffer sizes. 8. Forgetting null terminator. 9. Using <code>==</code> on floats. 10. <code>if(ptr = malloc(n))</code> instead of <code>if((ptr = malloc(n)) != NULL)</code>."},{"id":32,"level":"intermediate","q":"What is GDB and how do you use it for debugging?","a":"GDB is the GNU debugger. Compile with <code>-g</code>. Run: <code>gdb ./prog</code>. Commands: <code>run</code> start, <code>break func</code> or <code>break file.c:42</code> set breakpoint, <code>next</code> (step over), <code>step</code> (step into), <code>continue</code>, <code>print var</code>, <code>info locals</code> all locals, <code>backtrace</code>/<code>bt</code> call stack, <code>frame N</code> switch frame, <code>watch var</code> watchpoint, <code>x/4xw ptr</code> examine memory, <code>disassemble func</code>. Core dump: <code>gdb prog core</code>. TUI mode: <code>gdb -tui prog</code>."},{"id":33,"level":"basic","q":"What are bitwise operators in C and what are common bit manipulation patterns?","a":"Operators: <code>&amp;</code> AND, <code>|</code> OR, <code>^</code> XOR, <code>~</code> NOT, <code>&lt;&lt;</code> left shift, <code>&gt;&gt;</code> right shift. Always use unsigned types for bit ops. Set bit n: <code>x |= (1u &lt;&lt; n)</code>. Clear bit n: <code>x &amp;= ~(1u &lt;&lt; n)</code>. Toggle bit n: <code>x ^= (1u &lt;&lt; n)</code>. Test bit n: <code>(x &gt;&gt; n) &amp; 1</code>. Clear lowest set bit: <code>x &amp;= (x-1)</code>. Isolate lowest set bit: <code>x &amp; (-x)</code> or <code>x &amp; (~x+1)</code>. Check power of 2: <code>x &amp;&amp; !(x &amp; (x-1))</code>. Count set bits: use Brian Kernighan loop or <code>__builtin_popcount(x)</code>."},{"id":34,"level":"basic","q":"How do you swap two variables using XOR without a temporary variable?","a":"<code>a ^= b; b ^= a; a ^= b;</code>. After step 1: a = a^b. Step 2: b = b^(a^b) = a. Step 3: a = (a^b)^a = b. Works for integers of any size. Caveat: if a and b point to the same memory location (aliasing), all three XOR steps produce 0 — always check <code>if (a != b)</code> or use a temporary. The XOR swap is mostly a curiosity; modern compilers generate equally fast code with a temp variable."},{"id":35,"level":"basic","q":"What is bit masking and how do you use it for flag fields?","a":"A bitmask is a pattern used to set, clear, or test specific bits. Define flags as powers of 2: <code>#define FLAG_READ 0x01\n#define FLAG_WRITE 0x02\n#define FLAG_EXEC 0x04</code>. Set multiple: <code>perms = FLAG_READ | FLAG_WRITE</code>. Test: <code>if (perms &amp; FLAG_WRITE)</code>. Clear: <code>perms &amp;= ~FLAG_WRITE</code>. Common in: OS permission bits, hardware register maps, network protocol headers, option flags. Use <code>enum</code> with explicit power-of-2 values for readability and type safety."},{"id":36,"level":"basic","q":"What is the difference between logical shift and arithmetic shift?","a":"Left shift (<code>&lt;&lt;</code>): always fills with 0s from right. Equivalent to multiply by 2^n for unsigned. Right shift (<code>&gt;&gt;</code>) on unsigned: logical — fills with 0s from left. Right shift on signed (implementation-defined in C): arithmetic on most platforms — fills with sign bit (1 for negative). Example: <code>(int8_t)(-8) &gt;&gt; 1</code> → -4 on most systems (arithmetic) but not guaranteed. Always use unsigned types when you want logical right shift. C23 adds <code>__builtin_stdc_bit_width</code> and related portable bit utilities."},{"id":37,"level":"basic","q":"How do you reverse the bits of an integer?","a":"Method 1 (loop): <code>uint32_t reverse_bits(uint32_t n) {\n  uint32_t r = 0;\n  for (int i = 0; i &lt; 32; i++) {\n    r = (r &lt;&lt; 1) | (n &amp; 1);\n    n &gt;&gt;= 1;\n  }\n  return r;\n}</code>. Method 2 (divide and conquer in O(log w)): swap nibbles, then swap pairs within nibbles, etc: <code>n = ((n &amp; 0xAAAAAAAA) &gt;&gt; 1) | ((n &amp; 0x55555555) &lt;&lt; 1); n = ((n &amp; 0xCCCCCCCC) &gt;&gt; 2) | ...</code>. GCC: <code>__builtin_bswap32(n)</code> reverses bytes (not bits). Used in: FFT bit-reversal permutation, CRC computation."},{"id":38,"level":"basic","q":"What is endianness and how does it affect bit/byte manipulation?","a":"Endianness is the byte order for multi-byte integers in memory. Little-endian (x86, ARM default): LSB at lowest address. Big-endian (network byte order): MSB at lowest address. Example: 0x12345678 at address 0x100 — little-endian: [78 56 34 12]; big-endian: [12 34 56 78]. Convert: <code>htonl/ntohl</code> (host-to-network 32-bit), <code>htons/ntohs</code> (16-bit). Check endianness: <code>union { uint32_t i; uint8_t c[4]; } u = {0x01}; if (u.c[0] == 1) little_endian</code>. Critical in network protocols, binary file formats, cross-platform data exchange."},{"id":39,"level":"basic","q":"How do you count the number of set bits (popcount) efficiently?","a":"Naive: loop and test each bit — O(w) where w = word width. Brian Kernighan: <code>while (n) { count++; n &amp;= n-1; }</code> — O(set bits). Lookup table: precompute for 8-bit chunks, process word in 4 steps. GCC built-in: <code>__builtin_popcount(n)</code> (32-bit), <code>__builtin_popcountll(n)</code> (64-bit) — compiles to single <code>POPCNT</code> instruction on x86/ARM. Standard C23: <code>stdc_popcount(n)</code>. Applications: Hamming distance, sparse matrix operations, bloom filter, SIMD operations count."},{"id":40,"level":"intermediate","q":"What is a circular buffer and how do you implement one?","a":"A circular (ring) buffer is a fixed-size array used as a FIFO queue with read and write pointers that wrap around. <code>struct RingBuf { uint8_t buf[SIZE]; size_t head, tail, count; };</code>. Write: <code>buf[head] = val; head = (head+1) % SIZE; count++</code>. Read: <code>val = buf[tail]; tail = (tail+1) % SIZE; count--</code>. Full: <code>count == SIZE</code>. Empty: <code>count == 0</code>. Power-of-2 size allows fast modulo: <code>head &amp; (SIZE-1)</code>. Lock-free single-producer/single-consumer possible with atomics. Essential in: audio/video streaming, UART drivers, kernel ring buffers."},{"id":41,"level":"intermediate","q":"What is a process vs a thread in C?","a":"Process: independent instance of a running program with its own address space (code, data, heap, stack), file descriptors, and OS resources. Created with <code>fork()</code>. Isolation: a crash in one process doesn't affect others. Thread: lightweight execution unit within a process, sharing the same address space and open files. Created with <code>pthread_create()</code>. Threads share globals and heap — need synchronisation. Processes communicate via IPC (pipes, sockets, shared memory). Threads communicate via shared memory directly. Context switch between threads is cheaper than between processes."},{"id":42,"level":"intermediate","q":"How do you create and join threads with pthreads?","a":"<code>#include &lt;pthread.h&gt;</code>. Thread function: <code>void *worker(void *arg) { int *n = (int*)arg; printf(\"%d\", *n); return NULL; }</code>. Create: <code>pthread_t tid; int val = 42; pthread_create(&amp;tid, NULL, worker, &amp;val);</code>. Wait for completion: <code>pthread_join(tid, NULL);</code>. Detach (auto-cleanup): <code>pthread_detach(tid)</code>. Pass multiple args: wrap in a struct, pass pointer. Compile: <code>gcc -o prog prog.c -lpthread</code>. Check return value of <code>pthread_create</code> — non-zero means failure."},{"id":43,"level":"intermediate","q":"What is a mutex and how do you use it?","a":"A mutex (mutual exclusion lock) ensures only one thread accesses a critical section at a time. <code>pthread_mutex_t lock = PTHREAD_MUTEX_INITIALIZER;</code>. Lock: <code>pthread_mutex_lock(&amp;lock)</code> — blocks if another thread holds it. Unlock: <code>pthread_mutex_unlock(&amp;lock)</code>. Always unlock in all code paths (use goto cleanup pattern). Try-lock (non-blocking): <code>pthread_mutex_trylock(&amp;lock)</code> — returns EBUSY if locked. Destroy: <code>pthread_mutex_destroy(&amp;lock)</code>. Dynamic init: <code>pthread_mutex_init(&amp;lock, NULL)</code>. Never lock and forget — leads to deadlock."},{"id":44,"level":"intermediate","q":"What is a race condition and how do you detect one?","a":"A race condition occurs when program behaviour depends on the relative timing of threads — two threads read-modify-write shared data without synchronisation. Example: <code>counter++</code> is not atomic (read, add, write — three steps). Thread A reads 5, Thread B reads 5, both write 6 — result is 6 not 7. Detection: ThreadSanitizer (<code>-fsanitize=thread</code>), Helgrind (Valgrind tool), careful code review. Fix: mutex around the critical section, or use <code>_Atomic</code> counter with <code>atomic_fetch_add</code>."},{"id":45,"level":"intermediate","q":"What is a semaphore and how does it differ from a mutex?","a":"A semaphore is a counter that controls access to a resource pool. <code>sem_init(&amp;sem, 0, N)</code> initialises with count N. <code>sem_wait</code>: decrement (block if 0). <code>sem_post</code>: increment (wake a waiter). Binary semaphore (N=1) ≈ mutex but: a semaphore can be posted by a different thread than the one that waited (signalling semantics), whereas a mutex must be unlocked by the thread that locked it. Use semaphore for: producer-consumer signalling, limiting concurrent access to N resources, thread synchronisation across processes (<code>sem_open</code> for named semaphores). Use mutex for: protecting a critical section."},{"id":46,"level":"intermediate","q":"What is a condition variable and how does it work with a mutex?","a":"A condition variable allows threads to sleep until a condition becomes true. Pattern: <code>pthread_mutex_lock(&amp;m); while (!condition) pthread_cond_wait(&amp;cv, &amp;m); /* use resource */ pthread_mutex_unlock(&amp;m);</code>. Signal one waiter: <code>pthread_cond_signal(&amp;cv)</code>. Wake all: <code>pthread_cond_broadcast(&amp;cv)</code>. <code>pthread_cond_wait</code> atomically releases the mutex and sleeps — re-acquires on wake. Always use a <code>while</code> loop (not <code>if</code>) to guard against spurious wakeups. Classic use: producer-consumer queue, thread pool work queue."},{"id":47,"level":"intermediate","q":"What is IPC and what are the main IPC mechanisms in Linux?","a":"IPC (Inter-Process Communication) lets separate processes exchange data. Mechanisms: Pipes (anonymous: <code>pipe(fd)</code> — parent-child only, unidirectional). Named pipes/FIFOs (<code>mkfifo</code> — any processes). Message queues (POSIX: <code>mq_open/mq_send/mq_receive</code> — structured messages). Shared memory (<code>shm_open + mmap</code> — fastest IPC, need explicit sync). Sockets (AF_UNIX for local, AF_INET for network — most flexible). Signals (async notification). Memory-mapped files (<code>mmap</code> with MAP_SHARED). Choice: shared memory = fastest; sockets = most flexible/cross-machine; pipes = simplest."},{"id":48,"level":"intermediate","q":"How do you use pipes for IPC between parent and child?","a":"<code>int fd[2]; pipe(fd);</code> creates a pipe: fd[0] = read end, fd[1] = write end. After <code>fork()</code>: parent writes to fd[1], child reads from fd[0] (close unused ends!). Example: <code>fork(); if (child) { close(fd[1]); read(fd[0], buf, sz); } else { close(fd[0]); write(fd[1], data, sz); }</code>. Always close unused ends — read returns EOF only when all write ends are closed. For bidirectional: use two pipes. Pipe capacity: typically 64KB on Linux. Blocking when full (write) or empty (read)."},{"id":49,"level":"intermediate","q":"What are POSIX shared memory and when do you use it?","a":"Shared memory lets multiple processes map the same physical memory into their address spaces — fastest IPC (no kernel copy). Create: <code>int fd = shm_open(\"/myshm\", O_CREAT|O_RDWR, 0666); ftruncate(fd, SIZE); void *ptr = mmap(NULL, SIZE, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);</code>. Access like a normal pointer. Destroy: <code>munmap(ptr, SIZE); shm_unlink(\"/myshm\");</code>. Must synchronise with semaphore or mutex (in shared memory with PTHREAD_PROCESS_SHARED). Compile with <code>-lrt</code>. Use when: large data transfer between processes, producer-consumer with high throughput."},{"id":50,"level":"intermediate","q":"What is a socket and what are the main socket types?","a":"A socket is an endpoint for communication. Created with: <code>int fd = socket(domain, type, protocol)</code>. Domains: AF_INET (IPv4), AF_INET6 (IPv6), AF_UNIX (local IPC). Types: SOCK_STREAM (TCP — reliable, ordered, connection-based), SOCK_DGRAM (UDP — unreliable, connectionless, fast), SOCK_RAW (raw IP packets). Protocol: usually 0 (auto). <code>close(fd)</code> to close. Sockets are file descriptors — can use <code>read/write</code> after connection. Both TCP and UDP available locally via AF_UNIX for high-performance IPC."},{"id":51,"level":"intermediate","q":"What is the TCP client-server connection sequence?","a":"Server: <code>socket() → bind() → listen() → accept()</code> (blocks waiting). Client: <code>socket() → connect()</code>. After <code>accept()</code> server gets a new fd for that client connection — original listening fd stays open for more connections. Data exchange: <code>send()/recv()</code> or <code>write()/read()</code>. Close: <code>close(fd)</code> — sends FIN. TCP handshake is handled by the kernel. Always check return values. Typical server loop: <code>while(1) { cfd = accept(lfd,...); handle(cfd); }</code>. Multi-client: fork per connection, or use select/poll/epoll."},{"id":52,"level":"intermediate","q":"What is CMake and why is it used?","a":"CMake is a cross-platform build system generator. It reads <code>CMakeLists.txt</code> and generates native build files (Makefiles on Linux, Visual Studio projects on Windows, Ninja files, etc.). Advantages: handles dependencies, compiler flags, platform differences, out-of-source builds. Basic flow: <code>cmake -B build -S .</code> (configure, generate), <code>cmake --build build</code> (compile). Minimum <code>CMakeLists.txt</code>: <code>cmake_minimum_required(VERSION 3.15)\nproject(MyApp)\nadd_executable(myapp main.c utils.c)</code>. Industry standard for C/C++ projects."},{"id":53,"level":"advanced","q":"How do you implement a lock-free ring buffer using atomics?","a":"Single-producer single-consumer (SPSC) lock-free ring buffer uses atomic head/tail. Producer: reads tail (acquire), writes data, atomically stores head+1 (release). Consumer: reads head (acquire), reads data, atomically stores tail+1 (release). No mutex needed because only one writer and one reader. Key: use <code>_Atomic size_t head, tail</code> with <code>memory_order_acquire/release</code> to ensure correct visibility. For multi-producer/consumer: use <code>atomic_compare_exchange_weak</code> (CAS) to claim a slot. Lock-free buffers used in: audio/video, kernel ring buffers (io_uring, perf), real-time systems."},{"id":54,"level":"advanced","q":"What is the difference between mutex, spinlock, and RW lock?","a":"Mutex: sleeping lock — blocked thread yields CPU, kernel wakes it on unlock. Good for long critical sections. Overhead: two syscalls per acquire/release. Spinlock: busy-wait loop — thread keeps checking in a tight loop. Good for very short critical sections on multi-core. Wastes CPU if held long. Use <code>pthread_spinlock_t</code> or atomic CAS. RW lock (<code>pthread_rwlock_t</code>): multiple readers OR one writer. <code>pthread_rwlock_rdlock</code> (shared), <code>pthread_rwlock_wrlock</code> (exclusive). Good for read-heavy workloads (e.g., configuration, cache). Writer starvation is possible — use timedrdlock variants."},{"id":55,"level":"advanced","q":"What is deadlock and how do you prevent it?","a":"Deadlock: two or more threads each hold a resource the other needs, blocking forever. Four conditions (Coffman): mutual exclusion, hold-and-wait, no preemption, circular wait. Prevention strategies: (1) Lock ordering — always acquire locks in the same global order (e.g., always lock A before B). (2) Try-lock with backoff — use <code>pthread_mutex_trylock</code>, release all held locks on failure and retry. (3) Lock timeout — <code>pthread_mutex_timedlock</code>. (4) Lock hierarchy — assign numeric levels, only lock higher level from lower. Detection: Valgrind's Helgrind, ThreadSanitizer."},{"id":56,"level":"advanced","q":"What is false sharing and how do you prevent it?","a":"False sharing: two threads write to different variables that happen to share the same cache line (64 bytes on x86/ARM). Each write invalidates the other core's cache line — massive performance hit despite no logical sharing. Example: <code>struct { int a; int b; } shared;</code> — if thread 1 writes a and thread 2 writes b, they false-share. Fix: pad structs to cache line size: <code>struct { int a; char pad[60]; int b; };</code> or <code>alignas(64) int a; alignas(64) int b;</code>. Also affects: per-thread counters, lock arrays. Profile with <code>perf stat -e cache-misses</code>."},{"id":57,"level":"advanced","q":"What is the memory model in C11 and what are memory orders?","a":"C11 introduced a formal memory model for concurrent programs. Memory orders for <code>_Atomic</code> operations: <code>memory_order_relaxed</code> — only atomicity, no ordering (use for independent counters). <code>memory_order_acquire</code> — no reads/writes in current thread move before this load. <code>memory_order_release</code> — no reads/writes move after this store. Acquire+release form a synchronisation pair. <code>memory_order_acq_rel</code> — both. <code>memory_order_seq_cst</code> — strongest, total order (default for <code>_Atomic</code> ops). Use relaxed for stats; acquire/release for producer-consumer; seq_cst for complex patterns."},{"id":58,"level":"advanced","q":"How do thread pools work and how do you implement a basic one?","a":"A thread pool pre-creates N worker threads that pull tasks from a shared queue. Components: work queue (mutex-protected linked list or ring buffer), condition variable (workers sleep when empty), worker threads (loop: lock, check queue, dequeue task, unlock, execute). Submit task: lock queue, enqueue function pointer + arg, signal condition. Shutdown: set stop flag, broadcast condition, join all threads. Benefits: amortises thread creation cost, limits thread count (prevents over-subscription), enables work prioritisation. Used in: web servers, game engines, parallel computation."},{"id":59,"level":"advanced","q":"How do you do non-blocking I/O multiplexing with select, poll, and epoll?","a":"<code>select(nfds, readfds, writefds, exceptfds, timeout)</code>: checks up to FD_SETSIZE (1024) fds. O(n) per call. Portable. <code>poll(fds, nfds, timeout)</code>: no FD_SETSIZE limit, cleaner API, still O(n). <code>epoll</code> (Linux only): <code>epoll_create1(0)</code>, add fds with <code>epoll_ctl(epfd, EPOLL_CTL_ADD, fd, &amp;ev)</code>, wait with <code>epoll_wait(epfd, events, MAX, timeout)</code>. O(1) for ready events — scales to 100K+ connections. Edge-triggered (EPOLLET) vs level-triggered. Used by: nginx, Redis, Node.js event loop. For portable high-performance: use libuv or libevent abstraction."},{"id":60,"level":"advanced","q":"What is a POSIX message queue and how does it differ from pipes?","a":"POSIX message queues (<code>mq_open/mq_send/mq_receive</code> from <code>&lt;mqueue.h&gt;</code>) preserve message boundaries (unlike pipes which are byte streams), support message priorities (<code>msg_prio</code> field — higher priority received first), persist between processes (kernel object), and allow non-blocking operations. Create: <code>mqd_t mq = mq_open(\"/myqueue\", O_CREAT|O_RDWR, 0666, &amp;attr)</code>. Send: <code>mq_send(mq, msg, len, prio)</code>. Receive: <code>mq_receive(mq, buf, sz, &amp;prio)</code>. Notify on arrival: <code>mq_notify</code>. Cleanup: <code>mq_close + mq_unlink</code>. Compile: <code>-lrt</code>."},{"id":61,"level":"advanced","q":"What is a TCP server that handles multiple clients with epoll?","a":"Pattern: (1) Create listening socket, set non-blocking: <code>fcntl(lfd, F_SETFL, O_NONBLOCK)</code>. (2) Create epoll fd, add listening socket. (3) Event loop: <code>epoll_wait</code> → for each ready event: if lfd — <code>accept</code> new client, add to epoll. If client fd — <code>read</code> data (loop until EAGAIN), process, <code>write</code> response. (4) On EPOLLERR/EPOLLHUP: close client fd, remove from epoll. Key: all sockets non-blocking — never block in the event loop. EPOLLET (edge-triggered): must read/write until EAGAIN. Handles 100K+ concurrent connections in a single thread."},{"id":62,"level":"advanced","q":"What is UDP socket programming and when do you use it?","a":"UDP is connectionless, no handshake, no delivery guarantee, but lower latency and overhead. Server: <code>socket(AF_INET, SOCK_DGRAM, 0) → bind()</code>. Receive: <code>recvfrom(fd, buf, sz, 0, &amp;src_addr, &amp;addrlen)</code> — gives sender address. Send response: <code>sendto(fd, buf, sz, 0, &amp;src_addr, addrlen)</code>. Client: <code>socket → sendto</code> (no connect needed). Use UDP for: DNS, DHCP, video/audio streaming (latency &gt; reliability), gaming (fast updates tolerate loss), SNMP, IoT sensors. Implement reliability on top if needed (like QUIC does). Max UDP payload: 65507 bytes (65535 - 20 IP - 8 UDP headers)."},{"id":63,"level":"advanced","q":"What is SO_REUSEADDR and SO_REUSEPORT socket options?","a":"<code>SO_REUSEADDR</code>: allows binding to a port in TIME_WAIT state (after server restart). Essential for servers — without it, restart fails with \"Address already in use\" for ~60 seconds. Set before bind: <code>setsockopt(fd, SOL_SOCKET, SO_REUSEADDR, &amp;(int){1}, sizeof(int))</code>. <code>SO_REUSEPORT</code> (Linux 3.9+): allows multiple sockets (even across processes) to bind to the same port — kernel load-balances incoming connections between them. Used by: multi-process servers (nginx), zero-downtime restarts. <code>TCP_NODELAY</code>: disables Nagle algorithm (reduces latency for interactive protocols)."},{"id":64,"level":"advanced","q":"What is CMake and how do you structure a real project?","a":"Project structure: <code>CMakeLists.txt</code> (root), <code>src/</code> (source), <code>include/</code> (public headers), <code>tests/</code>, <code>lib/</code>. Root CMake: <code>cmake_minimum_required(VERSION 3.20)\nproject(MyLib VERSION 1.0)\nset(CMAKE_C_STANDARD 11)\nadd_library(mylib src/core.c src/utils.c)\ntarget_include_directories(mylib PUBLIC include/)\nadd_executable(myapp src/main.c)\ntarget_link_libraries(myapp PRIVATE mylib)\nenable_testing()\nadd_subdirectory(tests)</code>. Build: <code>cmake -B build -DCMAKE_BUILD_TYPE=Release &amp;&amp; cmake --build build -j$(nproc)</code>. Install: <code>cmake --install build --prefix /usr/local</code>."},{"id":65,"level":"advanced","q":"How do you add external dependencies in CMake with FetchContent and find_package?","a":"FetchContent (downloads at configure time): <code>include(FetchContent)\nFetchContent_Declare(googletest GIT_REPOSITORY https://github.com/google/googletest.git GIT_TAG v1.14.0)\nFetchContent_MakeAvailable(googletest)\ntarget_link_libraries(mytest PRIVATE GTest::gtest_main)</code>. find_package (uses installed libraries): <code>find_package(OpenSSL REQUIRED)\ntarget_link_libraries(myapp PRIVATE OpenSSL::SSL OpenSSL::Crypto)</code>. pkg-config: <code>find_package(PkgConfig REQUIRED)\npkg_check_modules(LIBCURL REQUIRED libcurl)\ntarget_link_libraries(myapp PRIVATE ${LIBCURL_LIBRARIES})\ntarget_include_directories(myapp PRIVATE ${LIBCURL_INCLUDE_DIRS})</code>."},{"id":66,"level":"advanced","q":"What are CMake targets, properties, and visibility specifiers?","a":"Everything in modern CMake is a target (executable or library). Properties attached to targets control compilation. Visibility: <code>PUBLIC</code> (applies to target AND anything linking it), <code>PRIVATE</code> (applies only to target), <code>INTERFACE</code> (applies only to things linking it — not the target itself). Examples: <code>target_compile_options(mylib PRIVATE -Wall -Wextra)\ntarget_include_directories(mylib PUBLIC include/ PRIVATE src/)\ntarget_compile_definitions(mylib PUBLIC MYLIB_VERSION=2)\ntarget_link_libraries(myapp PRIVATE mylib pthread)</code>. Avoid global commands (<code>include_directories</code>, <code>add_compile_options</code>) — they pollute all targets."},{"id":67,"level":"advanced","q":"How does multicore programming differ from multithreading?","a":"Multithreading: concurrent execution, may run on one or multiple cores. Multicore: true parallelism — threads genuinely run simultaneously on separate CPU cores. On a single-core CPU, multithreading achieves concurrency via time-slicing (not parallelism). For multicore, key concerns: (1) Cache coherence — MESI protocol ensures consistency but causes overhead. (2) NUMA (Non-Uniform Memory Access) — memory access latency depends on which NUMA node holds the data. (3) False sharing (see above). (4) Amdahl's law limits speedup by serial fraction. Tools: <code>taskset</code> (CPU affinity), <code>numactl</code> (NUMA binding), <code>sched_setaffinity</code> in code."},{"id":68,"level":"advanced","q":"What is a barrier in multithreaded programming?","a":"A barrier is a synchronisation point where all participating threads must arrive before any can proceed. POSIX: <
