  {id:9,level:'basic',q:'What is a graph and what are its representations?',a:'A graph G = (V, E) has vertices (nodes) and edges (connections). Directed (digraph): edges have direction. Undirected: edges are bidirectional. Weighted: edges have costs. Representations: Adjacency matrix (V×V matrix, O(V²) space, O(1) edge lookup), Adjacency list (array of lists, O(V+E) space, O(degree) edge lookup — preferred for sparse graphs). Other: edge list, adjacency map. Use cases: social networks, maps, dependencies, networks.'},
  {id:10,level:'basic',q:'What is the difference between BFS and DFS?',a:'BFS (Breadth-First Search): explores level by level using a queue. Finds shortest path in unweighted graphs. Time O(V+E), Space O(V). DFS (Depth-First Search): explores as deep as possible using a stack (or recursion). Used for: cycle detection, topological sort, connected components, pathfinding. Time O(V+E), Space O(V). BFS for shortest path; DFS for exploring all paths, detecting cycles, topological ordering.'},
  {id:11,level:'basic',q:'What is Big O notation and the most common complexities?',a:'Big O describes the worst-case growth rate of an algorithm\'s time or space as input grows. Common complexities (best to worst): O(1) constant, O(log n) logarithmic (binary search), O(n) linear (linear search), O(n log n) linearithmic (merge sort, heap sort), O(n²) quadratic (bubble sort, nested loops), O(2ⁿ) exponential (recursive Fibonacci), O(n!) factorial (brute-force permutations). Always analyse for the dominant term and drop constants.'},
  {id:12,level:'basic',q:'What is a dynamic array (ArrayList/vector) and how does it grow?',a:'A dynamic array wraps a fixed-size array, automatically resizing when full. Growth strategy: when capacity exceeded, allocate a new array (typically 2× size) and copy all elements. Amortised O(1) append — although individual appends can be O(n) during resize, averaged over n appends the cost is O(1) per operation. Random access O(1). Examples: Python <code>list</code>, Java <code>ArrayList</code>, C++ <code>std::vector</code>. Trade-off: occasional O(n) resize vs always-O(1) linked list insert-at-head.'},
  {id:13,level:'basic',q:'What is a deque (double-ended queue)?',a:'A deque supports O(1) insert and delete at both front and back. Implements both stack and queue. Implementations: doubly linked list, or circular array with two pointers. Python: <code>collections.deque</code>. C++: <code>std::deque</code>. Use cases: sliding window maximum (monotonic deque), palindrome checking, undo/redo with front-to-back browsing, BFS with priority adjustment. More versatile than a plain queue but slightly more overhead.'},
  {id:14,level:'basic',q:'What is recursion and what is a base case?',a:'Recursion is a function calling itself to solve a smaller sub-problem. Base case: the condition that stops recursion (no more recursive calls). Without a base case: infinite recursion → stack overflow. Example: <code>factorial(n) = n * factorial(n-1); factorial(0) = 1</code> (base case). Recursion is natural for: tree traversal, divide-and-conquer, DFS, backtracking. Every recursive algorithm can be converted to iterative (using an explicit stack). Watch: Python default recursion limit is 1000 (<code>sys.setrecursionlimit</code>).'},
  {id:15,level:'basic',q:'What is a circular linked list?',a:'A circular linked list has the last node pointing back to the first node (instead of NULL). Singly circular: tail.next = head. Doubly circular: tail.next = head AND head.prev = tail. Advantages: can traverse the entire list from any node, efficient for round-robin scheduling, circular buffer implementation. Disadvantage: easy to create infinite loops if not careful — always check for cycle termination. Detect cycle in any linked list: Floyd\'s cycle detection (fast/slow pointer).'},
  {id:16,level:'intermediate',q:'What are the self-balancing BST variants and when do you use them?',a:'AVL tree: strictly balanced (height difference ≤ 1 at every node), faster lookups, more rotations on insert/delete. Red-Black tree: relaxed balance (black height equal), fewer rotations, used in Linux kernel, C++ <code>std::map</code>, Java <code>TreeMap</code>. B-tree/B+ tree: multi-way balanced tree, optimised for disk I/O, used in databases and file systems (each node holds many keys, matches disk block size). Skip list: probabilistic, simpler to implement, used in Redis sorted sets. All guarantee O(log n) operations.'},
  {id:17,level:'intermediate',q:'How does a hash table handle collisions with chaining vs open addressing?',a:'Chaining: each bucket holds a linked list of all keys that hash to that index. Load factor can exceed 1. Simple, handles high load well. Cache-unfriendly. Open addressing: on collision, probe for next empty slot. Linear probing: check i+1, i+2... (causes clustering). Quadratic probing: check i+1², i+2²... Double hashing: second hash function determines step. All slots in one array — cache-friendly, but load factor must stay below 0.7. Deletion in open addressing needs tombstone markers.'},
  {id:18,level:'intermediate',q:'What is a trie (prefix tree) and what is it used for?',a:'A trie is a tree where each node represents a character, and paths from root to nodes represent strings. Insert, search, prefix-search all O(L) where L = string length. Space: O(ALPHABET_SIZE × L × N) — can be large. Use for: autocomplete, spell-checking, IP routing (radix trie), dictionary implementation, prefix matching. Compressed trie (radix tree): merges single-child nodes to save space. Example: implement a dictionary with <code>startsWith</code> query in O(L) regardless of dictionary size.'},
  {id:19,level:'intermediate',q:'What is a segment tree and what problems does it solve?',a:'A segment tree is a binary tree built over an array that supports: range queries (sum/min/max over a range) in O(log n), point updates in O(log n). Built in O(n). Each node stores aggregate (e.g. sum) of its range. Example: given array of n integers, answer Q queries of the form "sum of elements from index l to r", with updates. Naively O(n) per query; segment tree O(log n). Lazy propagation extends to range updates in O(log n). Alternative: Fenwick tree (BIT) — simpler, only sums, O(log n).'},
  {id:20,level:'intermediate',q:'What is a Fenwick tree (Binary Indexed Tree)?',a:'A BIT supports: prefix sum query O(log n), point update O(log n), O(n) build. Simpler and faster constant than segment tree for prefix sums. Implementation: array where BIT[i] stores sum of a specific range determined by lowest set bit of i. Update: <code>while i ≤ n: BIT[i] += val; i += i & (-i)</code>. Query: <code>while i > 0: sum += BIT[i]; i -= i & (-i)</code>. Use when you only need prefix sums with updates — more space-efficient than segment tree.'},
  {id:21,level:'intermediate',q:'What is a priority queue and how is it different from a regular queue?',a:'A priority queue dequeues elements in priority order (not arrival order). Highest (or lowest) priority element is always at front. Implemented with a heap: O(log n) insert, O(log n) extract-min/max, O(1) peek. Python: <code>heapq</code> (min-heap). Java: <code>PriorityQueue</code>. C++: <code>std::priority_queue</code>. Use for: Dijkstra\'s shortest path, A* search, Huffman encoding, task scheduling, finding k-th largest/smallest elements efficiently, merging k sorted arrays.'},
  {id:22,level:'intermediate',q:'Explain Dijkstra\'s algorithm and its data structure requirements.',a:'Dijkstra finds shortest paths from a source to all vertices in a weighted graph with non-negative edges. Algorithm: initialise distances to infinity, source to 0. Use min-heap (priority queue). Extract minimum-distance unvisited node, relax all its neighbours. Repeat. Time: O((V + E) log V) with binary heap. Requires non-negative edge weights (use Bellman-Ford for negative weights). Data structures needed: priority queue (min-heap), distance array, visited set/array. Used in: GPS navigation, network routing (OSPF).'},
  {id:23,level:'intermediate',q:'What is a disjoint set (Union-Find) data structure?',a:'Union-Find tracks a collection of disjoint sets and supports: <code>find(x)</code> — which set does x belong to? and <code>union(x,y)</code> — merge sets containing x and y. With path compression (flatten tree on find) and union by rank (attach smaller tree under taller): both operations are nearly O(1) amortised (inverse Ackermann O(α(n))). Use for: Kruskal\'s MST algorithm, detecting cycles in undirected graphs, connected components, percolation theory. Essential for graph algorithms.'},
  {id:24,level:'intermediate',q:'What is a monotonic stack and when do you use it?',a:'A monotonic stack maintains elements in strictly increasing or decreasing order. When a new element violates the order, pop until it doesn\'t. Solves "next greater element" type problems in O(n) instead of O(n²). Problems: next greater element, previous smaller element, largest rectangle in histogram, trapping rainwater, stock span problem. Pattern: iterate through array, maintain stack of indices, pop when current element is greater (for next-greater-element). Very common in interview problems on arrays.'},
  {id:25,level:'intermediate',q:'What is the difference between a tree and a graph?',a:'A tree is a connected, acyclic undirected graph with exactly n-1 edges for n nodes. Every pair of nodes has exactly one path between them. A graph is the general case: may have cycles, may be disconnected, directed or undirected, any number of edges. A rooted tree adds a designated root. A forest is a collection of disjoint trees. All trees are graphs but not all graphs are trees. Tree traversal is simpler (no visited set needed if you don\'t traverse to parent). Graph traversal needs a visited set to avoid infinite loops.'},
  {id:26,level:'intermediate',q:'What is topological sort and when is it used?',a:'Topological sort orders vertices of a directed acyclic graph (DAG) such that for every edge u→v, u comes before v. Algorithms: Kahn\'s (BFS-based, uses in-degree array + queue) or DFS-based (reverse post-order). Time O(V+E). Not possible if graph has a cycle. Use for: build system dependency resolution (Make, Bazel), course prerequisite ordering, package installation order, instruction scheduling. Detect cycle: if topological sort doesn\'t include all vertices, there is a cycle.'},
  {id:27,level:'intermediate',q:'What is the difference between a min-heap and max-heap, and how do you simulate one with the other?',a:'Min-heap: parent ≤ children — <code>extractMin()</code> is O(log n). Max-heap: parent ≥ children — <code>extractMax()</code> is O(log n). Python\'s <code>heapq</code> is min-heap only. Simulate max-heap: negate all values — insert <code>-x</code>, extract and negate result. Use both simultaneously for: median of data stream (max-heap of lower half + min-heap of upper half). Two-heap median: max-heap size = min-heap size or +1. Median = max-heap top (or average of both tops).'},
  {id:28,level:'intermediate',q:'What is dynamic programming and how does it relate to data structures?',a:'DP solves problems by breaking them into overlapping sub-problems, storing results to avoid recomputation (memoization = top-down; tabulation = bottom-up). Key data structures: 1D array (Fibonacci, coin change), 2D array (LCS, edit distance, knapsack), hash map (for sparse state spaces). Identify DP: optimal substructure + overlapping sub-problems. Common problems: longest common subsequence, 0/1 knapsack, edit distance, longest increasing subsequence, matrix chain multiplication. DP = smart recursion + storage.'},
  {id:29,level:'intermediate',q:'How does a hash map handle resizing and what is the amortised cost?',a:'When load factor exceeds threshold (typically 0.75 for Java HashMap), the hash map doubles its capacity and rehashes all existing entries. Rehash is O(n) per resize. Amortised analysis: over n insertions, total rehash work = n/2 + n/4 + ... = O(n). So amortised cost per insertion is O(1). Space doubles on resize — peak usage can be 2× current. To avoid resizing overhead for known size, pre-size: <code>HashMap(int initialCapacity)</code> in Java, or reserve in C++ <code>unordered_map</code>: <code>map.reserve(n)</code>.'},
  {id:30,level:'intermediate',q:'What is the LRU cache and how do you implement it?',a:'LRU (Least Recently Used) cache evicts the least recently accessed item when capacity is full. Operations: <code>get(key)</code> O(1), <code>put(key, value)</code> O(1). Implementation: doubly linked list (for O(1) move-to-front and eviction from back) + hash map (for O(1) key lookup). On get/put: move node to front. On capacity exceeded: remove tail node and its hash map entry. Python: <code>collections.OrderedDict</code> or <code>@functools.lru_cache</code>. Java: <code>LinkedHashMap</code> with <code>removeEldestEntry</code>. Classic interview problem.'},
  {id:31,level:'intermediate',q:'What is a B-tree and why is it used in databases?',a:'A B-tree is a self-balancing multi-way search tree where each node can hold many keys (order m = max keys+1). All leaves are at same depth. Search, insert, delete: O(log n). B+ tree (used in most databases): data only at leaves, internal nodes hold only keys for routing, leaves linked in a list for range scans. Reasons databases use B-trees: (1) nodes sized to match disk block size (4-16KB) — minimises disk I/O, (2) O(log_{m} n) height means 3-4 levels for millions of records, (3) range queries efficient via leaf linking.'},
  {id:32,level:'intermediate',q:'What is a graph\'s adjacency list vs adjacency matrix and when to use each?',a:'Adjacency matrix: V×V boolean/weight matrix. Space O(V²). Edge lookup O(1). Iteration over neighbours O(V). Good for: dense graphs (many edges), frequent edge-existence checks. Adjacency list: array of lists (or hash maps). Space O(V+E). Edge lookup O(degree). Iteration over neighbours O(degree). Good for: sparse graphs (most real-world graphs), BFS/DFS. Rule of thumb: use matrix when E ≈ V², list when E << V². Most graph algorithms (BFS, DFS, Dijkstra) are designed for adjacency lists.'},
  {id:33,level:'intermediate',q:'What is a sliding window and when do you use it?',a:'Sliding window maintains a contiguous subarray/substring of variable or fixed length by advancing two pointers instead of recomputing from scratch. Fixed window: move both pointers in lockstep. Variable window: expand right pointer, shrink left when condition violated. Time O(n) vs naive O(n²) or O(n³). Use for: longest substring without repeating characters, minimum window substring, maximum sum subarray of size k, count of distinct elements in every window. Key: identify what aggregate you maintain (sum, frequency map, deque for max).'},
  {id:34,level:'intermediate',q:'What are common tree interview patterns?',a:'1. Tree traversal (in/pre/post/level-order). 2. Height/depth calculation. 3. Lowest Common Ancestor (LCA) — binary lifting or DFS. 4. Diameter of tree (longest path between two nodes). 5. Check if balanced, BST, symmetric, identical. 6. Serialize/deserialize a tree. 7. Path sum problems (root-to-leaf). 8. Construct tree from traversal arrays. 9. Morris traversal (O(1) space in-order). 10. Flatten binary tree to linked list. For BSTs specifically: floor/ceil, kth smallest, validate BST, successor/predecessor.'},
  {id:35,level:'intermediate',q:'What is the two-pointer technique?',a:'Two pointers maintain two indices into an array or linked list to solve problems in O(n) instead of O(n²). Patterns: (1) Opposite ends converging — two sum in sorted array, palindrome check, container with most water. (2) Slow/fast — detect cycle in linked list (Floyd\'s), find middle of linked list, remove nth from end. (3) Sliding window (see above). (4) Merge two sorted arrays. Key insight: instead of nested loops, move pointers smartly based on a comparison. Works because the input has a useful monotonic property (sorted, or window property).'},
  {id:36,level:'intermediate',q:'What is memoization and how does it differ from tabulation?',a:'Memoization (top-down DP): write the recursive solution, add a cache (dict/array) to store results of sub-problems. First call computes, subsequent calls return cached result. Natural to implement, only computes needed states. Tabulation (bottom-up DP): fill a table iteratively starting from base cases, building up to the answer. No recursion overhead, easier to optimise space (rolling array). Both O(n) time for Fibonacci. Use memoization for: complex state spaces, when not all sub-problems are needed. Tabulation for: performance-critical code, space optimisation.'},
  {id:37,level:'intermediate',q:'What is a sparse table and what is it used for?',a:'A sparse table answers range minimum (or maximum) queries in O(1) after O(n log n) preprocessing. Builds table <code>sp[i][j]</code> = min of 2^j elements starting at i. Query for range [l,r]: find k = floor(log2(r-l+1)), answer = min(sp[l][k], sp[r-2^k+1][k]). The two intervals overlap but that\'s fine since we\'re taking min/max (idempotent). Updates not supported (static structure). Use for: static range minimum query (RMQ), LCA in trees via Euler tour + RMQ. Segment tree is more general (supports updates).'},
  {id:38,level:'intermediate',q:'What is a graph\'s strongly connected component (SCC)?',a:'An SCC is a maximal set of vertices such that there is a path from each vertex to every other vertex. Only meaningful for directed graphs. Algorithms: Kosaraju\'s (two DFS passes — one on original, one on transposed graph in reverse finish order) or Tarjan\'s (one DFS with a stack and low-link values). Both O(V+E). Use for: finding cycles in directed graphs, condensation DAG (collapse each SCC to a single node), dependency analysis, 2-SAT problems, compiler optimisation.'},
  {id:39,level:'intermediate',q:'What are common string data structures?',a:'Suffix array: sorted array of all suffixes — O(n log n) build, O(log n) pattern search with LCP array. Suffix tree: compressed trie of all suffixes — O(n) build (Ukkonen\'s), O(m) search. Aho-Corasick automaton: multi-pattern string matching in O(n+m+z) where z = matches — built from a trie with failure links. Rolling hash (Rabin-Karp): O(1) hash computation per window for string search. Z-array: Z[i] = length of longest substring starting at i matching a prefix of string — O(n) pattern matching. KMP failure function: O(n+m) single-pattern search.'},
  {id:40,level:'intermediate',q:'What is the time complexity of sorting algorithms?',a:'Comparison-based lower bound: Ω(n log n). O(n log n) algorithms: Merge sort (stable, O(n) extra space), Heap sort (in-place, not stable), Quick sort (average O(n log n), worst O(n²) — mitigated by random pivot). O(n²): Bubble, Selection, Insertion sort (but insertion sort is O(n) for nearly-sorted — used in practice for small arrays). Non-comparison (beat the lower bound): Counting sort O(n+k), Radix sort O(d(n+k)), Bucket sort O(n) average. Python\'s Timsort and Java\'s Arrays.sort are hybrid merge+insertion sort — O(n log n) worst case, O(n) best case.'},
],
};

let viewed = {};
let levelFilter = {};
TOPICS.forEach(t => { viewed[t.id] = new Set(); levelFilter[t.id] = 'all'; });
let activeTopic = 'linux';

function switchTopic(id) {
  activeTopic = id;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tbtn-' + id).classList.add('active');
  document.querySelectorAll('.topic-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
}

function setLevel(topicId, level, el) {
  levelFilter[topicId] = level;
  el.closest('.topic-panel').querySelectorAll('.ltab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderQuestions(topicId);
}

function toggle(topicId, id) {
  const el = document.getElementById('qi-' + topicId + '-' + id);
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  if (!wasOpen) { viewed[topicId].add(id); updateProgress(topicId); }
}

function updateProgress(topicId) {
  const total = ALL_QUESTIONS[topicId].length;
  const done = viewed[topicId].size;
  const pct = Math.round((done / total) * 100);
  const fill = document.getElementById('prog-' + topicId);
  const txt = document.getElementById('progtxt-' + topicId);
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = done + ' / ' + total;
}

function renderQuestions(topicId) {
  const qs = ALL_QUESTIONS[topicId];
  const level = levelFilter[topicId];
  const filtered = level === 'all' ? qs : qs.filter(q => q.level === level);
  const basics = filtered.filter(q => q.level === 'basic');
  const ints = filtered.filter(q => q.level === 'intermediate');

  function renderGroup(items, label, badge) {
    if (!items.length) return '';
    let s = '<div class="section-label">' + label + '</div>';
    items.forEach(q => {
      s += '<div class="q-item" id="qi-' + topicId + '-' + q.id + '">' +
        '<div class="q-header" onclick="toggle(\'' + topicId + '\',' + q.id + ')">' +
        '<span class="q-num">' + q.id + '.</span>' +
        '<span class="q-text">' + q.q + '</span>' +
        '<span class="q-chevron">&#9658;</span>' +
        '</div><div class="q-body"><span class="badge">' + badge + '</span><br>' + q.a + '</div>' +
        '</div>';
    });
    return s;
  }

  const container = document.getElementById('qs-' + topicId);
  let html = renderGroup(basics, 'Basic', 'Basic') + renderGroup(ints, 'Intermediate', 'Intermediate');
  if (!html) html = '<p class="empty">No questions match this filter.</p>';
  container.innerHTML = html;
}

// Build UI
const nav = document.getElementById('topic-nav');
const panels = document.getElementById('panels');

TOPICS.forEach(t => {
  const total = ALL_QUESTIONS[t.id].length;
  const basicCount = ALL_QUESTIONS[t.id].filter(q => q.level === 'basic').length;
  const intCount = ALL_QUESTIONS[t.id].filter(q => q.level === 'intermediate').length;

  const btn = document.createElement('button');
  btn.className = 'topic-btn ' + t.cls + (t.id === activeTopic ? ' active' : '');
  btn.id = 'tbtn-' + t.id;
  btn.onclick = () => switchTopic(t.id);
  btn.innerHTML = '<span class="dot"></span>' + t.icon + ' ' + t.label + ' <span style="font-size:11px;opacity:0.7">(' + total + ')</span>';
  nav.appendChild(btn);

  const panel = document.createElement('div');
  panel.className = 'topic-panel ' + t.cls + (t.id === activeTopic ? ' active' : '');
  panel.id = 'panel-' + t.id;
  panel.innerHTML =
    '<div class="progress-row">' +
    '<span class="progress-label">Viewed</span>' +
    '<div class="progress-bar"><div class="progress-fill" id="prog-' + t.id + '" style="background:var(--tc);"></div></div>' +
    '<span class="progress-count" id="progtxt-' + t.id + '">0 / ' + total + '</span>' +
    '</div>' +
    '<div class="level-tabs">' +
    '<button class="ltab ' + t.cls + ' active" onclick="setLevel(\'' + t.id + '\',\'all\',this)">All (' + total + ')</button>' +
    '<button class="ltab ' + t.cls + '" onclick="setLevel(\'' + t.id + '\',\'basic\',this)">Basic (' + basicCount + ')</button>' +
    '<button class="ltab ' + t.cls + '" onclick="setLevel(\'' + t.id + '\',\'intermediate\',this)">Intermediate (' + intCount + ')</button>' +
    '</div>' +
    '<div id="qs-' + t.id + '"></div>';
  panels.appendChild(panel);
  renderQuestions(t.id);
});
</script>
</body>
